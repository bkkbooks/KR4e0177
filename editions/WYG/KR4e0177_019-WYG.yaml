body:
  text: 小山類稿巻十九明張岳撰志論惠安縣志論有序惠安縣志十三巻嘉靖庚寅春邑大夫莫侯敬中以纂述之職屬余余爲采摭故實旁徴故老聞見擇其可以厚民生善風俗興政務者次第成巻巻有題辭不發凡起例而所以纂述之意各於叙論見之其非吾邑之故不以勦入傳曰所見異辭所聞異辭所傳聞異辭時世有逺近則其辭不能無詳畧也自有邑以來至今上下五六百載中間陵谷之變尚不能盡同况於時事之因革從宜寖逺寖忘豈一人一日所能盡識是故其遺落多矣若夫記述近事欲以厚生善俗而興政務區區之辭感發於所見聞有不覺其繁且多者世必有讀余言而得余心則是十三巻者其亦足備吾邑之芻蕘也與􅄱勝論曰余行天下見江南諸山由西北昆侖發原至岷山乃折而東爲楚越諸郡東北至吳淞際海而止江漢水交流其下今以吾邑觀之亦然意天下山川雖細大不侔其脉絡固有同歟古人建都置邑必審擇山川風氣有以也夫封域論曰吾邑廣輪之數止是爾然且包山林並原隰椁其中斬長綴短可耕之田不能紓三之一斥鹵者㡬半上承㑹府下引漳潮之衝并日以馳不足也夫不察地利夲末猥令豐瘠同科顓顓焉執計簿以取盈爲事不已虧乎圗里論曰周官井牧書自四井爲邑逓登其四以至於都故都無殊縣縣無殊甸甸無殊丘丘無殊井是故賦平而政一後世都圖倣是設也然非計丘畆以均其制多寡盈乏相懸絶大者自分爲二矣小者至不能都或比其二三乃得與他都齒調賦經用胥吏舞手爲奸民仰首受成莫有知所由然者故經界不行圖里不均由今之道而欲以至於治難矣險塞論曰觀古人審畧封疆必先制其陿阸明斥堠其於折伏狂狡之術可不謂豫哉吾邑山海之道交衝地小而爲備者多幸時無事與四隣同其安靜一不幸有援桴馳羽之變寜能晏然而已乎故曰小國無罪恃實其罪可不戒哉可不戒哉諸山大勢論曰余嘗登龍山絶頂環望邑中諸山自西北大㡌麓别支分迤邐將窮則環以鉅海精氣停洩爲雲雨爲草木爲庶品其最竒秀者爲人物嗚呼此造化之紀也邑無大小必有崇山鉅川以奠地守彼徒探幽討勝蘄於一賞者又烏覩所謂山川者乎諸水大勢論曰吾邑北有楓亭溪南有洛陽江合山谷諸水受之以獨趨於海山之出兩水之間爲邑境壤亦將至海而窮矣而直數十里内洄洑嵁巖稍縁山麓以行其源流逺近可知也然其流惡鍾美潤槁生物與人事相因爲用則邑之農田蓋資之而不可以泯没者故各夲其脉絡著之潮汐論曰古稱善富國者為能擅山海之業通漁鹽之利也余嘗東臨海門觀漁人所操諸網技極其纎備南循徼海鹵地場團蓋纍纍焉可謂無遺利矣歲稍不登則漁鹽之民輒先病何也豈所謂厚生足用者將不在是歟不然則必有授之病者矣利不在民雖多奚益可不審哉土田論曰埭之受諸溪亦夲其地勢􅄱便所趨爾要之發源不逺耕上流者復導以注其田豈有餘潤可以逺及故埭田多旱若其鹹淡交蒸流淤盪委土力深厚得其術以治之大抵皆渥壤也是以善爲國者常寛萊田之征勸農功興水利於斯時也豈復有田荒弗治懸賦額以爲民病者乎噫非一日矣水利論曰今學者多不譚水利以爲猥瑣無益於名理若周官遂人匠人職爲溝洫之事謂爲水利非邪夫以吾邑之墝埆斗泄愆旬弗雨輒告旱若㑹覈土田以沃瘠燥濕相乗除度其需於溉注者㡬何稍率民力以興之不及數年其利猶可収豐年之半也事當爲而莫之爲惜哉橋梁論曰所謂橋梁道路者考圖經作於宋世居多南渡後尤多今國家承平日久民物殷阜宜有餘力以興百務也而橋梁道路之修反不及宋季世何歟或言宋海舶無禁利入甚富且易不捐之於橋梁道路則以崇侈釋氏無所愛惜理或然歟不然則物力登耗必有任其責者矣夲業論曰讀蟋蟀之詩見唐風之憂深而思逺以爲有堯之遺焉吾邑亦然其土􅇤而民貧土瘠則勤民貧則儉是故善心易生而可致於理也雖然由君子觀之爲易興於善由末世觀之無以堪上人之誅求不幸瘠與貧也祗有死亡而已豈非各繫其時不同哉悲夫習尚論曰聞之𢎞治前風雨時若歲頻有秋其時官吏亦奉法遵職與民相安無事故俗號稱近古自正德初某人以苛刻爲政剥膚敲骨者六年加之屢有水旱之災民窮譎詐漸生風俗始爲之一變然其愿畏而儉朴者故在也昔夫子論齊魯之俗不同以爲至道則有難易嗚呼道不可得見矣長民者謹勿以魯而之齊也哉歲時論曰今世所謂俗節者雖不能一一合於禮然行之既久所以崇愛敬接慇懃使親疎上下聫屬而不散雖聖王有作亦所當損益莫之有改焉者也夫能使民歡欣和恱及時相樂而無愁怨之聲此非賦平刑省歲豐時和不及此而豈一日所能强致哉可以觀政矣雜占論曰書稱敬授民時傳言凡分至啓閉必書雲物爲備也古人謹節候以重農如此近世歴書雜以修方剋擇乃巫史小數非古人授時正法而占候之術又祕不傳是以水旱災祥大率後時不及爲備蓋保章眡祲氏之職廢久矣農夫野老欲拘滯歲時成迹以質諸未然不近誣歟然其譚水旱災祥時或微中有不可廢者故擇其稍闗分至啓閉者存之爲老農聞見資焉穀屬論曰吾邑論五榖重稻論歲豐歉亦唯視稻徃歲稻嘗弗登矣民食且急已而麥大熟黍稷粱豆之屬皆熟一歲之蓄沛乎亦有餘計也特其夲在稻耳是故丘陵藪澤髙下相因食地博而墾藝兼之以此治國則無敝國以此治生則無匱民故曰黍稷重穋禾麻菽麥蓋兼之也蔬屬論曰夫蔬品之於民食切矣昔樊遲願學稼又願學圃意其栽培䕶養必有成法如世所傳種樹書者古人作事不茍亦必待學而後能之周官宅不毛者有罰漢書言千畝巵茜千畝薑韭其人與千户侯等其重如此惜吾邑人之勤力於此者少也諸品甚多特據邑中所宜取其美者列之以資老圃木屬論曰松栢楓楠以材桑柘以葉槐以華烏桕以實栟櫚以鬷榕以䕃諸此類皆美材也徃年風雨時叙自海隅逹之山陬莫不有茂林蒙密今則童山而樵矣擁腫拳曲之給薪蒸者無幾而况有所謂材且美者哉氣數有盛衰則草木亦與之消長噫可畏哉畜屬論曰吾邑牧畜之利頗博假令一夫傭田以耕水旱災眚卒然莫爲備有牝牛一羊豕之牝者一鷄鵝鴨雌者亦一牛歲乳羊豕時乳鵝亦時乳鷄鴨以月乳胎伏者不夭殰稿秸稃秕播屑雖微謹畜而時字之則孳息日蕃衣食百需緩急亦或有賴也不至甚病漢世循吏常以時課民種蔥韭瓜匏及畜牛羊鷄豚葢古之勤民者已如此鳥獸魚蟲之屬論曰吾邑地兼山海俶儻詭怪之産皆有然其肉不登於俎皮革齒牙骨角羽毛不登於器雖有殊絶猶無濟於民生也夫鳥獸魚鼈之登耗與政事實相流通故書稱咸若詩歎於牣其理有足徴者余故列其可登於俎與器者將驗其登耗以觀政理焉若其他則圖經本草載之詳矣貨屬論曰天生五材民並用之故先王之任民也審度天時地利因民所冝榖粟桑麻爲夲佐以山海而權以泉布使民通變不倦以成其務是故均之利也爲民興之則王爲國興之則霸攘以自私而民與國無利焉則謂之蠧嗚呼今之司民者其王邪霸邪蠧邪户口論曰吾觀版籍軍民户額軍户幾三之一其丁口幾半於民籍噫何其多也國初患尺籍不足三丁一抽有犯者輒編入戎伍至父子兄弟不能相免也乃令户多耗矣而舎匿隱漏之灋猶存先王之訓曰罸不及嗣嗣猶弗忍也况於世世及之邪與先王異矣窮則變變則通兹非其時歟田賦論曰自唐中葉以後田制不明至我朝版籍之法乃爲詳備觀其鱗次櫛比詳畧相因秩秩乎其條理之也及夫法久弊生老奸巨蠧蟠穴乎其中於是田産有暗飛詭寄包荒移換錢榖有駕空埋跡虛入實出之弊莫不援引版賦以爲左驗自非精密小心傍推逺考未有不爲所眩者况以簿書應接之閒而欲察見端緒不亦難乎故曰盡信書不如無書盖存乎人焉爾矣課程論曰吾讀管子鹽鐵書至於日食升兩及一刀一鍼莫不𣙜算詳盡使利出一孔悲夫霸者之用心也彼嘗勸其君務農重榖分業四民亦足以富國制敵而售其術矣何乃瑣瑣若是而後世祖述之者又或失其意是以或𣙜之而國貧或捐之而民富其利害相去逺甚然則所謂鹽鐵者固必管子行之乃能無弊也歟古人推論世變至五霸而止自霸以下尚足言哉尚足言哉支費論曰此所謂經常之費著在令式者如此冗費不在焉吾常論州縣冗費如投石於水石没而水無迹故敷配不足以至折贖折贖不足必至科罰科罰不足必至抑勸近者屢下省費之詔反復諄切吏直以尋常頒降條格視之而已豈知民窮財且盡矣沉痛無所告則嗟怨謗讟足以感傷和氣而生意外之災哉前後令長能省費者不少唯陳令所裁定頗得中故表而録之兵役論曰民出食以養兵兵出力以衛民此雖後世之制然行之既久兵民咸便近者畜兵不用緩急征調皆於民兵乎事之是民既出食以養兵而又出力以衛之也何其不幸或疑令甲臨陣損失官軍者罪至大辟夫令嚴其灋者欲平時教閲精鋭戰無不克爾非以啓兵驕將惰而專責戰於民也失初意矣學政論曰夫論學校教養之灋昔人備矣今制有卧碑有勑諭有提學條教其灋制嚴密最爲戢斂學者使不敢肆若夫有志實學者豈必待此而後知自厲哉故曰義理之恱我心猶芻豢之恱我口義理不足以恱心而徒恃區區灋制其為教與學抑末矣書籍論曰兩漢時學者重專門誠太隘然習一經之士終身守其師說如蓍龜然雖義理未精規模未𢎞不害其爲篤信也故兩漢士習終近古今學者記問日富下筆動數千言穿貫他書不名一藝郁郁乎盛矣然求一如漢儒名家且不可得况於深造自得者乎夫子云雖多亦奚以爲蓋病之矣典祠論曰壇社稷於西郊北嚮陰神也壇山川風雲雷雨於南郊南嚮陽神也故社稷有望瘞而山川有望燎各從其氣也厲於北郊鬼之也而祭以反而伸之故亦南嚮余嘗以諸生陪祀獲覩牲幣祝號奠獻登升之數秩秩乎其文之也若其義則非博學精深者不能道孔子嘗曰祭神如神在又曰治國其如視諸掌乎聖人之不易於祭也如是哉鄉賢名宦論曰自宋以來邑大夫政蹟不登圖牒獨斷碑殘刻時髣髴見其名字又以他書參之知其決有善政者此數公也鄉先輩行事舊志所載亦弗詳而得於故老聞見猶灼然可考是以既敘其傳矣又擇其卓卓可入祀典者以實鄉賢蓋善惡之公必越世而後定一鄉之嚮慕存焉其敢忽諸雜祠論曰張黄二將歿數百年尚能顯神靈以庇鄉人其事甚怪此與三山志所稱鎮閩王事何異皆英雄猛悍之氣久而磅結不散亦所憑山川使然也濟陽以下茫昧遼邈然以其食於民也久故附列之與張黄異矣丘墓論曰吾邑薦經喪亂文獻殘缺先輩諸賢至於居址子孫今且無以知其所在而况於荒丘頽壠世遠堙沒者乎夫操行之難也使越世之後丘壠翳然登者或歌而過者不式趙文子雍門之徒所爲感歎悲哀而不能已也是以謹表而録之官職論曰吾邑圖里之數僅齒中縣然其實地瘠賦重民貧用嗇而額設猥多食浮於事儒者坐食以耗國能者生事以擾民其勢不少加裁省則民困未易遽蘓也愚嘗通一邑官設而論其緩急輕重可裁省者不啻三之一矣夫能使官與事稱繁簡得中體統嚴明而條貫辨舉豈非理世之先務也哉選舉論曰余觀宋塲屋士習之變考其是非得失與國祚相盛衰自開寳至嘉祐士氣淳厚中間文體雖病於卑弱險怪然無敢爲私學曲說以亂之也不害其爲淳厚熈寧以後乃有國是之說倡於新灋和於紹述蔓於和議而極於僞學士有一言不合國是者則指以爲怪妄斥逐禁錮無餘力干時騖進之士莫不翕然附之而宋之國事亦且變而南渡變而臣虜又變而之閩之廣而不可爲矣故宋之不競也識者推原其故以爲士大夫爭私意於廟堂之上學術不明人心蠧壊其禍乃至此極豈非後來之永鑒耶故因科目而附著之爲辨志居業者告焉小山類稿巻十九
