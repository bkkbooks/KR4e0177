body:
  text: 小山類稿巻二十明張岳撰賦望思樓賦有序樓王克明之先人築以娛老逮其殁也葬距樓南十里登樓以望則其藏也與其昔遊也皆可思也故克明寓以斯名而請年友惠安張某爲之賦以道其思時戊寅四月朔日絳河之陰龍潭之澨有高樓焉淩晷景以上騰横碧落而中峙羣山環委在下兮若舞而翔若拱而起翹翠光於茅麓兮聽逸響於江瀨時憑虚以縱觀兮眇遐情之所寄睠千里兮㑹心羌何爲兮垂涕嗚呼噫嘻宇宙無情萬物有數感物變之無端兮憂與樂其易趣念斯樓之始基兮果誰人之尺度方其畫棟春輝綵衣日麗菽水承歡絃歌繼志陋人寰之卑湫兮挾爽鳩以洞視曽日月之幾何兮但見荒墟頽冡馬鬛崇而薾室閟拱木蟉兮凄凄宿草青兮揺曵水幽咽以含悲兮雲黭勃而凝淚狐兎躑躅以經丘兮亦嘯歌而慘悴循蓼莪之哀詩兮耿宛鳩之不寐願彷彿以如見兮馳營魂於四際精摶摶以往來兮氣穆穆以方繼初浙瀝以盤旋兮忽㝠迷而漫瀰上無高而不即兮下無深而不至慨寥廓之無有兮息衡中之纚纚飛野馬於梁間兮度隙光於疏綺風飄飄以動簷兮疑颯颯而來止起睇盻於中天兮見長江之東逝目斷絶而弗舒兮心煩寃以如醉嗟昔賢之慷慨兮猶追傷於負米顧鼎祭之惟豐兮亦何釋於罍恥極幽明以攀號兮曠千載而一揆非大德之可言兮寧報施之敢擬仰蒼天之浩蕩兮茫不知其所以樓之望兮有時而窮望之思兮有時而弭收視反觀廓爾思兮内湛湛而弗貳荒丘之頽兮斯樓之圮兮爾名永存前人之光兮後人之企詩送人之崑山司訓宛宛西飛日餘光照客裳青岡留一壑石瀨幽且長駕言從之遊山水有清光浮雲日夕起寒風何凄凉寧爲巖畔栢不隨秋葉揚朅來二三子懐德應徬徨淵雋尋薄味苦淡出清商浩歌入雲表驚起雙鴻翔沉浮何足論兹意殊未央仰看河漢碧徒爾問津梁寄贈姚江陳舍人生日衢路騰軒車鱗鱗夕埃起幽人卧空山一榻淨如洗紫簫遞谷聲𤣥鶴銜石髓五十歲未衰明眸烱秋水昨宵火昏中祥光見弧矢瑶花隔歲開影醮千巖裏三壽古來傳真訣静可擬贈君一束書夜半認戊巳少宗伯王甌濱先生持節封益藩便道歸省予爲何愛之正郎賦贈江空流月華白石光淩亂孤舟泛層波一往如飛翰遐哉遠遊心爲國樹藩幹明遣辭玉衣倚門發皓粲悠悠甌水濱春日浴鳬鸛爲爾立斯須言笑遲昏旦回首百念并時時瞻斗漢大司寇恒山張公父母俱八十餘三疏得歸省太夫人舊患喪明公歸而愈縉紳多詠其事鄭同年與聚索予作忙中走筆恒山何危哉白雲復漫瀰念彼白雲飛戚戚傷岵屺流光不再須甘瀡爲誰㫖累疏叩天閽洞塞幸伊邇不謂許國身亦慰門閭倚沉迷起宿痾春風滿歩履古來孝子心寒氷躍雙鯉眇綿氣感通或可徴神理如兹事幽絶傳聞乏前史推之民物間一視而已矣願轉此心丹坐使呻吟止觀瀑八景爲孫性甫詠雙泉遺榮渉林丘捫蘿弭朝節廻眺林薄外瀑流撼玉軼天髙山氣清野靜夕霏徹忽見雙飛龍下飲寒潭洌水霧騰紫虹石鯨勢怒抉初疑河漢傾又似渾沌泄靈源莽何窮素練天所揭仙翁碧玉笙鶴馭振㵳泬我欲從之遊風烟坐羈屑緬邈懐孤髙幽意不可掇泉源向來觀懸瀑披袂颯秋風耳目豈不廣歴覽意未窮闕縁廻磴倚杖睨危峯亂雲交壁翠石竇㵼泉紅㣲㳙初濆湧稍稍入幽潨匯爲百尺波俯矙千仞礲靜光沉斗緯上與銀河通愛兹塵外境頓覺心神融踟蹰慰煩倦坐久超鴻濛顧謂後來子形役徒沖沖川上有孤嘆萬古集虛衷流觴渠去去㵎中水悠悠頭上巾歲月如飛彈不飲生秋塵家有紫霞精一迴三千春注之金荷葉投彼寒流濵寒流清且駛荷葉何逡巡列坐藉春草籌影亂紛繽當歌即成曲逸響動濳鱗引脰川原外翠靄千􅀈屯理深物有悟興極感相因試同世人飲誰得此中真月溪橋月色清且虛溪流靜而澈二者相涵映空山境竒絶創始昔何人石虹跨丹穴幽篁迷舊谿迴磴距飛轍中有亡懐子長笛横翠鐵一曲寒兔泣再曲溪石裂夜深斗柄移孤峭厲嵽嵲安得雙飛鴻相從問真訣營魄感晦盈深淵積氷雪危橋未可梯兹意吾能說白雲洞巉巗鬼鑿工􅏭嶫怪石走窪窈積輕烟千秋藏虬蚪瀰濛揺春波飄忽變蒼狗少進天末墟復經土囊口仙人睡正酣冉冉穿窻牖竹簟生㣲寒披衣起抖擻顧謂長鬚奴鷄骨曾占不釀泉流未枯豐樂烟已乆萬古天地心兹事良不偶復恐虹霓合臨風頻搔首飛雲峯長嘯林木下掛冠林木巔山農荷鋤歸相與話豐年輕風萬里隂落日一江烟緲緲生虛谷淒淒翻野田小溪流未穩寒漲欲平川阿婦視春筐蚕老簇且眠兒童浪驚喜剖竹走流泉山園霜露深黍稌蟠蛟蜒社酒及時釀春秋豚一肩無爲歌蟋蟀使我抱悁悁留客亭憑軒有所思思思在逺岑我有青絲瑟欲奏無知音淒淒芳草色遲遲美人心佳期不可敦離憂故難任秋江浮芙蓉春渚振璆琳㝠迷天欲雨歎息河梁深歸來臥山中浪浪涕霑襟竹窻列月􅍼杉徑黑雲沉願乗空谷駒翩翩夕巗隂桂枝聊攀折杖屨日相尋山阿華歲晏莫受異物侵瑯琊寺朝遊琅琊山暮宿瑯琊寺寺古山徑荒寒林積空翠慨念千載人欹枕不成寐六一安在哉智僊亦已矣燃燭讀殘碑剥落不可紀誰謂金石堅所託謾復爾秋風拂庭柯落葉盈陛戺大運古來然榮名安足理所以稱逹生靜觀良有以不見龕中僧白髪垂两耳過四峝安都營飲戍亭中成二十韻呈翁東崖憶昔合浦守憂虞四峝侵遣兵常選銳檄誓重兼金自擬風雷並終然殺氣尋以兹内憤鬰秖恐久陸沉設險仗尊俎連雲控紫岑門開千嶂合背塹一江深䋲亂費觿佩魚遊悲釡鬵共銷渤海劍更濕黄陵襟畬火催村鼓夷歌雜暮砧巾袍辭俚製言語効華音社鬼兒童舞山花婦女簪競輸公邑稅還識長官心生意動春水危檣出遠潯欃槍星隕石榆柳市成陰飛盖夏初熱行看日在參清樽銷旅恨微雨灑疎林築室古多議苞桑力可任豈惟防草露亦懼竭錘鍼戍將身皆膽使君旱作霖恩波敭海北寜復數蹄涔同翁夢山遊三海巖夙愛山水遊兹山屢延賞披雲入青㝠巖屋岈𢎞敞玲瓏開北户峭壁排銀牓初駭溜石懸漸喜瓊芽長幽泉時一滴毛骨森蕭爽壺觴屢獻酬清言激靈響天末多風波陳迹成俯仰徒聞海上洲中宵勤夢想聊兹永日留真性非外奬暝色望征途何由釋塵坱登靈山縣北松嶺同夢山有作越宿期登山晨雨聊復止薄暮雨氣収駕言披榛杞躋攀陟雲端曠然煩抱委長松何翛翛枝柯互相倚宻葉布成幄餘響散清㣲通川明井落平疇水瀰瀰禾黍豈不佳水多懼生耳平生畎畝心十載隔泥滓一丘未能謀萬壑安敢擬翹首望白雲瞬息千里駛乗興理巾車雨霽寜由已與夢山登文筆兹山若培塿名迹擅遐荒中天挺孤秀佳氣接溟茫昔人亦竒尚時節集朋觴豈無賢逹㑹歲徃事多忘我來屬仲夏南陸吐朱光暑雨喜初霽輕颸吹我裳良友期紉􅊉金玉發佳章爲歡既不淺履險固其常緬思峴首客陵谷意何長與夢山登欽州東城樓登髙易爲感况兹萬里心孤城餘百雉樓櫓亦丈尋中楹開軒檻翠色前山深屈詰水通海蒼茫日載隂美人隔宵旦精爽苦飛沉舉手招青鳥願托瑶華音青鳥不我顧瑶華空斷金耿耿還自念有酒且共斟鴻飛亭同夢山作置酒鴻飛亭請唱飛鴻歌鴻飛瀟湘遠窮海將奈何天山冰雪盛赤水揚洪波紫貂與翡翠毛羽豈其多朝爲山海媚日暮傷虞羅迷方非達節炫采亦愆和所以至人志萬事秋鴻過冰堅先夕惕龍亢謹南訛豈無寒與暑中正諒匪佗江亭水分渚夏雲鬱嵯峨酒行君盡醉莫惜朱顔酡試看㝠㝠表寜復顧鶬鵝自欽州回亷至上陽嶺望三渡周覽窮水國歲月屢徂遷憑髙一以眺心事故依然南天足梅雨草樹何芊芊幽蟬鳴我側鸛鷺飛我前茅茨與竹瓦參差傍野田黍稌力未蘇蒼莽起疎烟豈繄憔悴感永念膏澤偏撫已慚曠職劭農憶昔年斂斾還城邑耄稚擁郊㕓何以觧其愠南風寄所宣桞州别王楨甫柳州越之西山川阻且脩子來首冬節日月㡬廻周旅舘夜共榻清言鬰綢繆撫世嗟多岐語道無全牛上無幽不燭下無隠不抽歴歴見肝膈寫我百端憂歸途念有期爲子戒行舟豈不惜離别壯志浩難留驚湍束重峽春鳥鳴鈎輈子行應萬里中道莫夷猶人生㑹聚散竚望心悠悠努力平生業歲晩興全収唐膳部啓東有歸省之命祝鳴和賦三章題曰錦江歸興屬予和之朱紱爲誰健青山念爾違中天懸一月萬里照雙闈陟屺徒愁眼乗風便拂衣錦江東入海爲爾謾生輝其二歳月江頭老鄉關天外違髙秋雙鶴髪清夢㡬蘭闈一疏天應雨十年錦覆衣蜀中多舊事共指使星輝其三城角聞長夜江村事轉違風塵走宦跡烟水眇庭闈斜燕翻行幕黄花候舞衣臨期更一酌相看暮容輝遊員常寺有序乙酉秋八月與王子楨甫約遊員常登西麓縁斜逕穿林薄中秋氣度篁松颯颯有聲是夕宿方丈寺僧赴隣舎齋會命稚子摘園蔬對酌凌晨復登山北勢窮處有石頗竒怪石痕濃淡隱隱成山字徑三尺餘字畫雄健飛動殆不類人間所書者因憶徃歲讀書山中山之形勝登覧殆遍及後出仕居京師常來徃于心不忘擬築精廬一區因山勢廻合扁以丸中之號友人淛趙𢎞道善大書預爲乞其書扁尚未知有此竒字之勝也豈造物靈怪隱見有時將待吾二人發之與與王子歎訝者乆之自是又再越宿或坐茂蔭聽淙流登靈瑞高峯弔觀古跡夜玩月東廊下比更深就枕疏燈永夜與月色相盪使人清極不成寐詰旦僧歸復呼童引酌因料檢所爲詩十章每一酌輒歌一章傳于好事者以備山中他日故事昔日讀書處緑蘿映草堂風塵驚歲隔夢寐入宵忙擬作丸中舎更尋物外方兹心恐未遂臨眺獨徬徨其二不堪秋興極倚徙陟南岡野色開朝霧溪聲散夕陽孤村鷗鳥外小艇荻花傍一眺真竒絶浩歌意轉長其三竹識初時種抽梢今幾年老僧行掛衲稚子解分泉共惜流光逝翻悲秋露泫出山縁底事撫物空自憐其四突兀石痕古蒼茫字畫分千秋誰辨此我輩發竒聞逸勢翻龍篆精光動斗文秦碑與漢鼎摛冩徒紛紛其五偶爾尋幽去藤蘿小逕通野花深爛漫澗水細玲瓏不作悲秋賦還横短笛風雲根有仙訣安得命飛鴻其六地僻經過少山空草木深展書時一讀乗興復登臨紅緑暫時景高卑萬古心此中真意思莫遣更浮沉其七晩凉欹枕罷振䇿復山行冉冉雲穿䄂迢迢谷遞聲平原天際盡孤嶼海中明忽覺襟期遠呼觴坐自傾其八月華流㝢縣靜夜此山中寂歴無人㑹孤高幾處同秋聲藏遠樹物色度虛櫳預恐星河落徘徊小院東其九嶂合孤烟暮秋初響籟清到來情已愜坐乆累還輕留偈僧何在通宵月自明年華駐笻竹從爾謝山靈其十寂寞非人境清虛惬道心聽經猿入定破夢鶴鳴陰刻竹題詩遍望雲懐古深蕭蕭羞兩鬢吾欲投吾簪太平學舍八首吾道江河水文章奎壁精寒光無楚越清潤足瓶罌絶徼兵戈少青衿絃誦鳴新秋占氣候應産紫芝榮其二空城抱靜碧太宇逼青葱誰謂經無用人知聖可同三千壓戎馬萬丈吐霓虹所志諒能遠殷勤戒篆蟲其三陳良稱楚璧姜相擅南金文物動千古風流越在今洞犀箭礪鏃習羽鷹低林莫遣流光邁負君頭上簪其四聲教千年運春秋一畝宫明禋薦緑藻遺響拂絲桐地遠人多朴中孚物自融乗桴非有託兹意欎沖沖其五文豹能藏霧翠毛亦自珍如何寒潭水翻翳後車塵經緯精微在歩趨禮法陳前賢心最苦直指竟非真其六迂闊元吾道盱睢是吏師誰能朱墨暇更理鳶魚辭春雨滿芸閣天聲散島夷豈無分竹者感歎良在兹其七春秋譏猾夏秦漢事邊功攘斥非無術微言自不同聖心堙反袂霸氣漫隮蝀振策首遐軌多岐幸勿訌其八徃歲謬文柄掄材上澤宫迂疎成泛愛棄逐任飄蓬舟檝一身逺闗河萬里通重來多舊意朗詠舞雩風和游可齋憑祥途中即事昨晩猶孤棹今朝獨木橋千峯旌斾逺萬里鬢容銷歸鳥入雲定殘花過雨飄交南消息近客意一疎蕭和可齋飲駐仙亭亭隂清翠蓧樹影揺青楓偶此殊方㑹翛然滿檻風棋敲靜夜子月掛下弦弓不爲流連飲天涯任轉蓬同翁夢山遊六峰觀秋日登髙興天涯野望開羣山連瘴海一水隔蓬萊磴曲迷深樹巖空響薄雷羈心應不盡何處更孤臺題遼王巻子江漢分王地空同訪道年浮雲収滯念一粒轉丹田淮枕書仍在東平思更𤣥遥知最樂處魚鳥亦悠然又洞府移蓬島雲山入畫圖出門衡嶽近流水桃花俱梁苑多才子荆臺足舊儒祈招日有誦脩竹徒區區送同年謝仁夫知長安縣萬栁垂旌拂去鞍馬蹄新喜得沙乾竒峯數㸃青㝠外寒笛一聲落照間餘刼無端留黒壤孤村應是小銅山秦中物色高秋冷爲報春風好解顔送林次厓致政還鄉疎燈夜榻隔秋連一别滄江故愴然語穽久疑無地避長材應使後人憐山留荒屋供多病力剰加飱健昔年怪我好竒欲問字清尊信有子雲縁又寒迎初雨晝隂連草舎蕭疎意慘然世態備經方自悟秋丹結盡竟誰憐可堪物節催雙鬢又見風花似去年湖海生涯興不淺如君風骨故天縁登馬退山望邕州筍輿度嶺又髙峯望極越山興不窮元氣逺浮瀛海外人家多在翠㣲中軟莎黄犢迷烟雨極浦歸㠶逗晩風兵祲沉銷春晝永兩江樹色鬰青蔥入邕州邕州城北兩江來五管金湯亦壯哉海賈遥通身毒布堠亭直擬白龍堆臥闗虎豹春霾霧入匣雌雄夜吼雷御逺古來資上畧天南壁馬已枚枚發邕州徃鎮南闗隔年梅雨記重遊風景依稀潦瘴収老去筋骸慚櫪馬誰將華髪博蝸牛孤光冉冉瀧頭月雙櫓迢迢天際舟夜數星辰翻百念非闗鄉國起離憂太平東岸尖峯似故山作何處飛來玉筍峯似曽排闥爲吾容隔江翠色迎孤棹故國白雲知㡬重樹老時鳴楓葉雨山空逺遞夕陽鐘十年囘首凋𤣥髩欲躡征鴻恨莫從翁東厓鄭長溪馮次江赴憑祥途中遇雨賦詩戲贈分韻得須字别時霽柳拂前驅别後雷殷水滿湖俄頃隂晴迎伏暑淩兢車馬戒泥塗岸沙帶浪東西落田鸛逢人向背呼愁絶同袍闗塞客南山欲與剪扶須又五月隂精長緑蒲㝠風怪雨亦相須農人私記豐年兆僕馭偏憂九折途遠勢驚翻銀漢水怒濤疑拔老龍鬚嚴程傍險兼竒觀霑濕何妨赤杖扶和可齋泊舟左江有懐韻雉堞岧岧俯碧潯天涯此路接鷄林地非中土衣冠並氣壓南荒歲月深尊俎空憐白羽扇溪山何處樵歌音儻諧挿翮飛蓬島願學燒丹變紫金和可齋太平燕㑹奉酬廣西諸公韻城外青山畫㦸同長廊絲管度南風使君髙誼雙白璧旅客扁舟一逺鴻具共琴尊寛夙昔還開匣劍看雌雄江邊沙際孤烟起列炬分携暝色中和可齋泊況村雨霽二首扁舟夜雨瘴溪中曉起㸔山翠色重萬感忽來惟宴坐逺書欲寄漫題封似聞瀚海秋飛箭稍喜炎天近息烽却怪南華忘物者等閒空谷喜聞跫又雨歇郊墟斜日昏居人猶自散鷄豚槎當岸缺深留纜燕逐花飛故逺村水土周防翻藥笈江湖劇念傍征軒擬爲暫駐成淹久倦聽風波疑曲言况村即事用前韻江湍夜響雨聲中錦纜沙痕漲㡬重鳥雀深枝初日麗闗河舊恨白雲封漁舠逺泛還迷浦獵火暮歸似舉烽昨偶村邊試病足兒童驚訝履聲跫和可齋過安都營韻海上春風細柳營江雲靜抱一川平菰蒲晩泛磨刀水烟井初開殊俗氓此集衣冠成故事他年尊俎誰長城濁醪共醉芳菲暮畫角聲沉月始生得董蕨岡白沙村晩酌詩時遲諸公不至次韻一首晩舟餘熱坐櫓頭淩亂烟華水上浮遲客不來孤夜永扣舷獨和聽江流丹崖月出人初靜雲鳥陣髙手自籌醒醉筦然問漁父揚㠶南破浪花漚夜飲董叅戎蕨岡寓舎讀壁閒過伏波祠詩有感孤戍𤣥雲想壯圖酒酣日落歌嗚嗚大材敢道馬新息短劒還聞陸大夫奎壁淋漓看獨夜江天㝠漠失雙鳬幾囘欲酹溪頭月又恐前身是腐儒經宿受降城老夫越吏姓名通銜璧牽羊事不同聖代神靈跨徃昔南天萬水盡朝東荒山故壘籠寒月征馬孤嘶自晩風讀罷穹碑一悵望螭頭飛動欲騰空又沉沉髙閣午隂清况有岏㠝蒼翠迎金鼓徃年分閫地闗山千古受降城龍蛇蟄伏天機靜烟雨㝠濛春草生倦倚烏皮成獨寐不堪幽夢緬縱横過念涯營虎落周遭擁曉雲當年萬馬誰空羣共傳羌虜湟中策不數樓船海上軍夜柝聲嚴魚麗陣黄幡影動騶虞紋一從夷叟投闗後芳草依然映夕曛又風雲蛇鳥指揮新犢劒牛刀語入神殺氣成虹翻作雨溪姿含霧逺迷津地荒少值桑麻長路滑還憂風雨頻滿眼黄蒿半狐兔濟時真負百年身和可齋宿憑祥州勞歌永夕最堪憐望月東峯缺復圓紫盖銀鞍千里道水舂雨汲百家廛群山濕霧丹青滴萬木濃隂華葉駢且共風花散煩鬰馳驅未敢恨流年登鎮南闗昭德臺炎荒突兀見春臺皇德昭回氣象開五色光華瞻北斗一天雷雨動南垓乗槎擬借搏風力破浪還看曝日顋安得坡仙扛鼎筆表忠高掞静氛埃又振衣千仞瞰飛鳶望極江山思渺然百粤風烟畫一幅清時日月鏡雙懸天開正朔尊王㑹地接金鰲立極年横海昔賢堪勒柱髙臺我輩亦樓船觀莫福海像書事若翁文理領南中朱鳥囘光照膽紅世事水流餘故歩名駒汗血更追風已憑禹鼎銷魑魅好向龍編樹椅桐瞻代只今多霈澤百年忠孝莫匆匆又上將分符兵百萬文才草檄字三千試看洗劒滄溟水何似含恩雨露天牙纛嵳峩唐節使纓㽔飄褭漢貂蟬南中自有衣裳地剰讀周書旅貢篇遊白石洞夢裡似曽踏翠寒萬山洞壑石林攅寜知夏冷冬温地秖在藤梢棘刺閒隂火瓊膏烹日月長空簫管待虬鸞道人不是避秦客慢憶桃花囘首看又諸天洞府日華傾此洞隂風地底鳴泉落鮫珠含内景石飛仙珮散𤣥精暫遊不覺心源靜欲去那禁毛骨清勝㑹山靈應記取後期未許結三生與諸公同遊鐘鳴洞賦詩分韻得南字石鐘古洞似禪龕兀兀頑空亦可參擬傍藤蘿揮麈尾共移舟楫繫江潭雲開乳竇金膏見鶴定松隂午夢酣幽興不禁風景好况逢賔主盡東南又千秋洞屋鎻江嵐縣石鐘聲空自函疑有精靈遲勝㑹果然冠蓋並幽探巖前把酒雲揮䄂醉罷登舟花滿潭瘴海此逰真浩蕩未須留滯歎周南己酉九日王憲副邀登客山有作南山佳氣入簾櫳此日登臨興不窮萬里長風開曉霧五溪寒色浸秋空黄花滿泛樽中酒短髪還羞鶴背翁爲語山靈應記取未須江漢問流風其二谿上誰留紫翠堆秋風吹送重陽杯𤣥霜故染千林碧天籟時傳萬壑哀日月此辰應有㑹江湖浩思渺難裁明朝幸釋方隅甲萸菊扶衰擬再來其三故山迴首鎻烟霏廿載馳驅未得歸偶爾攀蘿尋絶頂那堪把菊對芳菲溪雲瀲淡秋容靜疎雨微茫梧葉飛似有宿縁成主客呼尊更酌醉斜暉遊雲臺山髙臺初日上嶙峋芝草琅玕别有春不用丹青圖將相只留巖壑待幽人沅州贈相士洪鰲沅湘千里心如水湖海雙眸具者稀我有九淵蟠未定憑君眉角覓真機贈吏目王策故國松楸魂欲斷山城伏臘亦堪憐莪蒿細辨年來味蘭芷輕籠雨後烟庚辰赴謫金陵過三山同年舒國裳劉實夫廖師賢郭澄卿邀飲即席聨句時正月念五日同年三百道相如舒天地生人又一初閩水有情春送棹劉塞鴻無恙夜來書詩成綵筆雲連掃廖紅滿膽瓶梅正舒賦罷遠遊誰與和張烟波渺渺正愁予郭春霽橋西雨劉商歌本不卑愁人尊酒盡廖臥病一舟宜憶昨心猶壯張憐今路正岐杜陵􅃚可作郭心事草堂知舒春别琴書雅廖新詩夢汝賢風塵驚滿眼張道誼喜同年奎照三山裏郭雲横五座前金陵渾在望舒君去亦登仙劉渉世應多慮張逢君可自寛晴雲看照户郭光景歎驚湍日月孤臣疏舒鸞凰國子官春江明發棹劉百丈上平灘廖剛喜新晴别淨峰郭欲將絲線繫艨艟野雲片片寒猶在舒花樹茸茸酒更供此日論心還剪燭劉當年携手憶聞鐘丈夫事業存青史廖敢道無才亦協恭張小山類稿巻二十
