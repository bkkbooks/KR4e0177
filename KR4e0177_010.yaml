body:
  text: 小山類稿卷十明張嶽撰書五湖貴苖事與嚴介溪差人自北回辱賜教翰備審台履多福曷勝感慰湖貴戎務議之多年近日兵困財匱而事尚未得寧妥此臣子所當竭力致命之秋祇患材力不足勝任豈敢妄分內外勞逸以為前却承諭縷悉公至誠體國如此而某不知奮勉異日將何以見門下初抵地方諸事方在經理然其大概已具揭帖中此後裒集衆議酌量事機須有長逺規模不使乍服乍叛如前時以貽廟堂憂念此不肖一念報國酬恩之本心但不知此心能自副否爾諸事容經畫略有次第再請謹此奉布下忱又入夏漸熱伏惟台候動履多福某至此半年矣兩省苗夷頗審情僞其聽撫者雖不敢保其終亦不以詐逆之撫循安插此時俱靜惟貴州之苗驕猾如故名雖聽撫實欲懈我乘間出入為患愈甚故當决策以征之以紓目前之急且省防守無窮之費事有勞而不容已者此事是也失此時不為之處貴州附苗郡縣將蕩然矣其用兵事宜一面區畫謹將大節目數條開列具奏數年所以無成功者任事之人心力不一而土官與賊為奸愚昧之見所以控告廟堂惟欲乞天語丁寧數言使之有所悚懼法一令行則事易集伏惟陳謨之際少留神慮則某與地方不勝幸甚答湖廣巡按王思質使至承翰教腆賜深感存念所論湖貴事情俱得肯綮其中有不同者蓋湖廣往年用兵雖未得利苗頗有所折傷亦願休息而湖廣新舊戍兵多有萬二千人分布防守每嵗支費幾及五萬兵多食足又乘苗折傷之餘故撫之易也然鄙意尚以為非可久之法貴州自用兵五六年以來只有敗衄賊氣愈驕萬治齊去後彼中擾患不已一方面官親往撫出六百餘人計口而給之糧又以冠帶寵其渠魁所謂俯順者可謂至矣而糧不可繼則又反以至今日挾撫以邀糧貴州去年罷兵議戍兵萬餘後以糧不足減至五千近存者三千四百掣襟肘見兼又乏糧無糧以供軍而况可以供賊乎若又添兵防守數必多於湖廣計兩年之費足以用兵事勢至此皆為有害而無利不得已擇其利多害小者為之猶勝於玩愒不為也賊自去臘以來至今年四月初間出劫四十餘次彼中俱隱諱不以相告只欲因循招撫挨過日子畢竟難挨遂至攻打衙門劫虜印信勢必威之以兵非區區姑息之術所能縻也數年來或撫或剿求一日之安尚不可得茍得數載亦何嫌一時之名而不任此只恐未能爾昨孫兼山道長過此持重分北之誨所談更詳切恨不及與執事一㑹也尚容請教答貴州巡撫李三洲前承教謂土官撫內官軍防外乃今日之要領誠然撫苗之設正欲施此策其效竟如此固貴州事力單薄亦由任事之人不能分公之憂以至于今日也不哭孩兒誰不能抱任其哭任其止而因以為安今人見識大率如此湖廣見有戍兵萬二千嵗費四萬餘豈可久之道但今方有事貴州未遽議及爾使貴州防費亦如湖廣非但力不堪就能堪之亦坐而自困也初至此時力破此間一種厭厭無氣之論而以知痛癢三家醒覺之近覺稍稍振動將來集事或可望也土兵路程逺近亦要緊查明即開入哨道書册以便剋期運道嚴督防護趂此時水長挖運不大段費力爾與翁東崖本兵昨奏本人還領教翰知入都清吉甚慰仰思苗情諸事俱䝉覆允所陳大概只言當用兵耳地方荼毒之狀尚未悉言去冬以前且未暇及某正月至荆州即移書三洲言此賊去年不得耕種今春乏食必出行劫宜急為備自三洲以下皆以戢斂告至二月終始聞道路時有劫掠恐其因某至而驚疑亟刋告示令地方撫諭又皆以戢斂告其實不曾戢斂特彼中相蒙日久苗出不能禦既飽而去則幸以為安百姓告被劫不但不行且逄怒也所以紀綱日壞生靈日困官司守候差占升遷委蛇而去莫肯為地方任事者此賊决須征若復因循無有了期竟亦不免勞費也及蚤圖之猶為省力今論者無他只管曰難某以為當就難處猛著工夫國家有事人人都欲揀其易者以為身圖儻更有難於此將以其憂遺君父邪昔年海南用兵有數村當誅某謂失今不誅必為後患時皆以某為太很今之叛即此數村又要動兵十萬尚未肯行天下一種因循便身之論誤國家寧有紀極議論相持初發本時原無所指不意乃今有當此語者想都下必有所聞公亦可意㑹也委曲處之看何如與嚴介溪近七月二十日差官陳經綸至伏領二月八日教㫖捧讀感激一隅之難纍年弗决公以天下之心為心憂慮深切某受此重托其敢不以公之心為心前者條具近事上請已蒙允行竊聞外議尚有不盡同者蓋未覩此間生靈荼毒困苦之狀爾謹條自正月至六月數月之內劫掠次數此皆從前有司蔽而上官不盡知或知之付於無奈何而止者銅仁思南石阡之境數年以來村落蕭條目下不但銅平一處各處苗賊相挻而起雲貴通衢甚於畏途使若稍可得已某何苦而必行所難誠不忍其毒也大抵居官者有時而去日子可延捱故凡言撫言處不過設好言以免目前爾豈知水火望救之情一日甚於一年及此時而圖之尚能有所全活以後恐受害愈深更難於收拾也某始入境料賊春間乏食必出劫掠即行預防二月中又刻布告示招諭地方各官惟務隱蔽嚴切追究乃得聞此梗概尚未盡也使某復不言將誰言者是以不避煩瀆條具上聞伏冀照察與李三洲聞得水西有出兵之意此酋若知利害必然須出若果不應命亦當有以處之林副使前日有文書詞說頗多大率欲中止爾已以未可語之林石至銅平未有一字相聞想規畫未定又聞雲南陳知府道公有欲撫之言此賊近雖稍靜只是倦而暫休劫質人口坐待取贖冬春間食盡贖完勢必復出若果撫得妥帖目下可減坐食之兵又絶他日之患某安敢不從哉望見教戍兵須林石料量擔當存減若干乃能酌處春間兵尚四千患且如此然猶可諉曰官不得力也今有林石矣再看如何與李古冲少宰麻陽銅平諸苗悍徑與兩廣不同幸其數不如兩廣之多而四靣皆流土衙門犬牙相入其為苗巢穴者亦不如兩廣之遼曠也其所以蔓延至今者蓋由上靣議論不一而下面人情觀望以為向背以前成敗歷歷可數至今此意尤甚旁撓隂沮事體解散致賊愈驕土官愈玩某一書生耳非藉廟堂之威令其安能行哉去冬决㑹兵因人情乖忤又水西該兵三萬其土官死子幼無人領兵酉陽平茶鎮溪三土官讎殺各招苗以為用逮處此數事略有規矩則已逼嵗暮春臨非其時矣剋期决在初秋入秋用兵百事利便明春散兵招撫餘黨即可安插耕種俾其得所前兩次不能收功亦由春夏深入非其時也此事思之甚審恐逺方傳聞有不盡知者如湖廣諸公憂念鄉井勿怪其然但深痼之病憚藥石之攻畏難茍止要久藥石終不能免也病日益深費日益大及今速為之猶可省力耳此其利害殊不難見儻有語及者煩公微道此意也與張龍湖閣老湖苗未叛之先只有晃州便水一哨軍兵共一千四百九十八名自用兵後逐漸增加防守至一十四哨某去年到地方查各哨見在軍兵名數四月內據副使陶欽䕫開報新舊哨兵共一萬三千七百七十五名每官軍一名每月支行糧六斗打手一名每月支工食銀八錢仍支行糧訪得打手猥冒者多而行糧工食增加太濫亦非舊制乃委官查核汰其老弱其行糧亦改從舊規每月只行糧四斗五升工食六錢自二十七年五月初十日起至二十八年終止據辰州府造報支過銀五萬四千一百四十九兩米一萬一千八百七十二石二十九年正月以後不與焉此皆當時三司㑹議題奉欽依以為經久之計者但湖廣錢糧嵗有常數今又加增此項費用嵗嵗無已將何以給之湖貴之苗非有髙山大川為之界隔其田地犬牙相錯貴苗未靖湖苗未可恃以為安苗既未安則兵未可撤而轉輸未已是湖廣無時而不用兵也此但為不才官吏茍安目前因循以待遷則可若為地方經久之計某愚昧决不誕謾以相欺也故思以逸道而暫勞之若智力淺劣不能勝任則某有罪焉爾其他利害屢嘗建白亦已具告記室伏冀照覽與徐少湖宗伯差人回領教言且傳靣諭委曲人情變態久知其必至是亦付之無可奈何而盡其在我者以待之而已所以纍次未敢以苦情訴於公也都下議論或所見不同或傳聞太甚談者無心秀才氣習從來遇事便嚷不足怪也最是南都有一樣議論純是私心騰書湖貴撫按諸司煽惑沮撓至去冬愈甚不能得其心術之微但竊以為譬之治病前醫不效後醫必為之審證易方理所必然終不可為前醫諱失而待其自斃也當此時某何敢言惟有勉盡職事以聽老天與公論耳某人大與為表裏事事相左去年所以未敢進兵大率由此安土官病故特其一事耳近某既去竹坡代之料檢兵事無一可恃亦幸於去年之未進兵也大約此事固難然以當今之全力治此數苗亦安可以難而委之又安知他日之果易乎廟堂之議若盡出國事而中某失者敢不奉行若出私心則古人有遭此事者范文正只為元昊一書至欲殺之况區區么麼亦何所惜哉惟公為我籌之與潘朴溪司徒春間人回承教翰辱念及地方甚感事之易見而不忍之心易動者莫甚於蠻夷寇賊毒害生靈而世間尚有一種邪說陷溺本心惑世誣民倡之者往往氣力足以申其說幾何不至於率獸而食人邪公有志斯世者宜其動念其他諸事大抵以此意推之世道或將有望乎有二疏為缺乏錢糧援舊例以請不知經由貴部否望公為覆行舊嘗怪淳熙大儒亦隨衆乞度牒此與度牒何異計窮策短惟公其念之外惟及時保練不宣與馬師山此間事不謂之難特三省人情不一議論多異任事者并所任之人觀望前却相持纍年至於紀綱日壞盜賊驕橫民生可哀尚復恬然以掩覆為長策也其意念之差乃上自柄臣其他可知也然其為說亦無他惟曰難耳更有難者將如之何某入境即力與之辨怪怒怨謗無所不至惟自信以待之今亦稍定矣秋間舉兵約年終可畢事然亦盡其所當為者如此利鈍不敢預計也恐兄為某憂此故一及之答前吏部李鶉野人至承教翰委曲諄至信所謂憂深而言切慮逺而說詳者入楚以來談苗事多矣未有能為是言者不肖開豁多矣此數殘苗勞費疲弊六七年無如之何非苗難也人自難之耳地方不甚廣人數不甚多羣聚出劫如犬豕爭食非有材勇計謀之可防而謂之難只言其竹菁深密爾其言淺陋殊不足信而或有信其說者大抵所見不同私意又從而激之不為生靈謀而為賊謀真所謂衣冠之苗也昨初三日兵已入山聞賊遁入老山立寨拒守山林之賊惟患散逸不患固守蓋幸其保守以待我又田酋叔姪皆斃師行無肘腋之慮永保無內顧之憂一意深入求賊所在計不至疏脫也貴州安氏兵亦至安萬銓親領志欲雪恥其兵數比征調外加多氣勢甚可觀將來可望成功前年地方官浪奏湖廣聽撫特為一時免責爾不劫湖廣而劫貴州非叛而何蠟爾山下數村乘此時亦為斷决之大抵好逸惡勞人之常情不肖行年六十衰病日侵豈不知養交隨時可以取悅上下顧以職事所在義無所避區區此心惟上不負君上下無靦顔於士民而已他所不暇顧也與執事未相見承披肺腑相示不敢不盡其愚與李古冲十月中鎮逺錢主事行附短啓令舍弟轉逹恐錢携家行遲此時尚未逹左右也某在此强支衰病苗事荷公庇藉幸獲就緒諸軍以九月初三進山十三日兵方大集而連旬隂雨山路濘滑至十月初方霽數日刋伐竹木通路但賊之巢穴兵無不到盡得所窖粟米以補軍食賊走入深險山巖倉卒不能有所賫諸軍四靣圍蹙初聚為二大寨後又并為一寨首惡并徒黨擒獲頗多惟大渠龍許保者尚據險未下然食乏勢困走無所之此渠類往年閩中所謂鄧茂七者破省溪印江石阡等處為地方荼毒十餘年今幸就擒其餘十五為羣竄伏山林間饑死者多因而捕之終嵗裏可盡也惟湖廣續奏數村素與貴苗相幫近又窩苗之附近者不乘勢誅之必為後患逮貴州既平則抽各哨精兵出其不意只有八九村不甚費力其餘悉皆撫納以剿為撫庶撫可固爾方將進兵後所獲功題知本已寫就是日得龍許保報又俟查明須遲數日故此揭尚未及也容後續報答楊僉憲承示苗情深得肻綮近親至此乃知向所聞者多非事實貴州苗地縱橫不過百五十里苗不及一千而敢旅拒官軍荼毒齊民數年無如之何者所謂奸民投住土官交通盡之矣有奸民為之耳目故出則必有所獲又有土官為之窩容故敗則必有所歸又屢年土官讐殺隂借其力凡平昔土官所以制苗之伎彼皆有之而以反制土官故其氣益健而吾以三省不齊之人心持纍年不决之議論或守或撫糜費無涯賊未破而當事者先告疲矣此所以難也今幸賴朝廷威福諸部用命深入林菁昔日兵所不到之處搜扒皆及貴州幾於空巢目下所要者在善後之策無以過於禁奸民責土官之兩言者昨行去招撫殘黨文書亦即此意也惟湖廣蠟爾山下數村原擬必誅以方有事貴州力未之及昨又來衝貴州二小營呼云吾來求撫非敢害官軍也已令湖川㑹兵剿之春深非用兵之時大率歸於撫耳人還謹此奉復與嚴介溪四月二十八日以近獲苗功奏報是後賊衆內自驚疑其中有稍曉利害者咸有息肩之望追究首禍之人羣執龍許保以自贖自此各苗內分讎敵勢難復合因而處之可獲粗安也湖苗已經撫定雖有數村隂合貴苗但貴苗定則湖自弭近時士大夫論事見影指形信口變換見用兵稍有差池則云貴苗原只該撫不該征及稍有功緒則又云湖苗亦該征不該撫故湖川二省前年一議論去年一議論近日又一議論近且如此况於逺者然豈深思所以當征當撫之故哉征固難撫亦不易也廟謨已定似不待某言然亦不敢不盡其愚照諒幸甚答聶泉崖禮部人至承惠書甚荷存念貴州事大概如此所謂一二處不容住手者此苗自進兵即聽招為官軍把路護糧湖廣官因而撫之永保二司為之擔承無辭以誅之亦聽其招而已古者治外裔類如此龍許保作亂之心未已特其黨懾於兵威願投官者衆故羣相謀遂執之以自贖此賊驍健狡詐神出鬼沒若非其黨內携亦費日力也若思州之事則酉陽土官隂為之主內有酉陽兵一百五十昨許保云然然此土官驕橫善結納最不利地方設總督往年屠平茶殺官奪印而挾其厚賄遍求人情蜀中士夫都下公卿間多有馳書為之饒舌者某亦以苗叛未靖含忍未行此酋恐苗靖而追究及之又日下方謀吞保靖邑梅二司土地其為此者蓋欲以多事撓不肖又欲因是搖撼而去之尤不利不肖在此也善後不無竒策只聽撫之後各村立之首領合數村立一大首領而又各屬於守備參將等官惟出劫殺人等大事則令大首領㑹小首領執以送官以土俗治之大者償命次者償牛其餘任從故俗要之略有羈縻而已詳立之法彼亦不識故不瑣瑣也出沒要路戍兵亦不敢廢逮其久後相安更詳議去留但區區亦老矣日夜思歸行以罪去亦所幸也不多及與徐少湖昨差人回領教示及苗事甚荷憂念湖苗當撫者多當征者少貴苗則皆當征皆當征者當惟患力之不足而不憂其濫善惡相參者恐有濫及無辜尤須分别且湖苗先已聽撫其數村聞有征剿之意亦來投撫則無殺之之理湖貴之相推賴某人時已有是言彼皆各有所依以相傾而有幸不幸而不肖惟有耿耿一心上對君父其來也原非有求其去也復何所惜若以數萬生靈之命以泄士夫之私憤則不敢也董御史之言沿襲舊語欲為貴州卸罪其主張全在廟堂廟堂不主兵連禍結何時已乎近日首惡被獲人人方幸息肩其餘事情不能恰好者只責嶽隨宜調度可以無事不必為多說以撓之也思州被劫緣由出於酉陽任巡撫先知之故其本後露出數句含糊不明而專歸咎於湖廣亦不可曉遲數日另容詳報與李古冲太宰自首惡得後地方無事貴州諸公遂有茍安度日之意就有一二殘黨者亦皆不理在內又有隂為之設策使其推賴於湖廣以起釁端而困不肖然動干戈以快奸人之志不肖非若人也不相忖甚矣雲南之事頗聞之否諸營俱被衝壞無完軍矣聲勢頗大而任事者稠載而北以為彌縫之訃不知廷議意何如也地方日益多事奈何差人便謹此附報與貴州巡按董近淮吳黑苗者纍承尊諭督厲地方官蓋已有可獲之機而衆見不同內有旁撓隂沮屢失機㑹其為說無他不過欲省費而速了事耳自動兵以來所費不止數十巨萬如投水中渺無踪跡奈何於垂成之際而計此錙銖之末兩接部咨必以擒獲首惡招撫餘黨為言而明㫖直責以剿絶餘黨况首惡而可故縱以遺後禍乎使其實出官聽招尚懼無以塞責况乃深居偃蹇而求招之詞出於烏羅土官之計謀而健步為之傳遞乎觀其詞豈有求哀之意而上下相蒙以為可以了事信掩耳而盜鈴也昨過鎮逺㑹竹坡不知何如向蒙以此見教某愚拙直以不可答之又復與沈總兵一文頗詳想渠諱匿不以奉聞也容令分守道轉呈惟執事以地方為念奉揚明㫖以督厲地方官俾始終一意除此禍根永綏生民則地方幸甚與李古冲去冬聞公去國駭不知其因隱微曲折必有所伏差人回領教翰浩然於去就之際可謂大丈夫也某此間事中脅旁撓坐中含沙者三年秉執愚性與之相捱至今猶未已自公去後都下再無開口處一二以書來相告語者大率如陳咸之父所以教子愈使人潰悶非拙性所能也為輪為彈隨所賦豫爾吳賊尚未得而貴州諸公議論不同蓋其倚託幽隂觀望風㫖欲以久不了事為不肖之責近嚴行石邦憲購捕甚急計終無脫處也諒欲聞故及之山中無事進修愈有味不知此孤蹤何時得操杖屨以相從臨紙愴然不盡答湖廣巡撫屠竹墟吳黑苗者貴州自去冬隂行招撫之策其意以為此苗聽招目下可無事以懸賞之費賫入彌縫而求脫手某不知其說也催之愈急看此數日何如運湖北之糧以贍銅仁此竹坡所見該部原不敢主而推來此然貴州事有易為者尚懷顧望不為而欲以難事責人誰敢任之某惟公議是從耳人還奉復不盡伏冀裁教答貴州巡撫任竹坡承諭縷悉吳黑苗之遲獲去年銅仁各官雖有其心而無其術為羣苗所欺捱中間又自為不同而招之一字又梗乎其間所以遲至今日然不得終不足以了事吾輩心中自打不過不待都下人言也湖廣事亦未了故明㫖有立功贖罪之言此乃巡按一時勘報云云亦不敢必言了事也冬春聞都下有一時貴兩寄聲於不肖云銅仁之事可以速了彼蓋欲始之以征終之不能征而招之以見其難為他人地耳吾輩身任其責自當竭力必誅此賊為地方久逺訃豈敢曲狥時貴一言而有所前却哉願公立定腳跟若有罪責必首及不肖公固在末減也劉參議貴鄉又同年也願有以厲之幸甚答董近淮昨者承教談銅仁事曾具疏草請教於竹坡某大意地方諸苗幸已安靖兵掣已久只黑苗一夫亦在囊中第一時竄伏未必遽得將已撫諸苗情由上報而黑苗責令地方官設法緩圖期於可得而不肖亦不得辭責皆事體之不容已者竹坡以為如此則是請㫖將黑苗安在他頭上擒捕是置之死地回書大閙前疏故且停不行夫黑苗原在貴州頭上何為死地自病食藥何與他人任地方重責不篤實任事而欲支吾巧脫以玷清議某豈敢以此誤竹坡哉况某辛勤於此五年矣事已七八而以欺罔終之非惟不敢亦所不忍也謹具疏稿奉覽其中詳細改日容别陳之照亮幸甚又差人至承教督上前來不肖初無此意竹坡以書來言者再遣伍參議來言者一又遣趙副使劉參議來言者一然後不得已而應之如不肖之意則欲得吳黑苗而後奏報一時收拾乃為穩當若隱下吳黑苗遽論功希求恩澤恐京師士夫亦有心竅不可欺也故明言責成之意此本特以見大兵已撤諸苗已撫首惡亦擒以解老師之議初未嘗偏害貴州也如言黑苗非有賊今不在貴州而在湖廣此欺心話豈敢出口又况湖廣不為應承紛爭何時了邪邊道長并近日徐道長二本一意他日當另為議報大扺中世士夫學術不明心術敗壞議論頗僻各便其私不能一一與之校量不肖本已於前念七日差人賫上亦不敢放下吳黑苗特去趙劉住俸之文而不肖之俸仍住也正欲差人奉稿上覽忽承尊示千里心同不勝欣幸謹此奉復答徐少湖閣老昨差人回承示治齊之意淺陋不足道但恐談之無益爾何也某受任日久而惡賊至今未得詔書責讓人言屢及負罪皇愧如涉淵氷所以未敢决於求去者欲得此賊以塞責而後行縱使得之猶不足為勞也况敢開口談事哉其不足聽信也必矣治齊方登大位以天下人材事明主所以流聲實垂竹帛者將萬萬於此區區一隅之業十數年已往之陳跡似不足以芥蒂其胸中也愧無以復命罪死罪死與王東臺尚寶某此間事已定妥惟一渠未得蓋挺身深遁諸苗多為其耳目者亦來聽撫而某不之許貴州諸公皆以為失策謂懸閣日久不如許之以了事某謂此賊在前之罪必誅不宥且年方三十力兼數人留之决為後患聞貴州亦嘗以其議謀於廟堂亦有主其議者不知何如也今差人賫本去大概言大兵已撤諸苗已就撫地方無事所未獲者黑苗一賊宜且徐圖以解士夫之惑某今年衰憊特甚日夕思歸惟望了得此一事不負所以來之意然後唯所欲耳都下若有所聞千萬見教與屠竹墟部中所咨徐道長之本久已行到向日題本因有此咨故敢决也但其意在設立總督而舉治齊之議疏然治齊去後遺此數條彼時通不舉行其一二行者亦已更改非復初意待各道查議來看何如大概此間不患無兵惟患無錢糧眼前雖可支吾持久似當通變此一事為要爾必前本有下落方敢題上也前發本時有以通餽遺相勸者某謂自古刀鋸鼎鑊皆儒者當之不聞迂徑以求免也知公同志故敢奉告密之密之小山類稿卷十
