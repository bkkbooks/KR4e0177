body:
  text: 小山類稿卷二十明張嶽撰賦望思樓賦有序樓王克明之先人築以娛老逮其殁也葬距樓南十里登樓以望則其藏也與其昔遊也皆可思也故克明寓以斯名而請年友惠安張某為之賦以道其思時戊寅四月朔日絳河之陰龍潭之澨有高樓焉淩晷景以上騰橫碧落而中峙羣山環委在下兮若舞而翔若拱而起翹翠光於茅麓兮聽逸響於江瀨時憑虛以縱觀兮眇遐情之所寄眷千里兮會心羌何為兮垂涕嗚呼噫嘻宇宙無情萬物有數感物變之無端兮憂與樂其易趣念斯樓之始基兮果誰人之尺度方其畫棟春輝綵衣日麗菽水承歡絃歌繼志陋人寰之卑湫兮挾爽鳩以洞視曽日月之幾何兮但見荒墟頽冡馬鬛崇而薾室閟拱木蟉兮凄凄宿草青兮搖曵水幽咽以含悲兮雲黭勃而凝淚狐兔躑躅以經丘兮亦嘯歌而慘悴循蓼莪之哀詩兮耿宛鳩之不寐願倣佛以如見兮馳營魂於四際精摶摶以往來兮氣穆穆以方繼初浙瀝以盤旋兮忽冥迷而漫瀰上無高而不即兮下無深而不至慨寥廓之無有兮息衡中之纚纚飛野馬於梁間兮度隙光於疏綺風飄飄以動簷兮疑颯颯而來止起睇盻於中天兮見長江之東逝目斷絶而弗舒兮心煩寃以如醉嗟昔賢之慷慨兮猶追傷於負米顧鼎祭之惟豐兮亦何釋於罍恥極幽明以攀號兮曠千載而一揆非大德之可言兮寧報施之敢擬仰蒼天之浩蕩兮茫不知其所以樓之望兮有時而窮望之思兮有時而弭收視反觀廓爾思兮內湛湛而弗二荒丘之頽兮斯樓之圮兮爾名永存前人之光兮後人之企詩送人之崑山司訓宛宛西飛日餘光照客裳青岡留一壑石瀨幽且長駕言從之遊山水有清光浮雲日夕起寒風何凄涼寧為巖畔柏不隨秋葉揚朅來二三子懷德應倣徨淵雋尋薄味苦淡出清商浩歌入雲表驚起雙鴻翔沉浮何足論兹意殊未央仰看河漢碧徒爾問津梁寄贈姚江陳舍人生日衢路騰軒車鱗鱗夕埃起幽人卧空山一榻淨如洗紫簫遞谷聲玄鶴銜石髓五十歲未衰明眸炯秋水昨宵火昏中祥光見弧矢瑶花隔歲開影醮千巖裏三壽古來傳真訣靜可擬贈君一束書夜半認戊巳少宗伯王甌濱先生持節封益藩便道歸省豫為何愛之正郎賦贈江空流月華白石光淩亂孤舟泛層波一往如飛翰遐哉遠遊心為國樹藩幹明遣辭玉衣倚門發皓粲悠悠甌水濱春日浴鳬鸛為爾立斯須言笑遲昏旦回首百念并時時瞻斗漢大司寇恆山張公父母俱八十餘三疏得歸省太夫人舊患喪明公歸而愈縉紳多詠其事鄭同年與聚索豫作忙中走筆恆山何危哉白雲復漫瀰念彼白雲飛戚戚傷岵屺流光不再須甘瀡為誰旨纍疏叩天閽洞塞幸伊邇不謂許國身亦慰門閭倚沉迷起宿痾春風滿步履古來孝子心寒氷躍雙鯉眇綿氣感通或可徴神理如兹事幽絶傳聞乏前史推之民物間一視而已矣願轉此心丹坐使呻吟止觀瀑八景為孫性甫詠雙泉遺榮涉林丘捫蘿弭朝節回眺林薄外瀑流撼玉軼天髙山氣清野靜夕霏徹忽見雙飛龍下飲寒潭洌水霧騰紫虹石鯨勢怒抉初疑河漢傾又似渾沌泄靈源莽何窮素練天所揭仙翁碧玉笙鶴馭振漻泬我欲從之遊風煙坐羈屑緬邈懷孤髙幽意不可掇泉源向來觀懸瀑披袂颯秋風耳目豈不廣歷覽意未窮闕緣回磴倚杖睨危峯亂雲交壁翠石竇㵼泉紅微涓初濆湧稍稍入幽潨匯為百尺波俯瞰千仞礲靜光沉斗緯上與銀河通愛兹塵外境頓覺心神融踟蹰慰煩倦坐久超鴻濛顧謂後來子形役徒沖沖川上有孤嘆萬古集虛衷流觴渠去去澗中水悠悠頭上巾歲月如飛彈不飲生秋塵家有紫霞精一回三千春注之金荷葉投彼寒流濵寒流清且駛荷葉何逡巡列坐藉春草籌影亂紛繽當歌即成曲逸響動濳鱗引脰川原外翠靄千􅀈屯理深物有悟興極感相因試同世人飲誰得此中真月溪橋月色清且虛溪流靜而徹二者相涵映空山境竒絶創始昔何人石虹跨丹穴幽篁迷舊溪回磴距飛轍中有亡懷子長笛橫翠鐵一曲寒兔泣再曲溪石裂夜深斗柄移孤峭厲嵽嵲安得雙飛鴻相從問真訣營魄感晦盈深淵積氷雪危橋未可梯兹意吾能説白雲洞巉巗鬼鑿工􅏭嶫怪石走窪窈積輕煙千秋藏虬蚪瀰濛搖春波飄忽變蒼狗少進天末墟復經土囊口仙人睡正酣冉冉穿窗牖竹簟生微寒披衣起抖擻顧謂長鬚奴雞骨曾占不釀泉流未枯豐樂煙已久萬古天地心兹事良不偶復恐虹霓合臨風頻搔首飛雲峯長嘯林木下挂冠林木巔山農荷鋤歸相與話豐年輕風萬里隂落日一江煙眇眇生虛谷淒淒翻野田小溪流未穩寒漲欲平川阿婦視春筐蠶老簇且眠兒童浪驚喜剖竹走流泉山園霜露深黍稌蟠蛟蜒社酒及時釀春秋豚一肩無為歌蟋蟀使我抱悁悁留客亭憑軒有所思思思在逺岑我有青絲瑟欲奏無知音淒淒芳草色遲遲美人心佳期不可敦離憂故難任秋江浮芙蓉春渚振璆琳冥迷天欲雨歎息河梁深歸來臥山中浪浪涕霑襟竹窗列月曙杉徑黑雲沉願乘空谷駒翩翩夕巗隂桂枝聊攀折杖屨日相尋山阿華歲晏莫受異物侵琅琊寺朝遊琅琊山暮宿琅琊寺寺古山徑荒寒林積空翠慨念千載人欹枕不成寐六一安在哉智仙亦已矣燃燭讀殘碑剝落不可紀誰謂金石堅所託謾復爾秋風拂庭柯落葉盈陛戺大運古來然榮名安足理所以稱逹生靜觀良有以不見龕中僧白髮垂兩耳過四洞安都營飲戍亭中成二十韻呈翁東崖憶昔合浦守憂虞四洞侵遣兵常選鋭檄誓重兼金自擬風雷並終然殺氣尋以兹內憤鬱秖恐久陸沉設險仗尊俎連雲控紫岑門開千嶂合背塹一江深繩亂費觿佩魚遊悲釡鬵共銷渤海劍更濕黃陵襟畬火催村鼓夷歌雜暮砧巾袍辭俚製言語效華音社鬼兒童舞山花婦女簪競輸公邑稅還識長官心生意動春水危檣出遠潯欃槍星隕石榆柳市成陰飛蓋夏初熱行看日在參清樽銷旅恨微雨灑疏林築室古多議苞桑力可任豈惟防草露亦懼竭錘針戍將身皆膽使君旱作霖恩波揚海北寧復數蹄涔同翁夢山遊三海巖夙愛山水遊兹山屢延賞披雲入青冥巖屋岈𢎞敞玲瓏開北户峭壁排銀榜初駭溜石懸漸喜瓊芽長幽泉時一滴毛骨森蕭爽壺觴屢獻酬清言激靈響天末多風波陳迹成俯仰徒聞海上洲中宵勤夢想聊兹永日留真性非外奬暝色望征途何由釋塵坱登靈山縣北松嶺同夢山有作越宿期登山晨雨聊復止薄暮雨氣收駕言披榛杞躋攀陟雲端曠然煩抱委長松何翛翛枝柯互相倚密葉布成幄餘響散清微通川明井落平疇水瀰瀰禾黍豈不佳水多懼生耳平生畎畝心十載隔泥滓一丘未能謀萬壑安敢擬翹首望白雲瞬息千里駛乘興理巾車雨霽寧由已與夢山登文筆兹山若培塿名迹擅遐荒中天挺孤秀佳氣接溟茫昔人亦竒尚時節集朋觴豈無賢逹會歲往事多忘我來屬仲夏南陸吐朱光暑雨喜初霽輕颸吹我裳良友期紉茞金玉發佳章為歡既不淺履險固其常緬思峴首客陵谷意何長與夢山登欽州東城樓登髙易為感况兹萬里心孤城餘百雉樓櫓亦丈尋中楹開軒檻翠色前山深屈詰水通海蒼茫日載隂美人隔宵旦精爽苦飛沉舉手招青鳥願托瑶華音青鳥不我顧瑶華空斷金耿耿還自念有酒且共斟鴻飛亭同夢山作置酒鴻飛亭請唱飛鴻歌鴻飛瀟湘遠窮海將奈何天山冰雪盛赤水揚洪波紫貂與翡翠毛羽豈其多朝為山海媚日暮傷虞羅迷方非達節炫采亦愆和所以至人志萬事秋鴻過冰堅先夕惕龍亢謹南訛豈無寒與暑中正諒匪他江亭水分渚夏雲鬱嵯峨酒行君盡醉莫惜朱顔酡試看冥冥表寧復顧鶬鵝自欽州回亷至上陽嶺望三渡周覽窮水國歲月屢徂遷憑髙一以眺心事故依然南天足梅雨草樹何芊芊幽蟬鳴我側鸛鷺飛我前茅茨與竹瓦參差傍野田黍稌力未蘇蒼莽起疏煙豈繄憔悴感永念膏澤偏撫已慚曠職劭農憶昔年斂斾還城邑耄稚擁郊㕓何以解其愠南風寄所宣桞州别王楨甫柳州越之西山川阻且修子來首冬節日月幾回周旅館夜共榻清言鬱綢繆撫世嗟多岐語道無全牛上無幽不燭下無隱不抽歷歷見肝膈寫我百端憂歸途念有期為子戒行舟豈不惜離别壯志浩難留驚湍束重峽春鳥鳴鈎輈子行應萬里中道莫夷猶人生會聚散佇望心悠悠努力平生業歲晚興全收唐膳部啓東有歸省之命祝鳴和賦三章題曰錦江歸興屬豫和之朱紱為誰健青山念爾違中天懸一月萬里照雙闈陟屺徒愁眼乘風便拂衣錦江東入海為爾謾生輝其二歲月江頭老鄉關天外違髙秋雙鶴髮清夢幾蘭闈一疏天應雨十年錦覆衣蜀中多舊事共指使星輝其三城角聞長夜江村事轉違風塵走宦迹煙水眇庭闈斜燕翻行幕黃花候舞衣臨期更一酌相看暮容輝遊員常寺有序乙酉秋八月與王子楨甫約遊員常登西麓緣斜徑穿林薄中秋氣度篁松颯颯有聲是夕宿方丈寺僧赴鄰舍齋會命稚子摘園蔬對酌凌晨復登山北勢窮處有石頗竒怪石痕濃淡隱隱成山字徑三尺餘字畫雄健飛動殆不類人間所書者因憶往歲讀書山中山之形勝登覽殆遍及後出仕居京師常來往于心不忘擬築精廬一區因山勢回合扁以丸中之號友人浙趙𢎞道善大書預為乞其書扁尚未知有此竒字之勝也豈造物靈怪隱見有時將待吾二人發之與與王子歎訝者久之自是又再越宿或坐茂蔭聽淙流登靈瑞高峯弔觀古迹夜玩月東廊下比更深就枕疏燈永夜與月色相蕩使人清極不成寐詰旦僧歸復呼童引酌因料檢所為詩十章每一酌輒歌一章傳于好事者以備山中他日故事昔日讀書處緑蘿映草堂風塵驚歲隔夢寐入宵忙擬作丸中舍更尋物外方兹心恐未遂臨眺獨倣徨其二不堪秋興極倚徙陟南岡野色開朝霧溪聲散夕陽孤村鷗鳥外小艇荻花傍一眺真竒絶浩歌意轉長其三竹識初時種抽梢今幾年老僧行挂衲稚子解分泉共惜流光逝翻悲秋露泫出山緣底事撫物空自憐其四突兀石痕古蒼茫字畫分千秋誰辨此我輩發竒聞逸勢翻龍篆精光動斗文秦碑與漢鼎摛寫徒紛紛其五偶爾尋幽去藤蘿小徑通野花深爛漫澗水細玲瓏不作悲秋賦還橫短笛風雲根有仙訣安得命飛鴻其六地僻經過少山空草木深展書時一讀乘興復登臨紅緑暫時景高卑萬古心此中真意思莫遣更浮沉其七晚涼欹枕罷振䇿復山行冉冉雲穿袖迢迢谷遞聲平原天際盡孤嶼海中明忽覺襟期遠呼觴坐自傾其八月華流宇縣靜夜此山中寂歷無人會孤高幾處同秋聲藏遠樹物色度虛櫳預恐星河落徘徊小院東其九嶂合孤煙暮秋初響籟清到來情已愜坐久纍還輕留偈僧何在通宵月自明年華駐笻竹從爾謝山靈其十寂寞非人境清虛愜道心聽經猿入定破夢鶴鳴陰刻竹題詩遍望雲懷古深蕭蕭羞兩鬢吾欲投吾簪太平學舍八首吾道江河水文章奎壁精寒光無楚越清潤足瓶罌絶徼兵戈少青襟絃誦鳴新秋占氣候應産紫芝榮其二空城抱靜碧太宇逼青蔥誰謂經無用人知聖可同三千壓戎馬萬丈吐霓虹所志諒能遠殷勤戒篆蟲其三陳良稱楚璧薑相擅南金文物動千古風流越在今洞犀箭礪鏃習羽鷹低林莫遣流光邁負君頭上簪其四聲教千年運春秋一畝宫明禋薦緑藻遺響拂絲桐地遠人多朴中孚物自融乘桴非有託兹意欎沖沖其五文豹能藏霧翠毛亦自珍如何寒潭水翻翳後車塵經緯精微在步趨禮法陳前賢心最苦直指竟非真其六迂闊元吾道盱睢是吏師誰能朱墨暇更理鳶魚辭春雨滿藝閣天聲散島夷豈無分竹者感歎良在兹其七春秋譏猾夏秦漢事邊功攘斥非無術微言自不同聖心堙反袂霸氣漫隮蝀振策首遐軌多岐幸勿訌其八往歲謬文柄掄材上澤宫迂疏成泛愛棄逐任飄蓬舟楫一身逺關河萬里通重來多舊意朗詠舞雩風和遊可齋憑祥途中即事昨晚猶孤棹今朝獨木橋千峯旌斾逺萬里鬢容銷歸鳥入雲定殘花過雨飄交南消息近客意一疏蕭和可齋飲駐仙亭亭隂清翠蓧樹影搖青楓偶此殊方會翛然滿檻風棋敲靜夜子月挂下弦弓不為流連飲天涯任轉蓬同翁夢山遊六峰觀秋日登髙興天涯野望開羣山連瘴海一水隔蓬萊磴曲迷深樹巖空響薄雷羈心應不盡何處更孤臺題遼王卷子江漢分王地空同訪道年浮雲收滯念一粒轉丹田淮枕書仍在東平思更玄遙知最樂處魚鳥亦悠然又洞府移蓬島雲山入畫圖出門衡嶽近流水桃花俱梁苑多才子荆臺足舊儒祈招日有誦修竹徒區區送同年謝仁夫知長安縣萬栁垂旌拂去鞍馬蹄新喜得沙乾竒峯數點青冥外寒笛一聲落照間餘劫無端留黑壤孤村應是小銅山秦中物色高秋冷為報春風好解顔送林次崖致政還鄉疏燈夜榻隔秋連一别滄江故愴然語穽久疑無地避長材應使後人憐山留荒屋供多病力剩加飱健昔年怪我好竒欲問字清尊信有子雲緣又寒迎初雨晝隂連草舍蕭疏意慘然世態備經方自悟秋丹結盡竟誰憐可堪物節催雙鬢又見風花似去年湖海生涯興不淺如君風骨故天緣登馬退山望雍州筍輿度嶺又髙峯望極越山興不窮元氣逺浮瀛海外人家多在翠微中軟莎黃犢迷煙雨極浦歸帆逗晚風兵祲沉銷春晝永兩江樹色鬱青蔥入雍州雍州城北兩江來五管金湯亦壯哉海賈遙通身毒布堠亭直擬白龍堆臥關虎豹春霾霧入匣雌雄夜吼雷御逺古來資上略天南壁馬已枚枚發雍州往鎮南關隔年梅雨記重遊風景依稀潦瘴收老去筋骸慚櫪馬誰將華髮博蝸牛孤光冉冉瀧頭月雙櫓迢迢天際舟夜數星辰翻百念非關鄉國起離憂太平東岸尖峯似故山作何處飛來玉筍峯似曽排闥為吾容隔江翠色迎孤棹故國白雲知幾重樹老時鳴楓葉雨山空逺遞夕陽鐘十年回首凋玄鬢欲躡征鴻恨莫從翁東崖鄭長溪馮次江赴憑祥途中遇雨賦詩戲贈分韻得須字别時霽柳拂前驅别後雷殷水滿湖俄頃隂晴迎伏暑淩兢車馬戒泥塗岸沙帶浪東西落田鸛逢人向背呼愁絶同袍關塞客南山欲與剪扶須又五月隂精長緑蒲冥風怪雨亦相須農人私記豐年兆僕馭偏憂九折途遠勢驚翻銀漢水怒濤疑拔老龍鬚嚴程傍險兼竒觀霑濕何妨赤杖扶和可齋泊舟左江有懷韻雉堞岧岧俯碧潯天涯此路接雞林地非中土衣冠並氣壓南荒歲月深尊俎空憐白羽扇溪山何處樵歌音儻諧插翮飛蓬島願學燒丹變紫金和可齋太平燕會奉酬廣西諸公韻城外青山畫戟同長廊絲管度南風使君髙誼雙白璧旅客扁舟一逺鴻具共琴尊寬夙昔還開匣劍看雌雄江邊沙際孤煙起列炬分携暝色中和可齋泊況村雨霽二首扁舟夜雨瘴溪中曉起看山翠色重萬感忽來惟宴坐逺書欲寄漫題封似聞瀚海秋飛箭稍喜炎天近息烽却怪南華忘物者等間空谷喜聞跫又雨歇郊墟斜日昏居人猶自散雞豚槎當岸缺深留纜燕逐花飛故逺村水土周防翻藥笈江湖劇念傍征軒擬為暫駐成淹久倦聽風波疑曲言况村即事用前韻江湍夜響雨聲中錦纜沙痕漲幾重鳥雀深枝初日麗關河舊恨白雲封漁舠逺泛還迷浦獵火暮歸似舉烽昨偶村邊試病足兒童驚訝履聲跫和可齋過安都營韻海上春風細柳營江雲靜抱一川平菰蒲晚泛磨刀水煙井初開殊俗氓此集衣冠成故事他年尊俎誰長城濁醪共醉芳菲暮畫角聲沉月始生得董蕨岡白沙村晚酌詩時遲諸公不至次韻一首晚舟餘熱坐櫓頭淩亂煙華水上浮遲客不來孤夜永扣舷獨和聽江流丹崖月出人初靜雲鳥陳髙手自籌醒醉管然問漁父揚帆南破浪花漚夜飲董參戎蕨岡寓舍讀壁間過伏波祠詩有感孤戍玄雲想壯圖酒酣日落歌嗚嗚大材敢道馬新息短劒還聞陸大夫奎壁淋漓看獨夜江天冥漠失雙鳬幾回欲酹溪頭月又恐前身是腐儒經宿受降城老夫越吏姓名通銜璧牽羊事不同聖代神靈跨往昔南天萬水盡朝東荒山故壘籠寒月征馬孤嘶自晚風讀罷穹碑一悵望螭頭飛動欲騰空又沉沉髙閣午隂清况有岏巑蒼翠迎金鼓往年分閫地關山千古受降城龍蛇蟄伏天機靜煙雨冥濛春草生倦倚烏皮成獨寐不堪幽夢緬縱橫過念涯營虎落周遭擁曉雲當年萬馬誰空羣共傳羌虜湟中策不數樓船海上軍夜柝聲嚴魚麗陳黃幡影動騶虞紋一從夷叟投關後芳草依然映夕曛又風雲蛇鳥指揮新犢劒牛刀語入神殺氣成虹翻作雨溪姿含霧逺迷津地荒少值桑麻長路滑還憂風雨頻滿眼黃蒿半狐兔濟時真負百年身和可齋宿憑祥州勞歌永夕最堪憐望月東峯缺復圓紫蓋銀鞍千里道水舂雨汲百家廛群山濕霧丹青滴萬木濃隂華葉駢且共風花散煩鬱馳驅未敢恨流年登鎮南關昭德臺炎荒突兀見春臺皇德昭回氣象開五色光華瞻北斗一天雷雨動南垓乘槎擬借搏風力破浪還看曝日腮安得坡仙扛鼎筆表忠高掞靜氛埃又振衣千仞瞰飛鳶望極江山思渺然百粵風煙畫一幅清時日月鏡雙懸天開正朔尊王會地接金鰲立極年橫海昔賢堪勒柱髙臺我輩亦樓船觀莫福海像書事若翁文理領南中朱鳥回光照膽紅世事水流餘故步名駒汗血更追風已憑禹鼎銷魑魅好向龍編樹椅桐瞻代只今多霈澤百年忠孝莫匆匆又上將分符兵百萬文才草檄字三千試看洗劒滄溟水何似含恩雨露天牙纛嵳峩唐節使纓㽔飄裊漢貂蟬南中自有衣裳地剩讀周書旅貢篇遊白石洞夢裡似曽踏翠寒萬山洞壑石林攢寧知夏冷冬溫地秖在藤梢棘刺間隂火瓊膏烹日月長空簫管待虬鸞道人不是避秦客慢憶桃花回首看又諸天洞府日華傾此洞隂風地底鳴泉落鮫珠含內景石飛仙珮散玄精暫遊不覺心源靜欲去那禁毛骨清勝會山靈應記取後期未許結三生與諸公同遊鐘鳴洞賦詩分韻得南字石鐘古洞似禪龕兀兀頑空亦可參擬傍藤蘿揮麈尾共移舟楫繫江潭雲開乳竇金膏見鶴定松隂午夢酣幽興不禁風景好况逢賔主盡東南又千秋洞屋鎖江嵐縣石鐘聲空自函疑有精靈遲勝會果然冠蓋並幽探巖前把酒雲揮袖醉罷登舟花滿潭瘴海此逰真浩蕩未須留滯歎周南己酉九日王憲副邀登客山有作南山佳氣入簾櫳此日登臨興不窮萬里長風開曉霧五溪寒色浸秋空黃花滿泛樽中酒短髮還羞鶴背翁為語山靈應記取未須江漢問流風其二溪上誰留紫翠堆秋風吹送重陽杯玄霜故染千林碧天籟時傳萬壑哀日月此辰應有會江湖浩思渺難裁明朝幸釋方隅甲萸菊扶衰擬再來其三故山回首鎖煙霏草載馳驅未得歸偶爾攀蘿尋絶頂那堪把菊對芳菲溪雲瀲淡秋容靜疏雨微茫梧葉飛似有宿緣成主客呼尊更酌醉斜暉遊雲臺山髙臺初日上嶙峋芝草琅玕别有春不用丹青圖將相只留巖壑待幽人沅州贈相士洪鰲沅湘千里心如水湖海雙眸具者稀我有九淵蟠未定憑君眉角覓真機贈吏目王策故國松楸魂欲斷山城伏臘亦堪憐莪蒿細辨年來味蘭芷輕籠雨後煙庚辰赴謫金陵過三山同年舒國裳劉實夫廖師賢郭澄卿邀飲即席聨句時正月念五日同年三百道相如舒天地生人又一初閩水有情春送棹劉塞鴻無恙夜來書詩成綵筆雲連掃廖紅滿膽瓶梅正舒賦罷遠遊誰與和張煙波渺渺正愁豫郭春霽橋西雨劉商歌本不卑愁人尊酒盡廖臥病一舟宜憶昨心猶壯張憐今路正岐杜陵那可作郭心事草堂知舒春别琴書雅廖新詩夢汝賢風塵驚滿眼張道誼喜同年奎照三山裏郭雲橫五座前金陵渾在望舒君去亦登仙劉涉世應多慮張逢君可自寬晴雲看照户郭光景歎驚湍日月孤臣疏舒鸞凰國子官春江明發棹劉百丈上平灘廖剛喜新晴别淨峰郭欲將絲線繫艨艟野雲片片寒猶在舒花樹茸茸酒更供此日論心還剪燭劉當年携手憶聞鐘丈夫事業存青史廖敢道無才亦協恭張小山類稿卷二十
