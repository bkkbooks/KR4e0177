body:
  text: 小山類稿卷二明張嶽撰奏議二督撫鄖陽稿鄖陽到任謝恩疏欽差提督撫治鄖陽等處地方都察院右僉都御史臣張嶽謹奏為謝恩事臣原籍福建泉州府惠安縣人由進士歷升浙江布政使司左參政為遵奉明旨議處安南事改廣東布政使司嘉靖二十一年十二月二十日準吏部為缺官事該本部會題奉聖旨張嶽升都察院右僉都御史提督撫治鄖陽等處地方寫勑與他欽此備咨到臣遵依于本日起程至今年正月初一日行至廣東韶州府地方該兵部差錦衣衛舍人李武齎到勑諭一道臣即叩頭祇領望闕謝恩訖于本年二月二十六日行至所屬荆州府地方準原任提督撫治右副都御史喻茂堅咨送原降預備倉糧勑書符驗關防到臣交代接管欽遵行事外臣竊以鄖襄重鎮控扼南北之樞實為要害之地自設立衙門以來假以雄職弗輕畀人臣疏拙無用尸素多年嶺海遐陬尚無益于甸宣江漢上流惟深慚乎瘝曠誓竭孤忠仰承嚴命布揚皇澤振肅兵威撫輯流散之民厚為根本之計雖遷代不常未能悉其條件庶規模粗立亦足明其素志臣下情無任感恩激切之至為此具本専差百户蔣鉞齎捧謹具奏聞平黎謝欽賞疏奏為謝恩事臣原任廣東布政使司左參政伏蒙聖恩以臣征剿海南黎賊效有微勞欽賞銀三十兩紵絲二表裏于去年十月二十七日差禮部署員外郎林應亮齎至廣東臣當即祇領叩頭望闕謝恩訖方具本奏謝間又接邸報伏蒙聖恩升臣前職續接吏部咨文就在廣東起程前來到任所有前蒙欽賞銀兩段匹臣因升職起程奔走道途未能差人奏謝竊念臣一介疏庸備員嶺海適遇黎賊惡稔數窮臣仰仗廟謨吏卒用命深入巢穴一舉掃清崖陵百姓從此始獲生全之慶此皆皇上威德逺揚之所致也臣有何能而寵錫駢蕃超擢逾分捐軀以報尚有餘志况犬馬筋力豈敢自愛惟當黽勉以竭愚忠無任感激之至為此具本専差齎捧稱謝謹具奏聞巡撫江西稿江西到任謝恩疏欽差巡撫江西等處地方都察院右僉都御史臣張嶽謹奏為謝恩事臣于嘉靖二十一年十二月內準吏部咨伏蒙聖恩升臣都察院右僉都御史提督撫治鄖陽等處地方前赴到任嘉靖二十二年五月內又準吏部咨該本部等衙門會題奉聖旨張嶽以原職改巡撫江西等處地方寫勑與他欽此欽遵本年六月初一日又該兵部差辦事官包冕齎捧勑諭到臣本年八月十三日將撫治職事交與新任都御史王守隨即起程于本月二十五日至江西九江府地方準前巡撫江西等處地方都察院右副都御史汪玄錫咨送原降符驗關防并原給坐名散賣寺田勑諭一道到臣接管行事外伏念臣學殖素荒受器有限久經任使莫效勤勞逮兹半周超遷兩鎮惟是揚越之交號為賦訟之地非資通明亮幹之材曷究情偽始終之變顧如庸匪恐誤選擇蓋責既重則憂畏之愈深而負且乘亦危奪之必至在鄖數月曾無尺寸之可言大江以西又豈端委之能治惟當仰承勑旨俯竭愚衷知無不為不敢愛筋力而自怠事有難處尤先察民情之所宜與之休息未能家至而人益積以嵗時期于賦省而訟清此臣素心天日可表誓以鞠躬庶答皇造臣下情無任瞻天仰聖激切屏營之至處置災傷第一疏題為乞恩處置地方重大旱災事據江西南昌府南昌新建豐城進賢奉新五縣吉安府廬陵吉水永新永豐泰和五縣吉安安福二守禦千户所撫州府宜黃樂安二縣饒州府浮梁縣九江府彭澤德化瑞昌三縣贛州府龍南縣信豐守禦千户所瑞州府申據高安上高新昌三縣臨江府申據峽江清江新淦新喻四縣袁州府申據宜春分宜萍鄉萬載四縣并袁州衛各申稱今年正二月間疾風霪雨地方二麥黃死顆粒無收三月間幸雨澤及時得以播種至四月初旬以後秧苗正當抪插一向無雨高田乾涸栽插不入低田略得抪插無雨接濟中間有陂塘去處竭力車戽隨注隨涸直至五月十七八二十二數日雖有微雨乾涸已極不能成潤及此六月旱勢已甚又有抱葉食心各色螟蟲為害早禾晚秧一併傷死數年以來旱災未有若此之甚者國課日食將何以資申乞區處秋徴設法賑恤庶人心得有所恃而地方可保無虞等因又據江西布政司呈報所屬前項被災府縣緣由各到臣先該臣看得撫屬地方今年入夏四月缺雨高田早禾不能抪插已為憂慮特以節氣未深小民用力車戽官吏竭誠懇禱中間值有雨澤尚可救其一半而臣以乖謬之政不能作乂致此恆暘日甚一日田無高下種無早晚秧苗無老稚一切拆裂枯稿縱使今後得雨晚禾稍蘇前項被災州縣不過一二分可望收成江西地瘠人多雖甚豐熟嵗入不足供給尚須輾轉外郡欲以此一二分之子粒糊此百十萬生靈卒歲之口雖有巧手可知無措臣又訪得今年旱災非止江西一處往年南直𨽻浙江湖廣等處豐熟資其商船來此接濟若此兩處俱災則商船不來無處買糴居無可食出無可往飢寒切身或生意外此臣所以夙夜惶惶寢食不寧者也除行布政司趂今禾根在土查勘分數及行催未報旱災縣分作急申報另行外查得旱災舊例節年只于存留糧內照依分數遞減通計江西每年實派民米一百八十四萬四千三百三十三石有零除兌軍兌淮南北折銀折布顔料外存留米只有三十一萬一千九十石有零縱使盡數皆免不及十分之二况蠲免尚在明年未能有以救目前飢餓之患臣查上年因撫臣奏請多準于兌軍兌淮南北折銀內改折扣留亦視災傷分數以為多寡俱合候巡按御史核實與臣另行會奏定奪惟賑濟一事目前之急莫甚于此蓋布政司貯庫銀兩非嵗額則事例别無贏餘可以動支惟有各衙門贓罰等項去年餉邊已用二萬兩又宗室儀從婚娶冠服房屋墳墓料價等費嵗不下二萬兩前年宗室祿米新增一萬五千石原無存留舊額可以擘畫亦於贓罰從宜那補猶且不敷則預備積榖之數從可知己臣又查得嘉靖十七年巡撫都御史胡嶽奏準將吏農例銀并十五六年齋夫存留與該年分派剩南折米一十四萬每石折銀六錢共銀八萬四千兩相兼賑濟十九年巡撫都御史王暐奏準亦於前派剩銀內除原留四萬石補祿米外再留四萬石于本處預備倉相兼賑濟故此二年雖災俱蒙聖慈惻怛存恤備至一方飢民得免溝壑至今含戴聖澤以為再生今年之災既比前年尤甚萬口嗷嗷所以仰賴于皇上者又非如前年之比如蒙乞勑該部從長計議不必候明年且將嘉靖二十二年分應該今年起解南折銀八萬四千兩暫時停解并上年未解吏農并缺官柴薪馬夫等項但非歲辦額辦之數俱存留候秋冬小民十分缺食之時聽臣會同巡按御史分委守巡及府縣慈祥有心力官員動支與各處預備倉榖設法相兼賑濟仍行巡按御史魏謙吉核實將應免分數并該查上年事例改折扣留等項另行會奏定奪及照愚臣奉職無狀至此災旱上損國計下誤民生罪當罷黜但當此大小憂惶之時義不敢言去欲望皇上將臣重加罰治令其戴罪撫處凶荒如果無效重置刑典以謝此一方飢困之民且為不職之戒臣雖萬死無恨緣係乞恩處置地方重大旱災事理未敢擅便為此具本専差承差鄭世隆親齎謹題請旨第二疏題為乞恩處置地方重大旱災事據江西按察司呈報分巡各道勘核過各州縣被災田糧分數文册及稱已該巡按江西監察御史魏謙吉核實過緣由到臣據此卷查先據南昌等府南昌等縣袁州等衛所各申并據江西布政司呈各報極旱災傷情由前來隨行布按二司督同守巡各道通行委官踏勘分數造報及比照以前撫臣節年奏準事例具本題請荷蒙聖慈命下户部覆查題奉欽依備咨臣及咨都察院轉行巡按江西監察御史魏謙吉各欽遵查照將前項被災地方選委能幹官員逐一沿丘履畝踏勘核實分數要見有災無收幾分無災有收幾分照依勘災體例分别分數以次遞減俱于存留糧內除豁仍扣留各屬未解嘉靖二十二年派剩南糧折銀五萬兩并上年未解吏農及缺官柴薪馬夫等項但非嵗辦額辦之數俱準存留與本處預備倉榖相兼賑濟等因到臣隨經案行都布按三司通行所屬遵照及專責按察司督併分巡道各催攢原委各官各將踏勘被災田糧逐一再行核實分數造報去後今據繳到覆查相同又查得今年九月二十六日準户部咨為類奏災傷乞溥聖恩以恤民隱事該本部題該户科都給事中林廷壆題稱各處災傷議將嘉靖二十三年分漕運正改兌糧四百萬石照依上年事例內除原額折銀并薊州天津二衛倉本色照舊外其餘以十分為率七分徴運本色三分折銀每正兌米一石連席耗折銀七錢改兊米一石連席耗折銀六錢解部轉發太倉銀庫折放官軍後不為例除通行遵照及將各衛所屯糧查照坐落州縣被災輕重分數依先年巡按湖廣監察御史沈一定奏準事理改折并勘核過被災分數另行會題外該臣會同巡按江西監察御史魏謙吉議照江西一省今年災傷異于常年該臣具奏雖蒙聖恩俯從部議量留南折銀五萬兩并上年吏農等項銀兩聽臣等與預備倉榖相兼賑濟及通將正兌改兌二項糧米量折三分恩德所及莫不鼓舞但今地方災傷之餘徴納錢糧固難而米尤難得一十三府惟南贛建昌廣信稍輕其餘皆十分重大榖價翔貴仰糴於南贛等處災輕地方亦已告竭雖有銀貨無從販買當此冬初晚禾收穫之時尚且艱窘如此若至來春嘉靖二十三年糧米正兌除三分折徴外尚該正兌糧二十八萬石改兌一十一萬三千七百二十九石共該三十九萬三千七百二十九石外加耗過江過湖等項每米一石量算加耗六斗約該二十餘萬又有南糧本色三十三萬每石加耗本色四斗又共一十三萬二千石總計二兌并南糧約有一百餘萬石皆當于三四月赴水次交兌起解此時青黃不接民方啼飢而欲令辦納糧米縱使有司設法追併祇趨于流亡困踣臣知其決不能完納也况減免存留內除王府祿米七萬七千四百餘石該全徴其量免者只有府縣學倉三項共二十三萬三千六百四十石有零以江西總額實派民米一百八十四萬四千三百三十三石論之所減免者無幾臣等查得嘉靖十四年該巡撫都御史秦鉞巡按御史王鎬會題水災蒙準將起運正兌內折徴二十一萬三千九百五十二石改兌內折徴一十二萬八千一百二十二石二斗嘉靖十七年該巡撫都御史胡嶽巡按御史景溱會題旱災亦蒙準將起運正兌糧內折徴二十萬石改兌糧內折徴一十萬石又查得嘉靖十五年該巡撫都御史秦鉞巡按御史陳玒會題水旱蠲免存留則祿糧等項欠缺數萬無從處補蒙準將十四年分起運南京倉米三十三萬石每石折銀七錢內將五錢解南京户部抵斗給軍餘二錢扣留本省以補祿糧等項臣等思得今年災傷比前數年尤重其所蒙折支分數比之前年反輕不勝拳拳至情欲嘉靖二十三年起運正改糧米比照嘉靖十四年奏準於正兌內共折徴二十一萬三千九百五十三石改兌內共折徴一十二萬八千一百二十三石二斗之數及比照嘉靖十五年奏準全折南京倉米三十三萬石每石除五錢解部扣留二錢抵補存留減免之數尚有不敷或將九江鈔關今年冬季并明年四季稅銀扣留或于贛州鹽稅銀內截撥五六萬兩相兼支用則官之經費不虧而此飢饉困苦之民命不致遂填溝壑如蒙準奏乞勑户部再加查議俯從照數改折解存及將鈔關鹽稅等項截留支用此不但臣等為地方拳拳至情不能自己乃一方軍民所為引領不啻更生之望也緣係云云請存問尚書羅欽順疏題為尊元老以風後學事據江西布政司呈奉臣批據吉安府泰和縣申據本縣儒學廩增附生員劉元等呈稱致仕吏部尚書羅欽順壽躋八帙乞要表章等情奉批仰布按二司會守巡提學道查採公論議呈以憑奏請奉此又蒙巡按江西監察御史魏謙吉批據該縣申同前事依蒙通行布按二司掌印右布政使陳嘉言副使任轍守巡湖西道右參政吳從義僉事施千祥帶管提學僉事鄭世威會議得致仕尚書羅欽順少掇巍科齊名先哲繼登少宰允服鑑衡持身則無愧官針居鄉則允協輿論誠一方之師表當代之偉人所據該縣儒學生員劉元等呈請本官壽躋八帙乞要表章一節亦其秉彞好德自不容已既經查採公論僉同相應俯從羣議合候呈詳允日備行泰和縣案候本院奏請明文至日施行等因具呈到臣據此簿查先據該縣申準儒學牒呈據本學廩增附生員劉元蕭仁等狀呈切惟本縣致仕吏部尚書羅欽順四朝元老一代達尊美質由於天性正學得於家傳鶚薦巍科文章華國蜚聲翰苑制作名家職司成多士勤山斗之仰遷少宰庶僚服衡鑑之公秩典太常究心禮樂疏排逆瑾拂袖山林道遵晦而彌光譽有孚而上達晉陟太宰號稱至公未老乞身名節完懋家規同柳氏之嚴鄉約法藍田之備深造獨得記于困知足以羽翼聖經攘斥邪説誠後學之宗師振古之豪傑者也今年壽躋八十元等切見元老大臣年高休致者朝廷嵗有優禮之恩而學校未罄表章之誼誠非虛譽實出公評其呈到學公同通學師生覆議相同等因備申前來已經批仰布按二司會守巡提學道查採公論議呈去後今據前因該臣會同巡按江西監察御史魏謙吉看得致仕吏部尚書羅欽順爰從筮仕揚歷五十餘年以至掌銓衡蒙恩致仕而歸清修不倦德業日新杜門講學多所發明其學以孔孟程朱為宗以誠敬踐履為要其于近時私門譎誕之習抉剔病源力加排斥惟恐其蠧壞學者心術上纍德化之美凡今縉紳之知欽順者但知其清修端雅為一時正人而已至其學術之正用意之深則未必能盡知也伏惟皇上稽古建極優禮舊臣欽順纍經論薦在起用之列惜其年已向衰筋力不可復強臣等竊見近例凡大臣二品以上以禮致仕年至九十者遣官存問八十者令有司以時存問如大學士毛紀賈詠工部尚書陳雍皆先後膺此殊典內外臣工歆羡聳歎以為美談欽順之官階年望與前數臣無異既該布按二司府縣儒學呈覆前來臣等誼不敢隱伏望特勑該部查毛紀賈詠陳雍事例令有司親詣欽順廬舍以時存問上足以彰朝廷優老敬賢之風且使縉紳學子知欽順以正道正學為上所尊禮莫敢不勉率以趨於正孟軻有曰經正則民興斯無邪慝矣風化所繫誠非淺少緣係云云江省人材疏題為薦舉地方人材事臣聞明主之于人材其長養成就之也如天地之于萬物甘苦小大皆有以全其生其因材録用之也如匠師之于衆木尋尺斫削務有以盡其用故世無不用之材材無不當之用此所以能兼總羣略鼓舞一世其遺風餘烈猶可以為後世法伏惟皇上建極錫福以成就人材翕受敷施以凝熙庶績不惟聚于廟堂者日近清光感發奮起以靖恭乃職至于負譴抱痾退伏朝野者亦莫不益敦忠愛冀幸際會以償其畎畝拳拳之念此豈羣臣自能如此哉皆遊泳皇極之化而不自知者也皇上長養成就之功真有同于天地因材録用最為易事亦惟皇上少加之意爾江西號為多材據臣所知原任南京兵部右侍郎簡霄原任刑部右侍郎劉節原任南京國子監祭酒鄒守益原任南京鴻臚寺卿歐陽德原任翰林院修撰羅洪先原任給事中魏良弼曾忭詹泮原任御史曾孔化郭宏化傅鶚陸夢麟原任湖廣按察司副使江以達浙江按察司副使王蓂此數臣者皆退居日久進修不倦常懷忠愛之心皆有濟用之器內如簡霄先以都御史操江因同官爭論坐席詿誤及霄公論已白猶多年廢棄臣近見吏部推用在京堂上并在外巡撫多起用舊人如霄才望一時無能逾之者使之終棄深為可惜及以上諸臣俱纍經論薦有奏牘可考如蒙聖鑒復召來京擢以一官俾得展其謀猷天下幸甚所以感激帡幪者當不獨臣一人也緣係云云小山類稿卷二
