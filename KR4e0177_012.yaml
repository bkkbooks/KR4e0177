body:
  text: 小山類稿巻十二明張岳撰序二送桃溪潘年兄還六安序六安潘君宗魯與余輩同登進士除行人己卯夏同以罪落職來為南京國子學正於時諸司同去官者若干人來南都者若干人其在國學則黄君子忠劉君伯繡李君民望潘君及余張某維喬也夫有罪之人宜置之山陬海澨荒僻險惡之境使之顛困愁苦欲去不可得然後足以大懲其心若夫通都大邑紛華鉅麗乃逹官貴士所以優勞養望而非罪人所宜余輩蒙天子寛恩來假食息於此又幸職局多暇得以深居念過圖求自新以故日無不㑹㑹必指摘瑕疵互相鏟剖當其意有相得處伸眉抵掌啞然失笑僮僕左右至相盼駭愕不解其為何事嗟夫某嘗觀古人之為有登山臨水徘徊瞻眺或欲逺遊僊去以銷不窮之感者彼於外物逹矣而未足以語盡性樂天之君子吾數人者豈敢自謂何如要其心求勿肆焉爾矣未幾潘君以太夫人年老疏病乞歸君才識明逹吾輩取法乃欲斂而養諸桃溪之濵其如吾輩何然某聞之士或終日接膝心不相知而有神交於千里之外者必有以也心天心也理天理也山林藪澤與廣都大衢所見莫非天者黙而成之盖有不言語而孚不形骸而合者矣况余輩之宻欵於君邪君將行諸君皆有詩謂某宜以言贈某不佞惡能言言其不能釋然於别者如此以見吾數人之情焉爾贈延郡守歐陽侯序道由浙由江入閩山之趾與水之澨迤邐相將而㑹於古鐔之津鐔之視諸郡也度壤第賦猶其相登也然其襟抱環帶控御一失所宜則瀕海諸郡且靡靡承其弊矣故諸郡以郡守鐔以閩守守尤重也己卯秋石江歐陽侯崇道由南都夏官郎中來視篆審方觀俗勤察所宜不越月浹旬而令肅制一凡幽荒之民昔所未見與間一見之而玩以不信者皆屏息以聽莫敢譁令某以今年春赴官南都出鐔津則見夫山髙水深徳翔化洽猶將頼之逺以自庇焉况鐔人邪既抵都縉紳有訊及侯者具以所見對則皆曰吾石江之才也揉而涵之以就一州得無有餘施乎對曰然又曰吾輩與聞入官之道矣事得其分之謂體施得其序之謂順講求過多而翕張不漸民有耀觀矣而弗從也厲之以威而明察以詗之民有强從矣而弗情也弗情使民不可乆已故善理人者明政體而順施者也曾子曰心誠求之不中不逺得其體之謂矣石江之信於鐔也其亦猶是也夫對曰然請馳此以往弼侯之志且廸厥終則何如皆辭曰懼非石江益也退而以告鄉友陳君徳階劉君是成輩僉曰可矣遂書之而因黄春官子昭之使以逹於鐔贈鳴贊李君考績序人亦有言曰智者宜動拙者宜静金陵處天下江山之㑹而吏之職務又多清曠宜於静者居之余性迂而無用守官南雍頗謂得所宜者然誦説應答周旋進退之間繁文數節候事不暇間或以餘力擕朋登髙一望又有所謂滿目瀟然之感者豈非静宜於拙而獨不宜於余耶盖余聞之惟有得於内者乃可以兼乎外余方内患憧憧顧欲待乎在外者以忘其内宜其有所不能也南海李君拱之為鴻臚三年矣李君之官視余尤多暇且銜其先大夫司徒公之訓淹飫事理而静深閒逸藏之益虚尤余逺不能及者余之宜於静也以拙且不能君拙以藏智而静至於三年之乆則龍蛇尺蠖其所謂未應之感又豈予之所能言哉夫動静各有所宜者性之禀也乆於從事亦各有至焉然乆事於静其至也尚足以却外而養内一不幸而過於動則將無所不至矣君子懼動之無所不至也以為寧過於静雖然未若兼至之為愈也庚辰冬君考績之京以君之賢先司徒之烈而又有吏部之資例懸持其上余疑其待君者將有以撓君之静而置於動也故贈以是説贈鄭太學子榮還曲江序鄭君子榮將歸曲江詣予别予飲之酒而問道所由曰有二西出新林浦泝采石入湖口泛彭蠡抵豫章城下以歸易矣而有彭蠡風濤之險東迂道千餘里以避彭蠡歴呉㑹横絶兩浙繞衢信而亦㑹於豫章然迂迴緩曲不如西之㨗也予曰行也期至爾無速於險道途所次山川之迂徑疾遲固將道之以至者也茍不止無不至焉夫彭蠡風濤晦㝠變化頃刻殊狀使人心掉神慄及俄而就定波平如掌一駃千里豈不足以快所適哉然有幸㑹焉則整裝東出緩轡徐掉其於至也誠的而安矣嗟夫天下未嘗無乆逺不可至之道特巧於涉世者不勝於好徑冀幸之心學飾於私見而名之信否幸乎人事决於小數而功之成否幸乎天夫豈無所至焉以自信其心由君子觀之則有逡巡退避不敢一投足於其間者多矣是故難易者勢也近乆者時也裁而處之者義也化而忘之者道也道義所安命則立焉故曰不知命無以為君子獨歸也乎哉子榮再拜曰守仁也問行而得持身之方敢不敬夙夜於是復酌飲之而與之别贈丘君以義宰餘姚序正徳辛巳榜進士初入選籍吾鄉丘君以義注餘姚令餘姚劇邑有為以義難之者余獨以為易而有甚難者迺在以義之身也凡民性之剛柔緩急直詐繫于水土之習尚而莫不受變於賢士君子餘姚賢士多矣是其俗必知耻而能讓敬吏而畏法令之勢宜無撓者故曰易然習尚既美其所是非與其所好惡必甚嚴且公矧夫虚心以觀令之初政意向少失其平彼且誹然議矣未及於政也則勢雖無撓而宅心之難又有甚者焉故曰在以義之身也今之為政者患在以甚難誣其民而心術隐㣲之間反有自恕者法令條貫周悉無遺巧矣卒不足以勝奸其弊至於茍且相欺以畢嵗月而後已吾以義必不屑為也則余將奚告哉昔夫子之言曰齊一變至於魯魯一變至於道言俗有不同也則夫子為政固將權其道以處之矣及其所告門弟子之問政者莫非宅心定志反躬自勵之事故曰以忠無倦無欲速無見小利夫豈無民情政體可相講明哉聖人終不以彼先此者難易之理宜然也由是言之則以義所以令餘姚者可知矣以義將行問言於余余不知令事而以義髙才又足辦此故獨推古人之意告之盖所效區區於以義者又不止為令爾贈張朝禮丞太平驛序嘗讀兩漢書見所稱文學卒史功曹掌故嗇夫亭長監門執㦸之類其名稱甚㣲而一時竒傑魁壘之士所以樹聲當時卓卓至今有足紀者亦且為之不以為絀官之輕重固繫其人歟漢世用人弗以資文學卒史之類後有去此而都大官及都大官又或拘文守故不能昭明以整肅其職如所謂文學卒史之類卓卓至今可紀者人之能否固弗列於位歟或謂位髙則慮危危則思持位卑則無所慮故敢為竒軼以求伸乎位之外勢或然也莆田張朝禮少侍其父游宦江湖間即有四方之志既迺從事薇垣歴銓曹以年勩擢太平驛丞驛之為職也閲關節峙餼粻以待天下賔旅而其勞逸休戚與天下興衰治忽之機有相闗者在漢世不翅一亭長使漢竒傑魁壘之士生今世亦或為之寧獨為之固將軼於位之外以求伸也君子之仕如飲食然適可而已食而不知其味者衆矣通乎飲食之道以貫出處髙不為顯卑不為晦食糲飲淡與逐逐於割鮮甘腆者奚擇哉通乎此者忘之矣此漢人所以竒軼也朝禮志乎古其亦務所以卓卓可紀者安知當世君子無如班孟堅者出亢朝禮之名迹乎余故以是贈行且以騐其終贈郡丞春江李侯序余昔居京師頗乆幸官閒事鮮喜與恢廓辯博之士譚論古今制度得失盖至於兵制末流未嘗不慨然三歎也人心之靈可使百世四海而相通至於血氣之剛柔强弱雖父母兄弟不能相授今使從戎者世及違其水土風氣履行陣於數千里之外往焉未必足用也民之以世及從戎者徵調騷動困且極矣而戎衛之符檄交下嵗月未巳識者咸知憂之特委諸莫可奈何曰法則使然噫法固然也行法之意將不在人乎餘干李侯佐治吾郡於郡事無所不與亦無所不善而清戎猶其顓職嘗歎曰今天下兵弛民困養兵之費既竭民膏血贍之復驅彫瘁之民以充其無益之數吾勢與位不能及逺泉吾赤子也吾敢慢視乎哉故佐郡五年四方戎衛之符至辨其真偽量其逺近審夫家衆寡蘓瘁之數以權其當行與不當行者茍可以免吾民悉留不遣盖侯勢與位之所能及盡心力而為之如此若夫位守有限非侯所能及者則與余同一憂歎而亦莫如之何也天下之治非法制明備不足以攝人心而防世變及其既也法有時而弊不知所以變通之復為之申令宻禁而法之弊者愈深固而不可解則當今之可歎者豈止一事噫安得千百李侯者布滿列郡以蘓吾民哉御史簡公采侯善政而旌奬之盖亦有以知侯者故叙贈永春柴尹序嘉靖二年癸未夏㓂起惠潮之間由汀漳入閩掠泉及莆所在長吏斂兵城守以獨完其府藏廨舍簿書出郭數里外輒委以飫㓂柴侯在永春申飭保伍訓齊人卒傳柝之聲逹四境㓂知有備從谿谷僻逕疾去當是時列郡邑俱震莆蒙禍尤烈永春獨以柴侯故幸無事其秋㓂退識者憂其復聚聚當益熾適侯將循資例上最吏部藩臬諸公僉留之越年秋果復至將入莆肆掠如昔年之為柴侯亟率人卒控扼諸險㓂至度不能逾迤邐及安溪聞郡城兵大集還走徳化柴侯以所率卒合諸郡蹙之悉俘其黨當是時列郡邑又大震獨以永春先據要害故師不待乆頓而功卒成昔年莆中屯師數千日費錢數萬緡卒不敢向㓂寨峒發一矢㓂搏吾人以嬉顧反姗侮吾之無策至今譚者尚有餘憤今日事力猶昔而功之成否頓殊者豈非知勇之疎宻奮惰固有不同者耶承平日乆郡縣寖以多故兵驕將罷獨以數書生提擕其間一成功豈可常恃當必有過為之憂者吾於是重有感矣永春耆民陳某輩謂侯有平㓂功又當上最列狀來請文故特書其大者如此若其他善政則固多矣贈鄧一新入試春官序昔年有贈余律吕解註者著作者名氏曰古岡鄧某夫鐘律不傳乆矣今人之學之也甚少鄧子獨能奮而為之註余雖無以識其用意深處竊亦知好其書也然學者所當為而今人之為也少奚止鐘律一事第其心勿以為異於人而為之斯其至焉爾鄧子既窮精力以註乎彼亦必有得於此者余又因其書竊并好其為人也頃余至城與鄧子聚者頗乆貎古氣剛其持論常謂古人之道與今不殊事無難易意若茍以為當則蒙怨仇任謗議毅然必以為售已志而理卒不可易又其官卑俸入薄竭力以養父母有餘即給兄弟無分毫顧惜為他日計此皆今人之所少能而鄧子則獨能為之夫士所患在於窮困内攻而外不能釋然於是非毁譽之途故有背古而狥今棄道以從欲若鄧子志行如是當進於古人無疑雖然車攻馬健足以歴逺矣背轅而馳之不審所向未見其至也故學者有入道之資又在虚心反已以審所向而已然則鄧子之資與其所向其不甚卓然與明年丙戌教晋江六年例得羣天下士就試禮部當必有讀其文好之如余之於律吕解者而余謂鄧子所可好不顓在是也故其行序以送之贈王與喬南歸序嘉靖乙酉冬余北上京師仙谿王君與喬將赴選銓曹實與偕行余嘗入武夷上幔亭峰浮江逹淮泝泗汶歴齊魯舊墟遇景物㑹心或古今賢逹遺跡輒徘徊瞻眺不能遽去與喬儒家子往往能舉史册所書者與余叅評其是非可否及余至京師幸職事稍暇抱痾寡出與喬亦能以其暇日數相過從譚故鄉桑麻節候以暢豁幽懐如是者又三閲月則與喬既領選檄將歸矣余告之曰士不逺遊不足以知宇宙之大而宇宙内事與其深思博攷於一室也孰若足迹四逹心目之力俱逺然後能盡無窮之變乎方余與與喬北上也寒漲初㴼舟滯於江臯河渚氷雪交沍嚴寒薄人而不甚覺者豪氣勝之也今炎暑鬱蒸行者以為病余欲留與喬涉秋以行而不可得豈非浩然歸思亦有以勝之與夫隂陽寒暑之變大矣人心有所向也尚能勝其變况有義理為主於中則夫貧富貴賤榮辱生死之擾擾者真如飄風浮雲安能以有芥帶邪與喬之官曰隂陽訓術夫隂陽之理未易窮詰若夫氣與數則所謂寒暑之變其大者然非理明不足以識之子歸矣伯氏與寄讀書窮理必有得於是試以吾言問之贈年友陳士特司教新泰序昔人謂司馬子長文得山川之助予嘗攷其足跡所及自龍門南徙江淮而㑹稽而禹穴又折而九疑沅湘既已挹其精華秀麗矣乃循汶泗北放乎齊魯之都則其巍然崛起者岱山詭然怪特者鄒嶧之刻石宛乎周旋揖遜之跡若與神接者夫子所講之射圃故子長之文渾深雄壯而紆徐曲折又不失法度可謂至矣予愛其文辭想其舊遊處又恨無子長竒氣不能迹而游之今年夏吾年友陳君士特拜新泰學博新泰岱山麓邑而魯之故都夫子遺風存焉所謂巍然崛起詭然恠特宛乎其迹若與神接者皆逺近錯望可按迹而知矧士特起南荒北遊京師又東而至於是也信乎追子長之大觀矣然子長之所得特以雄其文焉耳已夫子之道在六經其行事之實在春秋而尤詳於魯其當時㑹盟戰伐歸取之地荒城頽址不與人代俱往猶往往散見魯之東西郊想其人與事攷其是非成敗亦有使人咨嗟感創不能自已其有助士特專門之學亦豈在子長之文之下哉古之學者既有義理以養其心矣及他所以輔養之具不一而足其在庠序則有釋奠釋菜之禮釋奠有樂釋菜合舞樂有徳有語而舞有位又習之於射以觀其徳而皆以禮樂為之節如此其詳也而今皆廢不講其僅存者亦皆苟且滅裂不足以為法魯有聖人之風焉豈無聞而知者士特相與講而行之以教其人則所以養心成徳又豈但取諸足跡所及而已哉士特將赴新泰告别於余余故為亟道其所以樂仕於魯者有若是云贈林一清之石橋司鹺序莆陽林君一清得嶺東石橋鹺使領部檄將往涖事造余求贈言予惟環海壖東南走萬餘里廣斥濘淖耕稼弗利而鹽筴之利興盖天地之藏所以佐民用也先王以道經國别形散飴苦之味以供祭祀禮賔客而已非盡籠以入官也後世謀利益精苛設禁令以賦取諸民國之經費半於是焉出民始受其病矣既其弊也則墨吏之慾飫焉豪家之勢叢焉賦額倍常而國計日虧折於是乎强税諸民以登之而民之病彌甚矣夫衣食於桑麻菽粟人之情也𨽻名鹺籍非其得已他無以為生也則不得不致力於是而亦有厚利焉盖不憚其勞而為之以濟其生奪其所以為生者以自利矣彼亦何頼於上也故籍鹺之民多犯豈其情哉今之司鹺者非不知民情若是也而猶不免為是以病民無亦慮法太深而通融之術或未之講歟往嵗著令負販者許弗禁而有司譏之益嚴夫熬波鬻水至勞也而獲負販之利至微也猶且不能直遂其圖焉此人生所以重困也林君莆陽世族莆亦濵海郡也耳目聞見寧無感於心乎必思發其所感者以措諸職矣若夫終日坐塲力與商賈競刀錐之末雖非林君亦有能行之者予弗庸以告贈張世尊之廬陵幕序幕屬於其長吏職簿領出納稽其功緒有善則逹之有未善者亦得執憲令之式糾而弼之盖以職業相聨立政非徒取其唯諾恭順備使令而已自幕屬既失其官為之長者兼職事以治之方欲咨求民瘼稱宣導撫綏之意而簿領繁委又每以分其日力雖有精强之才明敏之智莫能盡究虚實之變於是敝端滋於巨胥而天下幕職遂至虚設無所事事夫天下之治必得人而責以實今從事郡縣者不得其人則已苟求得若人而以實責之鮮有不拂戾其上何也位卑而勢逼位卑易奪勢逼則上之人有所不堪必至奪之職而自為之亦其勢然也吾宗世尊甫入選授廬陵典史廬陵之劇聞於天下世尊幸無簿領之勤從容講求利病以贊長吏之政令是職宜無難處者然吾聞之處事非難無事而能虚已以待之尤難處事出於才才可勉也若虚已以待未至之事非識且有守者不能末屬下僚不能固守以安其分媚上以要名生事以殘下因之僨其節者可勝數哉則世尊甫之於廬陵也亦審其所自處者而已爾贈郡守洞陽顧侯入覲序後世言吏治推漢西京攷諸班史西京循吏六人其三人在孝宣之世當是時上方褒顯功能之士用法律課責事功獨渤海潁川三數郡間吏民相與悶悶焉如家人父子商畧其耕桑畜息税斂不求殊功竒能以驚動人耳目者豈非髙文流風之逺雖廟堂趨嚮有異昔時士大夫亦能篤於自信而不詭於時好邪我國家承平日乆漸涵亭養風俗日以媮惰論者見其如此以為法令不信使然凡百年踵行故事一切指為藏蠧蓄弊出新見陳利害援證古今以為必如是行之則積習之俗可變而治可成此其論甚美譚之者往往精神氣力又足以動人天下孰不快然從之顧持之有體其先後緩急之勢不可不深思而熟講也顧侯在吾郡獨雍容簡静守法令崇亷耻敦風俗威有所可仲不矜於立威明有所可察不矜於盡明如父兄之訓治子弟期於肝膈相慕戀而已可不謂之篤於自信而有漢吏之風邪夫天下之治新故損益之相推其理勢有必然者獨怪搢紳氣習一旦變更如河决隄壊無所底止此其理似不可知固時變之激使然與於斯時也欲以一人一郡獨力轉回於其間非迂則誕然西京循吏既其末流區區宻令猶能以其寛仁恭愛濳胚渾厚之氣孰謂郡邑之治果無與大數與今年冬顧侯當上計京師㑹天子崇古黜浮以興政理之日當必有璽書勉勵如漢元始地節故事盖吏治關諸盛衰上之所頼以為化本者終在此不在彼也吾於侯行徵之矣贈孔𢎞運司教惠安序周衰聖人之道不明夫子盖傷之也其論夏殷周典禮反覆乎杞宋之不足徵與魯之郊禘盖曰是禹湯文武周公之子孫焉耳天下不能禹湯文武周公之道幸其子孫能勉而守之猶可取信於天下而徵其實若子孫既不能然矣於天下又何責焉此夫子之所深傷也不然則宋之僅存與周之郁郁夫子嘗學而奚其言若是自夫子至今又二千年矣中間斯文幾絶如綫頼羣儒區區講明卒以有傳學者家有其書而人誦之盖郁郁無不及於周異乎杞宋之不足徵矣然謂是誦讀者為夫子之道之行乎否也夫子之教曰文行忠信其深儆學者曰予欲無言則以言語為學非夫子所望於後人也况文飾假借以便功利之私其所言又非夫子意也夫子有知其能以無感乎哉杞宋之於夏殷也魯之於周也若今孔氏之於夫子也以道言之則天下之公以所承之重言之固一家之私也兼有是二者之重而承家之孝發於天性者當尤切是故有專責焉孔君𢎞運應貢入大廷受學職往教吾邑夫子子孫也神靈在廟志在書登降周旋髣髴在階序渺乎其相接渾渾乎聚於所聚而淪貫於無形聲也其勤與惰能與否於祖有光玷而身之賢不肖判焉其可以無勉歟余將因君以徵夫子之教故為道夫子所感於杞宋魯者以發之贈呉文燦還安溪序今之譚隂陽者數家有主於象主於數主於氣其歸未始不相通然學罕有至焉余亦不能解也儒者之書道隂陽者莫詳於易天地萬物之運消息盈虚之氣先天一圖至矣及乎三易迭興經卦皆六十有四而首艮首坤首乾立文取義不盡同於庖犧氏何也今之易周易也文王周公繫辭而命之懇懇因卜筮立教聖人憂患天下後世之心至矣吾夫子翼以十傳大抵多為學易者言之精意所指又不盡如周公文王所云又何也盖自三易興而先天之數隠十翼行而文王周公之意微聖人於易如質文損益示訓不同要其切於民用使無失其天常而已其於理數精微之際盖有聖人所不欲言者故曰以此齋戒以神明其徳夫易之數且然况其非吾易者邪安溪吳文燦氏以郡邑之命來京師授隂陽訓術以歸余不敢以所未解者告之告以易之説而又申告之曰凡陽必剛隂必柔陽必明隂必暗陽必善隂必惡善必君子惡必小人君子必吉小人必凶吉凶之判極於霄壤而始於一念向背之間噫嘻微矣君如中止乎其官則吾罔敢知若有志於盡人之道第於是焉勉之而已賀林司馬公平㓂序嘉靖九年夏廣之新㑹新寧逋民復憑險出没為患民奔告於縣縣度其勢不可止告於藩憲之分部其土者以請兵於總制大司馬林公公曰兵出所傷必多盍思所以撫綏之者毋輕議已而㓂日益肆請兵之牒報日益至公曰附腧之癰弗治病及腹心治弗得其法病亦及故五毒能愈病亦能滋病劀之熨之療之盪之審所以治之毋敗良肉毋伐天和病乃可已僉曰敢不惟命於是蒐材猛飭器械量度山川逺近險易兵從所入公躬涖五羊以節制之十年春二月羣旅畢集進攻諸峒克之公曰其且戢予士無窮追無殄類無馘脅從待其悔誠撫同吾人越三月賊之餘黨皆投欵來歸遂班師僉曰兹㓂之不靖於廣乆矣撫之則惠不能懐而幾於褻攻之則威不能制而幾於玩積其勢以至今日匪公之明畧戡定繄全廣將蒙其患矧兹二邑敢以凱旋之觴夀公公曰全廣吾一體也附腧之癰劀之熨之療之盪之吾方惻焉念之不忘寧忍言功僉又曰公之心則仁矣盖聞用兵本仁而義以行之終之以禮於是有釋俘獻馘凱歌飲至之禮古之道也所以勞勞息民流惠澤而作士心也徵古之禮於今日則公之功安得終辭於是鎮守廣西副總兵張侯某先羣校舉觴而提學僉事張某為敘其事禮也贈憲使胡公浦南序嘉靖辛卯秋御史巡按八閩者言其部内按察使缺章下吏部選擇有風力知大體宜於其任者疏名上請乃以屬之廣西叅政浦南胡公冬十月庚寅朝命至廣西自巡撫藩臬以及百司文武之吏士莫不齎嗟惋恨以為廣西徼邊比嵗不登軍食且不繼一切倚辦於公而遽奪以與閩閩則幸矣所以處此邦者得無有遺慮與余曰不然夫明天子之用人也固將量其任之輕重小大與才之所宜施而後用之故才鉅者則其用𢎞閩去京師幾萬里兼陸海之㑹號稱文物國家汪濊之恩無間於内外逺邇然或時有動容變色以憂執事者唯閩以其僻静獨完夫盛則有衰而人情積習之乆其勢易至於因循而懈弛弊所由滋而奸之所伏也閩嘗見之矣非有紀綱憲度之臣肅然其上訓飭整齊使人亹亹然奔走虔奉而不已則夫黯然伏者倉卒突乘如曩日之為其變庸可遽弭乎是故言職任則紀綱重言事勢則宿弊深而敕法銷萌視給一時軍食效又孰為大天子計惟逺乆移公於閩總憲按察司公至其地畧去一切苛細激揚彈壓破十數年偷惰茍且之習與屬僚更新異時言閩者將以閩之紀綱憲度自公始作而曩日之變濳消黙黜亦不至有他慮則今所以用公意也於是皆以余言為然公嘗歴西曹兩司楚蜀風紀鬱然為時望所歸承檄入閩志力欲有所為故嘗為余言其所欲為次第與議論其風俗人情去留趨向所宜而幸不予鄙以余固閩人也是月戊戌公治行例有贈言遂書所嘗問答者以贈之盖以釋此邦願留者之意亦以豫告閩之長老子弟使知有良使君如公者至所當精虔小心遵奉條教無惑於理數之盛衰余亦自謂閩人也故云賀少傅蔣敬所公七十序嘉靖壬辰春三月辛卯柱國少傅敬所公夀七十公天下元老也天下望其進退以為輕重其起居飲食之衰健多寡皆有繫天下元氣而非止一身之夀者當正徳十五六年間天下危疑極矣小人環視以為是其勢固然而莫可奈何觀公之所以雍容鎮定及其臨機發慮回巡幸之轍入之京師與不呼吸俄頃而仆元兇於羣疑之際功何其盛也今天子即位公與二三同徳之老拳拳修復祖宗政事期與天下休息時議已有不便而撓之者公遂决歸公既歸天子以向所用之人皆不足用悉罷去之更選新進善議論通逹故事者倚以為政然課其治效卒無以逾公與夫二三臣者未幾亦悉罷去於是天下士大夫無賢愚不肖莫不引領想望於公以為天子明聖虚心以圖治理當必翻然興舊徳之思異時諸老公望實最隆而最夀吉或者天其遺之以夀天下也而公方且斂其精神以自頤於湘水之濵盖與世相忘乆矣而豈知天下之望不釋邪昔曲江罷相而歸也以風度見思又數年以先見見思又百餘年識者追論理亂之分以為始於曲江罷相之日則又愈乆而愈見思思之去幾千年而公乃生焉天下所望於公而祝之者欲公夀祺介福為天下元氣如某所云非如曲江有不盡用之思也公亦安得果於忘世自夀其身而已邪鎮守副總兵張侯某以是日為公初度又七十也宜賀徴文於某以將之於是乎敬書贈大叅孫公毅庵序昔人論士行得失深致謹於方圎之辨自靈均已有是言其曰何方圎之能周兮夫孰異道而相安盖不以圎為善也栁子厚反之曰人當方其内而圎其外方所以能守圓所以能行余以為内外一理既有意於圎其外矣則夫方諸中者安能固守而不變哉孟子曰規矩方圎之至也是皆有天則存焉聖賢之道天則具於心而時措從宜以適於用未嘗不方也而亦未嘗不圎故學者之所以持身應變豈必於其方圎之迹云乎哉亦反諸心以嚴其天則而已矣某年二十三始識毅菴孫公於浦城其後六年復見於南都又十一年乃今復見於廣右而公之踪跡則自縣令而給舍少叅憲副得罪當道落職典史稍起今官其於得䘮禍福去就升沉之變備嘗之矣而未嘗以易於初豈非剛方自信之士哉夫方圎皆天則也非圎無以濟方非方無以用其圎然或不得已而至於過也則寧於方焉過之無寧於圎故曰行已有耻又曰人有不為也而後可以有為皆欲人以方自勵也方中其節無抗之為激狹之為隘執之為滯是亦圎而已矣况夫無是病而備其則如公者於以適天下之用焉往不宜哉公以廣西叅政改江西諸嘗同官者宜有贈言謂某受知於公者命之使言故敢竊推公制行之實以告之亦不肖之所願學者焉小山類稿巻十二
