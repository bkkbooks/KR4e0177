body:
  text: 小山類稿卷三明張嶽撰奏議三督撫兩廣稿兩廣到任謝恩疏欽差提督兩廣軍務兼理巡撫都察院右副都御史臣張嶽謹奏為謝恩事照得臣於嘉靖二十三年九月十六日準吏部咨該本部會推具題奉聖旨張嶽升本院右副都御史提督兩廣軍務兼理巡撫寫勑與他欽此備咨到臣本年十月初九日節該欽奉勑諭今特命爾提督兩廣軍務兼理巡撫欽此欽遵於嘉靖二十四年正月初五日前到廣東南雄地方隨準舊任提督兵部尚書兼都察院右都御史蔡經咨送原收掌符驗一道預備倉糧勑書一道并令旗令牌各五面副及關防卷吏到臣當日收掌望闕叩頭謝恩管事外臣竊惟兩廣之地實古百粵之區內叢萬山外連巨海風氣殊異獠獞雜居地逺而法禁多疏貨多而貪墨如織自非公廉並施寬猛得宜茍舉措之或偏則安危之所繫須求實材以濟時用顧如臣者徒抱鉛槧之微能愧無尊俎之長䇿顧以更常頗久險阻粗知誤蒙厚恩畀此重任感激所至或能捐軀受材有限終懼覆餗惟聖明洞照于萬里之外俾孤忠勉竭于咫尺之間敢不俯察羣情仰遵邦憲興滯補弊去穢扶良公以滅私賞罰期于信必慮而後動拙速勝夫巧遲兹雖老馬之舊途抑亦挈瓶之所守茍能用效庶答鴻私臣下情無任激切感恩願效之至報封川捷音疏題為捷音事據鎮守廣西地方副總兵程鑒廣東布政司右參政張烜廣東按察司僉事陸子明分守雷廉高肇地方左參將武鸞會呈奉臣等照劄俱為地方賊情事內開議照封川縣文德歸仁二鄉大滑腦洪秋大貨黑石白馬白水蓮花黃岡金叉茶瓶等巢稔惡賊首蘇公樂張公蘂李公請林公香蘇宗德陳公黨嶽公安等憑恃山巢勾連黨與僭號稱王嘯聚一方流害諸邑攻圍村寨焚蕩室廬節據德慶州封川縣各該生員軍民告訴請兵急救倒懸前項應剿賊徒已該副總兵程鑒參將武鸞會議進兵哨道畫圖貼説前來又該三司掌印守巡兵備等官重復集議明白應該進剿備仰職等前來監統軍務除遵奉剋期進剿陸續獲功馳報外今查得左大哨自嘉靖二十四年三月內奉軍門行委副總兵程鑒統率軍兵至文德鑼鼓岡立營把截防守于本年四五月內不等時日賊屢出沒行劫督發軍兵截殺斬獲賊徒賊級共九十八名顆內一名係五旗賊首左公珠俱經解報又該鑒督右參政張烜統督副總兵程鑒遵奉軍門照劄各巢肆害尤在首惡若首惡逃避無以示戒各鑒統官若臨敵設竒計擒首惡生解軍門明正典刑者功當優論職等密令領哨神電衛署指揮同知梁希孔等潛令聽招賊徒陸公茶李公願懸以重賞用為間諜於七月初八日計擒僭稱王號賊首張公蘂僭稱五旗將軍賊首李公請及從賊陸公安韋公詔陳公達覃公孫共六名解赴軍門明正典刑外又該各職奉到分布哨道于八月初四日寅時齊舉該副總兵程鑒親督前去剿殺于本年十月初六日班師通計本哨立營截殺為始及開刀至班師之日為止前後計擒生擒并斬獲首從賊徒賊級共一千一百二十九名顆奪獲被虜婦女四口俘獲賊屬大婦幼男幼女共四百一十九名口奪獲器械一百六十九件水黃牛共二百二十五隻又查得右大哨該監督僉事陸子明統督左參將武鸞遵奉軍門劄付行令預先設法擒解首惡以正典刑當即密令領哨德慶守禦千户所指揮僉事婁澤肇慶衛指揮僉事張輝郭靖等百計用間于七月初七日擒獲有名大賊首蘇公樂嶽公安次賊首廖公敬陳公田李公輒并從賊梁公間蒙公相佐公學賔公位林扶定覃扶觀蘇公蟻覃公章覃公稿共十四名解赴軍門明正典刑又先後被賊出沒剽劫督發軍兵截殺擒斬獲賊人賊級共七十二名顆內一顆係賊首岑公英俘獲賊屬大婦一口小女一口奪獲器械四十七件被傷打手四名鄉兵六名陳亡打手一名俱經解報隨該各職奉到分布哨道前去剿殺通計本哨自八月初四日起至十月初六日散兵曰止連前共擒斬首從賊人賊級一千四百四十五名顆俘獲賊屬男婦共三百一十一名奪獲器械一百一十四件水黃牛二百零二隻奪回被虜婦女一口今計左右二大哨前後通共斬獲首從賊徒賊級二千五百七十四名顆俘獲賊屬大小男婦共七百三十名口奪獲被虜婦女五口器械二百八十三件水黃牛共四百二十七隻除將奪回被虜人口審實給親領回完聚生擒賊犯審明呈詳處決功級并俘獲賊屬器仗俱解紀功僉事王舜卿查收閲驗估賣二哨牛隻徑發封川縣牧養勘給被害極甚民人分領耕種外該監督右參政張烜僉事陸子明會同統督副總兵程鑒左參將武鸞議照得封川縣歸仁文德二鄉大滑腦洪秋南吉大貨黑石麒麟白馬白水蓮花等山巢險﨑盤匝凡五百餘里賊首張公蘂蘇公樂等黨與占據其中強奪竊取特其常事小民受害苦不可言正德年間倡率為亂大肆慘毒屠戮居民雖經調兵征剿尚未及殄滅近年以來生齒日繁醜類益衆負恃險阻復肆凶殘嘯聚稱雄僭擬名號村落被其劫虜州邑為之震驚即今正二月間西村陳村觀地之民殺掠殆盡此真罪貫穹蒼人神共憤法在必誅兹者仰荷朝廷威德仗軍門嚴令陳師致討條畫指授允中機宜揮戈兩月之餘斬首二千餘級蠻煙頓息嶺嶠肅清凡兹將領效忠行伍奮義以共成大捷皆不能逃軍門洞察之下均乞敘録以勸將來職等上奉萬全之䇿下賴三軍之力秋毫無補塞責未能再照前項賊徒雖已撲滅中間未必全無一二漏網除奉布招旗差人四面號令但有殺戮未盡賊徒潛蹤山谷搜扒不及萬一幸生自行投出洗心改過者聽令招撫安插編管以全好生及今掣兵量留官員分領軍兵打手護民耕種行令參將武鸞往來提調以警人心候事定民安調理歸一方行呈請告掣外所有前項獲過功次擬合會案通行呈報伏乞施行等因到臣據此案查云云今據前因臣會同鎮守兩廣地方總兵官征蠻將軍平江伯陳圭議照廣東肇慶府德慶州封川縣歸仁文德二鄉大滑腦洪秋南吉大貨黑石麒麟白馬白水蓮花等巢山徑多岐崖洞延袤深林疊嶂窮險莫測自古為猺獞所居種類繁多先年曾經調兵征剿彼皆倚山為勢不能盡滅如賊首蘇公樂張公蘂李公請陳公黨左公珠等復又烏合各處猺賊倐爾突出鄉村大肆流劫攻寨殺人虜掠財畜罪惡貫盈神人共怒法當剿滅所不敢緩臣等仰遵節該欽奉勑諭調集官兵區别善惡分布哨道左右夾擊撫勦並行軍兵臨境蠢兹醜類尚恃其險惡糾合旅拒而將卒效命奮勇爭先無險不登無堅不破自進山開刀至班師之日僅及兩月前後擒斬首從賊人賊級共二千五百七十四名顆俘獲賊屬大婦男女七百三十名口奪獲器械二百八十三件賊牛四百二十七隻奪回被虜婦女五口凡平素有名極惡賊首無不生致麾下伏法市曹及其黨類剪滅殆盡寃憤之氣一旦蕩消遷避之民復還故業是皆仰仗我皇上建有皇極乂用三德神武不殺之威覃孚宇內而干紀負犯者未嘗姑息故人懷敵愾之心賊無逃生之地所誅雖止一隅而逺近溪洞莫不寒心兵威既振削平可就臣等隄備欠嚴致滋寇梗雖罪人幸皆剪滅而死者不可復生方自念咎豈敢言勞但今兩廣猺獞非止封川一處見奉有明旨相機撫剿至于賞罰功罪以激厲將來用兵之際尤為要務照得副總兵程鑒右參政張烜僉事陸子明左參將武鸞各監統軍兵直搗巢穴紀律嚴明綜理周悉誤以多方賊不知其所之懸其重賞人皆樂于用命至仰攻乎危險尤親冒於矢石故能使魁渠無不生擒醜類幾于殄盡平一方之大患復先年之版賦較其勤勞均為稱最內程鑒當賊勢猖獗逺近驚疑之時提兵深入擒斬數多賊徒為之奪氣居人恃以無恐其勞又多此皆效勞于領哨所宜優敘者也左參議顧中孚總理糧賞調度有方兵有餘食僉事王舜卿閲視紀功削録公明姦弊盡革此皆有勞于軍前所宜並敘者及照廣東布政司先後掌印左布政使朱䊵右布政使龔輝按察司按察使駱顒都司署都指揮僉事王寵咸以地方為憂力贊征討之䇿往來計議皆切于事情調集軍需能濟乎緩急其軍前供事府縣正佐官如肇慶府知府胡純同知趙塤封川縣知縣吳蕙夙夜盡瘁分理庶務以上各官職任雖有大小功勞亦各不同要之均為修職奉公亦宜敘及者也但數內該道守巡參政張烜僉事陸子明先因高州有事往彼巡歷武鸞又在雷州閲視城池地方隔逺盜起于千里之外管照不及今各官身先士卒備歷險艱獲功數多勞效最著似宜準贖仍一體優録庶人心激厲而將來任事益加奮勉惟復别有定奪臣等又照前項賊徒俱已平定然久安之䇿所宜預圖除將調征兩廣漢達官軍土官目兵打手人等量行犒賞掣放休息仍將剿過地方暫留參將武鸞在于封川駐劄往來提調督理量留奉議武靖上思各州目兵二千三百名兼同所在軍壯打手鄉夫人等分撥緊關要害去處立營防守俟數月之後事體既定人心稍安即行掣放復又照得封川縣歸仁文德二鄉先年被賊殺占與逃竄民田行委肇慶府知府胡純親詣地方逐一清查踏勘有主者責令給主認耕無主者召募良民任種照額糧差及查得文德鄉巡檢司原設在文德鄉地方為因被賊殺害以致遷出地名賀江口今地方既已平復應合移回該鄉照舊設立防禦保障以便控制其領哨䇿應把截有功都指揮等官并獲功陳亡被傷官軍目兵人等照例聽巡按廣東監察御史通查明白核實造册另行奏繳外緣係云云賀太廟成頒赦疏奏為慶賀事嘉靖二十四年十一月二十八日臣駐劄柳州府該廣東布政司差官齎捧到謄黃詔書一道以太廟既成詔赦天下者臣誠歡誠忭稽首頓首上言伏以達孝莫大于尊親萃饗必先于有廟太室入祼嘉幣告遷通乎神明賚及羣品蓋得萬國之歡以祀先是為聖人之孝由中心之誠而制禮奚止述者之明恭惟皇帝陛下聰明天賦仁孝性成精一執堯舜之中易簡法乾坤之用肅若舊典爰作新宫謂都宫合食之制昉自有周故同堂異室之規沿于後代事非茍作禮或從宜義率祖而仁率親所以重乎社稷內盡志而外盡物庶幾見于羮牆熙事備成景福滋至用敷錫厥庶民俾同躋于仁壽雖洛誦秩蒸祭之文而漢史記寬大之詔合兹二美孰與今日臣督撫遐方獲覩盛典謹當虔奉條詔頒布民夷觀其所萃可見萬物之情咸與維新冀助孝理之化臣無任瞻天仰聖歡忭踊躍之至謝升賞疏奏為謝恩事嘉靖二十五年五月十三日準吏部咨為捷音事準兵部咨該本部具題節該欽奉聖旨這獞賊稱亂流毒地方督撫等官乃能調度官軍征剿平定捷音來聞朕心嘉恱張嶽升兵部右侍郎兼都察院左僉都御史賞銀五十兩紵絲四表裏欽此欽遵備咨準此本年六月初七日據廣東都司廣州右衛千户陶金齎捧前項表裏銀兩到臣除臣欽遵祗領望闕叩頭謝恩外臣竊伏念督撫罔功寇虐為梗憂在庭户勢切焚溺順衆志以徴兵涉初秋而發令仰承廟略遂靖妖氛豈曰臣能蓋有幸會方虞訶譴以示懲敢冀成貸之兼被兹蓋伏遇皇帝陛下深仁博大睿鑒昭明欲飭治乎五兵尤垂精于八表汙疾為之藏納尺寸咸皆甄敘致兹曠劣亦荷龍光司馬二卿西臺雄職美鐐陋漢直之二品文綺法虞服之五章無乃稍畀以渥恩俾其忘勞于説使泰不遐遺治尚中行之體師以正出吉獲三錫之繇茍在行間孰忍自負况若臣者分當糜捐雖去殺勝殘逺愧善人之為效而有征無戰期副大旱之望霖永肩此心庶酬鴻造臣無任感戴歡忭之至報柳州捷音疏欽差提督兩廣軍務兼理巡撫兵部右侍郎兼都察院左僉都御史臣張嶽謹題為捷音事據廣西布政司分守右江道監督中哨右參政鄭絅分守柳慶等處地方統督中哨右參將戚振呈為班師事據本哨領哨把截慶逺衛指揮僉事陳勳柳州衛署指揮僉事徐儼張奎南寧衛署指揮同知劉瑄平樂守禦千户所指揮僉事吳國雄會呈奉職等會牌備奉總府會劄行仰遵照分定哨道剋定嘉靖二十四年九月初七日開刀按圖進剿馬平縣里隆地方上下朝水大橋楊梅等四十三村融縣古龍古郎洞石梘上園古當嶺腳崩土古舊等三十二村鵝頸古盆大難大源等四村各賊巢前後攻斬備收全功各開具緣由到職會同總理統督三哨副總兵程鑒通查本哨計該擒斬首從賊人賊級通共一千三百三十五名顆俘獲賊屬八十三名口奪獲賊馬十匹牛一十一頭紗帽盒一箇奪回被虜男婦四名口其器械各該軍兵奪獲分用除將生擒賊犯呈解軍門審決賊級俱解紀功副使魏良輔紀驗俘獲賊屬除病故外其餘見在與牛馬俱發委官變賣價銀入官被虜人口審實給親領回完聚賊贓發馬平縣收庫陳亡被傷目兵照例給與棺木湯藥銀兩及將上油鵝頸等處殘徒行柳城融縣二縣從宜招撫安插造册另報又將北岸寨聽招殘賊韋朝勇等三十名同艮寨聽招殘賊藍萬喜等三十名與南團寨殘賊二十名共八十名各給與旗榜撫令下寨聽候處分給與田土編立羈管永為良民訖除遵奉軍令于本年五月二十四日掣兵班師外理合具呈施行等因又據廣西布政司分守右江道帶管監督左哨右參政鄭絅統督左哨原任左參將署都指揮僉事孫繼武呈稱依奉行據本哨領哨南丹衛指揮僉事張國威張鋭柳州衛指揮使金簡指揮僉事吳同章李元祿潯州衛指揮僉事卞爵湖廣備禦永州衛指揮僉事陶禮等會呈稱遵奉各職會行備奉軍門會劄行仰遵照分定哨道剋定日期申嚴號令整搠部伍進剿馬平縣五都里隆地方羅塘武歷上下中段等七十三村柳城縣上油洞金蒲大塘等二十一村融縣鵝頸鎮古營小源等六村各賊巢通查前後攻破各村寨共該擒斬過首從賊人賊級一千零三十九名顆除將生擒首從賊人賊級并奪回被虜一名俘獲賊屬共六十四名口馬一十八匹沙水牛三十二頭平頭牌六十面眉刀一把弩一十二把箭筒二箇鐵甲二領皮甲一領皮盔二頂蟒龍袍一領俱經解報訖口巢殘賊二十餘一向羈縻至本年五月十七日亦行招撫下寨聽候處分并本哨先該指揮金簡招過附近獞民鳯山江口山衝三村共獞民秦公黨等一百一十四名亦各安心住種等因備呈到職除將聽招殘賊安插撫諭及差人齎執旗榜曉諭漏網殘徒一體招安復業陸續得獲功級閲視明白送紀功衙門紀驗被虜人口給主俘獲賊屬人口牛馬變賣價銀入官器仗貯庫及遵奉明文會行各該領哨官員遵照掣兵班師外具呈施行又據廣西按察司整飭右江兵備兼分巡道監督右哨副使魏良輔呈奉軍門會劄依奉公同統督原任廣西都司都指揮僉事李齊將本哨原調到東蘭州目兵并漢達官軍民款分撥慶逺衛指揮僉事李世顯部領報效官孫韋應龍目兵連兵款為一哨由洛西洛東進思家隘撲剿黎村中碟等一十三村慶逺衛指揮僉事王圭部領官男韋起雲目兵連兵款為一哨由清潭高泉取路過三江橋出遷江管下窰灰村從南鄉大坡大珠寨門等村進剿黃干四軍等一十一村及分兵把截以遏賊遁指揮張鋭千户黃輔部領把截來賔葫蘆頭松叢等處千户毛麒部領把截仙人博廣二隘而在慶遠洛目渡三寨鎮與大曹堡三處則尤以地遠既有巡檢林玉千户鄭琳劉上表百户李夔分領仍行知府王橋就近總領以便䇿應分布既定申明軍門號令遵照原定剋期嘉靖二十四年九月初七日寅時各扺應剿賊地按圖分哨計本哨前後陸續擒斬首從賊人賊級通共一千七百一十名顆俘獲賊屬一百一十二名口牛馬一百二十八頭匹器械共八十件除將前項功次俱經通行呈報驗收人口牛馬發仰羅城縣縣丞朱夔變賣銀兩入官奪回被虜人口給親完聚并將各處原調到兵欵目兵掣散放回休息量留目兵打手人等參將戚振親自督領在于地方防守外今將進兵節次攻克巢寨獲過功次等項緣由呈報施行等因到臣據此案查先準兵部咨為懇乞天恩申嚴責任亟加征剿以安地方事該巡按廣西監察御史陳宗夔題前事該本部議擬合候命下本部移咨提督都御史張嶽會同總兵陳圭督同副總兵程鑒并于三司中選委才力超卓二三人責令専任以事完為期并合用兵糧議處停當一面具由奏聞一面約期進兵凡軍中一應機宜俱聽相機行事本部仍咨都察院轉行新代巡按廣西監察御史馮彬事完將有功有罪人員分别具奏等因覆題奉聖旨準議欽此欽遵備咨到臣已經行該守巡兵備會同參將官督同守備府衛并地方人員備查為惡村分首從賊徒分别哨道合用漢達土兵各若干細開畫圖貼説并一應軍需等項條具報奪隨據分守右江道右參政鄭絅整飭右江兵備兼分巡道副使魏良輔暫代分守柳慶等處地方原任左參將孫繼武會呈奉臣等案驗前事依奉會同鎮守廣西地方副總兵程鑒廣西布政司掌印左布政使李香按察司署印僉事魏一恭都司掌印都指揮周乾議得右江所屬柳慶等府近年以來盜賊充斥人民逃散柳州一府所屬十二州縣被害尤甚中間馬平來賔等縣里隆北伍等處更為酷烈其巢穴冞深山洞險阻北通古田永福南通淥里八寨東接藤峽諸流西連湖貴二境最近而融縣洛容柳城朝發夕至稍逺而龍哈欣城莫往此逐彼移其餘旁蹊曲徑高壘深居蓋不啻狐兔之三窟而已而里隆一處魚窩等巢險峻尤極控引長江有同天塹迥臨絶壁如守雄關乃柳慶二府之奧區西南一方之劇盜盤據山川豺虎之心益橫因循嵗月地方之禍彌深屢經建議未見施行若非大調兵馬廣積糧餉多分哨道遠布防禦申嚴號令明信賞罰其何以收萬全之功除積年之患哉今將府縣查過應剿首從賊徒名數村分并哨道防守把截去處與夫合用官軍兵款糧餉船隻等項逐一會同詳議畫圖貼説備開條件呈報到臣臣等遵照節奉欽依事理會差官舍分投齎執令旗令牌督調南丹州土官男莫惟武東蘭州土官男韋起雲那地州土官男羅庭鳯各目兵并左右兩江各衛所府州縣馬步官軍打手壯款人等齊集將各官繳到畫圖貼説應分哨道書册分為中左右三大哨俱差官齎執令旗令牌督押剋定嘉靖二十四年九月初七日寅時一齊抵巢按圖撲剿其餘為惡村分應該剿殺儘兵力所及相機行事隨據中左二哨監督右參政鄭絅左參議趙崇信呈稱五都諸寨賊徒勢益悍猾屯結寨上兵力不敷所圍有限呈乞再調别處土兵一二萬前來分布三哨以收全功臣等看得前賊堅結魚窩等寨恃險拒敵未易攻克隨將剿平廣東封川地方班師目兵於內摘取鎮安府土官男岑真寶精兵三千名田州土官男岑芝精兵五千名向武州土官男黃仲金精兵三千名東莞縣銃手五十名及漢達官軍打手人等行委廣東都司新任都指揮劉海廣東布政司分守嶺西道右參政張烜總領隨同臣于十一月十五日前到柳州駐劄督催功次陸續獲功解報臣等又看得各處巢賊將次削平惟百魚窩馬鞍龍船等寨勢極高險拔地數十丈弓箭火銃俱不能達上有窩凹各賊嵗有積聚以防官軍據高臨下礧石如雨從古攻打未曾克破必須申飭各哨為久困之計設法攻打恐日久人情懈弛又行委新任鎮守廣西副總兵程鑒前去總理統督三哨并據原委左哨監督左參議趙崇信呈報丁憂去訖隨改委中哨監督右參政鄭絅兼管左哨監督臣等于嘉靖二十五年四月初八日移鎮柳城縣親自臨督仍將各領哨官以軍法處治鎖項勒限責令攻打據副總兵程鑒監統等官右參政鄭絅等稟于本月初八二十等日購募敢死目兵黑夜藏火毬用繩梯鉤搭絶壁偷上魚窩馬鞍二寨奪其閘門投火毬燒其茅房賊衆驚亂各兵魚貫而登斬獲數多其被火燒死及墜落懸崖不計其數并俘獲賊屬人口奪獲器械等項解報前來今據前因臣會同鎮守兩廣地方總兵官征蠻將軍太子太保平江伯陳圭議照廣西柳州府馬平柳城融縣等縣五都里隆上油石龍鵝頸等巢賊首韋金田韋金秀韋明濂覃朝鮮藍扶威韋扶曠韋張容韋朝龍等各據險巢朋黨為患聲勢相通其中五都魚窩馬鞍等巢自洪武初年以來不入版圖尤為險惡諸蠻所視以為向背蓋自正德二年徴兵大舉斬獲首級雖多然而魚窩等巢攻圍數月竟未盡克遂且招撫是以兵散之後餘黨復布山谷頃年以來根蔓延引占據慶逺水陸二路敵殺官軍攻劫縣庫殺戮鄉村每殺一村則一村田土盡被包占積嵗蠶食各縣僅存附郭數里其餘大抵漫為盜區又恃其險阻狃于招安謂官軍不能持久縱來征剿終歸于招故敢于據險拒敵欲老我師狡猾凶狠人神共怒臣等仰遵兵部題奉欽依調集官兵親臨調度攻剿以九月初進兵收其禾稼兵有餘食決意持久以絶後患其團結上寨者會兵圍困遁投别巢者黏蹤窮追誓以必破此賊乃肯班師是以人無還心進皆死戰賊勢日蹙險逺巢寨並皆摧滅已將各哨報到擒斬首從賊人賊級共四千零八十四名顆轉發紀功官驗實通行造報其首惡韋金田韋金秀覃朝鮮韋明濂藍扶威等明正典刑餘威所震羣蠻膽落而馬平縣三都四都來賔縣北五賔州龍哈八寨并象州武宣洛容等處以北及乎古田之境其魁渠皆自投軍門願編立里甲輸納稅糧同于百姓原被賊殺占額徴糧米今清出一千三百二十六石有竒經報在官聽撫造册給帖者已有二萬零六百六十三名送出原日行凶盔甲槍刀弩箭等項共二千八百一十亡件馬三百五十五匹其班師之後陸續聽招者尚未開報各被賊逼遂良民皆行令有司安插復業田土或仍舊或招人耕種蠻禍消除地方寧息是皆仰仗我皇上聖德同天春生秋肅並行以成歲功臣等奉揚天威遵奉廟謨致此克捷非犬馬之力所能及也及照賞以示勸罰以示威軍旅之中所繫尤切臣等所以能鼓舞羣心奮勇趨事者亦惟宣國家賞罰之典示以信必之令使之有所畏而知勸爾除前日地方失事各官如參將李榮等已奉有明旨革黜罰治不敢再參外其軍前監統領哨領隊等官或到任未久或臨事委用如廣西布政司右參政鄭絅按察司副使魏良輔分守右參將戚振原任左參將孫繼武原任都指揮李霽調任柳州府知府江滿謀畫素定䇿厲有方師久而氣不衰令明而人競勸摧破危險之巢俘獲俱盡窮追連結之黨巖穴幾空鎮守廣西副總兵程鑒未暖封川之席復揮里隆之戈總率諸哨躬冒矢石功雖止于二寨聲實震乎羣蠻此皆有勞于監統所宜次第優敘者而右參政鄭絅經略于始審機分哨動皆當可副使魏良輔輯定于終推誠招徠至者如歸况又兼督餉紀功其勞為最廣東布政司右參政張烜諳熟地利兼曉兵機贊決征撫之宜以靖門庭之寇勤勞數月謀畫居多所宜並録廣西布政司右參政趙崇信甫破數寨乃以憂歸使其終事必有可觀慶遠府知府王橋分兵扼要斬獲數多師出其境供頓俱備亦冝敘録廣西都布按三司前署印官左參政陳茂義副使劉采力破羣疑以定征剿後掌印官左布政使李香按察使朱觀及署都指揮僉事顧繼先皆能敵時所愾與民同憂往來計議終始同心其勞所宜敘及伏望軫念邊方用武之地勑下該部再加查議將鄭絅魏良輔程鑒戚振孫繼武李霽江滿量行升賞張烜亦加優敘趙崇信王橋量行敘録陳茂義劉采李香朱觀顧繼先量行優奬內知府江滿近被論劾間住或升與一官準其致仕庶人心激厲而將來任事益知奮勉惟復別有定奪再照臣等受兹重委休戚所關上之不能敷布國家文德之治化服異類共享太平乃不得已至動兵革又不能出竒決勝蚤收勘定之功持以久困僅乃克之鋒刃之下實可哀憫正法明罰當自臣始况臣等近以封川微勞叨蒙聖恩升賞過分方切慚懼圖報未能不敢別有希冀以干清議此出臣區區至誠非由矯飾除將調征兩廣漢達官軍土官目兵打手人等量行犒賞掣放休息其已聽撫夷獞行令所司加意存恤未招者備行守巡官遵照臣等原行條約逐一撫處停當安插復業及摘發泗城東蘭南丹那地等州目兵五十名行令參將戚振管領在于柳州融縣來賔千蔓古零等處立營防守俟數月之後事體既定人心稍安即行掣放臣等于本年五月二十四日班師回還梧州總府控制地方其餘有功獲功并陳亡傷故被傷官軍目兵人等照例聽巡按廣西監察御史通查明白核實造册另行奏繳外緣係云云留任兩廣謝恩疏以刑部右侍郎召該御史奏留嘉靖二十六年二月初三日準吏部咨為乞留提督大臣以責成功以安邊境事該本部題該巡按廣西監察御史徐南金題前事本部覆題節該欽奉聖旨張嶽著照原職提督巡撫地方欽此欽遵備咨到臣除欽遵望闕叩頭謝恩照舊管事外臣竊惟蠻夷為患雖自古隆盛之世所不能無商宗有鬼方之伐周宣有蠻荆之師皆得人而專其任持久以要成功故能殲厥渠魁齊一醜類四海內外咸仰德威巍然三代之上號稱中興伏惟皇上臨御以來文教覃敷武略逺振九夷八蠻重驛獻貢無敢干紀負犯以速天誅雖高宗周宣中興之烈未能及此而臣受任邊疆無方叔召虎顯允甸宣之材致兹小醜尚肆陸梁雖仰賴皇威時或戡定揆之止戈之武義甚愧之方將屏息以俟譴訶不謂大度包容復隆委任輟其明刑之召俾久督戎之司揣分奚堪臨事彌懼臣再惟薅除稂莠本為嘉禾然用力弗審反傷禾根惟兹事勢之相疑要在審機而善處顧臣愚昧非所能辨惟有厲果毅之心竭匪躬之節上奉廟略俯采羣䇿慮善而動蚤圖即敘之功從人所欲庶遂息肩之慶臣之深衷耿耿在此為此具本專差百户林挺材齎捧稱謝謹具奏聞升賞謝恩疏嘉靖二十五年十一月二十四日準兵部咨為捷音事該本部覆題節該欽奉聖旨這惡蠻寇征剿既平撫鎮等官有功可嘉張嶽升俸一級賞銀五十兩紵絲四表裏欽此欽遵又該禮部差鴻臚寺序班吳一鸞于嘉靖二十六年六月十八日齎捧欽賞銀兩表裏到臣除欽遵祇領望闕叩頭謝恩外緣臣往年督學廣西巡歷柳慶知五都里隆之寇為二郡腹心之疾憤發于中志欲靖掃逮兹再來又逾一紀道途阻塞慶遠幾為外區財賦陷沒馬平僅存空籍勢已窮極理無姑息臣仰遵廟謨參稽輿論謂非偏師之力可冀旦夕之功移檄徴漢土之兵合圍歷冬春之久乘其困憊悉就誅俘十年憤激之夙心粗若可償四郊未夷之多壘尚有餘辱期贖愆于後效敢希賞于清朝伏惟皇上聖度天容渥恩地載善雖小而必録功惟疑而從豫秩祿猥加溫飽羡于私門金幣載錫光華動乎部伍顧此微軀將何報稱若絲之有經緯願效幅尺于良工于金惟曰從革敢辭精純于百鍊秉此心以對越庶少竭其涓埃臣無任感恩激切之至報連山賀縣捷音疏題為捷音事照得先因廣西賀縣弓山磊石黃洞等巢積年賊首倪仲亮李三弟等廣東連山縣黃南梅水大曲等巢積年賊首李金石住等各結黨嘯聚相煽為亂流劫鄉村殺虜人財奪占田土民不寧居貽患三十餘年節據賀連二縣被害排年軍民黃昻黎得春等連詞具告請兵征剿已該臣會同鎮守兩廣地方總兵官征蠻將軍太保兼太子太保平江伯陳圭議得前賊積惡已盈流毒甚慘屢撫屢叛勢在必征將調到廣西鎮安思明田州南丹東蘭那地向武都康泗城歸順上林等府州司縣土官目兵并兩廣漢達官軍民壯打手人等分為二大哨一哨賀縣委鎮守廣西地方副總兵沈希儀統督廣西按察司僉事俞則全監督指揮李琮孫文繡陳棟鄒繼芳卞爵莫如爵等共兵五萬九千五百七十七員名進剿弓山磊石黃洞等巢首從賊徒一哨連山縣委廣東布政司左參議朱憲章監督廣東都司署都指揮僉事梁希孔統督指揮莫如爵黑孟陽李涇王煦共兵二萬零七百九十員名進剿黃南梅水大曲等巢首從賊徒及行湖廣巡撫衙門督行郴桂衡永上湖南等道兵備分守分巡守備等官各調集官兵鄉夫委謀勇指揮千百户等官管領把截剋定嘉靖二十七年正月十四日寅時一齊抵巢按圖撲剿應與湖廣官兵夾攻者約會夾攻仍委廣西布政司左參議朱道瀾總理賀縣哨廣東布政司監督左參議朱憲章兼管總理連山縣哨各軍前糧餉會本具題外續于本月二十一日據賀縣哨監統副總兵沈希儀僉事俞則全呈報督據領哨指揮陳棟孫文繡鄒繼芳李琮卞爵莫如爵各稟稱依奉督押土官目兵旗軍人等遵照剋期進剿磊石里松東西兩岸羅家亞隆新村大坪黃洞弓山晒禾趙家虞家坪蓮花均洞上下鹹石牛尾等巢連日攻破擒斬賊人賊級二千五百三十九名顆內有名賊首倪仲亮李三弟等一十八名顆俘獲賊屬一百七十九名口奪回被虜男婦三名口奪獲牛馬二百七十四頭匹器械九百九十六件并據連山哨監統左參議朱憲章都指揮梁希孔呈報二月初十日督據領哨指揮黑孟陽李涇莫如爵王煦各稟稱遵照剋定日時進剿大沖東坑倒水牛塘巾子大小中眼繞江等巢連日攻破擒斬賊人賊級四百八十名顆內有名賊首李金石住等七名顆俘獲賊屬一百零七名口奪回被虜婦女一口奪獲牛五頭器械六十二件及據湖廣按察司整飭郴桂衡永兵備兼分巡上湖南道副使潘子正呈稱遵照剋期嚴督管軍守備永道以都指揮體統行事指揮易堂等督率官旗殺手人等各照原定把截營哨相機攻剿永州府捕盜通判林一正等督率民快鄉團猺款各另分定把截通賊要路地方相機䇿應及永明縣桃川迤西桂陽宜章二縣迤東與廣西賀縣富川廣東連山地方但交界去處俱各委官督兵把截各陸續擒斬賊人賊級通共三百五十七名顆內賊首何滋嚴圭黃廷富三顒俘獲賊屬大婦幼男女一百四十九名口盤獲安插過一百二十一名奪獲器械四百一十九件又據湖廣布政司分守上湖南道左參議洪世文呈報相同各前來臣等查得連山賀縣二哨官兵通共擒斬首從賊人賊級三千零一十九名顆俘獲賊屬二百八十六名口奪回被虜男婦四名口奪獲牛馬二百七十九頭匹器械一千零五十八件俱經巡按御史蕭世延楊以誠原委紀功廣西按察司副使沈宏廣東按察司副使黃光升閲驗審勘明白獲功官軍目兵各照賞格給賞陳亡被傷者給與銀兩以為營葬及湯藥之資生擒內有詞者監候另議情真無寃者遵照兵部奏準嚴法令以靖地方事例押赴市曹處決器械貯庫被虜人口給親完聚俘獲賊屬與牛馬俱變賣價銀入官其湖廣官兵所獲首從賊人賊級賊屬等項備行該道俱徑呈彼處撫按衙門定奪委官紀驗施行外臣會同鎮守兩廣地方總兵官征蠻將軍太保兼太子太保平江伯陳圭議照廣西賀縣接連廣東連山縣地方密邇湖廣江華等縣崖洞深險林菁叢密各賊盤據負固肆凶東攻則西遁西攻則東遁急之則走入險阻緩之復糾聚出沒正德年間雖曾具奏征剿賀縣特以一面進兵不曾會合三省致使殘黨旋復嘯聚如賊首倪仲亮鄧良朝梁榮李金石住等合衆數千僭稱名號焚掠村寨占據田土逼近關廂禍延三省劫掠得志黨附益多各處無賴姦民投入夥中導之逺劫至于德慶開建等州縣亦被其害若不急為剿滅誠恐後來愈熾深為未便臣等動調官軍土兵行委副總兵三司等官統領進剿幸致克捷即今地方之患已除神人之憤獲伸舊民復業安枕而卧是皆仰仗皇上聖武宏敷天威遠振故能兵不留行賊無堅寨豈臣等犬馬微力所能強致照得副總兵沈希儀左參議朱憲章僉事俞則全署都指揮僉事梁希孔各監統軍兵直搗巢穴方略素定分布周密一鼓而克其中堅多方以翦其餘黨窮深極險無所不到信賞必罰令人莫犯致兹成功之速由其協謀之固切宜優敘內沈希儀未抵新任即涖戎行而能慷慨登途誓清妖氛指授諸將咸中機宜積勞致疾志猶不衰當稍為優異以勸將臣左參議朱道瀾僉事奚良輔先後總理糧賞稽核周密錢糧清裕副使沈宏黃光升各閲視紀功存削明當人情厭服皆有勞于軍前所宜並敘者也及照廣西布政司掌印左布政使李香右布政使鄭漳按察司掌印按察使楊本仁都司署印署都指揮僉事周乾廣東布政司掌印左布政使韓楷右布政使蔡雲程按察司掌印按察使林應標都司掌印署都指揮僉事夏忠咸以弭盜安民為心始終計議以濟厥功亦皆不可不録者也再照湖廣按察司副使潘子正布政司左參議洪世文推同舟之義以分鄰境之憂各飭所部會兵截殺號令嚴明首尾相應破馬鞍白石二巢以除兩界盤據之禍但越境遁逃無不當時擒斬功雖三百有餘其利益不可勝數此所宜敘論者也又查得領哨指揮卞爵莫如爵等與湖廣領兵把截隨軍委用等官守備都指揮段欽以都指揮體統行事指揮易堂等職任雖有大小皆能各效勤勞以副委用相應量加奬賞以酬其勞者也伏惟皇上軫念邊方用武之地勑下該部查議將前項有功官員議擬上請量加升賞庶人心激厲而將來任事益加奮勉惟復别有定奪其餘有功獲功并陳亡傷故被傷官軍目兵人等照例聽各該巡按御史通查明白核實造册另行奏繳外緣係云云兩廣人材疏題為薦舉兩廣地方人材事臣聞士大夫立身大節惟有出與處而已出而服有官僚有所建立謂之宦業宦業有得有失部院得秉公道以黜陟之則人有所懲勸而政通于上處而杜門里居有所修為謂之鄉行鄉行有是有非鄉人得明清議以褒貶之則人以為榮辱而俗美于下清議之所榮辱與勸懲同撫按憲臣又以時采清議所褒者薦聞于朝以備録用清議既明而公道又行乎其間國家于求材作人之術可謂無遺法矣臣待罪兩廣三年備聞士大夫家居行事謹陳清議所歸可備録用者如廣東原任翰林院修撰蕭與成文章博贍性行端直推以用世猶有餘藴原任監察御史黎貫才器老成氣節凝重求之時輩鬱然典刑原任監察御史陳大器作邑循良立臺風采斂退鄉居物望推重原任監察御史何維柏青年美質潛心淵微菽水養親非義不食原任工部郎中吳會期持守堅確世務練詳屏居海外志節孤聳原任刑部主事王漸逵清修厲行篤志力學造理日深充養益厚原任兵部主事何鮤天性恬淡杜門避喧手無停披言不及利原任南京刑部主事冼桂竒棄官就養力學從師所志非凡進修未已廣西原任户部員外郎馮承芳間居日久守志益堅文造深醇才通世務原任禮部主事陳邦稱甘貧苦節篤學力行久屈未伸公論共惜以上數臣其行義之著于鄉者如此蓋聞古之舉士必始于鄉其或罷而歸鄉里也復得推擇為吏及起家為大官况聖明寬大之世愛惜人材片善片長皆得效用而使犧尊之材永為溝中之棄此臣所深惜也及又查得丁憂服闋南京通政司參議倫以諒性度端沈文章深厚材非一長器可大受似宜遇缺推用無令久淹里居如蒙乞勑吏部查諸臣去官緣由若只是養病違限或一時狂愚詿誤於大節無所干礙酌量輕重次第録用及倫以諒查照服闋事理遇缺推補諸臣感奮之餘後效必有可觀緣係薦舉境內人材以備起用事理未敢擅便為此具本順差舍人黃通親齎謹題請旨小山類稿卷三
