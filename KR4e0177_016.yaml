body:
  text: 小山類稿卷十六明張嶽撰墓志銘新寧教諭莊翠峯先生墓志銘嘉靖三年八月初十日翠峯莊先生之子伯吳等卜葬先生於錦溪前峯嶺頭深之原狀其事授淨峯張某俾為之銘某生晚不及識先生壯時也獨記頃年絫以通家子孫謁拜先生一室雅靚圖書筆硯之外無他物先生終日整襟端坐點勘書史雖分注小字亦精細不茍是時年幾六十矣與人言縱橫穿貫厯舉古今理亂事理物情之變能使聽者悚然莫或窮其辨也至其聞人有善與義當勇為者必咨嗟稱賞惟恐人不及知其好學樂善如此蓋天性然矣自科舉興士之敏茂者拘有司尺度分章摘句以備一日之用既得所欲則已先生獨能博其用心精勤不倦以至沒身後已焉非才不匱乎中而志不困于事者其能然邪嗚呼可謂難也已先生初以詩經遊邑庠領成化丙午鄉薦𢎞治癸丑入乙榜就選人授署湖廣新寧教諭新寧湖南末縣自先生為之師學者始知所嚮方議經術考古製器以變易學者習尚會有中以飛謗者遂解職事歸既與時齟齬故獨肆力學問間以所得作為文章歌詞皆閎麗可讀自邑長二縉紳以及後出之士莫不樂親先生而敬其為人先生亦喜于延接人為傾倒然其是是非非不茍也在新寧時安福劉御史遜言事出知武岡又為藩府所擠人多斂迹先生獨往來經紀識者韙之劉後復官至福建按察使纍通問先生且求見先生竟不見其持重又如此曽祖諱永傳祖諱儒考諱顯將仕郎母洪氏配陳氏生子三伯伯吳仲伯珠季伯範庶出女一適庠生連珏孫二應麒應麟伯吳伯仲弱冠遣遊邑庠志氣行業已為同輩所推蓋先生之教云先生諱鵬字萬里翠峯其號生天順丙子十一月十八日卒嘉靖壬午五月二十一日享年六十有七墓乙向有遺稿數卷藏于家銘曰嗚呼先生孰扼其衝而導其中雷風振撼宇宙晦雺詭靈祕怪慌惚殊蹤有守其一不內以訌頃刻洞視萬變皆空嗚呼先生是以永終千秋考德式此幽宫省齋莊公墓志銘邑南二十里上田山岡巒圓秀連疊而南六七里山夷水緩田原肥美前臨萬安江風氣萃止往年余每過而愛之以為必有鍾是秀而生者後數年乃聞山麓霞曽村莊氏有子應禎甚聰敏始業舉子出語已能壓其儔輩未幾舉于鄉又成進士戊申秋余自兩廣被命過家應禎以紹興推官丁其先人省齋公憂家居奉狀來請墓銘余素知公為人謹質孝弟美行內蘊與山水之氣似有相待其發于應禎豈非所謂天人理數之符會者乎按狀莊之先世自科龍溪西來遷至公三世矣畜而未聚中更變故頗有所折棄公毅然自力欲有以振起之其居族黨間不為岸異詭卓之行循循然無以異於人也而事親無違顔色父沒兄伯蚤世貶衣損食藝農圃樹松竹夙興夜眠與兄弟均其有無先世祭田棄折與人者力贖以歸歲時祭祀必敬謹如禮庭除間無一日不掃也讀書能曉大義喜接儒生聽其講論灑然忘倦與人交不茍為然諾趨其緩急以事就謀者告之必竭其忠其不合於義必反復勸諭使知改乃止故鄉稱長者必曰省齋始雖無以甚異於人而其積行之所至人亦不可得而強同焉晚年禾稼覆隴松竹成行婆娑丘園有足樂者而應禎又能致身科第以成其志人以為公力善教子之報也祖廷愛即溪西始遷者孝諱元璣妣某氏繼某氏以成化壬寅七月五日生卒嘉靖丁未七月九日年六十七娶何氏職內勤謹與公媲德生成化某年某月某日卒某年某月某日得年若干子男四長應鴻娶某次應文娶某次應會娶某應禎其季也娶某女二長適陳某次適何某孫男十一以渾以瑞以濟以渙以沉以澤以濳以薦以夔以藎以茝墓在十九都湖壩山之原已向其葬以己酉某月日銘曰不有以業之孰得而收之不有以挹之孰得而酬之吁嗟乎公行不越鄉挹之彌沖業則有常是以居身無疚志而沒世有餘光湖壩之丘體魄所藏松檟日大莫敢毁傷賓州訓導鄭公墓志銘公諱友字輔仁别號信菴劒之南平人曽祖克榮祖孔齡父文禮皆以士行隱于鄉至公乃治毛氏詩遊邑庠為弟子員振振有文聲正德庚辰貢入內廷試教職授廣西賓州訓導賓荒獠雜處絃誦衰鮮有為公憚是行者而公之子慶雲適由南昌治行徵入亦力止公勿行公不聽其明年卒巳今上入繼大統選置諌官慶雲擢南京禮科給事中又明年兩宫尊號覃恩得封公如慶雲官公辭焉是時大禮議興大臣相繼去位小官或死或謫慶雲纍上章論諌不見省公又在數千里外晨昏缺侍養乃移疾東歸遣使迎公于賓撫按諸司知慶雲者亦亟勸公且給之驛傳俾歸至南昌髙家渡感末疾不起則丙戌十二月九日也享年五十六公為人敦篤勤敏治經有密致剖析條理後生多就師之既屈于場屋老益貧至無家以居及慶雲登進士第厯濳山南昌二縣能以名節厲其官亦無紓若家之貧者故賓州之行公語人曰吾豈不知賓逺且乏才哉顧吾精力能勝此官未可以纍吾子嗚呼可謂有志也已天性孝友幼喪母林孺人比長思慕不已歲時祭祀輒流涕事繼母馬如所生與人處恂恂和易其在賓推所業以教其人亦多有成者配林氏封孺人子男一即慶雲由甲戌進士至今官女二長適生員萬同次許永州黃太守之子應春孫男一墓在某山之原卜以某年月日葬云銘曰圓冠方屨左圖右書循是以行孰曰匪儒炎荒遼絶亦有彞倫我老未衰往訓人文青襟化洽在逺猶邇不有大者以付吾子木華維根丘崇維址鄭世有聞則自公始荒山朱先生墓志銘先生諱軫字朝矩别號荒山泉之晉江人曽祖諱德驥祖諱鎛父諱瑚母某氏先生以成化甲午七月十四日生祖伯父都憲簡菴公占其命書喜曰兒當大吾宗比壯身長七八尺美鬚髯言笑不茍動止有容儀衆謂朱氏有子矣補邑庠弟子員治詩經是時蔡虛齋易學盛行於泉詩道幾絶先生獨與其師友三五人濳心講究久之有所自得不為時文窘束而于詩人性情及文公傳注融會通貫自成一派泉人業詩者多從之屢困場屋志不少衰晚年嬰氣疾猶不廢講究或中夜一起坐而思之人有見其過苦者先生曰古人于此學蓋終身焉吾其敢懈諸然亦竟以是不起先生為人襟懷坦夷與人無城府而是是非非自有分辨居家孝友燕居必以禮雖對妻子童僕亦無惰容尤留心世務嘗采擇當今可行者聚以成帙通達詳練見之者又知其有治事之才非止于經學專門者也自科舉學興國論不下采於鄉士之朴茂自修者反詘於浮華紛靡之習進不克有為於世其制行又不出於鄉里非有卓然竒偉可動人耳目者以故秉筆之士亦無從書而傳之以至於身名俱沒若先生者余知之詳矣而能紀其行事僅止於此以此而望信今傳後以亢先生于永久亦未知吾言之果能乎否也悲夫先生以嘉靖戊子十二月二十一日終享年五十有五娶王氏早卒繼娶吳氏相君子無違德子男四淡洵液涵女一適林春暉孫男二有極有樞墓在晉江縣三十二都石壁山之原已向其葬以己丑冬十二月二十一日狀其行者先生門人張天衢銘曰學以為已仕不逢時吾銘其丘千載不夷王君墓志銘晉江惠安之間有地曰蘆田逺望蒼然在羣峯最髙頂上至則邃然以深廓然以容闃然無市廛氣有王氏者居之數百年矣其地饒於楩楠松杉多良田有稻秫苽粱之利故其人樂生而易足又以逺絶外囂也故多勤儉簡淨無競於時人處士諱某字某父兄俱蚤世弱冠即涖家事卒勤填植百凡以躬天性和易無他衷曲好賓客樂施豫振族人之窮喪之不能葬與孤寡之不能贍者皆資之王氏之方尚既與其居地稱而處士為人與其行事又獨出族人以故晚年家益裕事益寡終其身未嘗一欺負人入城府地雖僻賓客樂至至則皆歡洽以歸及其沒也無親踈逺近皆咨嗟哭弔以為善人不可得見而思之不已生某甲子距卒某甲子為年五十娶彭氏能與處士甘其辛苦以成厥家子男三長良次清次豪女三壻鄭廷獻何時純陳子光孫男六因槐回松圖梓處士實晉江人而婚媾多惠安良與余皆龍盤陳氏壻故知處士頗詳因以銘其墓云銘曰維皇明嘉靖己丑冬十二月甲申孤子良等奉顯考處士歸窀穸石門者山某者向既堅且密永世其藏善人之迹孰敢壞傷廣州府通判梅峯莊公墓志銘公諱琦字元美别號梅峯𢎞治甲子與從兄晉陽同舉福建鄉薦是時泉中與薦者十三人而先君在焉自先君與公兄弟同升于鄉北試禮部入太學二十年間所交接天下士無慮數十人其終不以升沉聚散生死變易初意者亦惟公兄弟而已故不肖早得拜公左右竊觀聽其言論行事而知公為人之實正德戊寅春公有通判廣州之命語不肖曰吾乃書生初試吏即以十二縣一州財賦倚辦於我將何如使上不吾疑下不吾欺民於我無怨言而事卒辦則可某應之曰公有此心則公之所慮者免矣其後聞公以趨走拜跪間失小禮於巡按御史巡按銜之嘗隂使人伺察公行事久之竟中以飛謗蓋公為人伉直自信負志氣不肯茍下于人又不肯為阿媚軟熟態以邀譽上下其臨官行事一以誠實節儉而自踈不蓄機穽設町畦故不恱公者以是媒孽其短或有勸公與辨者公歎曰吾有九十老母常恐一旦不得相見且吾亦老矣安能更折節為人役卒不辨而歸然廣州人至今稱公為能又以不辨而歸也為人所難公之世與宋少師夏同祖皆自永春遷郡城其遷於青陽則自九世祖古山公始父諱繼曜母楊氏以成化癸巳八月某日生公弱冠遊鄉校治周易三十二舉于鄉四十六乃得通判廣州三年歸又二年而卒卒之時年五十一則嘉靖癸未四月某日也先娶楊氏蚤喪繼復娶其女弟子男二壬春乙冬女適林汝範皆後孺人出孫男二士英士睿公受誣以歸也圖功未終不能無望其子壬春少俊爽不甚知學公常舉不肖激厲之及公沒壬春益發憤讀書領戊子鄉薦連舉進士授廣州推官繼公治所蓋公于是乎有子矣壬春將赴廣州以公與楊孺人之喪在淺土卜以庚寅四月二十五日合葬深下園先塋之側授某狀使為之銘嗚呼公之生卒俱後先君一年皆僅得下夀未可以止也而止于此不肖長大無成孤背先訓不能及壬春萬萬然其子之才不才公與先君皆不及見矣終天之痛則與壬春同也乃抆淚而銘之銘曰不約其躬其曷能容不資之有其孰能守吁嗟乎公正志而無尤侃侃服義達仕則優中途抵險折轅摧輈於我奚戚於人奚仇隤然委順賁于其丘聲詩昭揚來裔是求江西提學僉事紫峯陳先生墓志銘正德丁丑天下士羣試于禮部將揭曉易考官尹編修襄持一卷語總考大學士靳公以為造詣精深出舉業溪徑之外宜置首選公為反覆數遍曰信然必出陳白沙門下不然則蔡虛齋他人不能為此然竟以程式格之置次本經比拆號乃虛齋門下髙第弟子紫峯陳先生琛也是時先生傳虛齋之學已有聲諸考官皆伏尹公為知人而先生聲譽一旦愈以暴顯士大夫無貴賤小大稱理學者必曰陳紫峯云釋褐後數月授刑部山西司主事以母老乞改南都得戶部雲南司已復調考功吏部又以母老乞歸養戊子大臣有薦先生有用之學不宜在散地下詔徵用辭又一年即家拜貴州按察司僉事提督學校俄改江西皆力辭由是每有文學清署擬議用人必念及先生而知其必以親老辭竟不果用始虛齋先生以深微踐履之學教人及門之士率常數十百人能得其言語者有矣未必得其精微或能并精微之意傳之者其于反躬履踐又未必能如其所言至出處去就大節其能悉合于義無愧師門者益鮮矣先生資稟明邁閉門獨學不茍同于人時輩未甚識也虛齋一見其文字以為絶倫亟詣所館屈行輩與為禮先生辭焉遂以師禮事虛齋其為學先得大旨宏闊流轉初若不由階序而其功夫細密意味悠長逺非一經專門之士所能企及其淵源承受之功不可誣也始入仕郎署刑戶二曹人或疑先生儒者刑名財穀非其所長先生涖官勤謹夙夜弗少懈其在戶部嘗督船稅淮安嚴水閘啓閉之禁以革私弊小舟舊不由閘從旁梁往來者悉弛其征人大稱便而漕院之撫淮安者微欲有所干撓先生移辨甚力曰正額不虧而多取贏餘以為功吾不忍為也其人愧屈考功居間無事益得肆力于學問學者造門請業日踵至淺深髙下各就所長告之皆有以自得也會上兩宫徽號例得封贈先生曰吾持此歸足以慰吾母矣於是乞終養既歸足迹不入城府不通達官貴人書問即所居旁闢一室朝夕偃仰其間靜觀天地萬物消息之變以及世之興衰治亂世態之炎涼向背或逌然發笑或喟然嘆息先生不以告人人亦莫能測也其興趣所至時或縱行田野間與農夫野叟談敘風俗舊故桑麻節候為樂發為詩歌往往自在脫灑超乎浮壒之外其論事是非得失侃侃不阿與人交藹然可親愈久而愈不可厭其出處大節及為人如此虛齋既沒所謂無愧師門者先生一人而已歸養若干年太夫人以夀考終先生年幾六十矣執喪如禮後十一年先生亦終士大夫聞之識與不識咸為太息有司為祀于學宫嗚呼先生既有以自信無待于外則官資之久近崇卑事為小大俱不足言余獨記其督稅一事者見儒者之用小試如此設不退而為親必進而有為於世其事功可勝述哉所著有四書易經淺説文集若干傳于學者先生字思獻紫峯其號先居晉江青陽山元延祐間始遷涵江曽祖保祖福考體成皆有隱德至先生貴乃贈考承德郎南京吏部考功司主事母吳氏封太安人生成化丁酉十月十六日卒嘉靖乙巳閏正月二十二日年六十九配王氏封安人鄉進士一臞先生宣妹一臞亦虛齋髙第弟子子男三長敦履娶張次敦艮娶潘次敦豫娶曽太守仲魁女女二謝道夫柯華新其壻也孫男三長復次徠次未名女三敦履以公遺命將以戊申冬十月某日袝葬于秀林山承德公兆酉山卯向先期來徵銘余與先生同年進士先生改官南部也余方為行人祖餞崇文門外先生臨别告曰北風雨雪之詩吾兄得無意乎余不能自決俄南巡事譁余繫杖瀕死以是有愧先生銘曰道宗先覺學異專門精詣洞觀貫于本原鍾鼎非豐菽水非貧求仁而得時哉屈伸一卧草年衆望方殷天不憖哲遽爾乘雲涵江紫帽流峙髙深英爽飛沉千古來今體魄所藏山曰秀林父母在茲式慰孝心惠州府通判黃公墓志銘余讀古循吏傳咸以平易為政孜孜牧民不倦若何武朱邑所至無赫赫名而去後恆見思彼之感民誠有以也今觀惠州通判晴溪黃公縝密確實焦勞捍民竟卒于位而吏民哀傷思慕十數年猶不忘蓋亦其人邪因受公外孫舉人陳階狀而敘次之曰公諱春字伯熙晴溪其别號家世惠安之雙溪曽大父諱長生大父諱鍾以夀賜冠帶考諱濬號忍軒妣鄭氏霞莊德興丞欽女繼妣王氏公幼警敏六歲遭鄭孺人喪即悲號若成人十九補邑弟子員𢎞治辛酉領鄉薦肄業太學益刻苦覽究窮極領要發為時文根據櫽括儀度斬斬學者稱焉正德辛巳授廣東惠州府通判職捕盜賊公才優于繁劇有應變濟務之用又蓄問學多淹厯一出之以平易惻怛日籍籍起治名上官奬勞相屬且奏其最郡饒險阻盜廋其中積逋暴抗公即廣詢要害規畫方略以次追捕襲博羅盜張五營盡俘之河源賊李文昌懾公威聲遽求款服時有龍川盜謝榮宗者兄弟七人為之魁勢甚猖獗乃命文昌往捕自贖公親督民兵挾與夾攻盡馘其兄弟而散其衆凡三除巨冦闔郡乂安公皆周旋行陳跋涉原野芒屩杖竿步履上下更閲寒暑不憚勞瘁繼追興寧逸賊乘夜進兵暴雨大作遂以嬰疾卒于官舍郡民聞訃臨哭者溢于道路既十餘年余按部過惠民尚思念黃别駕曰是能綏我蓋公之確實得之天性而學能成之不為矯矯異俗亦不能翕翕趨時其持已涖政必盡所當為與所得為不因以炫名射利人所歆豔者獨隤然自逺若將浼焉故其所就雖限於天未及光大而功在一邦亦卓卓可紀感在人心至于今未懈也嗚呼若公者使假之年以底成績其去古循吏何逺哉所編著有原岐叢采助化拾編一源天付諸書其文有晴溪稿公既卒于官道遙子稚多逸不傳又足慨也生于成化己丑十一月十三日卒於嘉靖癸未九月十六日享年五十有五配潘氏上舍生全之女繼娶仙遊陳氏後公卒子男二長玉碔潘孺人出次玉玞側室李氏出補邑庠生女二長適翁源知縣陳輝外孫階領甲午鄉薦次適張銘俱潘孺人出孫男一曰坤公先卜御嶺西溪山為夀藏今嘉靖二十七年戊申十月二十日始克襄事玉玞來乞銘先淑人于公為內表兄弟嶽為甥行知公為深是宜銘銘曰氣和色溫持其躬仁者必勇試芒鋒夷厥險阻裒其凶摩揉震駴德威隆胡嗇其施中道窮井里晏起思不忘有窈其室歸厥藏食德未報後永昌有欲知者徵斯章汀州府經厯王公夀藏銘附安成王公自汀州致其事而歸越九載為正德乙亥春秋六十有一矣召其子師頥輩命之曰隂陽晝夜之理吾知之矣然吾不能控持化機也他日將以襄事纍汝曹盍預圖之于是卜地于新興鮎魚山鳩工命日授畚鍤而役事焉不數日告成公嘗幅巾藜杖上下岡巒之間見其若來而止若去而顧若持而讓卑者不削髙者不坌反而息乎若所若春之溫若薾之閟則所謂乘生氣者天命神工或于是乎會公于是喜謂諸子曰此天下萬世窩也吾乃今知所以息心矣余聞而賢之曰公之達過於人逺矣其陶徵君之流與其讀鵩賦而有得者與太史讀鵩賦善其忘死生輕去就至為之爽然自失公解汀郡將歸郡守而下咸勸公上功狀或可陟一階公搖頭不答吏民有攀號請留者竟亦莫之留也公於去就之計審決堅定如此顧死生為何物曾足芥蒂其胸邪世俗以死生為大詫異徇欲忘生敝敝百年間瀕危猶不忍出一聲語以授其妻子公獨非人哉平居暇日為異時身體髮膚謀者尚如此况忍有生之欲以害其生之理邪由是言之公之賢過于人逺矣公事親事長必以孝敬能一不任其喜怒亦不以甘苦難易分毫見于言靣睦族善鄰內外斬斬俱有恩意皆人所難者世之君子必有論公于事定之後而并述之豫特取其大都之達于死生者以記藏之成云藏午向右連伯兄某竁為豫述其事者公壻河南僉事劉君遵教銘曰大化之無窮也而消息盈虛之數存焉則亦不能以不窮也儒者以歸根為誕存息為貪無意無必與化往來斯所謂達造化之理者而亦足以不窮矣百世之下有過斯藏而式之其亦猶是也夫豈亦猶是也夫神道碑嘉議大夫吏部右侍郎認齋余公神道碑銘公諱祐字子積别號認齋其先自歙之篁墩遷鄱陽清泥髙祖浩又自清泥遷仙壇别為方山余氏而二族俱以繁衍曾祖企周祖泰福清知縣父瀾以公貴贈承德郎南京刑部主事母吳氏贈安人公自幼穎異始入小學即慨然有求道之志聞餘干胡敬齋先生居仁濳心踐履徒步往師之先生一見謂其器可以逺到以女女焉公學問溪徑啓發于敬齋者最蚤成化丙午領鄉薦登𢎞治已未進士授南京刑部貴州司主事轉廣西司員外正德戊辰勳臣有爭襲者公嘗署其案忤逆璫劉瑾意落職瑾誅大臣以廉正執法薦起家知福州府愛人恤獄事先大體不以耳目摘發為聰明鎮守內臣豪買市物不豫之直又以白金二百兩強府令為市改機若干公入其金於帑民以不豫直訴者十百為羣涕泣慰遣之將以狀聞于朝鎮守懼稍戢求以事撓公公行素高媒孽竟無所得則謾為好言曰余知府好官但好官亦無庸慢我會遷山東按察司副使始解丁父憂未上服除補山東整飭徐州兵備南京進貢內臣多挾商貨索夫馬價至數倍知州樊準白公公命詰其私貨入之誣逮錦衣獄謫廣西南寧府同知稍遷韶州知府投劾去今上登極詔復副使升河南按察使屢與撫按兩院爭可否平反寃獄按黜巨贓以數十當其據理以爭辭氣棘棘聽者至不能堪乃因考察橫中之其劾章有心慕乎古氣失之偏之語公聞之笑曰偏則有之慕古吾豈敢也坐調廣西按察使遷湖廣右布政使雲南左布政使以太僕卿召未行轉吏部右侍郎公自調廣西後公論益以明白當國者知公剛正可大用故三任皆未久而遷吏侍報至公已不及聞矣嘉靖戊子某月日也享年六十四公學務有用不事空言發端于敬齋而推其本原以為出于程朱故于程朱之書尤究心焉微言精義多所自得其言曰程朱教人拳拳以誠敬為入門學者豈必多言惟去其念慮之不誠不敬者使心地光明篤實邪僻詭譎之意勿留其間不患不至於古人矣其時公卿間有指主敬存養為朱子晚年定論者公托朱子初年之説以折之謂其入門功夫非晚年乃定又輯朱子書之切治道者為經世大訓其論及文章辭翰者為遊藝録見其學之備體用兼大小非近時所謂單傳妙訣者可擬也其篤信如此蓋公進欲以其學施之天下退欲著書立言以垂後來不幸皆未及成就其餘緒之見于世者公不自以為至也好善嫉惡出於天性所交遊皆賢士大夫而于莊渠魏公子才尤善人有過不能忍常靣斥之而退無後言有以其過攻之者欣然樂受人以是信而重之推論當世正人必及公云先娶胡氏敬齋先生之女逾年而卒贈安人繼娶劉氏封安人子男三長烋次煥次炵俱側室出烋煥邑庠生女一適劉時澤孫男一圭曾孫男一公素清貧殁後無以為葬越十四年為辛丑六月壬申始克葬于縣治東之利陽鎮劉安人袝焉墓石未樹又三年為甲辰冬門人張某來撫江右乃敘公世系官閥與夫學術出處之關世教者刻石墓道繫以銘曰學宗程朱如射之正一言以盡曰敬與誠前哲既逺異説震驚羣聽方聵公心如酲剛明邁往期一廓清仁聲義色方矩直繩推以臨政物莫之攖公所獨持公所力爭如有降監寧畏譏評滇海萬里少宰上卿甫命而仆視天懵懵番水上遊鬱鬱佳城學術尚論千載作程墓表行人司行人贈監察御史詹君墓表武皇之將巡幸尚內畏兩宫外憚大臣臺諫有時騎馬至東西華門閽者伏馬前諌不可為回轡者屢矣丁丑秋七月始馳一騎從近幸數人徑至南海子都下洶洶部院臺諫詣海子跪門請回蹕上遣從者慰遣示以回期至期衆又欲往大臣有為鎮靜之説者揚言古天子以四時巡狩况南海子邇京師祖宗時常臨幸上一出即洶洶如是徒搖人心不如無往衆乃止是年冬幸宣府明年幸大同又幸榆林則莫敢有諫止者是時宸濠逆械已成以重賄賂左右嬖近蠱上南幸傳者謂濠將以輕舟伏甲卒迎駕江上變且不測已卯春三月戒行有日吏禮兵刑四部及翰林院先具疏列名詣闕下伏留甚懇上怒罰令跪門五日已而行人司繼之大理寺繼之工部主事三人又繼之上愈怒褫繼上疏者衣冠械鐐手足下獄亦罰跪四月九日杖之于獄中越五日又杖于闕下余時備員行人司同僚上疏者二十人其七人杖死而詹君敬之與焉敬之為人開爽磊落長身美鬚髯熟於世故每論天下事掀髯抵掌明切如丹青其科目資望又獨先同僚衆莫不推服之聞其死尤為之痛悼初上頻歲巡幸無諫者而南巡即羣伏闕死諫頗為感動故自敬之輩死後竟不言南巡事已而宸濠逆械發覺詔遣勳戚重臣往鞫之濠遂發兵反上震怒召大臣議出師致討而濠已就擒江西當是時都城內外籍籍言幸不南巡如宸濠江上謀遂或四方莫知乘輿所在訛言相煽搖其為變豈可遽弭哉今上即位首詔贈敬之與同死皆監察御史蓋以未官言路而死諫故卒以所能盡職者官其志云父母妻皆贈如敬之官賜祭録一子入太學皆異數也國家養士百五六十年祖宗列聖優假成就始終正德間權姦繼起用事士大夫屢起與之抗或列名或獨諍雖貶黜死亡而氣不少挫最後變起宗藩連結左右嬖近之臣謀深而事祕非諸公舍一死以諫人心蓋岌岌矣古人有曲突徙薪之喻若敬之之死謂非繫天下安危成敗者邪敬之死時年四十四其再從叔父瀚方為刑部主事亦以諫受杖幸不死為經紀其喪主事君今為浙江左布政而敬之所録嗣子曰貞亦授南京光祿寺署丞謂余與敬之同官又同事知其狀最詳以墓道之表見屬嗚呼敬之平生為人故太史石潭汪公銘之詳矣余獨懼後世謂敬之止於一節死諫而不知其所繫天下安危成敗有如是者故特為書之使後有述焉大理寺評事贈太常寺丞石峯林君墓表正德已卯春三月辛亥武皇將南幸中外訩訩危疑廷臣交章諫上怒責先諫者跪外廷待五日罪止來者勿敢諫丙辰行人司奏繼上上愈怒羣捽去下詔獄翌日大理寺闔寺繼之又翌日工部屬三人又繼之上讀奏怒如行人司加甚命鎖項械手足暴廷中五日復繫詔獄待後命是時余備數行人司同年長樂林君質夫為大理評事質夫長余十餘歲稟素癯繫械出入神氣間靜無異騎從出入棘署也越四月壬申杖于獄又越五日丁丑杖闕下質夫兩臀無完肉流血漬階砌竟杖息微微弗續舁至同年刑部主事鄭君與聚舍遂絶就殮焉余時卧瘡不能視質夫之殮而親見其死狀為之伏枕流涕絫日是夏六月余謫南京國子監學正便道省視乃攜質夫喪偕行至延平付其子逢春歸葬質夫為人忠孝沉默心事瑩明無一不可質諸鬼神其事親居家孝友恭儉與人信詳刑謹細不以一字茍喜怒于人可謂賢者當質夫未死時士大夫知質夫者大率謂其清修雅飭為善人而已及其勇于赴義臨死生而志不懾氣不衰然後知其浩然有烈丈夫之風非止世所謂善人也黃後峯伯固于質夫分素淺在獄中熟察其所為私謂余曰吾取友幾遍天下乃近遺質夫蓋將委心焉然質夫死未幾伯固亦死天於賢者氣數何如也今天子即位贈質夫太常寺丞遣官諭祭録逢春入太學授光祿署丞轉九江府推官升署正逢春嘗以墓表屬余久之未能作甲辰冬余撫江西逢春迎九江將之光祿任謁余别復申前請嗚呼同質夫時諫者百數人械繫詔獄者三十七人死者十一人自己卯至今二十七年械繫所存二十六人者惟余強顔茍祿而已霜雪雨露無往非天甘苦堅脆萬物各以其生質受之為變不齊然莫非天之道也于天乎奚有欣戚質夫之全歸與逢春之成立皆可以自信而無憾矣故書以授逢春使歸刻之石以示後世之欲知質夫者且慰九原之志云質夫名公黼别號石峯死時年四十四墓在長樂縣某鄉之原配某氏子一即逢春嘉靖甲辰小至日書傳余畏叟公傳先生諱福萬祥其字也登進士第仕至二千石厯撫州平陽九江三劇郡擠于權勢左遷同知又厯寧波太平致同知事家居而職二千石最久績最著最有聲鄉人稱之猶從其初官曰太守云先生幼有至性八歲失所恃事繼母以孝聞甫十四入邑庠郡大夫以公事至謁學升講堂竒先生宇貌訝其衣服不飭衆以繼母對先生諱之曰家貧耳大夫初竒先生有逺大器而不知其識度本如是愈加竒愛永樂乙酉舉于鄉明年第進士太宗皇帝以盡忠國家許之蓋先生以氣概自負耿耿形于色可望而知奉敕還鄉讀書未幾起為行人奉命使交宣達有體交人悅之餽以金銀寶貨悉却不受夷情大服使還入對具述使事及卻金上曰餽贐之金可受也何故卻之先生頓首曰臣受命出疆國家榮辱攸繫而以貨易守彼謂使臣可貨也國家何賴焉臣恐死無解四夷之侮笑也故不敢受上由是深嘉之凡有四夷之事必以命先生或正或介皆能稱旨而上注深矣庚寅車駕幸北京仁廟監國先生適巡緝南郡以權要朱主事不法具啓致法司擬謫先生戎籍先生令家人訴寃行在上覽表曰是非使交行人邪朕方欲用之安得有是旨遂取詣行在親鞫之果得其情遂命復先生職反罪朱所司皆置重辟時上怒不可測先生為叩頭死請乃從輕典先生之仇自此立矣其後以年勞擢撫州丁外艱服闋厯二郡左遷同知又厯二郡遂致仕先生方介志以忠誠結知人主不能媚事權貴仇人稍稍復用于宣德之末連結部院相與伺先生隙而擠之先生方與異已者為敵以故厯剔五郡積二十餘年不遷竟中飛語坐貶其自九江左遷寧波也素不善先生者謂其重聽廢事參政饒禮抗聲折之曰余福耳重聽其心固聰也與世徒有耳者較孰輕重凡以好惡為先生毁譽者若此類先生能自堅其守不為威惕利疚故卒完其晚節以歸居家和易執禮若未嘗有位者鄉人莫不加敬臨終立諸子床前厯敘平生既而曰是何所在也曰正寢有婦人乎曰無遂瞑目諸子亟請曰將無遺命乎曰無用浮屠士大夫聞之歎曰余先生亡矣弔者執紼者賻者相屬于道張嶽曰余家舊藏寅賓堂詩一章先生為吾世祖經厯公所賦其辭甚偉余幼能誦之邇謁先生家廟閲家乘日接前輩長者聞先生事甚偉使交為尤偉吾邑有登科文筆諸山靈秀輸委百年來惟先生一受之繼先生後又不多見先生其偉人哉是不可使無傳也已范節婦傳范節婦者寧海朱銓之妻也年十九歸朱氏越七年而銓沒無子父母老矣哭泣不時哀節婦哭曰吾不難以死殉吾夫顧舅姑老吾又無子畢吾夫子道圖其後吾夫者不有未亡人恐遂已矣遂截髮以示不二志常居一室屏斥珍麗不與羣笑歡雖內燕召弗赴勤治女工朝夕視具事銓父母如銓之為子者人或以無子動之節婦泣指其髮曰此不死之餘也可復冀乎或曰凡所為守者為其有子即無子百歲後當何如節婦曰不然吾婦人當如是也有子與無又其有幸有不幸焉若有子則守無則否是以幸不幸權吾志也聞者慚服節婦今年八十有幾以銓弟子某後銓𢎞治末有司上其事詔旌其門朱氏之先有旌表董節婦者于銓為祖母及至節婦人尤詫云淨峯子曰懿哉范節婦之為節也聞其言蓋幾於知道矣夫婦母子一道也為夫不忍舍其子與為子而不背其夫一也節婦則曰為子守者是以幸不幸權吾志也必若當然也者則為夫守也非以繫其子節婦其幾於知道矣吾故表而出之以風夫無子而不能守者小山類稿卷十六
