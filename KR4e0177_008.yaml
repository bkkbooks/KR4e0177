body:
  text: 小山類稿卷八明張嶽撰書三與督府錢桐江議勘交朝使進止安南之事側聞朝使至梧州成命成算非逺方下吏所敢輕議近傳聞黎氏差人赴京告難且求討賊朝議以奏辭不類外國文字暫止其使若果有此事其勢又必行勘某愚以為朝使可留梧州或止南寧且毋前進以須後命蓋向之遣使正為不知黎氏的實根因故欲勘其所以不貢之故今黎氏既來告難則遺裔尚存特阻於逆臣逺竄海外道梗不通其不貢之故不勘自明若使者往彼必自憑祥縣入至邱溫縣諒山府皆莫登庸地也安肯以黎氏要領告我既不得其要領萬里遣使徒受莫登庸欺誕之詞以歸猶之不遣也若不受欺必别尋事端以根究黎氏所在往復酬答中間必有齟齬難處者是二者皆不可某嘗反覆思之使者此行其關繫國體甚大此事情狀既明顧吾何如爾吾力能處則處之一時未能處則且置之於吾體面初亦無損固不在使者之勘不勘也某愚以為可暫留使者且毋前進欲望軍門㑹兩省巡按具奏乞下兵部將黎氏齎本陪臣差的當人員護押來兩廣選委曉事官員并訪各邉熟知彼國事情之人就近體勘真僞如果黎氏所遣要見其國王見係何人在何處見管若干地方并將莫登庸陳忭僣叛緣由併勘明白另行奏聞區處若别無負固方命只是逼於內難不能入貢宜諭以討賊興復之義勉令自强待事寧來貢其前項遣使成命所當收回使者似不必往事理甚明地方重事寧遲毋速某待罪邉郡寢食不寧惓惓之意無非欲持重審慮俾出萬全為地方莫大之幸伏冀詳處答林次崖欽州差人至黃邦相等事深領指教幸甚幸甚此事自嘉靖三四年以來聞彼國君臣乖亂其故王支屬有遁居近我龍州境界者因以虛利誘我邉民愚民嗜利喜亂易欺以動翕然赴之竟不能入其尺寸而欽忠上思三州之人纍歲蒙騷擾之害前年韋緣廣從欽州那蘇隘入交交人拒追直至隘外居民死其鋒刃者三四十人有王七者一家四口俱死其餘為交人所覆敗而死者不可勝計夫國家所以威馭四夷與吾輩所以保境息民者自有常道二者既皆失之乃曲狥愚民草竊寇攘之智而欲籠絡左右以冀他日萬一之徼幸則嚮之諸公固有誤為此說於前矣其流禍至今未巳在今日又安可不深懲痛絶而必效之且彼固吾冠帶之國也內有乖亂不奔號請命於我而出於盜賊之計欲誘我邉民而用之吾邉民不遵官府約束為夷人所誘而欲為之用此於法皆必誅無赦其署置劫掠之罪且不論也永樂間以文祖之神武太師定興王之勇略交人再叛再克而卒不能定至宣德初又叛則師老財匱極矣文敏諸老追惟仁廟遺意以不治之法治之然後湖湘江廣之民始得免於餽餉披執之苦其休養生息以至今日皆數公之力也安可以失䇿追咎之某始至郡見戶口消耗田野荒蕪財賦虧折如久病之人生氣僅屬蓋休養之久事力猶未完復如此不能不為之凛然悼心而欽州又為此輩無故開此釁端貼浪永樂新立數鄉之民騷動失業者三四年矣若不為盜則流竄與為盜招以擾我爾夫坐視吾民之必為盜與流竄與為盜招而曲狥愚民草竊寇攘之智籠絡左右以冀徼幸於他日某之力不能辦此而於心亦有所不忍也是故盡吾所以保境息民者而已抑又聞之天下之事蓋有是非明白而中間之害復參半者逹識之士亦有權利害輕重而為之以濟一時然儒者不談也若此事之必不可為與為之必有害而無利較然甚明正當痛懲深絶使山峒愚民皆知假託徼幸之必誅帖然相安田畝以聽官府之約束是則所謂以生道殺之而非得已也吾兄曰且必無誅以維姦雄之心而俟機會此是非利害兩可之言願兄無易其出愚民傳聞恐將有借復交之名以飾其草竊寇攘之姦肆然又號於衆曰某衙門許我矣此州疲民生計如斷梗浮萍寧堪幾番騷動邪設使交人果有可乘之釁正名興師而有豪傑之士出之任事亦何患於無兵似不假此草竊寇攘為之羽翼也馬伏波狄武襄之事可見矣今事未有形兆而坐設虛談疑人聽聞不但非和衆安民之道所先亦恐有謀人之心而使人疑之古之略曉兵事者其䇿亦不若是左也願兄毖之重之毋易其出匪特欽人之幸某亦竊有賴焉年來苦於足疾每詠韋蘇州身多疾病邑有流亡一聨輒為之慨然發歎昨覽吾兄登天涯亭髙作警䇿多矣但不肖平日所望於吾兄者願於論孟故紙中尋一箇安身立命處馬伏波事業亦不敢為吾兄願之也望照黃邦相等罪名首惡無可宥之理餘當為分别第後次發去牌面欲召數人至府警諭之初無罪之之意今收回甚善但此數人亦喜亂生事者能再出告示諭以禍福使不至於怙終更善答王檗谷中丞解戶至伏承教言備審近日起居之詳不勝慰浣真州終非久居之地祠堂婚嫁粗畢似當束裝歸莆然莆無舊業而世態紛華要之珍膳醲味之中亦當梅蓼一二味存其酸辣乃有風趣爾此道不於吾老先生之望而誰望安南之議士大夫談之數年然皆出於一種喜功利尚權譎者之口沉靜守道者初不談也大扺近世學術不明廉恥道喪士大夫往往犯見金夫不有躬之戒其所操之術皆管啇秦儀之奴隸所不屑談者而妄托以為經濟自媒自衒且不論三代何如孔孟何如就我朝成化𢎞治中前輩亦有如是習尚邪孟子曰我亦欲正人心息邪說距詖行放淫辭以楊墨為禽獸儀衍為妾婦闢土地充府藏戰必克者為民賊而善戰者又服上刑聖賢之言良非迂也西漢之衰士大夫柔巽之風終不足以勝其經術節行之美故漢能既廢而復興東漢之衰士大夫氣節之髙一變而為詭激縱橫之習故漢一敗而不能復振由是觀之天下之盛衰不外在四夷而在士大夫心術明矣且就今日四夷言之士大夫果有深謀竒略能為國家建萬世之䇿亦不在於安南何也泰寧三衛肩項之疾也河套腰脅之疾也若安南則膚爪之末爾舍肩項腰脅而治膚爪失其等矣昔人有畫狗馬難畫鬼易之說三衛河套形勢切近一言不售則其術窮安南逺在萬里徼外未必便有實事謾為大言爾某守方拘文自知不足以料敵應變切恐今之談安南事者大扺多半畫鬼也次崖初到此慨然有勒功銅柱之意某屢勸以且去孔孟故紙堆中尋箇安身立命處馬伏波一時之士殊不足學今亦知其難不復出口矣某前年八月扺此將及兩載多病兼以吏事素非所長旦夕俟以微罪訶彈而去歸卧林下儻老先生歸莆得以侍杖屨領誨言平生之幸也未有奉教之期惟倍加珍攝以副注望不一與林次崖論征交事與郭白峯書稿承見教吾兄料之誠是也近日朱二守在梧州馬路差人馳報吾兄陳取交之䇿差人已過梧州其同船者以告朱二守昨詰朱判官不服不得已出朱二守書并以詰寫本李生乃得其略如此則吾兄别有方略以告諸京貴特漫為一書以誑白峯與區此事關天下利害其行其止非由吾兄一人某雖無能擅專城之托若合一郡人心而以光明正大行之亦不繫吾兄相告不相告但兵者詭道吾兄錯用其心而以施白峯與區此則朋友忠告之道有所不容已爾奏已行追之無及亦不必追欽州非用武之地尊相無封侯之骨恐有後悔吾兄試觀之近王檗谷亦有書來道及交事冗中略以數言答之以非吾兄所樂聞故未嘗奉告然今既有此舉又不敢不告蓋兄以垂老多病之軀欲僥幸此必不可成之功重則趙恬王恢輕則熊本皆理勢所必有者兄若不信且將吾言藏在笥篋待他日敗事之後姑取而觀之未必不慨然追念區區之為益友也願益懋令圖以卒逺業不悉論征交利害與廟堂安南之事始獲邸報逺近驚駭恐不免於用兵及巡撫衙門行下劄付備見首尾則彼中事情廟堂皆已盡知其所遣行勘乃是持重未遽用兵而示以開誠撫納之意廟謨成算有非逺方下吏所能測識者據邉民傳報正德八年黎賙襲封四年無子以兄子譓為子正德十一年四月初六日逆臣陳皓及其子忭作亂黎賙遇害陳皓篡立十三日國人擁譓立之陳皓奔據其國諒山府譓立七年為逆臣莫登庸所逼出居其國升華府登庸又立譓幼弟懬而相之卒又弒懬自立國分為三黎氏在南莫氏居中陳氏在西北然查訪陳氏已無消息其諒山府亦為登庸所有黎氏所居即古日南地在交址極南與占城為界隔限大海登庸不能逾海而南黎氏亦不能逾海以北故能相持兩存數年前登庸又以交州付其子莫福海而自營海東府地名齊都居之凡諸峒巢爭戰皆登庸自領衆以行蓋安南諸府惟海東一府負海地勢最大即通典所謂玉山郡也此賊負篡逆之罪常練兵習戰以謀黎氏而隂備我亦令人掦言於邉欲求入貢邉人以非故王也弗敢以聞若興師致討則登庸當為誅首然萬里興師為逺夷討賊古無此法不誅其篡逆而以職貢不入責之則欲貢乃其本心也無待於兵故某愚見以為彼內自乖亂未嘗有所侵犯於我可且置之待其亂定乃貢於事體亦未有損若必用兵其勝敗利鈍非某所敢知也宣德初之事可鑒矣非但宣德初也馬伏波以戰士二萬餘人平定交址比振旅經瘴疫死者十四然伏波乃不得已之師其時交址刺史及諸州太守尚有能城守者故伏波因得以撲滅之易非若今時敻然久為殊域也自古兵強莫過於元世祖時四路進兵以取安南一由慿祥一由雲南一由占城又以舟師載糧餉由海道皇子鎮南王脫歡親監督之雖嘗再入僞都卒不能守其猛將如李恆唆都皆戰死脫歡幾不能免考於史可見也某切謂莫賊起自列校能篡其主而有之舉國上下莫敢喘息必其天資凶譎號令嚴明有足讋服人者非出萬全豈可輕動近欽州知州林希元在彼專講取交之䇿又且言之於朝而身任之其蔽於功名而不逹事機如此恐其掇拾故事裝綴成章讀者或信其文辭而未深考其實至誤國家大計故敢縷瑣上瀆聖聽而私布如右伏冀裁處與夏桂洲閣老壬辰秋齎捧入都一從賔客之後瞻望門墻五六年于兹竊伏思念守官無狀過咎積深閣下不知其愚滯無用祓濯而器使之果以宿咎觸憲至於擯黜閣下復為之論奏開釋雖力不能及而一念體國録瑜之公天地鬼神實共臨之謫居以後念欲以一言候謝記室又自思之閣下位遇方隆不肖名在謫籍恐涉援上之嫌故輒默然復止惓惓之私懷仰不忘邇聞晋登黃閣秉國政鈞主上之所倚眷天下之所仰望然位髙則憂亦深不肖跧伏遐荒愧無以報答恩私竊願有獻焉易大壯自一陽積至四陽陽之勢壯矣以四陽而去二隂甚易也聖人必為之戒曰君子用罔貞厲罔無也言陽不可恃其壯盛而蔑二隂也故事常成於兢惕而患或生於忽略夫盛者易衰也進者必退也自大壯而進為夬夬者剝之反對也一反則為剝矣天下之理其反復往來豈有常哉故大壯之象曰君子非禮弗履其彖曰大者正也正大而天地之情可見矣聖人所以兢惕於盛壯者如此伏惟閣下以孤忠結主知超登八座內參密勿稽古制禮洗千百年之陋習而復諸古閣下之業盛矣然皆為所得為於禮曹者爾天下事所當為者未止此也請略數其大者則學術未明士習未正功利日滋而德義之風益衰好惡相奪而朋黨之議未息財匱於下矣而工役方殷兵驕于邉矣而夷患復起此皆天下所望閣下以有為者閣下亦安得委曰習俗已成積弊已深晏然任之而已哉前輩居此位者多矣未能一一舉上登極十六七年所拔擢倚用以共成天下事者其人可數也其始將進也天下或以為未可上急於致理置群言而姑用之及其弗稱任使亦不能不狥羣言而舍之不肖竊嘗仰歎上有日月之明天地之量生成臨照優遊深厚而莫露其迹然則彼之所以自處者顧不為薄哉語曰欲知未然視已成事伏望閣下深思利貞之占用罔之戒竭忠盡瘁以答明主之知開誠布公以收羣材之用据經秉法以應天下之變不肖雖衰殘多病尚能勉自扶曳與海隅蒼生詠歌德化之成然後退就農畝死無所恨辱教愛之深輒敢進其狂瞽不勝惶恐安南事不知廟堂深意何如某所守郡與之切近生意憔悴誠不忍調以逺征其曲折具見揭帖閣下佐明主以文德化成天下非有大不得已似不宜輕動武功恐後悔之無及伏冀照納天時向暑調燮勞神尚冀懋加珍保以慰具瞻與姚明山學士不領清誨者數年瞻仰之心無時己巳前年東泉老先生起臨三邉及後休致邉方俱不見此報最後僅見兵部覆題捷音一報乃知老先生久已去官而不知其故陸幼淳至此略聞曲折亦莫能詳大率老先生以公論推薦而起用又以直道不容而去官其出處光明俊偉追配古人此門下之士所以傾心向慕願承教澤者也其他皆不必論廣西祠堂在江西時辱老先生手教命某記其嵗月不久而某去江西轉徙入廣又來廉平生孤伉寡與怨仇潜蓄一旦落穽則羣起下石世態之常無足怪者東坡有言吾輩道理貫心肝忠義填骨髓一見困窮便有可憐之色此與不學道之人何異某嘗佩服其言謫官以後不敢妄有一札通訊於人獨念承老先生之命記祠而負罪逺去言語文字非世人所復愛重就使勉强成章誰復傳之以此私心耿耿不能自已近日安南事不知廟議何如而此閒林茂貞過不曉事以為可一舉而取然此言也倡於陽明陽明平生好為虛誕彼蓋大言以炫能於其徒爾岑猛之事功已有七八分陽明繼之竟不能紓一䇿卒割以畀岑氏潦草了事又為之辭曰岑猛無罪夫岑猛燒泗城殘龍州阻兵拒命且曰無罪然則安南之罪孰與岑猛其强弱難易又孰與岑猛方岑猛之未用兵舉朝以為當討及駐師稍久則又以討之者為非今日安南之議何以異此兩廣困窮而廣西殘弊尤甚外夷紛爭不敢侵犯於我無故而動師逺討弊中國以事蠻荒某切以為不可內懷隱憂欲止不能是以竊有陳奏奏草并小揭帖奉上諸先生不免作書具禀罪廢之人甚不欲以名姓通於廟堂而切近之災又不容己然此事非旦夕可了若兵釁一開恐亦執事他日之憂也有可善處之望不惜垂念未㑹間千萬及時自愛不一一論交事與巡按兩司安南之役命將出師廟謨已定似聞議者謂賊中乖亂國土三分乘其亂而取之可不勞力而定此則甚謬嘉靖初黎賙被弒賊以兵破逐陳皓父子擁立譓已而君臣漸不相能黎譓出奔又假立黎懬而相之當其時國人未附若以吾中國之威命猛將提兵數萬臨賊疆必有內自送欵者用兵或不甚勞今則陳氏滅黎懬弒黎寧以亡國遊魂假息海裔賊父子相繼竊有其國不啻十之七八地廣兵衆羣下用命又梟健多智數有子十六七人以交州居長子而自營都齊居之繕治兵甲以伺四方之變餘子勝冠以上者各令將一軍分據要郡男子婚嫁皆與其豪酋相結去冬頗聞吾消息購鐵勒木塹險塞為重柵而守之又教練水戰造巨艦募人鑄佛朗機銃海㲼通舟處皆樹木楗水中令舟不得入賊之防慮甚預且密如此而吾又聲其篡弒之罪討之非至勢窮力屈安肯束手以受誅夷去冬以來吾之聚議於廟堂之上者幾旬月矣至今日而調兵給食尚未定畫永樂中王師九月至龍州其年四月已遣大理陳卿至廣西計處兵食皆以九月集於南寧將帥至即統以行其調集土兵不過三萬將帥非侯伯則都督勢重謀預又經靖難百戰之餘以馭素教之兵猶用八十萬也將八十萬如將一人安得不克昨見兵部所下劄其調兵皆待總制參贊至日處置今總制參贊尚逺就使盡此八月至兩廣發符調兵福建湖廣往還之間非三四月不集又半月乃臨賊疆則冬春之交矣春雨將降霧潦淫濊以數十萬衆淩險阻渡溪谷衝犯瘴毒與負險必死之寇爭勝負或者有他巧妙則非某所知但以書生識量窺之誠不可不過為之慮某又竊伏思念國家以髙爵厚祿養士大夫將士一旦有大征役主上憂勤宵旰不寧羣公環尹無肯跬步出國門以副當寧之憂所命督餉副將監軍皆起於間廢而用之是在廷無一人可使也人生惟命不可期萬一所命數公或有疾病他故必再求其人以代之倉卒豈能及事以此觀之吾人情可知矣夫將提數十萬之兵深入人境以謀人之國誠非計慮終始為萬全可久之䇿不可輕動今賊已先事有備而吾庶務未集事若可已則及今己之尚不為遲如其不然待大將參贊至日博盡羣言以圖進取方略數道分攻水陸並進老生常言要亦無以逾此然以永樂事勢較論今日其難易利鈍亦非某所能逆覩也謹將賊中地勢參詢人言畫成圖子一幅中間傳聞料想未能盡合然大略亦粗可觀伏乞照亮施行答廉州朱二守令叔至廉承教措處安南事甚荷甚荷大想此事他日總制諸公必授成算而來非此間所能預度只有上告軍門整搠各衛所軍馬器械於各武將推選可堪隊以上者具定姓名以俟大軍至而調發其糧餉在倉見糧皆可無支動且以折色按月散與軍士積至九十月所積頗多他日潮惠髙廉雷之糧由海道以給水軍南韶廣肇并廣西湖廣衡永之糧可由江道以給步軍不足則和糴以補之所可為處如是而已然舉事之初朝議雖鋭其所推用將帥亦未見卓然可倚折衝者必有馬革裹尸之忠然後能著銅柱之績甚難甚難諸草草不盡俟面求教與督府蔡半洲論撫諭交夷三月三十日據欽州知州林希元送到莫方瀛奏本抄白二紙到某看得莫賊負罪懼討欲請降入貢以求封爵已非一日去年五月間陳必聞之來其辭只稱黎家無人莫登庸以黎懬之命權主國事節次來貢未蒙見納雖未見有投命請罪之意然出其邉臣勘報之言猶有可委者今次所上奏本只加臣父子己甘有罪一言而已至第二奏自解僣號改元僞作大誥自比禹湯文武等委諸黎氏故事及文儒私自稱美辭氣之間似尚倔强未肯輸服又兼自敘其祖宗被黎氏見陷之冤隱然以篡弒為復讐而無所忌憚此奏若經御覽上聰明神武欲伸大義於天下恐未肯遽賜允納也軍門前日奏請一面治兵積榖以待進取一面行勘黎寧所在既不失討賊之名又以從容觀變度時而動而慎重不肯用兵之意自在其中事體明白再遲一月必有明㫖凡百舉動宜且待之昨日撫諭文移某初意欲暫且停留既又思之古者兵交臨陳尚為招納之辭以款之今只欲其直敘國中事情不得如陳必聞隱諱且查勘黎寧所在若回報果有虛實抵梧且令邉吏與之反復必其深自悔罪言黎家無人暫為天朝護守印信不敢專有土地謹以國中圖籍獻之朝廷且乞恩願世為藩臣入貢不絶然後朝命以夷荒遐逺在中國為無用委而畀之如此則事體為順此賊外震吾征討之威而內不能弭其國人携二觀望之志勢孤而情逼某䇿其決不能不如吾言也故行下欽州令再加勘酌行之彼國就欲用兵安知此不為欵兵之辭於吾計亦無損也待其回報已在五月間而前奏之命已下又可以權其輕重而處之矣伏乞照處論防備交夷以下俱上蔡督府某於初八日至欽州據峒長黃浩報莫賊先接廉州衛公文後接欽州公文今回衛文書先至永安州以回州文書未到故在彼候齊此賊狡猾百出防我之計慮極密常遣小船在外海以捕魚為名打探海中船隻今次雖來投文聞得亦有許多船隻其實防我又傳說莫賊密地自來䇿應其調船發軍防禦之事正與茂貞商量我之百事未集只宜震之以聲而不示之以形如操練儲積調發等事俱先以大聲勢揚出使賊聞吾用兵而莫測所以用兵多方為備而莫知所以備吾乃得以靜制動之道而賊疲於奔命矣若於沿邉等處示以實形兵船之數不多形露情得反使莫賊得窺見吾虛實萬一兩下以形勢相恐喝或至交手後當如何此間山川形勢險要利害某俱親身歷過非徒憑紙上陳言及聽人傳說如調來戰船只當灣大洸港此港深澚可以藏舟其外即烏雷山直海中安南人素聞其名前代但以水軍入交者皆由此發船欽州戰船舊規停泊在此登山一望西至永安州地方東至合浦縣冠頭嶺皆可見若夫氣清朗則海東府山形亦隱隱可辨而欽州海㲼若鳯凰方家烟通等處反在裏港蓋烏雷山直海中如人伸臂用拳廉欽諸海㲼皆在肘腋之下今指揮范鎧已領軍七十五名在烏雷山背五里劄營日輪二十五名在山頂瞭望廣雷二處戰船灣在大洸港者日輪快馬船海中往來巡綽若望見一船數十里外逺逺而來則山上響炮張旗諸舟聨引而出賊敢忘外慮而入裏港哉決不然也茂貞欲調東莞船數隻在防城往來防守某與商量以為不可蓋防城水發源欽州永樂諸鄉流至石龜頭入海石龜頭之南為永安州白虎尼諸山兩山之間為海口凡防城等處水自北而南永安萬松嶺等處水自西而東者皆㑹此入海自海口乘潮入防城一日程而永安州即在海口略靠裏爾其地名赤沙尾者乃海濵夷船往來處若引舟由石龜頭入防城必經過赤沙尾萬一夷船疑我為有事永安或來衝突豈不至於費手茂貞頗以為然防城且令營軍看守若大舉事成别處亦無難也髙參將宜駐廉州且借其名號養其威重以懼賊其他曲折正惟某處之爾交人文書到日另禀伏乞裁照論撫諭事情莫賊遣頭目叩關投降某訪得此賊懾吾征討之聲內不能和其國人近者吾調東莞新會等船二三十隻泊在廉州港中賊遣探船候而得之逺望不知數之多寡回報大駴本月十二日乃差通事黎迪裴延祐二人齎文來求通奏狀文書某謂前次陳必開所聞一片虛飾及雲南奏辭中間以紀位號為故事稱堯舜禹湯為文儒歸美不能辭而拒之以篡奪黎氏謂為父祖申冤凡此皆倔強未即輸服雲南輕於接納又為轉奏以致朝議紛紛而征撫之計竟未歸一故與欽州議行防城營諭令先將奏狀申文內事情開具揭帖呈看如果輸情伏罪乞哀丐命方與轉逹其差來頭目稱奏本印封不敢折動欲以副本并申結狀付與本營差人領來某又與欽州議以為不如徑檄莫賊令其自具奏內事情開寫揭帖前來體面仍更光明正大此賊近在永安打聽消息如不先具揭帖則事不得妥帖遲三兩日必定具來此舉甚得䇿若果罷兵可因此以為後面收拾之地若兵不罷而必大舉又以款賊而緩其謀但賊之奏辭必令極卑哀不如雲南之潦草乃為得體爾聞其計殊窘急欲求通此間又以聲勢震之想不敢仍復如雲南也餘候夷文至日再禀伏乞裁照論辭夷使往憑祥納款停征既有明㫖夷使辭之令往憑祥最是蓋使往憑祥未絶其求通之路但曰聽候議處而已尚有許多含蓄未便許之也某差文通往令直告之云朝廷為君臣大義不容不征朝中文武或言事在逺夷須當審處故且罷征討之師而令吾兩廣議處若汝不納地請罪吾兩廣議處不得則只有練治軍馬贊朝廷征誅而已汝前次揭帖未見納地請罪之意於理不當接納汝可回去思省停當遵照舊規在憑祥伺候如此則義正理順且留一著以為後日收拾之地夷人探知罷征是實計謀自緩就使不往憑祥其在永安日久無所事不待辭之而自去矣但此只可備目前爾要久當有收殺方有以上副朝廷之意切以為用兵之聲未可全然放下使賊有所顧憚而求款於我益堅然後我得以操縱制馭而要之以納地請罪蓋此事既出聖斷百十年朝貢之國決不肯如是罷了後面恐更有事也戍兵只打手殺手土兵當掣回其官軍且留在地方待其班滿放回不時又發一兩班來每月只耗行糧十石大要使賊知吾軍馬未盡撤而知懼爾議處安南納款安南表本昨在孫僉事處見陸布政議稿甚詳悉愚見頗有不同者并以呈請裁示蓋莫賊弒君篡國有覆載不容之罪此非辨說之所能釋上聰明神武方敘彞倫以懼亂賊案輿圖以臨萬國若言黎氏查無下落暫與莫氏管束及言炎瘴難居不可為郡縣等語恐皆不足以上煩聖聽而紓南顧之懷也洪武中朝鮮李仁桂連弒王氏三王叩邉求貢髙皇帝始惡其篡弒絶之後又因邉臣以請髙皇帝曰彼夷狄也姑令自為聲教下詔許之而李氏世效職貢以至今日李仁桂亂賊也朝鮮箕子之所封也若牽於文儒之義則當正九伐之法以復秦漢之故疆矣然髙皇帝只斷以一言曰聽其自為聲教吾特取其效職貢不敢侵叛而已可謂破拘滯之見獨觀昭曠之原一言而天下定者也夫欲勞十萬之師甘心快意於無用之地攻之未必可得得之未必可守守之未必可久而以黎氏為辭則是勞民動衆深入夷地以援立莫知所在難必真僞之嬰兒古無是理也而議者猶復疑黎正莫逆云云胡不引髙皇帝聖語以斷之也愚以莫賊信有不容誅之罪矣今朝議既重為生靈愛惜寬而未誅此賊震懾兵威叩關待罪可因請罪之誠聽其自為聲教以管束所有之土地人民如洪武中之待朝鮮李氏且許之暫管而不與以真封如宣德初之待黎氏其黎寧之强弱存亡不必深究也蓋所以待之甚輕所以責之者不求備是謂以外裔待外裔而中國禮義綱常之訓固昭如也唐太宗之時蓋蘇文弒君太宗為之興遼左之師其後師久無功天下後世不病太宗之失賊而譏其為黷武則今安南事之是非利害鑒於太宗可見矣似此頗為直截脫灑無許多委曲遷就難行之意不知可用此意轉聞於上否其餘略見前後揭帖伏乞鈞裁小山類稿卷八
