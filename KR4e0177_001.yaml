body:
  text: 小山類稿巻一明張岳撰奏議一行人司稿請令大臣侍疾疏毅皇帝寢疾豹房逆彬輩握重兵在侍兩宫不得聞問中外危疑謹上此疏行人司行人臣張岳謹奏為據禮陳誠乞賜采納事臣謹按古禮臣之事君如子之事父故君有疾飲藥臣先嘗之親有疾飲藥子先嘗之至扵侍膳問安朝夕在側一如人子之節蓋君臣一體義理當然亦所以鎮定危疑預備非常其所關繫甚為不小也近日聖躬偶感風寒暫免朝參數日陛下稟氣完厚宣節得宜偶爾感冒豈足過慮如臣所言則以為自古臣子愛君體國之誠及國家防㣲杜漸之道自不當不如此爾今自免朝之後羣臣不聞親候玉色嘗奉藥膳止扵闕門備禮一疏恭問起居揆諸人子事親之義臣愚深有未安也伏望陛下仰思宗社重計俯念臣子至情每日許内閣大臣一員府部院寺大臣各一員經筵科道官各一員朝夕詣寢所候問凡諸藥餌令其先嘗然後進御及是日内侍左右何人太醫何官製何藥依何方該日官備細開寫掲帖送内閣收照至聖躬平復視朝仍以逐日開過掲帖具本奏聞陛下起居之詳既得漸聞扵外人情自無疑慮且由中及外關節脉絡通透明白了無瑕疵亦可以備意外不測之變臣深思人情禮法參酌古今事勢必如此然後可安自古豈有人主寢疾不與大臣相接獨與内侍數人共之而可以迓和平之福者哉伏惟陛下不以臣言為妄特賜施行則宗社幸甚為此具本親齎謹具奏聞諫南巡疏奏為乞留聖駕事臣竊惟璣衡旋運而北辰常居其所溟渤靜深而衆水必朝其宗是以在昔聖王範圍天地而一念不踰時經緯萬方而半武不出户凡以此耳肆我祖宗稽古為治每歲惟南郊一行實近在京畿之内雖間值邊郵之警亦不過命將而征誠知朝廷乃四方之極而大君實萬物之宗也用臻太平至百五十餘載仰惟陛下當鼎盛之年撫盈成之運稽古由章已逾一紀頃以西北少靖親御六飛迅掃妖氛間關半載維時小大臣工愧無即時諫止之力幸而奏凱南旋臣等竊謂自今伊始當享伴奐之休而無復省方之舉矣夫何西征之役方已南巡之命又下臣等驚悸罔知攸措竊以巡狩之典雖古帝王之制然古之制有不可行扵今猶今之制有不可行扵古也葢古之封建各君其國各子其民而慶讓之典勢難已扵巡狩今之郡縣屬扵藩臬統扵撫按而政令之行又皆出扵朝廷是不必泥古之迹自足以成今日之治也矧先王之巡狩省耕省歛有及民之實恵一㳺一豫非無事之空行陛下之為是舉也將為省耕乎省歛乎切慮道途推輓之勞皆出於民力有司供億之費皆出扵民財祇恐未有以補之先有以傷之未有以助之先有以害之何必侈巡狩之名而為是紛紛者乎臣等謹以此行之甚不可者為陛下一一陳之人情莫不惡勞而欲逸也櫛風沐雨孰與扵龍樓鷄帳之嚴涉水登山孰與於桂掖椒房之邃乃舍其逸而從其勞是其不可者一也裏河一帶漕舟之往來必由而國用之盈縮繫之今兹南巡舳艫蔽江雖聖諭昭彰使通往來而一溝之水勢難兩便是其不可者二也近聞淮安等處荒澇異常父食其子母食其女此在今日正宜寒心奈何滿目瘡痍未獲少痊而鑾輿又幸其地臣恐遭霜之葉不可復風大憊之民豈宜再汗是其不可者三也且龍舟所經必渡淮北泝江南而黄河天險聞者心驚長江天塹見者毛悚陛下以不貲之軀而甘蹈不測之險是其不可者四也夫一日二日萬幾叢委今匹馬遥遥駕言行邁將來國家之重務何由面陳其可否而内批之裁請往復動經乎嵗月廢時失事莫此為甚是其不可者五也况天下大器也置諸安處則安置諸危處則危是以止則深宫閉門動則出警入蹕鄭重如此而意外之患時或有之今也白龍魚服肆無戒備則豫且之變臣有不忍言者矣是其不可者六也臣聞之天子者天地之子也天子弗克肖乎天地則必出災異以譴告之不脩徳以回其怒行且亡之矣今也凶荒相仍盜賊充斥地震扵下龍鬬扵上其所以儆戒陛下者至矣陛下及今正宜如成湯之六事自責武丁之恭黙思道奈何恬不自省方事逸逰臣恐亡予之天不忍言也是其不可者七也古之人君雖甚不得已如㑹盟之舉親征之行亦必有太子親王以監國然皆非盛世之事今前星未耀儲位尚虛衆建諸王各就藩府大本未定俯無以聯屬乎人心匕鬯乏主仰無以祀事乎宗廟是其不可者八也夫憂勤惕厲固古帝王之所不廢者文王不敢盤扵遊畋尚書誦之隠公觀魚于棠春秋譏之盖始扵憂勤者終扵逸樂始扵逸樂者終扵敗亡陛下修徳講學親賢逺奸昧爽臨朝日昃忘食猶恐憂勤不逮古人而貽付託不效之憂也况又以逸樂促之哉是其不可者九也夫帝王舉動當順乎天意觀天意者驗之人心而已是舉也孤卿論列不已史臣繼之部寺諸屬又繼之雖以臣等疎逖之㣲亦極知其不可也陛下何苦違衆志以拂天意乎是其不可者十也臣等備員下士濫厠清班荷天地造就之恩捐軀莫報撫江河廣大之迹銜石無由雖嘗耿耿有懷恒以出位中止兹復黙黙無語誠恐噬臍莫及是以忘位卑之戒冒越職之罪昧死言之伏望皇上廣包荒之量奮獨斷之剛不聴左右従諛之言俯従孤卿羣臣之請急收成命寢此南行使朝野臣民樂英主無難扵改過而垂之後世知聖徳不果扵遂非臣等不勝隕越待罪之至再任行人司稿辛已自謫所召還原職陞俸一級乞恩褒恤故大理寺丞黄鞏疏行人司行人臣張岳謹奏為懇恩褒恤忠直以勵臣節事臣聞自古帝王之治天下其規為條目巳燦然明備矣至扵士氣風俗所繫尤必激勵而振作之蓋斯二者固國脉之所賴以存也使士氣不振風俗日媮雖有規為條目亦將何補哉竊見正徳十四年間逆彬弄權導引巡幸氣焰薰天犯之者糜兵部郎中黄鞏與員外郎陸震慨然首疏其奸遂得竒禍震死於箠杖鞏幾死不死除名歸田里逮聖明御極天日廓清震蒙贈太常少卿予祭廕子鞏自除名亟起為南京大理寺右寺丞陛下扵士氣風俗所繫可謂能盡激勵之術矣而鞏命數多竒到任未及一年今年八月齎捧萬壽表文來京得疾不起中外聞之失色相弔臣與鞏相處頗密知鞏最深鞏趨向甚高學術甚正有定心養性之功故氣節剛勁而不傷扵激有格物窮理之學故論議持正而不詭扵時加以清修之苦才具之優當陛下更化圖治之初使天假鞏年以盡展其志焉則所以効忠於他日者豈但此一節之可稱哉然則鞏之死非止一身之不幸也陛下於鞏之生既亟起而録用之則聞鞏之死必為震悼歎息臣愚有以仰窺聖心自不容已矣國家之待臣下如贈官賜謚祭塟等項皆視品秩高下至扵徳學氣節為衆所推者皆官資未及而褒賜之典亦所不廢伏望聖恩命所司討論舊典及採天下公論贈鞏一官予祭一壇或令有司為造墳安塟不惟死者有知自當結草銜環扵地下其士氣風俗所補尤不淺者何則鞏起用人注望之鞏死人憐惜之忽聞朝廷有此殊典皆謂陛下扵徳學氣節之士真能崇重如此凡在臣工孰不自奮耶伏惟聖明留意士風幸甚為此具本親齎謹具奏聞廉州府稿論征安南疏廣東等處承宣布政使司廉州府知府臣張岳謹奏為大慶事臣伏覩皇子誕生渙頒詔命華夷内外莫不覃敷惟安南以久不入貢詔使臨遣為之停止下外廷集議咸謂罪當討毋赦陛下寛仁惻怛兼愛華夷不忍遽動甲兵特詔使者馳入其國究問縁由本年三月初一日使者已至梧州府迤邐由南寧府前去臣待罪邊疆不能宣達朝廷威徳使雕題君長慕義向方奔效職貢至扵上軫聖慮萬里遣使死有餘罪臣竊聞安南自正徳十一年内國王黎賙為逆臣陳暠與其子陳昪所弑國人立賙弟黎譓主國事以兵逐陳暠父子奔據其國諒山府黎譓立七年又為權臣莫登庸所逼出居其國升華府登庸立譓幼弟黎懬相之既又弑懬而自立國内分裂日尋干戈無暇請貢此皆往嵗傳聞及其國諒山長慶等府牒報之言其間曲折及近日事情雖不能詳知然其久爽貢期大抵由此非真負封豕之勢敢扵阻兵拒險以抗上國之命而不貢者也自古外裔惟内擾則誅逆命則誅若其國不能通貢似不足以勞弊中國今用兵之聲先已傳布使者行勘未復誠恐生事樂禍之臣不能仰窺陛下所以遣使行勘之本意迎合附㑹謀動兵戈臣不暇逺引請以目前義理事勢反覆詰之夫欲興兵必以黎氏為辭為之討其亂賊也為夷狄勞師萬里之外討其賊而定之位非中國長䇿其不可一也不定黎氏而因以取之是乗人危難而利其所有五霸稍知義者不屑為也而謂聖明為之乎其不可二也萬一勝不可必夷人操長技毒弩乗高截險以邀我師如古人所謂廝輿之卒一有不備而歸者此扵禍敗孰當之乎其不可三也今兩廣困弊猺獞狑款所在屯結官軍僅足備守所恃以調發者狼兵然諸州土官及湖廣句刀手連年疲扵征調内懷讐怨若復驅以逺征深入數千里之險進有難必之敵退無旋反之期狼顧兩端莫堅鬬志南方暑濕易生疾疫萬一師老財匱猺獞狑款乗虛而起安南事未可必兩廣破敗可以立視其不可四也近日為大工役府州縣但係官無碍及軍需吏農等項銀兩盡起發赴部梧州軍餉亦因鹽法壅滯課額虧損每年敷給諸軍剰積無多兵興十萬日費千金永樂中用八十萬人入交今就折半言之亦當有四十萬人屯食兩廣飛芻輓粟約以二石致一石何處措備其不可五也天下承平久矣人不知兵兵不習戰將帥皆膏粱子弟少經行陣而縉紳之喜譚兵者類皆趙括房琯之流平居為大言爾蓋深扵兵者必不譚兵其掇拾古人糟粕以譚者多妄也欲舉大事而使膏粱主兵躁妄之士得成其謀不待兩兵相交而不勝之機先見矣其不可六也此六不可者臣特粗舉其端爾至扵天下大勢其財用盈虚兵馬强弱民情休戚蓋有非臣職事所及而不敢究言者臣愚以為安南縦有可誅之罪猶當重為民命愛惜審酌輕重扵當用兵之中求所可不必用者以全民生以養元氣今其久不入貢之情只是如此以義理事勢反覆推之用兵一事臣愚切以為不可伏惟陛下聖學精深洞見千古制作盛備逺暨殊俗舞干羽以格苗修文徳而來逺稍遲俄頃理宜響應况皇子誕生神人懽悅大慶之恩將使天下含生之類無不得所若軍旅一興必有無辜之民殞扵鋒鏑者恐非陛下肆赦初心也去年十月六日皇子生是日近畿地震數次聖徳純熈天眷方隆安得有此異天之垂戒其殆為開邊乎天下大器也安之甚難無故而動揺之臣中夜以思不寒自慄伏望陛下上承上天仁愛之心逺思皇祖不祥之訓待行勘使者復命乞下廷臣將安南事勢反覆詳議如黎氏尚存力能入貢則許之入貢如果内難未定則且申勑邊臣謹固疆埸禁戢奸宄毋得妄生事端致有驚駭揺動人心待安南亂定應否入貢另行奏請定奪此扵國家事體初未有損而生靈得免扵兵革之禍所全活者多矣臣邊吏也遇此大征義當擐甲執戈躬率先所部以死效命乃其職分顧不度分量輕肆瞽言干撓廷議避事偷安罪當萬死然臣非敢愛死也恐死而無益是以敢冒昧為陛下陳之伏冀陛下哀矜曲垂裁察非特臣一身一郡之幸實天下萬世之幸粤藩稿安南來降謝欽賞疏廣東等處承宣布政使司左叅政臣張岳謹奏為謝恩事伏蒙聖恩以安南夷目莫登庸赴闗投降臣待罪邊方曾効㣲勞欽差中書舍人李傅齎賞臣銀二十兩紵絲二表裏臣當即望闕叩頭謝恩祇受訖竊以四夷來賓邊疆寧謐皆我皇上徳威逺揚帥臣審猷宣力之所致臣材非果毅事因人成寵賚所及榮以為媿惟有益厲素節願竭㣲忠茍職業之所存匪險阻之敢避庶以仰答恩光冀成後效不任拳拳感激之至為此具本專差舎人親齎稱謝謹具奏聞小山類稿巻一
