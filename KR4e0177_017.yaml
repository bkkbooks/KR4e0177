body:
  text: 小山類稿卷十七明張嶽撰雜著一密針引虛齊先生學問蓋已造于精微矣其反身自檢之功又嚴切如此密針凡五十條某最愛勸君莫用半㸃私若用半㸃私終無人不知勸君莫用半㸃術若用半㸃術終無人不識一條往年守合浦嘗大書於後堂屏風出入觀省夫君子之不敢用私用術非恐人之知識而後不為也若小人則直謂可以欺人而無所畏爾先生此針正所以深探小人心術隱微之病使之知其無益而或改也二者之病私尚易見而術之為禍尤烈自古挾術欺人至用以欺天下後世機械翕張居之不疑久則沿習成風人亦莫之怪矣洪水猛獸之災何以異此讀先生之針者所當深切而豫防也故刻之以廣其傳題汪汝梁蛟潭卷易一陽伏于五隂之下其卦為復說者以為靜中有動昔余在京師見僧廬有畫打坐法身者跏趺瞑目一童子盤于膝前瞪目而視之余笑曰此非擬復卦之象邪惜其錯認開合眼為動靜而非真動靜也今觀汪子蛟潭畫卷為之撫卷深思汪子之擬此圖以自號必不以開合眼為真動靜矣何時從容于靜中共講之題余氏子救父卷夫子云事父母能竭其力觀余氏子崎嶇兵刃間竭家資以求脫父難卒之感動幽明父子相扶以歸信能竭其力矣患難既平家庭唯諾夫子不又有色難敬養之訓乎一時感發與從容積久者難易又自不同余氏子其更思之題曲江公小像曲江公小像一幅嘉靖甲辰嶽購得之吉永豐同姓人家以示知畫者謂為吳道子真跡道子與公同時像右傍有中書省印或公在中書時為寫此像雖風度凝逺而凜然嚴峻有不可犯之色望之知為正人君子也上有宋阜陵題讚按宋録唐名臣後惟狄梁公段司農郭汾陽與公四家子孫當受官者持畫像告敕𤣥宗御札詣闕下為左驗宣和中御札留祕府像仍歸其家此其持詣闕下受官經阜陵御覽而為之讚與史稱公弱體有醞藉𤣥宗每愛其風度嶽往來曲江見畫像數本皆為豐碩盛麗有富貴氣疑非當時真本及得此像然後知彼皆後人轉相模寫此其真也然公以開元二十一年十一月再入中書二十四年十一月罷政事其時主德寖荒小人朋比用事侃侃諤諤事無細大必力爭聽從者十不能二三今觀此像義形于色若有不盡忠憤者𤣥宗以風度愛重公要為不知公觀之者亦尚有以識此也邪題小山石鼓厚重少文似勃沈靜寡言似光守節堅深弗可奪似黯茲惟淨峯張氏之石鼓題薛氏四禮圖後六經之教惟禮最切于學者之身而殘缺視諸經尤甚漢初儀禮始出而魯徐生者以善為容世禮官不顓在誦說也及賈鄭氏學興字訓句釋推達倫類甲是乙非於是學者始以考據講問為禮而切于身之教益微竊意夫子於詩書二經常言誦言讀至于禮而特曰執則考據請問政不足以盡禮徐生去古未逺疑或得其遺意矣惜其節文度數之合於後世者寡也子朱子深患禮學難明取古禮最切于有家者簡去節目揭示宏綱定為四編今則著在令甲列于學官宜學者之知有是也而克由之者亦寡瓊山薛有孚氏教吾邑嘗取朱子冠昏喪祭書參以丘氏儀節編為四圖詳盡明白據圖以觀者真如身出其間而與之周旋也先生教人導俗之意可謂得其本矣夫禮以防人之欲養人之情嚴其節于動容毫髮之間而推之則先於家冠昏喪祭用之有時也非冠昏喪祭獨無所事禮邪必深求其所謂不可須臾去身者而敬守之觀是圖者又不可不知也唐漁石江西奏議跋寧禍蓄于十數年前天下皆知其不至叛亂不止當時用事者不惟不悟方倒持刑賞之柄以成之故遂至於亂亂既定矣死者心跡與生者之功罪宜其大有别白以章刑賞之實者而愛惡相奪疑似相蔽至今尚有遺論蓋公道之難持久矣孟子以正人心繼于抑洪水驅猛獸之後其示戒豈不最深切哉余在陜西大司馬總制漁石唐公示余奏議一編皆公巡按時所上者也是時寧難甫平其于救災弭變固本善後之圖詳矣而所謂心跡功罪尤若炳然不可以私掩其後諸司覆議間不盡同然識者推究人心公論之所極以為卒無易於公者癸巳冬來江西聽斷餘暇偶及舊事取公此編讀之未嘗不慨然三歎也乃為翻刻于憲司後堂而私識其簡末如此跋萍鄉府君手帖右家報一帙先大父萍鄉公在南雍時報先公者公性敬謹平生無一事茍且觀其與子書字畫亦精楷如此他事可類推矣𢎞治丙辰公再下第卒業南雍厯事都察院辰入申出傭人寫本皆非書生所堪書云不見十分艱辛者寬家中憂念爾悅公第三子怡公次弟敬伯公子公姪也初曽大父桐廬公有丈夫子六人大父居長次即敬伯公桐廬公致仕歸食口幾千指乃分為三長與次三與四五與六各為一爨異居而同財田園歲收桐廬公制其出入而均給之子孫既冠不能耕者令教村童入束修以相補贍故書中云悅怡之館何如也公與敬伯公少失恃極相友愛甲寅敬伯公沒遺孤子二長即怡次怙女三長瑞金次瑞環次瑞璋俱未適人而瑞璋與怙尤幼小公每撫之流涕瑞金服闋歸霞莊鄭氏不肖母家也故書以璋怙衣服藍縷為念又令時問訊瑞金公於諸孤姪恩意懇惻雖數千里外猶惓惓不忘孝義之風視後人何如也是時不肖初從蒙訓祖屋左右有水塘族人子弟時游浴其中公以此豫戒不肖至今佩之其戒先公讀書不可放過毋交損友毋圍棋飲酒以妨學業等語豈惟父子間一時相告語吾子孫世守為規範可也不肖十餘歲即師先公親見先公苦學達旦不寐無他嗜好無泛交所交傾肺腑相與終身不衰蓋先祖之教也文伯者公從父弟時以掾史辦事南都亦教小童以自贍故書後及之李先生名謀字伯資莆林墩人先公六歲時就之訓蒙及訓不肖蒙館吾家二十餘年後以年老辭歸歲時問餽不絶也公事桐廬公最孝謹每得桐廬公書盥手徐啓讀畢復疊緘如故置笥中不肖少時尚得十餘帖內一帖乃癸丑不肖生之次年公在國子桐廬公報云先公諱某子一孫吾名之曰嶽冀此孫他日能成立如山嶽也總十數帖為一笥丙子侍先公試禮闈家移居逸之僅存此帖教子孫恤孤幼篤故舊安貧守義藹然天性中語獨所謂欲其成立如山嶽者豈惟桐廬以此望不肖大父猶此心也不肖今老矣無能有以副二祖之望于地下每思此帖輒出涕泫然而恨其不存也謹將存帖褙以厚紙附於桐廬公家集之後以示子孫不忘云後此帖五十二年為嘉靖戊申夏五月吉嗣孫通議大夫兵部右侍郎兼都察院左僉都御史提督兩廣軍務兼理巡撫今轉左侍郎嶽百拜謹識原譜古者封建法行諸侯卿大夫皆世其國家而傳重于嫡長其支子不得承先人之重而不敢有事其廟然其支分派續不可無統故立五宗以統之上不敢繫其世嫡之尊下得以隨所宗而明世系序昭穆定親疏纍世以相次莫不知尊祖而敬宗敬宗以尊祖如國有大君政無多門故厯數百年而族不散蓋其世不得不合也自宗法廢而天下無世族治化不明風俗不厚大率亦繫于此而周衰以來靡靡且千餘年矣于是士大夫之家始倡為譜學之說肇于晉盛於唐衰于五季而復振於有宋諸君子當其說之行也服雖已盡宗雖已易而人猶知淵源之所自支派之所分祖將忘而不遂忘族將散而不至于遂散者由譜之力也其法實與宗法相表裏直書之序自高祖而止于曽𤣥世系明而昭穆辨矣橫列之序自嫡長而旁及支庶尊卑明而親疏定矣長子繼父而書明其有所承也諸子旁嫡而列明其有所統也隱然有宗法寓乎其間而世之言譜者直以為一家紀事之書不亦異乎江左之名門山東之六族競以豪右相矜譜之存者僅為婚姻之捷徑流風所染至於慕富貴而忘至親舍本宗而附顯達謬戾若此豈知譜之關于宗法之深意哉至眉山蘇氏始因歐譜而作大宗譜法以盡譜之變然後譜與宗相須之義復明蓋宗乃見于行事之譜譜乃存于記載之宗譜非宗不行宗非譜不著知乎此則可與言作譜之意而崇孝敬之實矣又天下之道本諸身而施之首于家家者身之符國與天下之權輿也古人言家之難齊者曰閨門之內恩常掩義降及後世率以利而傷恩則其趨益下而悖理亂常益以甚夫自曽髙而上祖宗之逺也功緦之外支派之疏也然其初則一氣之所傳而分也其情義之相維休戚之相關亦豈遽至大相隔絶哉而世人至於忘祖宗而忮族人蓋由不知反而思之所以相維相關之重蔽之而弗知知之而弗明利欲之私日惕乎中妻子之計又日迫乎其後所以蔽其良知良能之天而長其忘親賊恩之惡日有甚者此譜之所由作也譜之作所以崇孝敬廣恩愛繫人心而敦薄俗也標其世系之淵源紀其族屬之逺近序其宗統之離合詳其生卒葬埋婚姻嫁娶之始終使後之讀譜者反而思之知吾身之處乎此遡而上之一世則為禰也二世則為祖也三世則為曾祖也四世則為高祖也一氣之所傳也知其一氣之所傳可無孝乎旁而推之同禰則為親兄弟也同祖則為初從兄弟也同曽祖則為再從兄弟也同髙祖則為三從兄弟也一氣之所分也知其一氣之所分可無愛乎有服者則情以服伸無服者則情以義起謂如高祖之上三從之外生必慶死必哭婚姻嫁娶必赴貧窮相周患難相恤有善相率行之有不善則交以相戒人知所以尊祖而睦族則孝敬以崇恩愛以廣薰染成風道之始於家者殆亦因譜有助矣故知乎此則可與言作譜之意而隆孝愛之實矣覺軒義雷子孟升嘗夢晦菴朱子語以學既寤若有覺焉他日仕莆以告見素林公公為名其齊居之室曰覺軒釋之者曰覺晤也明也又為直大其字從學從見謂學而能有見也學而能有見則晤而且明以復直大之初其義深矣然而未學將無覺乎曰有見孺子入井而怵惕惻隱聖人君子至于庸衆人一也聖人者安而化之也君子必內自覺曰是心曷從生哉我無為也而彼自生其天機也與於是乎養之以學衆人方生而遂熄熄久而或生機自動也機自止也則卒歸于無覺爾故有獨覺者有先覺以其道覺我而覺者既獨覺矣先覺又以其道覺之焉則得之內者益精先覺之覺之也而以我參驗之則入耳著心而益固夫是謂之君子之學曰先覺之生不數逺或千載近亦數百載人生不及夫千載與數百載不能值先覺又不能獨覺也則如之何曰心所同然者理也義也聖人先得我心所同然爾誦其詩讀其書明義理以養此心如見面命之矣曰亦有既學而卒無覺者歟曰是在學者深造而自察焉爾若夫執方守文以為安揣度料想以為達雖謂之無覺也亦宜曰子之繹夫覺之義則然將無徵于夢乎曰未夢有夢也既夢無夢也因夢有覺而止徵諸夢吾未敢以論夫覺雷子曰子言似矣他日吾復有夢將以質諸朱子和氏三子字說大梁和敬所氏三子順穎顔次第加冠未字也以請於余余為字曰子貞子濳子復又為說其大義淨峯張某書夫貞一道之極也消息時之變也易卦六十四爻三百八十觀象設義剛柔迭用示人順時以通其變也不貞不利是故君子學以正志義以正行羣處而不爭獨立而不懼所以居貞也故貞立則天下之動一矣故曰濳龍勿用又曰亢龍有悔夫易比其進退而反觀之者也退藏于濳進悔于亢進退之際可以觀已是故物之鋭進者莫如穎龍陽物也穎之至也湛濁外景清明內景濳也勿用非不用也時用之使勿亢而已矣夫易乾其至矣基純體者必由於復乎是故學莫善于復復莫善於覺覺莫進于力覺以先之力進所覺而純之焉復之善也故曰不逺復無祗悔又曰顔氏之子其庶幾乎或曰易惟利夫貞也彼三德者何如曰吾未見不貞而元亨也夫貞以制變濳以立身復以修德修德而後身立身立而後變可應學至于應變則成矣三者各有取也其至一也名宓兒說吾兒持素軸一幅以嬉問家人軸中作何物事最善家人戲語云莫若求阿爹之文章善而信之向吾求文章余怪家人不宜誑吾兒又念吾兒不可卒誑乃為書吾兒名說與之始桂林城東有高峯峭立俯臨灕水曰癸山山腹洞空可坐數十人流石下垂如懸杵削玉不及地五寸許桂人傳有古讖云云嘉靖辛卯吾提學廣西與羣僚泛舟遊焉客有談茲讖者吾漫命侍吏以磚土坌合之客又舉酒戲相祝云云是秋吾廨階下雙桂盛開而提學公署一株臨池尤芬郁蔣大參子雲每過必嗟賞曰淨峯其有吉兆乎是冬吾兒協吾夢明年壬辰孟秋吾奉萬夀表入京遣孥東歸小山精舍吾兒乃懸弧為其兆于桂林也桂癸聲相似令乳媼輩呼為癸郎云吾守廉之三年歲在丁酉吾兒始習誦孝經論語公暇輒抱置膝上指字試之頗用常語引喻為說大義一夕講論語至伯夷叔齊求仁得仁章兒擁吾頸問曰阿爹吾能為古之賢人否乎吾笑而不答頃之兒忽自請曰吾昨學書書吾名字若彼彼皆小人奈何吾與之同吾笑云為兒且幼故以乳名呼比長則更之矣他日兒又語其母謂阿爹更吾名母以告吾吾又笑云兒欲善而名乎名善易恐長弗稱奈何其母曰彼幼何知盍姑與更之小姪輩名皆從宀故亦從宀更命之曰宓嗚呼古稱士之有志必曰古之人古之人古至宓羲醇極矣五栁先生自謂羲皇上人取其極醇以自命也以極醇者自命而猶有弗衷者焉况以世俗之儇佼矯厲而可以期與乎哉吾兒骨骼未成與之言弗解而顧及古之賢人殊不可曉故書其前後名呼之所以然者于軸以待其稍長省人事而自思之戊戌秋九月良日阿爹書于廉之官廨還鄉事略付宓一汝今方離吾側接應人事之始凡事須小心收斂雖僮僕下人待之亦宜有禮噭喝倨肆俱損德器切宜戒之一吾已移文各衙門不令相見有來請見者先差人固辭一凡哨守巡捕巡司驛遞等官來迎送者千戶縣佐以上辭之勿見餘官平揖相接皆必衣巾若行跪拜者必避其迎送人役至交界遣回一舟次宜畏謹舟行不可輒出船觀覽日下山則畢晚飯毋得爇燭坐立俱勿當風常于有障版處坐立以防不虞一兩廣春月江水驟漲流出山谷中穢惡食之亦能傷人凡江水須用緑豆澄過煮熟方可食茶湯生冷之物俱宜酌量一入漳州境即為父母之邦尤宜謙謹若夫馬一時應付不前須忍耐從容催儹不可聽信下人妄拏夫頭等役使下人乘機作威以招怨謗一至漳州謁梁岡公同安謁次崖公同安葉峝山大尹萍鄉公同年也素相厚亦宜謁之俱隅坐四拜請納拜若不從拜畢致辭曰反勞尊長若峝山年高不便拜起辭拜則聽命凡泉中前輩皆依此禮一汝自幼未嘗至泉今雖還鄉人情習尚事事未諳宜一切簡靜毋泛交毋多言毋聞閒事家事之外一毫莫理親朋拜望者以禮接之談及閒事則敬辭云有父叔在不敢聞命一城中屋宇窄小家私不備最宜耐冷安受不可萌嫌惡之心若有此心輾轉生出百病戒之戒之一宗族親戚在尊行者人前稱呼宜以行輩如曰某房第幾伯叔兄某處某親不可呼字以長傲慢其自稱于祖父行曰小孫父行曰小姪兄行曰小弟鄉先生前輩曰小生其餘俱如常稱大約禮節要謙厚言語要安詳接人要𣢾曲深以膏粱之氣為戒痛自洗刮守吾家儒素寒儉之風然後為人有進步也小山類稿卷十七
