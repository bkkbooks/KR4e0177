body:
  text: 小山類稿卷四明張嶽撰奏議四總督湖廣川貴稿至湖廣謝恩疏欽差總督湖廣川貴軍務都察院右都御史臣張嶽謹奏為謝恩事臣於嘉靖二十七年九月內自兩廣交代回至原籍福建泉州府地方據原差舍人葛智齎到通報兵部一本為捷音事節該欽奉聖㫖張嶽升都察院右都御史賞銀五十兩紵絲四表裏欽此續准吏部咨為參論地方失事官員事奉聖㫖張嶽著以原職總督湖廣川貴軍務寫勑與他著上緊去欽此又准兵部將總督職任事宜題奉欽依備咨到臣臣遵奉明㫖當即起程十一月二十八日至江西安仁縣地方接領欽降關防十二月二十日又於湖廣省城祇接勑書符驗令旗令牌欽遵行事外但臣原由兵部左侍郎升授前職係在京堂上二品官例該具奏辭免復有前項總督重務干係三省地方廣濶夷情變詐事體未嘗歸一兵糧等事所宜亟處若再循例辭免待命下而後供職往復稽遲恐至誤事臣所以聞命馳驅不敢復辭竊念湖貴二省苖夷作惡多年議征議撫迄無成功必欲征則必勝撫則可久非得老成練達暢曉兵機之臣不足以副此重託如臣疏庸豈所勝任臣於聞命之初即將湖貴二省兵馬錢糧夷情等項馬上差人齎文該三司官查報近據各報稱湖廣麻陽等處苖蠻頗出投官聽招貴州雖聽招撫而實陽順隂逆終難馴服臣切以各賊積惡多年固當殄滅然中間亦有旁相煽動非出本心今既聽招又無加兵之理况且臘盡春回雨水時作農務方興動兵深剿亦非其時臣遵奉勑諭事理將各投官聽招者開示恩信使之安心向化無復疑慮其強梗負固不肯降服及名雖降服而陽順隂逆仍前越境為惡者再行撫處必其執迷已深難再姑息方行㑹兵剿殺蓋聽撫既衆賊勢自孤征或可勝撫必可久臣疏庸愧非軍旅之材仰荷聖明簡付重託不自揣度冒昧受命夙夜黽勉誓竭心力期於恩威兩播民夷俱安上紓聖明南顧之懷下解二省積久之患至於天髙地厚之恩又豈此犬馬微力所能報稱臣下情無任激切感恩圗報之至為此具本専差百户陳經綸齎捧稱謝謹具奏聞領總督勑書題知疏題為總督軍務事嘉靖二十七年十二月二十日欽奉勑諭總督湖廣川貴軍務都察院右都御史張嶽近該貴州撫按官奏稱貴州地方惡苖據險大肆猖獗擬調近省官兵進剿但權無統攝未免動分彼此乞要添設總督大臣居中調度庶得事體歸一事下該部議謂宜如所請今特命爾前去總督湖廣川貴軍務在於沅州駐劄爾宜查照該部題准事理計畫一應兵糧隨宜酌處若苗人稔惡弗悛爾即調督各省官軍大加征剿務要同心協力以靖地方事體重大者奏來定奪撫鎮以下官員悉聽節制俱得照例舉劾指揮以下不用命者以軍法從事流官給由并土官襲替俱要呈詳核允然後起送其廣西右江道雲南安普道各守巡官及各宣慰宣撫長官鄰界州司聽爾一體節制其或苖人革心聽順亦宜善加撫輯以圖久安爾為大臣受兹委任須相度機宜計處停當毋玩寇毋擾民務使威懾恩流逺人畏懼地方寧謐斯稱任使毋得處置乖方致貽重患爾其敬之慎之故勑欽此欽遵臣當即望闕叩頭謝恩及一面前至沅州地方駐劄行事及通行湖廣川貴三省都布按三司并廣西右江道雲南安普道守巡官并各宣慰宣撫等官各一體欽遵外今將奉領過勑諭理合具本順差百户陳經綸親齎謹具題知謝升職賜金幣疏奏為謝恩事臣於嘉靖二十七年七月初八日伏蒙聖恩以臣前任兵部左待郎提督兩廣軍務征剿賀連地方效有微勞欽升都察院右都御史賞銀五十兩紵絲四表裏本年十二月二十日據公差承差曹東周齎到前項欽賞紵絲於湖廣武昌府地方臣當即望闕叩頭祗領訖伏念臣草茅下士章句諸生愧無折衝禦侮之材謬當典戎幹方之任五嶺之恫瘝切身三軍之耳目在將不遑夙夜若涉深淵雖有微勞皆遵廟略然猶險阻未夷征戍不息計過論功免責為幸兹蓋伏遇皇帝陛下德同天地明並日月覆載無私於遐邇照臨必及於幽微功疑從重賞必為勸既陟階班兼賚鏹幣旋授鉞於閫外俾董師於黔中煌煌錫命至自九霄穆穆清光不違咫尺江湖萬里狗馬寸心敢謂去天之逺積懷戀主之誠謹當丕揚威靈輯和卒乘思皇度之如金以形民力施五采以作服豈但身章永肩砥礪之心庶免鵜梁之刺臣下情無任感戴天恩激切歡忭之至為此具本專差百户李泉親齎稱謝以聞論湖貴苖情并征剿事宜疏題為苖情緊急乞用兵征剿以靖地方事嘉靖二十八年四月二十日據貴州布政司分守新鎮思仁二道兼管撫苖右參議楊儒呈報龍塘新寨盤黨地所麥地小茶園等寨節經奏內有名賊首龍許保吳黑苖龍老革吳老毛龍俸龍栁那龍老課龍角馬等自本年正月起至四月初八日止或一十二十成羣或糾至四五十徒濳伏林菁伺人不意出沒劫掠黃蠟灘架視迷路屯等處地方虜去客商船米軍民財物男婦頭畜非止一次將人口歸寨勒要老銀取贖本月二十八日續據右參議楊儒呈報平茶長官司土官楊和原招鬼提寨苖賊龍老課龍董等五十名為兵近日縱回糾同蠟爾山逃苖龍角馬等夥約五百餘徒打劫萬山架梘豬樓山迷路瓮帕等處虜去男婦牛馬各計不等回寨本年五月初七日又據右參議楊儒呈報四月二十五日寅時被龍塘鬼提等寨叛苖龍許保龍角馬等數百餘徒攻劫省溪囤殺人宰牛屯住至次日寅時方去本囤老幼男婦牛馬財物盡被劫訖時有土舍楊再仕倡率苗民追敵衝脫男婦百餘名口仍向前追趕未回及稱省溪既破則銅仁思州印江等處亦必被害等因到臣臣節行彼處巡撫總兵及兵備等官添兵防守截捕及行撫苖官再行撫處并將各失事官員查究治罪干礙奏請者查明另參外為照各賊恃險負固頻年猖獗流毒三省邊方纍經奏請征剿未能得獲旋撫旋叛乘利出沒臣欽奉勑諭近該貴州撫按官奏稱貴州地方惡苖據險大肆猖獗擬調近省官兵進剿但權無統攝未免動分彼此乞要添設總督大臣居中調度庶得事體歸一事下該部議謂宜如所請今特命爾前去總督湖廣川貴軍務在於沅州駐劄爾宜查照該部題准事理計畫一應兵糧隨宜酌處若苖人稔惡弗悛爾即調督各省官軍大加征剿務要同心協力以靖地方事體重大者奏來定奪撫鎮以下官員悉聽節制俱得照例舉劾指揮以下不用命者以軍法從事欽此欽遵臣初到地方以苖亦人類未忍用兵布信曉諭冀其悔悟各苖初頗畏懼不出才一兩月復肆行劫初間只是一二十名或四五十名所虜人口尚未敢殺害勒求敢贖追捕稍急輒稱願撫近則敢於聚衆至千百人徑入村落攻劫司治放火殺人撫諭非不諄切各賊姦猾反因招撫之意以逞其凶又探知該省兵力素弱錢糧艱缺倉卒出沒力不能制公肆欺侮以示無忌防守之兵數至五千餘名月支行糧費用不資聚之則地方廣闊照管不周分散則勢分力弱常被衝壞又兼湖苖雖已聽撫夷情多變不無觀望之心若貴苖就誅則湖苖之撫可固茍姑息貴苖則湖苗無所畏憚久必相效為非利害較然臣晝夜反覆思維若非㑹兵剿殺傾其巢穴剪其醜類則地方不得寧息臣謹遵照勑諭事理預行三省整搠人馬㑹計糧餉選委將領及行貴州巡撫總兵官將賊巢險易道路逺近賊徒多寡哨道分合備細畫圖貼說以慿㑹行分𣲖軍馬剋期進剿另具題奏外照得舊時各省㑹兵以一省為主事體不一嫌怨易生又軍需錢糧往往責望地主不能及時應付互相責望所以鮮有成功伏惟聖明洞見此弊總督之任猥及微臣無非欲奉揚天威申明法令使事體歸一人情協同除積年根深之禍為永逺安寧之計臣又思方今苖患貴州最急湖川二省未及切身恐利害緩急既殊人情不無向背萬一臨時各守所見進退從違微有彼此則為上辜嚴命下攜羣情其弊又將使議論相持嵗月玩愒師老財匱如向日之誤事而後已此臣所為大懼也謹將欽奉敕諭同心協力㑹兵剿殺一應兵糧隨宜酌處事理備列條件干瀆天聽乞敕該部參酌若於事理無礙轉行與臣通行三省大小衙門官員并各土官遵照庶法一令信人知趨事而賊可平緣係苖情緊急乞用兵征剿事理未敢擅便為此具本専差千户翁思誠親齎謹題請㫖計開一舊規各處用兵以副參遊擊都司等官一員領哨布按二司官一員監之布政司官一員専督軍前糧餉俱推選平日素有才望諳曉夷情地利者其分領小哨分管糧餉等項府衛以下官俱布按二司掌印官㑹推詳定聽用今三省㑹兵地方廣逺除貴州外湖川二省合無於附近貴州道分推委該道缺人方委别道其領兵官先儘該省如該省缺人即推委鄰省務要熟知夷情地利者軍前糧餉軍需器械之類該省各支錢糧隨軍措辦自供其軍俱限八月終齊備湖廣於辰州府四川於彭水縣貴州於鎮逺等處等候尅期若故意延緩失誤軍機聽臣參究處治則事預易立不致臨期倉忙矣一查得貴州布政司只有銀三萬兩堪以動支糧米甚缺除臣從宜計處外及照舊規湖川二省每年協濟貴州糧銀各三萬兩嵗嵗運解尚有拖缺但此乃每年坐𣲖嵗用之數只勾一年支給若移以供軍嵗用必缺貴州愈見艱難今三省㑹兵軍前錢糧通融出辦湖川二省合無行令查支倉庫相應錢糧隨軍供給其前協濟貴州銀兩仍照歲例運解不許扣作今次軍餉以致貴州嵗用不敷日後取豫各執一端紛紛論辨有虧事體一湖貴節年用兵俱調土兵各該土官挾賊為利邀索無厭曲意從之愈加放肆且如軍兵行糧每月例只四斗五升兩廣土兵只支三斗惟湖廣土兵於四斗五升之外又多索一倍每斗折銀五分該銀二錢五分若兵一萬每月該銀二千五百兩湖廣上年調土兵三萬六千名每月該銀九千兩自進山至散兵共十五箇月共該一十三萬五千兩是於行糧每名四斗五升之外又無故多費此一十三萬五千兩以與土官也湖廣如此推之川貴可知土官髙坐營中計日得銀只願賊在豈肯滅賊臣到地方即追究其所以冒破錢糧縱賊不殺之故示以國法亦頗悚懼合無今後行糧照例只與四斗五升其加取一倍者通行革去候獲功日以為賞賚之資功多從厚則土官利在殺賊不敢不用命矣一節年調土兵以剿賊而土官即私募苖賊以充兵數所支行糧分給各賊且如賊首龍老課原係奏內有名惡賊上年平茶長官司楊和招其黨五十名以為兵以龍老課而征龍老課欺弊至此近聞臣至乃縱回又夥合别賊為惡若復調兵則又招去抵數如此賊豈有可盡之期土官之中亦有素修行止者如永順宣慰彭明輔之類其餘多頑愞無能其狡猾者不過一二人若楊和其最也合無容臣將善者量行奬勸若平時跋扈有名通賊貽患舉其尤甚者處治一二則土官知畏令行於土官而賊不平者未之有也一㑹兵之要所據者哨道所信者剋期哨道既分約㑹有期若一哨愆期不至則全軍為之撓敗今三省之兵各從其邊界入哨剋期於千里之外欲如期而至其責全在領軍與監軍等官合無指揮以下違期者聽臣遵照敕諭事理以軍法處治三司等官三日不至行令聽參依律問罪别委官代之使逗遛之弊革而軍政可肅也一節年各處用兵紀驗功次多係巡按御史帶管今兵端雖為貴州而動三省㑹合各效其功若只行一省巡按紀功存削之際稍有輕重必致煩言合無各省所獲功次除報臣軍門給賞外一面類報該省撫按官巡按御史駐劄於附近去處紀驗功次稽察軍前奸弊事完將功次各自核實奏報其軍前費用過錢糧管糧者亦造報該省撫按官委官查刷庶奸弊無所容而人知警矣乞辭免疊賞疏奏為乞恩辭免重賞事准兵部咨該本部題為剿除地方劇賊事該巡按廣東監察御史黃如桂將臣原任提督兩廣軍務征剿廣州府連山縣地方劇賊斬獲功次核實奏報本部覆題奉聖㫖這功次既查明白張嶽陳圭各賞銀四十兩紵絲二表裏欽此欽遵備咨到臣照得臣先於嘉靖二十七年正月內為賀縣連山兩省交界盜賊往來流劫積有多年民受其害遵照原欽奉敕調事理督調漢土軍兵㑹合夾攻將斬獲功次緣由於本年四月二十日具本奏報該兵部覆題奉聖㫖賊冦盤據稱亂流毒地方征剿既平撫鎮官有功可嘉張嶽升都察院右都御史陳圭廕一子與做錦衣衛百户還各賞銀五十兩紵絲四表裏欽此欽遵臣於本年十二月二十日行至湖廣武昌府地方祗領欽賞當即望闕叩頭謝恩具本差百户陳經綸齎赴奏謝外臣切惟賀縣連山地方雖有彼此之分而調兵夾攻實同一事臣於事完奏報捷音連山已在其中欽蒙聖恩升賞優厚臣自揣微勞不足以上稱鴻恩方此懷愧豈敢此外更有希望今又蒙重疊加賜雖賞疑從豫固聖主奬善之權而度功而受亦微臣奉職之義所有前項賞賜委係重疊臣私義實有未安所當控辭伏望聖恩收回成命將前賜臣銀兩紵絲停止俾臣得安愚分免於冒昧之譏臣不勝受恩感戴之至為此具本専差承差董欣親齎謹具奏聞伏候敕㫖極陳地方苖患并論征剿撫守利害疏題為地方苖情事嘉靖二十八年二月十五日據貴州布政司分守新鎮思仁撫苖右參議楊儒前到軍門稟稱各苖賊今年正月以來雖不大肆劫掠時常有十數為羣在於道路邀截行旅不絶該臣看得各賊因去年用兵耕穫失時今春乏食窮逼搶奪勢所必至就經行令該地方多方防備隨據湖廣守巡湖北道撫苖右參政王崇兵備副使陶欽䕫呈稱鎮筸二司所管下苖寨諸苖俱如原撫市易耕種無異又該臣議照貴苖為惡本所當誅但中間善惡順逆亦有不同若不分别一槩誅殺恐及無辜開條告示刋發二省苖寨諭令已聽撫者照舊安插未聽撫者許其改過自新一般撫納仍行各地方官嚴加防守去後訪得銅仁府地方黃蠟灘被苖劫虜市客米船又有一夥苖賊由田堧坪等處截路拏人往來驚懼道路多警及據銅仁差來義官席淮口報相同顯是各賊陽順隂逆乘隙出劫各該地方防守缺嚴以致出沒又不即行飛報坐視貽患切責湖貴二省衙門嚴加把截一靣行查出劫苖賊要見是何寨分某苖是何流土官管下緣何復行作叛㑹查明白呈報區處本年四月二十日方據撫苖右參議楊儒回呈各賊糾衆出劫次數本年五月初七日又據撫苖右參議楊儒分巡僉事范愛各呈為十分緊急苖情事內開惡苖龍許保等千餘攻省溪司衙門劫印殺虜等情本月二十九日又據參議楊儒呈報苖賊龍許保寫帖一張挾要銀兩贖印并贖取人口又要官司供送糧草本年六月初七日又據僉事范愛呈稱首惡吳黑苖龍許保等糾拽各寨并湖廣蠟爾泠水逃苖及四川酉陽管下小平茶地龍菁地崩岑等寨惡苖四百有餘聲言要打茅坡龍敖思州府并印江縣朗溪長官司一帶地方吳黑苖守截糧船就打施溪長官司一帶又據參議楊儒呈稱叛苖龍角者等各出劫緣由到臣該臣分投差官督調酉平二司原防守逃回土兵各一千名又督調湖廣永保二宣慰司土兵各二千五百名又督調貴州獨山州土兵五百名俱往銅仁及黃蠟灘地架等處與原撥軍兵相兼防守外照得貴州數年以來財力困竭盜賊縱橫人情畏怯上下相蒙以賊為諱其初出劫勢不甚大則以為常事而不必報至殺虜已多勢不可掩則預憂參究而不敢盡報及賊滿其所欲係纍載道時有漏脫尾獲而歸則以截殺奪回聳報地方積弊其來已久臣入境之初據各衙門呈報文書皆以盜賊斂戢地方無事為言惟雲貴各處公差人員經臣衙門往往稟求護送再四采訪乃知前賊原未戢斂不但銅平一處為然處處聞風肆出雲貴官道幾不敢行事勢已極理宜處置已將猖獗緣由及用兵條款開具奏請仍行該省守巡撫苖等官查勘節次劫掠事情據各陸續稟報前來中間尚有匿而不報報而不實及去年攻打省溪長官司衙門衝陷營堡虜去指揮張韶等已經參奏追取未肯釋放法度日弛民生可哀任事之臣豈能無責參照鎮守貴州總兵官白泫分守撫苖右參議楊儒分巡僉事范愛守備以都指揮體統行事胡寧俱有地方之責難逃玩冦之罪相應處治以警偷惰但念其兵糧困乏力有所制况目下添兵稍多糧運不乏地方防備急在用人其白泫楊儒范愛係原奉欽依帶罪殺賊人數其守備指揮胡寧庸陋貪汙見以贓敗雖非失事亦該罷黜如蒙乞敕該部再議將白泫等量加罰治仍令戴罪殺賊胡寧亟行黜革員缺推補庶軍政少申偷惰知警臣又照得前賊驕恣不容不征臣前次所奏大略已具但恐議者猶以山菁深險賊勢徑悍難於收功為疑其稱為制馭良策者不過曰撫曰守及割地以與土官使自為守三策而已此皆似是而實未中事機何也嘉靖二十四年春賊勢猖獗左布政使石簡親詣銅仁招撫既給以魚鹽又犒以花紅牛酒又以防守地方為名計口而給之糧巨魁龍許保給以冠帶又選幼苖一名充生員賊所需索無不應付如奉驕子懼失其意可謂委曲之極而糧才入手復出劫虜未及一年勢愈驕蹇至於今日動言得糧而後聽招此以姑息為撫無益而反釀患之明驗也嘉靖二十七年掣兵之後調漢土軍兵五千五百九十名以守銅仁府城又調酉陽宣撫司土兵一千名防守地名小橋平茶長官司土兵一千名防守地名毛口皆賊出沒要路又招凱里司土兵等龍必升兵一千名住耕防守地架地方皆賊出入要路甫經一月小橋毛口孤陷賊巢道路險逺糧運不給土兵擅自掣散龍必升兵亦為賊所衝潰歸府城府城軍兵日久乏食逃亡數多并龍必升兵僅存四千五百四十員名夫兵多則苦於乏糧兵少又不足分布控扼賊路則賊所必攻聚於府城則緩急難應此以支吾為守無益而徒耗費之明驗也至於給地土官使自為守之說為不可者蓋湖貴苖蠻與兩廣猺獞不同兩廣如古田府江羅旁諸賊皆散漫無統故或欲立土官以管攝之臣往提督兩廣親詢各土官無敢應承者以其難也若夫湖廣諸苖見有該管土官寨落分明當其糾合為惡若不知有該管土官及或勢窘就招非用該管土官招之不信蓋其相攝服數百十年雖禽獸暴戾其本原之念亦有不盡泯者若舍其舊管而使之服屬他人非惟各苖未肯甘心亦恐原管土官隂相煽動激成禍變今鎮筸就撫諸苗已服其土官管束惟貴州銅平尚爾驕恣計二司之苖名數不多若分兵深入傾其巢穴誅其魁渠其餘黨必震栗願招逮其求招然後分遣原管土官就往撫之使之樹恩其土民原不從賊而為賊所攻流散他處俱招回復業蠲逋負省苛征使依土官居住以厚其勢循習既久則諸苖皆可化為良也顧處之何如爾故臣愚見以為決須用兵征剿然後撫可定守可固分背經理方得就緒故敢拳拳以用兵為言若畏避勞煩隨衆茍安給食以撫添兵以守豈無嵗月之安終非長久之計於臣私計便矣其如地方生靈何哉臣所不敢而亦有所不忍也伏惟皇上神謨雄斷燭見萬里乞敕該部查臣先今奏詞覆議上請特賜允行三省地方不勝幸甚緣係云云謝賜銀幣疏奏為恭謝天恩事本年八月十六日據臣原差齎本承差董欣齎到通報一帙內開六月十八日該臣一本為乞恩辭免重賞事奉聖㫖已賞了不准辭該部知道欽此欽遵隨據兩廣聽用千户陳經綸捧到欽賞銀四十兩紵絲三表裏臣當即望闕叩頭謝恩祗領訖臣夙荷寵靈屢膺藩寄嵗月荏苒功實未加叨御府之珍藏逮兹三鍚瞻天顔於咫尺惟切中兢伏惟皇上恩浹宇內念軫邊方事有備而無患勞雖微而必録恩波所及嶺海回日月之光仁聞中孚湖湘見豚魚之感矧兹夷醜敢負生成臣志切馳驅義無還顧縱擒如策愧攻心之未能威信兼施庶執信之可必不勝受恩感激之至為此具本專差指揮王官親齎稱謝謹具奏聞奉勑切責謝恩疏奏為謝恩事嘉靖二十九年四月初七日辰時准兵部差百户尚旻齎捧敕總督湖廣川貴軍務都察院右都御史張嶽近該巡按貴州御史張雨題稱印江縣治被惡苖龍許保等攻陷將知縣徐文伯等虜去殘害生靈震驚逺邇爾受専命調兵征剿日久不見平定今却愈肆猖獗顯是爾等不能協謀制變所致據法本當重治但念緊急用人之際姑從寬降敕切責著令戴罪管事爾宜遵照前㫖作速督率官兵相機征剿務要刻期平靖以安地方如或仍前怠忽致誤軍事必罪不宥故敕欽此欽遵臣當即望闕叩頭謝恩開讀祗領外照得貴州銅平苖冦為惡多年臣恭受明命督師徂征愧無折衝禦侮之材又牽於招安防守之議謀乖而事不集日久而賊愈肆至於攻劫郡邑執辱官吏生民受其荼毒地方為之恐動皆臣措處無策節制缺嚴所致當伏重罪死無所辭伏蒙聖恩寬大貸其餘生俾圗後效特賜敕書戒諭深切責以協謀制變刻期平靖皆洞見前此異同因循之弊俾各洗心一意趨事赴功蓋湟中屯田之策初亦譁於衆口元和伐蔡之役功竟成於獨斷矧兹殘冦又非昔比曰撫曰守持議纍年語及征剿以難為解更有難者將若之何臣雖駑鈍實切羞之謹當遵奉敕書督率將士今大火過中秋氣將臨乘時進兵分哨深入三面夾攻若此賊不平臣有何面目可復奉敕書以對將吏拳拳愚忠必滅此賊以盡報答而後已伏望聖明俯賜矜察臣不勝受恩感激憤發之至保留參將石邦憲疏題為乞恩保留謀勇將官保全危急孤城事臣於嘉靖二十四年四月十九日准兵部咨為走報十分緊急苗情事照得添設分守湖貴鎮筸銅仁等處地方右參將署都指揮僉事石邦憲近該巡按貴州監察御史張雨參劾本部覆題節奉聖㫖李夢祥林斌楊儒石邦憲都著巡按御史提了問員缺該部即行推補欽此欽遵所有前項員缺從公推舉得署都指揮僉事樊世諒李英俱各相應題奉聖㫖是有㸃的依擬用欽此欽遵內樊世諒有㸃備咨到臣欽遵臣看得參將乃要緊將領正值苖情猖獗不可一日有缺備行石邦憲暫在銅仁防備不許擅離一面行文催促樊世諒赴任隨據銅仁府申據鄉官監生生員封縉陳時謨等六十四員名呈為前事切緣本府地方節被鎮筸銅仁惡苖劫害禍極慘酷雖經各官屢年征剿或因偏執己見而智謀不協或因畏難推託而姑息同風遇有事變却乃多方彌縫以致釀成大患本府孤懸虎口不絶如線近於上年十月內石參將到任以來駐劄本府本官痛切事勢大壞民害日深隨即申明號令晝夜綜理不避艱險親臨一切緊要關隘撥兵防守沿城壕塹淤淺去處監督兵夫挑濬重夾響籬安籖布荆下弔設穽自捐廩糧銀兩鼎立望樓四座修葺損壞串垜中築子城以便用武又於南岸漁梁頭衆思塘黃蠟等處築堡開濠劄營防禦且見在哨兵寡呈請召募打手鄉兵日加操練鼓舞鬭志親統發哨各處要路分兵伏捕如各苖攻劫邑梅石阡等處本官身先士卒前去遏截敵殺陸續擒斬有名苖賊龍角者龍打岩等三十餘名顆又攻破罵勞苗寨奪回被虜男婦四十餘名口蓋自二十三年之後我兵不敢加兵於賊是以猖獗無忌至今始一挫之苖賊聞風畏威盡行潛避菁谷不敢出沒本府孤城暫爾茍安皆由本官保障之功近蒙明㫖以印江失事逮及本官去任士民聞之莫不相向垂淚本官在銅仁一日地方則有一日之安去銅仁一時地方即有旋踵之禍今有本官保全銅仁尚以印江之事坐纍若無本官將來不惟失一銅仁其流禍肆毒尤有不可勝言者縱有新任官員急難措處伏為俯察下情憫念本府地方連年受害乞轉達天恩保留本官姑容戴罪仍以原職駐鎮本府殺賊候大征事完之日方行聽理庶使事機易於就緒地方早安等情及據銅仁長官司十洞土著殘民楊稠楊文學等欣為懇乞奏留謀勇將官剿除惡苖以靖地方以安生靈事該府據前呈訴議照鎮筸銅平苖賊歷年積惡流劫地方蓋因將領非人茍延嵗月虛費錢糧以致猾賊愈加凶狠自參將石邦憲到任以來因見地方大壞極敝殘民荼毒倒懸竭力盡心改絃易轍號令整嚴賞罰明信內則修理城垣外則防守隘路各苖知畏濳避深山閒或出劫即行截撲數月以來屢獲戰功城中暫獲稍安流民相繼復業且熟知地理諳曉夷情身先士卒不避艱險年力精壯才識明敏似此將官誠不多見前者印江失守委的罪責難辭但數千之兵俱經本官多方調停漸有紀律傳聞諸苖頗有懼心今各寨正缺食用正宜進取之時少添兵糧成功可必本官一去各兵失主自難鈐制後雖有繼之者終不如其相信之深驅使之易也况孤城切近賊巢賊之垂涎已非一日近賴本官方得保全本官朝離銅城夕陷軍散于前賊乘于後理勢必至其受禍不特印江石阡而已剝床及膚深為可憂合無軫念危城殘民受禍至深功在垂成事咸就緒乞行本官照舊用心綜理以俟大舉以收全功不得以去留變志姑待事寧聽候領罪等因開申到臣續又節據龍里鎮逺等八衛所戍守銅仁旗軍戴云八劉興九涂佑等告為懇乞存留能幹官員以平惡苖以恤戍苦事銅仁長官司申為懇乞奏留謀勇將官剿除惡苗以靖地方以安生靈事省溪長官司申為保留賢能將官彌迫禍以蘇倒懸事委官普安衛經歷黃國聲呈為乞恩保留智勇將官以安地方事烏羅長官司申為乞恩姑留鎮守重臣以剿判苖以安邊境事提溪長官司申為乞賜保留將官鎮守地方以安生靈事據各申訴俱要存留本官鎮守地方候大舉事畢聽其領罪等情到臣及據舊任參將石邦憲呈該臣前行本官仍在銅仁駐鎮候新任參將樊世鯨到任方許離任非敢不遵但念奉提誠恐苖賊出沒人心懈怠罔聽進止難於約束合無委官前來管理容令卑職回衛聽候提問臣因樊世鯨久候不見赴任即今秋期大舉急在用人只得行令本官仍在銅仁暫候一面督兵防守屢據本官呈報擒斬功次及生擒龍許保親弟龍光照等俱行該道紀録案候另行外臣查得分守鎮筸地方參將先該勘處夷情都御史萬鏜奏設原擬責任於麻陽駐劄在湖廣則常德辰州沅州九溪永定施州六衛永順保靖二宣慰司施南散毛忠建容美等宣撫司筸子坪五寨等長官司及鎮筸九永二守備屬焉在貴州銅仁平頭省溪烏羅思州施溪黃道溪等長官司及銅仁守備屬焉其切近貴州地界如四川酉陽宣撫司平茶邑梅等長官司亦皆屬其節制為照參將石邦憲近因貴州思南府印江石阡失事兩次城池兵馬非其統屬責任而賊出不能遏截以致出巢劫掠罪果難辭應該欽奉明㫖回衛聽候提問原銅仁一帶地方苖賊出沒緊關重地本官隄守已有次苐值今正在大舉之期新任參將樊世鯨未到豈可輕縱本官擅離不無有悮事機及照銅仁頻遭苖患軍民逃散十分狼狽商旅絶跡糧運不通自本官到任以來修舉廢墜召集逃亡內築子城外設濠塹鼓舞士卒搗巢截殺擒斬多功俘獲亦衆商旅始集糧運得通地方賴以保障一聞去任屢有申訴臣叨任督兵急在將材取其所長既有見聞不敢緘默如蒙皇上軫念地方苖情緊急用人之際乞敕兵部再加酌議俯順士民之情將參將石邦憲姑留戴罪専在銅仁地方駐劄殺賊贖罪事畢仍行提問具奏定奪其新任參將樊世鯨查照原議只在麻陽駐劄提調湖廣一帶事後應否去留通行議處緣係乞恩保留謀勇將官保全危急孤城事理未敢擅便為此具本専差承差楊勝春親齎謹題請㫖小山類稿卷四
