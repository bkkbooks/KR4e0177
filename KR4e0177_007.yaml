body:
  text: 小山類稿卷七明張嶽撰書二答邵端峰提學某村居寂寞傾注教沃嚮疑車從由仙溪入永春故不及奉迓然亦以小嫌之故未超脫也承諭余先生推原大禮不定歸於吾輩講學之不精固然學之精微未可遽議然至於三綱五典所以繫天常立人極者雖匹夫匹婦莫不知其當然而學士大夫憑藉私心文以經典迎合附會貽禍悮朝而無所忌憚此豈但其講學不精有以誤之哉雖然其發有源其流有漸至今則皆揚其瀾而助之者也余先生云云殆有所指執事謂之公案則分别主從者想已有定論矣恨未悉聞某淺陋駁雜未有端緒方將承學於先生長者以教其所不及豈敢輕易立說自取不韙蓋古之立言隨其所得皆必有所自信於心而無疑然後敢筆之於書如荀楊諸子其言雖未精而亦不害其為自信也今之立言者果皆能自信於心乎哉無是心而敢於立說某嘗推其類以為異汨沒聲利者幾希而又何暇論其言之是非哉執事醇學奧文雅重當時每侍教論及此事未嘗不懇切感慨異於徒騰口說者執事而不為誰當為之乃以見屬不敢當不敢當去嵗僣易數言方懼督過顧蒙謙挹借奬仰歎無已平生於知巳茍有所聞而不面告心常歉焉以為未盡及既告之後又常悔之此一病痛亦自不小執事之不罪之也其亦有以終教之乎願學願學與前侍御馬師山某草率為此一行甚覺無謂到此愈悔之亦曽與吏部求一散地往南京當道者拘於年資未敢相信不知吾人仕進惟其才力所宜與心之所安者何如一切格以文法真可笑也向日處京師三四年其時朝廷雖甚多故然縉紳習尚猶頗近正其最下不過依狥茍且求為好官爾固不敢文飾姦言闔闢鼓弄立黨相擠顯肆無忌如今日也彼甘心破顔而為之者不足責矣吾輩之中至有棄其平生而隂附之者亦有坐持兩端彼此觀望以為他日地一時掩覆初若不覺而其心術不端趨向不定將積習敗壞至率獸食人乃已甚可懼也時事既非吾力所及祖母老母俱垂白在堂石田茅屋之閒豈無可容身者南京之志不敢中止縱不可得亦當别尋一事作歸計爾二舍弟在書院朝夕甚蒙指教恐其不知此意乞呼來語之幸幸與唐啓東韶州某初筮仕試事膳部與執事處者纍月地親辱愛最多别去不相聞又數年去年來京途中聞執事已擢守韶州政聲日逾嶺而北聞其政如見其人也慰寫何如先人向日曽備數知韶之英德為宋唐子方立祠其始蓋顓欲爼豆唐公既而思之終始三百年名賢遷謫居是地如鄭監門洪奉使輩髙風峻節與唐直相上下方欲稽牒按史舉其可祀者並唐祀之其祝號之稱位列之敘牲幣之數俱欲更有詮定而不幸抱疾以終不肖孤蓋痛心焉竊聞此邑荒陋僻逺其流風文物無能與他邑比獨以數賢嘗遊之故至今山水猶自生輝此祠若立豈惟足以勸率邦之人與夫仕於此者使之有所勉慕興起而凡遷人逐客瞻拜祠下思古人之所樹立如此亦足以慰其去國懷鄉之思名教所繫似非輕淺當先人作縣時郡大夫周先生子厚也先人幸支持嵗餘不甚得罪其士民其士民亦頗安先君至身沒而怨不興者周先生之愛居多夫事有可為而力又能為之固無問前人與我故敢舉先人未就之事以告伏惟裁擇不宣與邵端峰大參去嵗有校官自湖廣回辱遞所賜小録伏枕窮鄉不得接見其人詢問起居想寒暄保嗇自有道者餘事雖不必扣之來人亦可意領惟道術時事所繫於消長盛衰執事之所深憂欲言而某所願虛心聽受者乃邈焉經越嵗時不得以一札相告語奈之何其無拂鬱于中邪昔之倡為一道德同風俗之說鼓天下好異者而從之既以深入人心其餘波且漫及廟堂矣及其聲勢相軋操戈入其室者乃出於異時相嚮慕之人蓋邪說詖行之不足恃如此夏敦夫所謂紛紛相崇尚者果何如邪古今一轍良可歎也某初丁先祖母憂歸未抵家先妣亦復不幸哀疚㷀㷀志慮荒落仰惟執事平日教愛之深悚然愧懼而已不知何日可以相見盡所欲言臨風不勝傾仰與林次崖提學自吾兄有嶺南僉憲之命逾一年矣憂病多時不及作書奉問方以為念昨聞即轉彼中提學而自京師來者多言吾兄曽疏言八事不能舉其欵目獨言京師人口多藉藉稱道吾兄不出則已出必有大建明是二者皆可賀然所望於吾兄而欲為之賀之者當不止是古今聖賢極力說一幾字自吾身之辭受出處以至人才之賢否邪正政事之得失是非差之毫釐杪忽甚至治亂安危之所以判莫不在此若於此判決得精則所謂似賢而否似正而邪似是似得而實不勝其謬者皆不能惑而吾之所以持身與所以處世應變於是乎皆有定據而可不至於悔吝矣昔之君子其能辨乎此者其大節固已光明俊偉猶足欽乎百代若夫辨之不精意以為善而為之以卒陷於悔吝者亦豈少哉此正吾人今日所當深講者也以吾兄在嶺南又有風化之責故漫及之千萬照察所陳八事可相示否餘惟及時自愛與聶雙江蘇州昨會閒覺得泛談大多於尊兄去就一節殊未縷悉比歸復思之有不容默者輒復云云大抵今之論出處者只被一人先開口說要打破利名關不戀官職地位已自占得髙了所以下面更有合商量處才與商量似乎勸人做官勸人遷延避就以規時好與先開口者題目大不相湊泊只得和說合該飄然逺逝乃為能以氣節相激昂不隳落時俗一等見解某以為如此者皆是以虛名相從臾而中未必然茍焉為欺而已使於義決不容不去而其人尚愛戀不能決舍為朋友者豈得不以大義責之使之速去以成其美設若於義尚在可以去可以無去之閒則當權其輕重處之若去重於可以不去也寧可以去過去雖似激似迂然尚為不失己若過於無去則將為何如人哉若不去重於可以去也則自當不必去就其職事為之竭誠順理以無愧於不去之本心而已此義平正縝密豈容以一毫意氣參其間若尊兄之事則只有三分可以去七分似不必去夫吾之命受於君父者也得罪於君父當去君父未必知其當權者以勢凌辱之當去幸是二者之免而身且多病不能舉其官矣亦當去若其他則愛人不親反其仁治人不治反其智禮人不答反其敬苗頑逆命舜禹益所以相告警者惟欲負罪引慝致謹於一念滿謙之幾而已聖賢心法昭然可師尊兄今日欲去只有體弱多病一節可對人言耳在禮律亦有在告告滿之文豈得一疏就道即掉臂而行以悻悻面目而對姑蘇之士民恐於義未為得也望尊兄更審思之若曰吾惟拚此一去就所請不允他日議其擅離之罪亦不過禠職間住爾此直是平空中橫發一箇客氣下既逆料士民以為不必吾信上又逆料廟堂以為不必吾從邀一罪名在身以為去就之端甚不可甚不可方今人才雖多然求其有經世之心不尚空談者如尊兄能得幾人就使困在沙泥尚當洗拔而出之况猷為己著駸駸可望於大擔負不止如蘇州者豈可以虛名相從臾而茍焉謾說去以為欺而已哉某以為前疏既在道不可追矣望兄趂此間居省思慮飬精神時親藥餌自輔以聽進止之命若命未許歸而貴體亦完復可以涖事則不必決於一去以為髙簿書聽斷之間自有一假脫然塵埃之表處在尊兄更不待言也舟中熱握管甚艱不能悉悉餘惟自愛答鹽道李古冲春閒辱枉教書跧伏邉郡習懶成僻久不能顓啓奉候昨提舉司差吏回又辱手翰督教以所不及殊切惶愧比日伏審尊候調攝清勝提學道帶管公移亦行至此想不久當即真不但以暫煩也辱示宣城志書製裁古雅脫去近日一種浮蔓之習甚善大槩此書只載一方故實以備觀覽耳當事得其實使入境而問政俗者一展卷可盡古四方之史意亦如此非欲人於此論文以課工拙也近來秀才伎倆太多略一舉筆便要將許多識見堆入裏面故體裁愈新愈備而愈不足觀又有欲反其所為者每一事只書三兩句此春秋謹嚴書法也亦謬元本且留在此暇中再為一一看過鹽丁陳橫山責丁於田其初只欲抑大戶之詭稅者爾不知田之去留無常而丁引一定難以卒改異日田去丁存有無窮貱納之苦一時思想偶不及此東莞黃田兩場某所編量為豁免者甚多其他若稅鹽差役及均派柵甲數事橫山所議多有可采者某舊有一議欲悉查出沙田謂以田辦鹽如民田之以畝科稅此法若行則小民之有引無業者稍可輕減而大戶之白地煎鹽而無課者必多方沮撓之但委任得人亦不難行也試檢看何如昨見報九廟後又興大役滿朝將順無一人肯以利害為明主言者豈皆有吾君不能之懷邪可歎陸提舉行謹此奉布且謝來教之勤惟照納幸幸與黃泰泉廖教官行附問左右想已逹樂器昨奉報草略未盡蓋此方僻極且陋其聲音之節習而能知者殊少其數與義更不待論也若樂器修拾齊整而無知音者以教之亦虛器爾不知三學之中或從遊之士有善此者否望為訪定指示寥教官延請同來不敢指望一一中節但鏗鏘鼓舞依稀成箇次第亦足新邉方人耳目也志書已獲一見只開卷第一葉有分野不如不分月分月不如不分職之語漫不省其何謂又曰未可以惟日惟月惟嵗而因以自畫則一部洪範皆當廢棄而王卿士師尹任其率意妄為無復體統職分可守又引月令中星數句以為傳心要法則呂不韋真勝似箕子周公矣此事本不足道可惜費許多錢糧而某又不幸虛掛一名深懷石工之愧也漫論及此勿為不知者道靖難録又寫得一本託陸平川讀過一遍想無差誤又從渠得黃鉞傳今并元本附去可補入此天地間大公案得尊兄為之表白一番死者生氣勃勃然真足立頑起懦視世之媕阿任數欺君誤國以取富貴者乃犬彘之不如也欲作數語附其後屬此鬱熱未能候秋深稍暇當為之內閣虛位而銓曹屬之許公此何謂也豈下面又有求進者上意姑定此以杜覬覦邪有聞幸以見告餘惟照亮與王湛泉選部嚮經姑蘇嘗一望見顔色時行役匆匆未能深有所咨請蓋既久而浮踪靡定雖欲聞執事之聲光亦不可得矣不謂疏庸過蒙記録鄖陽承乏逾出分外但相知皆竊歎執事為國用人之盛心而某自愧不足以當之也雖然今天下人材雖經摧折剝落之餘其間能卓然自樹逺過於某而淹滯特甚者所在相望夫疏拙如某者尚蒙採録則其自樹逺過於某而淹滯特甚者豈復有遺舉哉此某所以為縉紳喜不但為區區致其私謝而已至荆州方聞江右之報已入境無辭去之理亦為喻月梧候代日久也齎奏人行謹此附布區區與山西巡撫曾石塘於執事非一日之仰而踪跡疏逺未能通姓名於左右春間方圖走書濟上復承移節太原長城之倚天街以南實藉風猷而某所為嚮往之私愈不能已比日夏景正熱伏惟尊候清勝往年平陽聶守方多事之時衆歸其有應變之功及事定之後則又以文法深求其罪此一聶爾其功其罪前後殊論豈世俗之好惡有難槩之也亦其不遇相知者邪然今有執事在上方將千金以市駿馬之骨而使真馬辱於泥塗江右諸公每見者多談此事又以為非執事無可告者某故不自揆於通問之初略伸其意外諸友書并小冊一帙并奉諒執事於是非之際已有定論亦不待此也未間千萬以時為國自愛不宣與福建按院何古林漳寇久知其必有此寒舍聚族海濵力不能遷因循以待禍此幾事不敏之過也然聞此寇自五月即徘徊於莆惠之間若水寨把截嚴謹地方候望分明軍衛有司略出百十人耀虛聲為居人倚重其禍尚可不至此且聞寇非有部伍行隊也三三五五星散搶虜舍舟楫之長技登陸走數十里無敢禦者蓋承平久矣然蠱極必飭豈可謂其飄忽往來付之無可奈何遂已愚意謂此寇腴於劫掠之味未必肯散且人多跡露勢亦未能遽散踪跡可尋大約惟嚴號令信賞罰聨水寨舟師依舊法會哨截捕此外調福清四澚莆禧吉了釣船晋江石湖漳州𤣥鐘船數百艘給之糧餉重其賞格分布哨道與舟師相幫蓋此輩海上纍與寇角寇頗畏之又海濵之人慣水儘有精壯可用者恨寇入骨欲致死於寇亦樂為用但平居患無舟楫又患官府不為作主而不敢動若募其願行者授以糧食器械分配各船或就用其地方本船使與調用船相幫其器械短海上兵勢不相及火器最急弓弩次之石子又次之如鐵蒺藜泥罐之類皆不可少凡此皆官為處給但統領之人頗難見在管事未必盡可用可於緣事指揮千百戶中平時素有才略者許以功贖罪若家資素厚罪犯頗深不至死者許其出私財募人報效要擒人船若干方與申明保奏此蓋數年前亦有用之得效者惟恐奸巧之徒欲緣此為脫罪計則又未必有益徒增一番人情面分使紀綱敗壞為不可爾分布既定刻以日期令其出海又遣精當有司佐二督領民兵與沿海衛所守城巡捕瞭哨等軍兵相兼截把澚口斷其薪水之路且以稽察各船㑹哨先後緩急令五日一報賊在海既逼於舟師欲登岸又阻於各澚劫掠無得薪水路窮勢自衰散可擒往者既不可追矣將來之患尚未知所届切望留念又聞近寇殺人甚慘别處不可知敝鄉附近三十都三十一都死者近百人百十年耳目未聞見痛苦何可言望委公正有司查勘死者量與優恤所費於官無毫髮之損而一念憫恤之意足以漸轉呻吟安生者之心而慰死者憤鬱于地下亦仁政一助也適得家報差人回視情切言無倫次伏冀裁照與張半洲司馬楊寬回備悉近日孝履宗圖略為揭看中間不無訛謬蓋清河之張與范陽之張各為一𣲖當初定氏族取一顯者以為望是時諸張惟清河一族最顯故取以望吾張非謂凡張皆出清河也文瓘為清河之後曲江為范陽之後清河祖司徒歆范陽祖司空華其上皆系留侯世次之見於傳紀諸書頗明後人但以張為清河郡故其為譜類牽强以求合之如以曲江為文瓘之後是也所示華宗圖向江西曽於張東白家見之大約多同此江西諸張相傳舊本雖東白亦未詳考爾某昔年曽作寒宗譜以曲江無可據未敢出昨因偶尋得祖墳志銘與家傳合去年乃刻以傳族人今奉往一本間中望試為閲過他日再請教與掌制內翰邇者恭遇太廟告成推恩不肖叨冒過分亦得榮及先人顧念先祖先父皆業儒發身僅終縣令既無雋異事功可以光傳琰琬而不肖立身無狀又無能為先人取重竊嘗觀前世名家文字一時縉紳士夫命官褒贈因代言之筆無小大皆有聞於後世者甚多况近時特重綸制之選髙文大冊焜耀宇內取善無方雖小必録則不肖之先人得以託而傳也必矣伏惟執事言為國章榮重華衮不肖所以僭妄有請謹具事狀一幅奉呈左右蓋古之史官嘗責取人家子孫私狀以備采擇敢援斯義亮在照納先祖以詩經領𢎞治壬子鄉薦正德戊辰選江西袁州府萍鄉知縣未任卒寒宗自先世以來俱業詩先曽祖老儒治詩能得肻綮先祖實傳家學天性孝友篤實與物無競而器宇沉靜人莫測其際容色粹然望之知為巨人長者先曽祖六子三母所出先祖居長撫諸弟恩愛均一不知其母之有同異與人交重信義不茍然諾至朋友死生急難之際尤急周旋雅甘淡泊雖甚貧窘閉門端坐非其人不見世故多所經練自朝廷典章至律令算歷皆留心講䆒務為有用不幸未及試而卒縉紳莫不惜之先祖妣出自名家性敦朴婉順與先祖同德以冡婦承事舅姑常伺候顔色惟恐不得其心家私物用常蓄其善者以待命一毫不入私篋撫妯娌如先祖之撫兄弟族黨僮僕皆有恩意尤不樂聞人私事及門外事有談及者為不聞而去之自少至老無日不親績絍家事惟總大綱曰吾有妯娌與子婦吾何為瑣瑣哉後享髙夀至不肖謬官郎中乃終先君亦傳家學以詩經領𢎞治甲子鄉薦正德庚辰選廣東韶州府英德知縣為人坦易明白表裏洞然與人交無親疏老少輒傾倒先業素薄家居教授自給暇則課僮僕耕作竹笠藜杖時行隴畝之間遇之者不知為科目人也英德多土産一無所好至誠惻怛視民之疾苦如疾痛在身思有以振恤之其聽訟務便民情有自知其曲直願兩釋者亦不窮䆒戶婚田土雖小必為案證以塞其後爭尤以興文教正禮俗為先建龍山書院以祠唐文肅公介旁列齊舍擇諸生肄業其中暇日親與講說邑當水陸要道痛節里甲浮費定夫役迎送之數以為常則核客戶墾田得正稅數百石是嵗編入黃冊人不謂擾在任勤勞竟以勞致痰疾而卒百姓皇皇如有所喪競來視殯書遺像以歸懸祀之今為祠於南山書院先妣性明淑識度過人入門及事先曽祖父母小心畏謹得其歡心先君初食貧先妣斥簮珥經紀家事勤儉積纍至於有以事飬婚嫁喪葬於禮無廢缺有餘則推以周族黨家政嚴肅內外大小必謹從誨令雖不肖兄弟少有過不假顔色也不肖幼讀書率以一燈夜績從旁課督不肖領鄉書登春榜先妣不甚喜也惟聞其欲學為修身寡過則喜其於紛華好玩終其身不一御曰吾家故寒素願子孫不改此風足矣臨終猶勑子孫必讀書守禮法為善人治喪依古禮葬毋侈靡毋用浮屠與壻李忱人至得所惠書并近作深慰去秋在祖家讀書想以其僻靜更能以禮法接族人一毫俗態不入於胸中一生事業俱從此始為益又在言語文字之外也命字之義令昆仲皆聨甫字請字曰誠甫六經中惟書經言忱字最多有以誠言者有以信言者惟大誥天棐忱之忱當讀如詩天難諶斯之意棐讀為匪而忱為信言天不可信也蔡氏從古注以輔字釋之恐未穩此字二訓誠以其全體言信隨事言之程子曰信不足以盡誠猶愛不足以盡仁字以誠甫舉其全體也若用功之實則無妄不欺至矣人便匆匆附此不盡外川扇四把引逺意視至幸甚小山類稿卷七
