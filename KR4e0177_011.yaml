body:
  text: 小山類稿卷十一明張嶽撰序一清介叟家集叙清介叟鄉士夫為曾大父桐廬府君别號也吾宗自宋元以前處而耕於野出而仕於朝者皆能自植立以聲其家入我朝以儒術顯自叟始初治禮記辨析考證具有成說復專治毛詩本經據傳參諸儒議論而精去取之視禮記有過無不及焉手澤尚存丹鉛之法炳然可考也作文章恆不屬稿而敦雅典實無一語贅大抵以無詖詞無險語為主發乎情以逹意情盡意彰而後已工拙不暇計也為太學上舍生餘二十年始拜官居官不三年復棄去平生所為百不一遂意文章非其所欲自奮者應酬所裁竟亦不自珍故稿多逸晚年盡斂平生而歸諸芳社緑野之間秋稻晚香冬醖初熟弱子幼孫森立左右白首之樂宜浩然有以自適者方且拳拳集古書立家範以教子孫而興族人勤一生而無悶焉叟之用心可知矣有剛烈之氣有耿介之節有精核之學有練習之政進足以扶名義成世務不幸而遇世變則死忠死孝亦其所能為而無歉焉者顧不克展布於時而約之為一家之政積其不盡餘意以待子孫叟之志足悲也夫叟之書聚而子孫未能讀也範立而子孫族人未能守也所待諸後又如此其解顔於九原否邪因撿舊篋得未逸稿若干篇懼其久而蠧壞益甚謹次而録之藏於家名曰家集俾孝子順孫觀之其亦有所感而興也正德乙亥季春吉嗣曾孫嶽百拜謹識浦北林氏族譜序雅菴林先生始以太學諸生入仕拜寧藩審理一旦投紱綬徑歸人莫有測其意者及己卯夏變起江西嶽乃知先生之有見於是也而追憶其時則辰幹逾一紀矣因歎曰天之所棄不逾其紀紀數盈也盈必變先生之亟去也其知之矣既又歎曰夫順逆利害之際其故不難知也然徘徊不去卒以身與名與之俱僨者此非獨其見之不豫蓋亦有中立顧望之念隂持其間欲坐邀幸成之利而外示偃蹇以欺清議者固天刑之不可解也故迹其禍福之所終而以幸不幸之數觀之則先生亦幸為不蹈其難耳夫惡知所决擇於中者尺度果若是嚴邪某之先祖父領命知萍鄉道洪都奄棄館舍蓋於先生有不涯之恩是以知先生最詳方且述舊恩登吾家乘以昭示不忘至其去就之大節又將與天下道之使知十載之前亦有深識逺見如先生者世果未嘗無人也况夫林氏子孫其寂無一言以劘厲而勸告之乎特書於其譜之端使凡立身應變者皆如先生之審决不茍焉則是譜也足以不墜矣新昌蔡氏族譜序蔡出姬姓以國為氏唐㑹昌中散騎常侍劔自上蔡家洪都又再徙於鹽步鎮其後易鎮為新昌縣而蔡氏遂為著姓譜作於常侍七世孫子飛又十世䕫府教授通乃大合羣族世經而支緯之視舊加詳焉正德庚辰冬南臺照磨純中出以示余蓋自教授至今又百餘年其間壯老生死之消長去來者又不知幾何也譜不續將至無所於考純中曰吾將續成之余因為之說曰近世士大夫家類皆有譜迹其所以辨據稱詡殷勤反覆未始不為久逺無窮計然未及數百年而至湮滅者何哉蓋譜者家之迹賴以著而非所賴以立也古之立家者必有孝敬友讓之實而制為經久可行之法是以卿大夫以下各立之宗雖至百世之逺其昭穆疏戚之叙不待考而知其吉凶慶弔往來之情不待强而盡其法素明其習素定也後世宗法之廢始於宗子之非世官士庶人之家又疑四親室數無敢為大宗之說者是以不待情盡服盡而族已散乃區區收拾墜後之名字故實以為辨據稱詡之資不亦末乎記曰别子為祖謂公族之為大夫者而非止公族之為大夫也士庶人之先固有德在子孫百世不能忘者亦可以義附之吾觀蔡氏譜其稱常侍君父子也功烈氣節震耀後代至其﨑嶇百死以全其宗又蔡氏子孫所當疾首愴心百世不能忘者不能忘則當祀之祀之則當立之宗以主其祀而有事必告純中欲尊祖合族為久逺無窮計自不忘常侍之心推之以逹於宗而譜其名實之迹以待焉則先後本末兩得之矣若夫四宗並建親盡迭遷禮家言之已詳余特辨其疑於大宗之不當立而觀蔡譜之可立有如此者故云集山書屋叙距崇陽北五里有山曰大集汪兵部希周嘗為余道其林壑嵒洞之美余未能遊也而杖屨飄飄已如凌二别遡鄂渚而循山麓以下上焉山故有張乖崖作令時書院嵗久湮沒至汪君乃翁更度幽勝處屋而讀書其中翁嘗以邑造士選入澤宫輒辭去不就退而冥棲是山取所讀之書而益諷詠之且忘其年之既邁也夫人情於天下之物凡有慕焉皆足以移其中惟山水之樂得之則其趣愈髙其心日益以靜而讀書於山水之問其樂又有甚焉者顧世之讀書者或未能深悟其樂而山林靜養之士亦自謂真有所得而無事於書是二者余交病之翁之避寵辱屏世味而從事於斯也精詣冥㑹意象俱忘山光水色入我襟懷豈無足樂者乎謂之書可也謂之山水亦可也謂其出二者之外而自有所樂亦可也然余未足以知之是山之勝後乖崖四百年乃再發於翁人心山靈果有默相酬而不可詰者邪姑叙以志吾之未始遊他日儻得遊焉尚當從翁以盡扣其妙也太𤣥集注序揚子太𤣥自司馬氏注出而諸家之說盡廢然𤣥好者故少今之學者豈惟不好縱有好精力亦無暇及故嵗久而訛脫愈甚余始得是書愛其文字竒古又愛司馬氏以其所自得之義理說𤣥明暢詳盡因并讀之患無善本可以讎校丙戌冬使過廣信郡守張侯景周方圖刻𤣥乃出余本與張本參校之得其訛謬可正者數處而闕其疑敘曰子雲之為是書將以擬易也夫易於天地萬物之理賾矣豈待别有一書與之並行而能有所發明哉自先天之學不傳吾夫子贊易僅存其辭於大傳中而世之為丁何焦京學者方蔽於傳注拘於術數莫有能察其所由然者也子雲博極羣籍又好深湛之思其於天地之運隂陽二氣之往來蓋見其機緘之不容已者於是考之於律則十二管相生之氣應參之於厯則四時分至之候驗測之以乾象則日月五緯之度合獨反而求之於易不得其說乃以為四聖亦有未備必待已而後明也於是奮而為𤣥其數肇於一參於三成於九而極於八十一一者陽之數也積陽之極輕清而運於上者為天故八十一首以象周天之體太隂五緯俱麗乎天者也遲留伏逆參差不齊惟日一日一度無有餘缺日法既定則太隂五緯所纒之度皆可考故為七百二十九贊以象日行一嵗周天之度氣始於冬至辰始於子律始於黃鐘宿度始於牽牛而疏布其節候分杪於八十一首七百二十九贊之中終始迭運而不窮與先天氣運之序真有相合者而不知易已有之以為待已而後明則是於易學之未深矣或謂子雲善於模倣是書倣太初厯及京房卦氣夫太初漢人本厯自當用之房之書惟互換卦序分卦直日及四正六爻各主一氣為牽合無取若其十二辟卦次第雖羲文未之易也特房用之異爾子雲𤣥首顓言隂陽消息而深致意於盛衰勝負之際至其贊辭所斷吉凶又直以義理人事得失為言不雜於占驗小數此其意正與房反自劉向父子號為精逹隂陽視子雲不知何如而豈京氏之所敢擬哉故余嘗謂子雲是書雖不得先天之數與象而得其意其他得失先儒之論已備學者擇焉可也或曰象數亦有二乎曰有理則有氣有象則有數盈天地間皆象也因象起數皆可顯造化之體惟其所起有偏全故其顯於是者時有不神爾譬之萬物皆得造化之氣以生而有正者偏者通者塞者謂偏且塞者造化之氣不在是不可也易之與𤣥以是求之斯得之矣惠安張某維喬敘夀圖敘楓溪薛母孺人今年夀躋七十其子訓術師清輩以春三月率其子孫若勝衣能拜者以上繞膝為夀而內外宗之姻賔親屬咸㑹先正德丁丑母年甫六十始為夀夀則有圖繪歌詩文辭以章其盛自是嵗每一舉而未七十也故及今七十又加盛是圖所繪不於其稱觴戲彩而狀楓溪之山川景物竒峰翠岫清峭壁立形勢近逺錯落於筆墨濃淡之間溪流順委瑩徹湧而沫珠旋而波縠如石激而風約之雲烟吞吐青白互映飛鳥行空古松生態真有使人俯仰天地之髙深而欲托形於久逺者惟於其萱草碧桃然後知為寓意北堂之夀夫人子之事親先有孝敬之實在中則有奉養順適之節飾於外實至矣而節有不至者乎未有不篤於實而能飾其節者也飾而至於歌詩文辭又至於圖繪極矣然豈自外至者與曾子曰一草一木不以時伐之非孝也而君子蓋一舉足不敢忘乎親焉自其愛吾親者推之至於草木之不敢不以時伐自其謹吾身者推之舉足不忘而登髙臨深之不敢茍則夫山川景物之在目默而存之皆吾孝也又况深於孝者則其心和心和則氣和氣和則山川景物之和皆與心㑹夫是謂之至和而以夀其親天性之樂可勝言邪昔之人嘗有事親之心而其力與時不能副者屺岵莪杞之詩於其所感蓋有餘情焉若子兄弟之心與力既足相副矣而孺人夀考康强又能待而享之宜其寓意於是圖而有異昔人也雖然圖之所寓者意也禮言孝子之事有視聽於無形與聲又不待圖而後見者是在薛氏子孫自得之而已矣金臺别意圖序太學林君文秀既三年卒業將歸省其親於清溪之上出士大夫所為送别圖示豫豫方借僧舍一榻卧拙其中每浩歌屈子逺遊之章以自放釋其形神之纍若不知羈旅之為愁者及觀此圖則小山叢桂之思又不覺為之咨嗟感歎而不能已焉圖之廣不能四尺其縱得四之二凡江山煙雲林麓墟井以及草樹禽蟲之幽忽變化莫不曲盡其逺近大小斜直廣狹之狀而其攢蹙屈折寓於筆勢之所含蓄者蓋不知其所窮也則亦庶乎其效天下之大觀矣古之人有終身一室舉天下之物理而藴崇之者亦有足跡幾遍天下而猶不免為物役物一也蓋觀者神之而已矣即噓吸之微以驗變化之機存虛靈之用以通萬事之感斯為善觀物者則與萬物相忘於形器之表凡其至者皆為吾用而不窮不然雖其衣服飲食之近亦且由之而不察况於天下之物理其能以有所悟而自得其趣者與林君走八十里北遊學友天下之士而歸耳目之所及亦𢎞矣其亦實有所得而不為物役者乎歸而茂樹清泉之下試引此圖以自考焉或以為信或以為疑必有出於筆墨蹊徑之外而非豫之所及知者故為書其圖之端以問之而豫亦逺遊未歸者因并以自警焉南寧府志序南寧古雍州之地西通雲南南控交址近扼兩江溪洞之間嘗考圖經右江出雲南峩利州左江出交址廣源州而㑹於郡之合江鎮入鬱江以逹於海兩江之所包絡地方數千里大者為府次為州次為縣其最小者為長官司時平則南寧通其驛道一不幸稍有警動駐節轉餉亦必於南寧焉有事故欲經略兩江必自南寧始唐以雍州開都督府列於五管元和後廢之兼領於容管而有黃少卿之叛議者始追咎失策宋初經制未備一旦儂智髙竊發破州城沿江東下嶺外幾不可守及智髙平後乃分析其地以漸制之而雍州太守特兼經略安撫之號兩江無事者垂百年前世之利害可覩也往者余承乏廣西臬司督理學政凡符牒下兩江者率閲月乃逹幸而不沉沒折壞能以時覆報者十無二三蓋視南寧如在荒服視兩江溪洞不啻化外地愈逺則法制禁令之所及者多疏萌芽容養至於苞枿桀張乃駭而圖之亦其勢使然也夫古之剖置方州皆因山川形便與其道理逺近所宜故或因建瓴之勢以臨制上游或順臂指之義以控運四外要歸於建威銷萌以久治安而已若悉割兩江東包亷欽潯鬱以北盡乎宜栁之境屬之南寧使自為牧鎮此所謂臂指之義也則兩江溪洞可以馴服兩江既治雖以南略交址可也或曰如此則何以為廣西哉曰夫桂林故衡湘地也天文分野上屬翼軫九疑蒼梧之山形勢曼衍首起衡嶽腹蟠八桂而尾逹乎蒼梧湘灕二水分繞其下桂林據其上游若屋極然此所謂建瓴之勢也衡永邵道郴桂諸郡綴附廣西并故所轄桂昭陽三郡統之其封略故為不小矣今荆湖地理闊逺行部使者病於不能遍歷或議欲析而二之而衡湘間數郡嵗調兵食以給廣西蓋猶屬之也若舉而移之經制一定為服嶺安危計慮久逺宜無出於此者南寧故無志嘉靖丁酉冬吾友郭侯世重守郡乃創為之列三十六目釐為八卷既成問序於余故為書余所見者以告之蓋講畫山川形勢以制其厄塞利害志亦弗可略云八陳合變圖說序古之善制兵者未嘗不以陳法為先其所由來尚矣世傳風后握竒有其文而圖缺焉後人乃取諸葛孔明魚腹八陳以補之其法以八為列八八六十四陳又有遊兵二十四陳在六十四陳之後自陳夀以來皆謂孔明推演兵法作為此圖以某考之六十四陳者古法也周人本黃帝井田法而定軍賦自四井之邑積至六十四井之丘則出兵車一乘士卒衣器備具為百乘者六千四百井為千乘者六萬四千井為萬乘者六十四萬井以八約之為八者八八其八則為六十四其制數與兵法同大司馬大搜狩之禮云如戰之陳又云戒衆庶習戰法蓋即此也周衰井田法壞而搜狩講武之禮亦廢獨所謂陳法者兵家尚習而用之漢制天子常以立秋之日親斬牲名曰貙膢以賜武官習孫吳兵法六十四陳至建安末年曹孟德亦講求其法而行之然又以六十四陳為出於孫吳也則三代寓兵訓民之本意漢時已失其傳矣夫不得其本意而雜用權變以取勝於天下術益竒其為禍亦益以熾烈孫吳孟德是也及至不得已而用之以救亂安民則其分合竒正之變亦安可不擇其善者而素講之哉魚腹陳圖世多有而演繹翻變以求合於天地風雲龍虎鳥蛇之說某所見者凡數家為法各異嘉靖已亥夏六月侍御湛塘王君奉璽書清戎兩浙出其八陳合變圖說以示藩臬諸司蓋取故都憲東萊藍公舊本稍為訂定發揮前此談八陳未有能及之者夫兵之合也欲其至靜而不可亂及變而應敵也欲其至神而不可測如人耳目四肢兩兩相比以成形而心制乎其中心有所感耳目四肢各隨所感以赴之而用每不同故曰如山之苞如川之流綿綿翼翼不測不克此三代節制之師也八陳者豈非其遺法歟與後世一切設詐出竒以詭遇於一勝者殊絶矣侍御君既敘其意命刋布諸武官使各以是法訓練而某特為推其法之所從來者如此若夫分合竒正之變則本圖說盡矣兹故弗及云江西貢士同年録序科貢皆取士正途而貢法於古意尤近後推行寖失初意科目所舉日盛而貢則似以為科目之遺而設士之由是以進者亦不免自小其途以為有歉於科法之初豈然哉夫所貴乎士者謂能學古人之道而進必以正也古者四十始仕又有過焉者其仕者或終身名一官以有聞於後惟其學有所得而其進以正故終身成就不肯以是自小蓋其道若此嘉靖癸卯江右嵗貢士若干人為私録以志同進以余嘗提學於此來請序余於諸士力不能挽之使速進猶幸其正而近於古也故為是言以慰而勉之然事之近古而推行寖失初意者豈但兹一事哉此又余之所深歎也東泉文集敘東泉先生姚公𢎞治正德中文章為一時所推而不以文士自命乙亥冬某侍公於閩藩講問之暇頗及文字公曰文非專不工然學者所當為事尚多奚必專於其文哉語既又顧某曰子他日當别有所就亦不必滯心於此某悚然不敢卒請退而私記於心者三十餘年矣中間踪跡浮沉無由再侍公教而尺書臨示敦勉每加庚子秋參政浙江公墓木已拱嗣子學士惟東繼喪家遭回祿索遺稿於仲氏汲散逸無完編蓋為盡然霣涕乃屬公壻吾同年湖廣憲副王君時化收拾彚次越六年丙午寄至蒼梧又閲督撫故牘得其總制時奏疏文移數篇合為巨帙請户部郎桂山馮君世立讎校得可傳者一百五十餘篇分為八卷公雖不以是自命其閎傑正大之氣練逹綜核之才欎然溢於筆墨問如洪鐘大吕竲竑震亮徐而觀之其紓疾開闔抑揚俯仰又莫不中乎節奏所謂實大而聲自宏者歟非茍言也古之君子自丙魏姚宋至韓富諸公非無文章也功烈懋盛故不以文章稱然其奏篇之流傳至今者舂容深切亦非一時能言之士所及公蚤負經濟大略視古人為何如中頗偃蹇晚乃遭際由中臺出握邊符屢奏膚功工堯之捷崑崙關後僅一再見而媢嫉朋比震驚聽聞賴天子明聖察孤忠於羣誣之中始終保全最後起臨三邊駸駸大用而鑿枘齟齬竟不能盡合而歸功烈既不能如古人之盛其文章可傳者又止此有志之士所以為公感歎發憤而不能自已也雖然中世卿大夫於其去就之際能完粹無議者鮮矣不合而去不足為病所病或合不以道至無以潔其去為可愧耳則公之用盡與不盡亦安能為公損益邪某少以文字受知於公而公所以知之又有出文字之外者老大無似未能副公拳拳期豫之意往叨廣西提學及今督撫皆繼公舊蹟於公條章約束又未能一一有以推行俯仰深恩大懼墜失惟有論次學術事業及所遺文字以時傳布庶後之尚論公者有以髣佛其閎傑正大練逹綜核之實不肖於感慕之餘時取以自厲則亦不為無補焉嗚呼是亦可慨也夫集後附桂林南寧生祠二記記中已有者兹不復出云秬洲文集敘文章髙下繫乎人之所養養盛者其發為文章如至人之息以踵而聲由於丹田神用不匱而應變無方長短大小惟其所至而止揚子雲曰虞夏之書渾渾爾商書灝灝爾周書噩噩爾三代道化之醇其見於文章者如此秦漢而後氣化寖醨矣然其卓然爾雅者亦自名家今世操觚之士莫不凌跨唐宋欲追作者於秦漢之上搜獵鍛鍊類以難讀不易曉為工其弊也浮華而乏滋味其誕者則又指切端緒超然於言語文字之表以自附於所謂心學者其術彌髙其為浮華巧曲亦益以甚二者蓋皆失之鐵橋黃先生以文章名家某往嘗受其所著秬洲集而卒業焉渾雄而不浮詳瞻而有則其筆力步驟追逐古作者與之上下而非有意於求似也其辨析事情該貫物理至於是非邪正興衰理亂之際反覆懇切務為實用蓋終篇有餘心焉讀其文可知其中所養也先生資禀徑特材猷宏逹進不獲盡施於時退居而靜養林下者二十餘年矣杜門却掃非其人不茍接也其於義理學問如饑渴飲食然至老不衰豈非剛方自信者與而文章亦復類其為人兹所以可傳也已昔蘇子瞻懷其父老泉之訓深有取於鳬繹先生之文謂其無枝辭遊談而有前輩典刑也鳬繹豈先生比哉後之君子有興世變之思而欲挹前輩流風於數十年之前又安知不三復歎息於斯集也夫儲政志敘邇者北邊嵗有警報聖天子慨然患將帥之不得人與防邊之備或缺思得豪雋不羣之才與共圖之於是內外小大臣工莫不精白一心以祇承德意忠言至計日以上聞矣然余竊怪國家備邊幾二百年必有一定不易之規可以垂諸久逺者惜余未之見也職方正郎褚子光楚嘗以户部郎督餉大同職務之餘考究兵食源流與其出入竒贏之數如振明以照不爽錙銖又及關隘之險易屯戍烽堠之近逺大小兵馬多寡萃為一書觀者便焉蓋地險定然後可以制兵兵制定而後可以制食兵與險稱食與兵稱法相因而成所謂一定不可易者然法久不能無弊弊則為之講求其故以通之偏者正缺者補賞罰功過黜陟賢不肖竒正分合應變於無方又所以經緯乎其間而亦莫非法之不可易者顧行之存乎其人爾抑禇子之為是書其於守法思弊之慮精矣至所謂時弊將弊者則又隱憂浩歎若有不盡之憤豈其書之所論乃常法尚有法外之意非書所能盡者乎天子夢想豪雋不羣之材與共圖邊事褚子當是時應職方氏之選其任匪輕也為其職與力之所能為者其所不能為者其書存必有能推其意為天子言之褚子之讜議施於邊疆者寧有窮乎余幸獲見是書因推其意為之敘云小山類稿卷十一
