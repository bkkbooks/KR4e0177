body:
  text: 小山類稿卷十四明張嶽撰記交翠亭記南京大理評事次崖林君茂貞卜宅于都城之東北隅某往造焉度石橋循流水立馬楊隂下叩門久之始覺有人聲蓋雖直闉闍而幽邃僻靜車馬弗喧殆類山林有道之士所以逺俗而全其貞者焉乃闢其東夾室以為小齋蓄古今經傳子史數十種外接廳事之霤舊亭稍完葺之亭外隙地數步藩以竹􅓗雜蒔花卉蔬果四時生意盎如也次崖祥刑之暇退坐是亭默驗天理流行之機亦有與之相契者乃取交翠之語名之法濓溪也夫濓溪之學已極于明通公溥之妙矣而日用之間即事即物所以體驗涵泳此心者又如此固非初學之所敢議然即所謂自家意思者而深思之亦可悟求仁之端矣孟子曰仁人心也乍見孺子入井皆有惻隱之心夜氣之所息則平旦之好惡與人相近心之本體妙用隨在昭著惻隱發乎其動者也夜氣存乎其靜者也皆所謂自家意思者也默而識之操存而擴充之湛湛乎生意遍九垓而無不之者也獨窗前之草與之相契也哉雖然此與異端所爭者毫末之間爾察之不精求之太驟則陷于揣度作用而從容自得之意微矣次崖讀古人書慕聖賢之道優遊弗舍務反諸躬其評獄大理也每以洗寃澤物為已責亦有濂溪意思某知其必無是失而亦不敢不告雅菴記正德庚辰秋家君將赴官英德過金陵進不肖嶽膝下而命之曰漳浦林先生寧藩審理逮事寧先君某王翼乎其容論諍猷為必依于古誼不為曲從茍合王重之每有儒雅之褒及後王德不類即致仕歸以雅菴自號曰是寧先王所以教也今老且病矣敢以後人廢前之美先生嘗與我言欲汝為之記小子念之而祖父有大故于洪都微先生幾不克殯吾欲報未能以望汝又未能雖然待諸外焉以報吾父子無時可能也語言文字汝或勉焉夫辭不必侈惟其核不必工要其心盡焉可無憾也小子念之嶽拜受退因思是年夏嘗以家君命敘先生宗譜於所謂儒雅者亦微發其梗概矣抑因是有感焉班孟堅漢書述王交王戊之所以存亡而反覆於穆生之去就夫醴酒之為恭怠甚微也奚遽決其去就若是哉穆生固言之矣為道故也以道為去就嗟乎儒者求聖人之道以蓄諸心而其進退從違非有關於存亡之數亦茍焉而已矣然則是雅菴也亦醴酒也能有為之推而附諸穆生得無有同者歟惜哉世未有孟堅而某言又無以信也先生名塤字某起家太學生其致而歸也以年例進長史一齋記五溪豐先生名其燕居之室曰一齋先生起家進士及第踐厯禁苑餘二十年遂掌玉堂之篆身榮且貴矣俄而國家有大議論先生議不合則率官伏闕下痛哭極諫天子以為狂妄不祥斥戍閩海居且七年常獨居一室其湛然默乎其中者日益虛靜其充然發見于外者日益和粹其靜觀天下之理而自得之者又日益精察而有條蓋其學之所至不以富貴貧賤患難而易其守可謂致一之極矣而名齋之意拳拳不忘又以下問承學之士如不肖者俾説其大義蓋嘗聞之自精一之訓見于虞書而伊尹之告其君亦有協于克一之言百世之下唯顔子之學為足以及之故夫子語以克已復禮而決其幾於視聽言動之間所謂一者何也天之理也典禮命討皆天也其體則具于心是故必視聽言動之皆由于禮然後可語典禮命討之皆出于天體驗之未精培養之未厚本原之地反而求之有不勝夫蔽且雜也而欲和衷懋政以一天下之動不幾于自誣其天也歟嗟夫學之不講久矣堯舜禹伊尹孔顔之心其終不傳矣乎某學不知道固未免於所謂蔽且離者豈能出毫髮意見以發明名齋之意而况先生之高明切實又非有待愚言者故竊推典禮命討之所自出以見先生之學之至於是也雖越在嶺南之外其有繫夫天下之萬變者無端倪也若夫主一之功則先生之所自為者備矣某小子終奚能言是為記一峯羅先生書院記故翰林修撰一峯羅先生初入仕即上疏數千言論大學士李公不當起復落職提舉泉南市舶司未幾召回守資南都即浩然棄歸天下既聞其風而高之比歸杜門講學不以世事屑意而尤嚴其節于辭受取舍之際俊偉明白必欲得其本心而後已故久之而天下益信服焉嘉靖己丑春按察副使萬安郭公持平巡厯至泉以先生嘗謫居于是也而尸祝之典未舉維時郡守顧侯可久以入覲去乃謀别駕李侯文節推徐侯照得城北叢祠一區請于巡按御史聶公豹斥去昏淫之鬼因舊材稍易蠧壞悉以堅良以三月朔日率郡之人士奉先生神主而舍奠焉既又治其齋居講堂下及庖湢之屬凡為屋四十間有竒擇士之有志者居之延鄉進士王宣顓職其教是夏顧侯及晉江大尹錢君某至自京師則教士續食之法講求益備而書院之傳可以久而不廢矣夫以先生風烈之盛去之千百載聞其風者猶將低徊嚮慕不能自已而况神靈精爽眷臨茲宇登降出入如將見之有不反身警惕求無愧于先生之心者乎孟子曰無為其所不為無欲其所不欲如此而已矣而推其所為所欲之類至于穿窬同科夫士者之不為穿窬必矣孟子復云爾者幾微審察之間一有未至其陷溺必至是爾是故人茍得其本心也雖呼爾蹴爾之不受乞人行道之人之心與不受千駟萬鍾者無以異也如其茍焉以遷就于功利而已則桓文之所以扶義而伯良平之所以挾術而謀亦何以異于穿窬者哉此其得失必有能辨之者先生所以寧終其身困約而不肯少貶以徇流俗者其不以是歟世或言起復之事李公入疏辭者十七八矣最後乃屬先生先生辭不宛曲若有負李公者是不然夫事之不得乎理而冒為之者使出于庸人與小人中材以下皆得以指摘而議之唯其不幸出于賢者復有賢者為之諱其失而回互之則是非反易人心無所折衷其流弊可勝言哉嗚呼此先生之所深憂也亦唯求得其本心而已矣故并述之以告吾黨之學者瓊山薛氏祭田記惠安司訓薛君有孚出其先世譜牒示余自始祖而下各有田以供祀事歲入有常數有孚又為考據禮書正其籩豆牢醴奠獻祀號之事豐不及褻而儉不至慢度可世以為常者行于家故薛自始遷至于今百數十年大宗之祀世相承也其親未盡之祖與夫主祧而墓存者皆不廢祀寧非以有是田也哉夫子孫之于祖考莫不有無窮不已之心而力或有限先王知其如此仕者既有常祿矣又賦之田以祭而蠲其征若士庶人之無田者則為之節而薦薦者謂不筮日筮尸取諸時物所有其禮亦云略矣然士薦用特豚而春韭夏麥秋黍冬稻各有其物則又未嘗茍也近世所定家祭禮儀大率通貴賤得行之較其豐儉之宜若無能加于特豚之薦者亦可謂費省而易舉矣然士大夫家每病於難行者豈非祿田之法既壞力固有所限不克以副其心邪先王之禮廢絶不講可歎也已薛瓊山大族纍世之田每增有孚慮其久或堙墜將標其封候畝步之廣狹多寡附譜以傳而請豫記其事夫禮失而求諸野野猶有取也况今士大夫家由義起禮以敦孝敬而不失先王之意若祭田云者可無其説乎故為本夫禮意書之以告薛之後人濟寧新亭記比年河水泛溢都水歲調吏卒起隄防救水費以巨萬計水至隄輒壞不能支而患愈甚乃十一年春御史中丞梁岡戴公奉璽書來理河事公之策則不然其言曰往者河水東南流經梁宋入淮其别流由故汴道過彭城下吕梁背出南清河以與之會二水分流故徐沛以北無水憂已而彭城流絶梁宋經流之道又弗利河始騰蹙而上環曹濟徐沛數百里滙為水區未幾年也夫不深求所以泛溢之故區區增修隄防恃數尺之土以捍洶湧之勢宜其激之而反甚也又曰徐沛以北地勢高於以分道殺水力為易水乘髙趨下自淮入海道逺又漫且隘不有以分披之則淮浦之患方始爾是年秋公策水將至先浚故汴道視常水患所及果減去二三議以冬初水落冰未堅大徵役悉理諸經流之淤淺者又以餘力經畫淮浦疏其入海之道蓋公之持論及與所施為次第如此濟寧為公治所南郭外少東直城闉舊有亭以為燕勞賓客之所公病其隘也命有司拓而大之池臺亭館具備其燕賓之堂題以江湖廊廟四大字而扁堂上小亭曰後樂他日某自京師道濟過公公觴于堂中酒酣移席臺上憑欄四望慨然語曰子知吾所以名亭之意乎盍記之某謂公固分廟堂之憂以來者也功既有緒矣乃又退託于江湖之逺若不勝夫憂且慮者其微意可遽測哉漢儒談災異或以河溢為隂氣盛盛極反亢故水不潤下而逆行為説迂鑿不切事情亦不可謂無是理然未易言也公之職河為重其憂當惟河為切某故詳其重且切者以見公于職事盡心如此且俾後之人有考也漳浦鄭尹善政記辛卯春余始識括蒼鄭君宗慶于京師君故浙東知名士有志操居京師不妄見人獨余與見相好也君好論天下事以為今人事不足為法士當法古人古人擅所長名世者多矣不能盡法要當法其心心茍誠于義矣其識見才猷有弗由義以行者乎弗誠于義而有是才識也秖以飾其弗誠而已蓋余所熟聞於君者如此是時君已領漳浦之命將抵任余嘗私持君議論以默觀其為政明年壬辰冬余自廣右入覲南歸則聞漳浦人頌君美政大約如與余言者始邑人尚氣輕生有小忿輒自毒以誣人前後令長屢為禁約而不能止君至悉理出受誣者反抵誣人之家以罪於是遂相戒不敢為邑境土既析十分之四為詔安縣矣而繇役猶兼任如故君言繇役出于丁田不當以新故縣有所增損屢與上官言民重困可哀乃得條減四十餘繇不事歲所省以千計君為政以愛養民力變化風俗敦節行崇名教為急其利惠纖悉皆思有以及人是非可否務以自信其心不為曲從茍止以媚説上下故條貫皆有可觀推其意可以持之數十年而利其見於邑人稱頌者甚多而余所舉二事尤其大較章著者初君始為是邑或有慮其迂及其既為復有病其矯而欲撓之者久乃莫不歎服蓋流俗之溺人深矣事必反求本心似迂不便文以諧俗似矯自古儒者皆蒙此名奚獨君哉詔安令何君某聞君能禁自毒欲刻其事以傳君聞而止之而君之士民雅菴林長史輩頌君美政者亦欲傳示久逺則相率來請余文不置由是觀之茍誠于義而篤自信焉則人信之矣君事是已故為敘述以答邑人之意云鄭孝子祠記孝子名韺字汝明廉之石康縣海岸鄉梁村人父賜正統初以春秋魁嶺南鄉試仕蒼梧縣訓導母謝氏孝子生而穎俊未弱冠為人賦梅月雙清駿馬圖二詩句語警拔長老皆嗟異之賜卒于任謝挈喪與孝子兄弟還鄉天順壬午年流賊起廣西延入郡境破石康縣治至四出為暴掠人口苦繫之以質取其貨不得皆殺之謝在掠中孝子哀痛辭兄弟挺身入賊營紿賊曰吾欲丐母命豈敢靳貨貨吾母手藏必以吾代釋吾母歸取之吾在此母決不忍不以貨來也賊信之釋謝孝子既免其母而家實無從于得貨留賊已而賊為官軍所逼移營至遂溪縣拜臺村以前語詰孝子遂遇害賊平後耆民沈昱等狀孝子事迹于石康縣表章之會縣廢事寢嘉靖丙申余行部至永安距梁村不逺聞孝子事亟索二詩讀之果警拔不凡又訪其家得沈昱等狀草一篇為可信據無疑梁村故有社學一區始自前元時其後屢興屢廢至孝子之父兄復繼葺之以教鄉人之子弟孝子幼肄業焉近又廢乃請于巡按御史陳公大用即其地立屋二間各有翼室前為講堂其後以祠孝子復於永安城內為牌樓大書烈孝二字揭示通衢蓋孝子之死於今幾百年矣一旦振發而暴著如此豈非一念精誠通于天地鬼神與百世之人心固有密相為感者邪方其奮身詣賊志在存母而已母得全而身已死其孔子所謂求仁而得仁者與梁村濱海去郡城二百餘里時有科第而人之景慕孝子也尤至深屋而祠之不但以發孝子之幽烈也又使後人知能盡性蹈義以死者雖窮海之濱百歲之逺終不致於泯沒無聞中材以下或有勸而益勉于善其繫世教亦豈淺哉重建永平巡檢司記故石康縣之永平信立永豐歸德四鄉在縣治東北斜入廣西界中環匝百餘里深阻而多逋逃舊設巡檢司以禁詰之又度地據險立營為木閘以鎖諸隘在永平者曰平原營楓木閘其外距博白之西鄉雲廬諸山在永豐者曰木頭橫嶺營樟木閘其外距鬱林之富民興業之興德二鄉大桂諸山曰沙尾營康樂閘其外距興業之懷南里在信立者曰馬頭營深水閘其外距橫之端峯里而歸德之城隍營泰山閘正當咽喉之處蓋其地外束而中寬如世所傳葫蘆形者自城隍以北逾嶺二十里至康樂閘則博白之狼麗江出焉合永平之黃藤漆桐二江北入貴之薌江與大江合蓋廉之水皆南流入海此數小水者獨背郡以北其形勢氣脈若與郡不相聨絡者故往往能為冦孽以梗吏治然其地山髙氣深美田疇斬山為業饒于竹木穀米射獵之利春夏間江水生筏浮舟運以下蒼梧南海者不可勝計亦茲郡一奧區也成化二三年斷藤峽冦作破潯貴鬱白轉入郡境先蹂數鄉然後石康不守而郡城亦以殘破當是時使先賊未至命一驍將將軍軍永平以扼路賊未必敢入就入亦必旁畏牽掣未敢長驅縱掠其禍若當時之烈也豈非數哉其後寧謐日久流氓漸歸舊荒田日益墾治宜為之稽稅籍正疆界分别主客戶立保伍之法以約束之庶幾可使其尊吏畏法比近地而以懸逺莫之省慮逮其爭而訟訟纍年不能決至相仇恨殺奪不能制然後草剃而禽獮之至無類乃止蓋自成化𢎞治以來如是者數矣最後甚不得已乃棄以畀狼兵此所謂引豺狼以守藩籬而欲與之俱安胡可恃也初石康既破不能縣省入合浦其四鄉者亦併為歸德一鄉巡檢司寄寓無常處𢎞治元年移寓靈山石隆堡僅存空名而已嘉靖十三年甲午巡檢郭盛千夫長寧文聰求故司舊迹得于永平村請復建廨宇徙居之又漸葺故營閘以聨絡其聲勢議上府府為申議報諸司其費與力盛與文聰率鄉民相勸為之官府不與焉其明年乙未秋八月余抵郡而工適訖功兩人者以記來請余諾之未暇為也又明年丁酉盛秩滿去後一年文聰亦死余復檄其子令長千夫其冬有浙學之命將行矣念既許此兩人不可以生死去留而遂易之乃備書始末付署事義民林中鳯刻石以成此兩人之志云信芳亭記雷州西湖之勝聞于海北然縉紳南遊過雷州若不知有是湖者蓋凡湖山以勝名則必帶林麓窮巖壑有宫室亭榭之觀而前世又有髙人逸士留故事以傳如杭之西湖越之鑑湖然後其名始盛而遊者踵至茲湖皆不能挾而有之獨其渾涵瀲淡吞吐萬象與海上雲日相澄輝於遐荒杳靄之表則非意趣悠逺不以竒麗𢎞富求山川者亦不能屢至而自得也嘉靖己亥石盟孟子雷謫二雷州始則湖心小島纍土增髙作亭以臨湖亭成未及名而孟子遷去又三年為壬寅春僉憲夢山翁子溥巡厯至雷遊斯亭而愛之榱桷瓴甓已有壞者為繕葺開拓加煥飾焉而余與參戎鳯山劉子經適以事至雷翁子以其暇日觴余二人于亭上酒酣憑欄四望慨然歎曰賀知章林和靖死天下湖山無真主人久矣其不幸據都會之盛日酣于笙歌羅綺又不幸則為勢家之所據奪欲如茲湖之淪於遐逺而全其真胡可得哉試自亭而望東阻城闉西蘸冦祠其南則走朱崖之路也昔之君子蓋有抱忠懷潔走朱崖萬里至于僦屋躬耕九死而不悔當其時豈有待于後世之名哉卒其所以名者諸君子蓋不與也士患不學無以自信爾既學矣而有以自信雖無以盡知于人必有以獨知於天者周公之聖而不恱于召公七十二子于夫子亦不能盡知也故曰知我者其天乎夫以聖賢之徒同堂合席猶且若是况于以逺外之身逡巡末俗而欲俯仰脂韋以求聲光於上下不亦重愧斯亭而可悲哉余與劉子矍然竦聽復命酒酣飲因取離騷所謂余情信芳者以名斯亭既名而去猶覺湖光之入夢寐也東泉姚公祠堂記古者學官天子始命為教必釋奠于先聖先師其四時於先師又率學者奠於所教之地樂於瞽宗書於上庠詩於東序其禮專而且數説者謂先聖道尊先師分親故祭有疏數之不同如郊廟然然所謂先師者皆身備道德又能自達于一藝生以藝教學者沒則為之俎豆以報之古人師弟子始終之間恩義兼至如此聖人著於禮經蓋以為天之所敘而非人情所強為也後世釋奠禮廢唐以後始以孔顔為先聖先師通祀天下而學校之師名存實喪泛泛焉以名位相維繫而已其德行道藝既無以相成又安能使之終始恩義而思所以報之如瞽宗之祭也哉千數百年惟文翁安定二祠於今為烈而教亦弗傳可慨也已故兵部尚書東泉姚公先生𢎞治癸亥冬由禮部員外郎出僉憲廣右提督學政始至慨然以振作人文變易習俗為已責諄諄誨誘晨夕不倦其條規甚嚴而科級有序其道自程朱以達于孔孟其法自事親從兄進趨揖讓誦數講説巨細畢備其大要以反身踐履為本凡時尚之浮華詭誕不稽於聖者一切屏去不使雜學者耳目其心地光明誠意懇切感發化導又有出于言語條約之外者故一時學者翕然敬信而推其盛以為雖蘇湖在當時不是過也正德丁卯丁內艱去學者皇皇如有所失比服除詔還公廣右又一年乃遷憲副督學閩中而廣右學者思之不置己卯相率即宣成書院之左建祠肖公像其中朝夕瞻依宣成書院亦公所建以祠南軒張宣公東萊吕成公其隂為提學公署公嘗於其傍作五經號舍以棲學者於此祠公即古者祠先師於所教之地之意也抑又聞公在廣西不但明教法以淑學者之心其於飢寒疾痛視之如已貧者喪者婚娶之無資與逺方來學者咸有所給其恩義兼至真不啻如家人父子去今數十年咨嗟感慕常如一日而豈聲音笑貌所能強合也哉師教之恩古人推其重至與君父等而又以為君臣父子之倫賴是以立瞽宗上庠東序特六藝之一師耳其祭猶且專而且數如彼况身備道德教澤覃于一方者庸能已邪數十年已往之師且不能忘焉則夫生我食我昊天罔極推此心以往其不淟涊陷溺以至遺親而後其君也必矣師道之植人極如此廣右學者其尚能講明而敦守之則公之教與此祠雖與文翁安定同一不朽可也湖廣方伯桂林徐君公髙第弟子作祠時與學者劉廷敘輩共議經始者謂祠久未有記公督學閩海某嘗供灑掃門下知公為詳書來徵文某不敢辭也然公去後十餘年復以都御史提督百粵夷亂安民當大書特書而此祠乃學者所立故特為詳其督學時事至夷難大功敬當别為論著云徐君名乾字健父尚志書院記廉州府學舊在城東北隅縣學附其左左逼城垣右瀕故濠庳湫敝陋學官弟子屢以為病圖遷未果余守郡時乃為兩遷之縣學于城外之南屯府學于城內東南朱砂岡之陽因老氏宫拓治之而稍葺舊學為有司歲時拜表習禮之所然府學改遷未幾余即奉命兩浙督學廟廷規制與夫講堂齋舍廨宇之類未及備為而去其後又閲兩太守雖嘗為之竟未克備甲辰冬今太守胡君鰲首重學政既修學如制矣又患弟子日增齋舍不能容則因故府學增修以為書院中闢講堂旁列齋舍講堂後為會食之堂又其後為庋書之閣門庭塗徑沈邃嚴整于是兩學之士進則瞻依夫子廟庭升降揖讓于階序之間禮法肅然也退而藏修于此又得屏紛囂一思慮親師取友無異物以遷其業其餼廩膏燭之費咸有所給不以纍乎其私其于學也真可以不勞而能矣所患者惟恐志有不立無以實其功爾夫古人入學之初即欲明明德于天下其所志之髙且逺如此要其所以用功惟欲格致誠正以修其身其曰欲之云者一念為主于中如飢之欲食渴之欲飲不得所欲不已夫子十五志學所志即此欲也又以恥惡衣惡食為志道者深戒所志所恥學者可以反求諸心而審其從違之端矣夫志於所不可不志則反身有力積其功用以至明明德於天下非由外也恥其所不當恥徇私襲取之弊則雖至于行一不義而得天下必且隱忍為之嗚呼嚴矣今學者之所志而欲者果何事邪其亦有同於古人乎其否也必思有以易之易之之方莫若亟去所不當恥之恥不恥則不求不求則此志無所封蔽搖奪如初奮之雷驟決之水果敢堅定其進而達于古人之學孰能禦之胡守既成茲役狀其事來白且請揭之嘉名以昭示學者余為名曰尚志書院蓋學莫先于庠序道莫備于聖賢今之士其操術非不正也志有不端所操之術適以濟其私心而誤天下國家者有之矣茍顧名思義常惕然警省于心焉則書院之所資于學力者豈淺乎哉鎮海樓記廣東海邦也其會城故治番禺自漢以來號稱都會我國家臨制宇內幅員萬里因嶺海以為金湯是邦隱然實當管鑰之寄城內北偏有山曰粵秀拔地二十餘丈國初天兵南下列郡既聽受約束守將永嘉朱侯亮祖始作樓五層以冠山巔曰鎮海樓成而會城之形勢益壯其後樓漸圮成化中總督都御史襄毅韓公命有司修完之比燼于火亟圖再作以費巨力艱持弗決者纍年嘉靖甲辰提督尚書蔡公經巡按御史陳君儲秀折衷羣議出帑金二千二百有竒以為木石瓦甓丹漆僦傭之費選用能吏稽董工程以明年乙巳閏月興工既而蔡公去余來代之陳君去御史楊君以誠代之越又明年丅未正月朔工告成規制如舊而閎偉壯麗視舊有加樓前為亭曰仰高左右兩端跨衢為華表左曰駕鰲右曰飛蜃舊所無也方樓之未作也環海百萬家嬌首齎嗟若失所負及其既作重簷飛閣逈出雲霄以臨北戶羣山內向大海浩渺如免者之冠痿者之起凡海邦之形勝精神有不迅張翕沓以赴茲樓者乎昔我太祖皇帝以丙午丁未歲命大將帥師北伐是歲又以偏師徇嶺外然後天下合于一樓於是乎始作列聖繼統昭受休烈至我皇上稽古重光禮文煥然樓之廢而復興也又適值于斯時蓋斗綱之端貫營室織女以指牽牛之初粵所分星也其日丙丁其辰午未其方宿為朱鳥之精文明之象氣數參會有足徵者斯樓之成豈徒抗形勝於一邦實所以章我國家一統休明之盛元元本本明示得意於無窮也書稱有虞氏之治曰帝光天之下至于海隅蒼生萬邦黎獻共惟帝臣亦必以是為盛當其時陽德昭融雖海隅之逺為其臣者莫不靖共一心以敬承上德無一毫隂濁以翳其間蓋其君臣之際如此今吏而食於嶺外者冠蓋相接也登髙騁望寧獨無帝臣之感矣乎夫茍目前之安而忽逺圖蔽于一方而不知有政理之要風俗之本此徇祿之臣非體國者也撤去戶牖之私獨觀消息之原不以逺自肆不以位自畫一食息一起居無一念不屬于君父其于政理之要風俗之本為之必盡其方而又擴之以廣大持之於久逺精粹明白夙夜匪懈庶幾于古所謂黎獻者于以登降俯仰此樓豈不有光而無愧也哉故書以告後之君子刻石小山刻石小山在五公北麓前挹平蕪後負列嶂大帽盤紆於其左輞海灣環於其右嘉靖己丑冬余始遷自香山下結屋居焉諸葛長嘯之廬司馬獨樂之園古人髙風匪余敢望若夫山川幽曠景物鮮澄仰觀于山則雲蘿發興俯狎于野則魚鳥會心盼北極于中霄結殷念于千載雖古人可作未必不同斯抱也屋成歌小山叢桂之章以落之遂書其所以勒于山石以諗來者前進士淨峯道人張某維喬父書平魚窩刻石聖天子臨御二十四年為嘉靖乙巳春詔提督兩廣軍務都察院右副都御史張嶽總兵官征蠻將軍平江伯陳圭征剿馬平縣五都諸蠻蠻據危險為巢以十數大者五六百人小不下二三百多儲蓄歲以防征秋八月徵兵悉會龍城分為三道右參政鄭絅監參將戚振統南丹兵由中道以向魚窩雷巖同艮北岸左參議趙崇信監參將孫繼武統那地兵由東道以向馬鞍平田北册洛滿南團口巢副使魏良輔監都指揮李霽統東蘭兵由西道以向都博髙桅龍船九月丁卯諸軍按道分攻雷巖北岸平田北册洛滿都博克之遂進圍魚窩馬鞍髙桅諸巢冬十一月幕府至自蒼梧廣東右參政張烜從至留參謀畫又檄副總兵程鑒馳入兼統諸軍晝夜督戰攻技並設無遺巧賊亦隨方為備明年丙午春三月僉謀緩攻以弛賊備撤圍若去之已而復乘之各募敢死士緣石壁夜登奪其險狹據之諸軍以楯相擁翼繼登戰于狹中又戰于支頂且戰且登遂至絶頂火炮矢刃迅激交發呼聲震山谷夏四月甲午馬鞍破丙午魚窩破魚窩者尤險惡自國初以來凡四攻弗克至是與馬鞍俱破蠻中震恐俄而髙桅同艮諸巢破因撫輯餘黨分兵屯守護旁近居民耕種遂班師是役也自秋徂夏嶺外行師未有若是久者而將士效命謀猷審壯異論莫能譁久益奮厲迄用有成功以仰副聖天子詔命是月幕府移駐栁城既又至千蔓周觀營壘閲諸將功最敘刻于崖石山可夷石可砥惟天子威靈彰播遐邇億萬千年永永無已小山類稿卷十四
