body:
  text: 小山類稿卷九明張嶽撰書四瓊黎事江右事鄖事粵事與蔡半洲督府以下瓊黎事崖陵之役數年之前若有人申禁令明賞罰鋤強扶弱以漸制之其勢可以不至今日而積習蠧壞至于今日其勢已極雖欲不為是舉不可得已中哨地廣各賊散處惟羅活最大初擬四哨並進今恐勢分力弱合諸軍萃於羅活羅活既破據其心腹其餘諸洞如四支無有不披靡者縱使逺遁隨其所往而窮搜之可以盡擒南閭一哨預設以為開通十字路之計既平諸洞進逼五指山下隨山刋木取徑路與南閭會則崖瓊儋萬之血脈始流通在前只為州縣環繞海旁而黎深據中間地形便利先為所得乘便出入客反為主故賊勢猖獗積成膏肓前輩論者以為其要在開十字路是也但兵難預料且須勉為之儻事勢阻礙則又當别處耳崖州去賊巢三日調度為難牙力柵稍完某暫此駐劄又聞羅活地勢廣闊田土肥美既平之後虛棄不治則復為賊藪若招撫流民分兵屯種設立衙門控制要害此皆不容己者候經畫稍有次第乃敢具請伏乞照察又征黎之役初意動調土兵掃穴深入功可指日而成及入山之後親歷地方山嶺疊峻林菁密刺賊巢雖破而所在屯結皆據髙臨下弓箭悍徑土兵斃於箭者頗多蓋從前講論征黎皆在外面遙度而實未有真得其中險徑之實者信行之而後艱也本哨應剿賊六千餘徒兵入賊巢已四十日所獲僅一千八百名顆其屯結深林與原圖册該載不盡者尚無慮數千人剿之則我進彼退誘入深暗而箭徑可畏撫之則疑信相半旁相恐脅而未肯盡來惟有占據要害持以日月廣布耳目擇利而進庶幾平日稔惡者可以漸次就擒不至於幸免詿誤願降者亦可使之心服而不復為非又本哨羅活德霞抱宥等洞四圍皆峻嶺茂林中間一假五六十里寬衍平曠其外將出崖州又復鎖以險徑此乃賊千百年窟穴有田可食有險可恃所資以稔惡者查得左右二哨郎溫等洞地勢大扺相似若不乘此兵勢建立衙門屯兵控扼漸招各處無田小民住種填實則兵退之後必復棄以與夷前功盡棄且深後患似為未便其合行事宜一面會行經略候稍成次第詳具畫一利害呈請先此稟聞伏乞裁照與商少峰兵憲使至省書知車從將扺雷陽相去不逺教言易於拜受甚幸甚幸向日擬不肖為左哨與右哨俱在陵水如兩臂然其山川道路險易因得并考之略知曲折小大地圖鄉道册俱取在此數日所費力者糧餉并軍前合用事宜頗有次第但海南法弛吏玩為日已久鞭朴枷杻呵叱之政日施殊損道心爾奈何陵水去賊巢不逺右哨中軍即城中為營比二哨又方便而鎮安那地二支鋭甚以鎮安全軍當黎停蓋此巢東聮五指而北通鷓鴣啼洞大抵營乃其喉咽處鷓鴣近亦議用兵但恐兵力太分以待後議故欲於大扺宿重兵以禁其私通暗透且密授經略之意於守者其中間事勢非面莫盡也向萬州黎知州來見以身任大抵但兵數太少更添一千可矣似聞門下頗取各縣打手及獞兵但得精壯可用者不在多也土兵諸事如渡海火柴行糧犒賞見為區處每哨扣兵數俱為量寬尚未得左哨數目爾海水四圍之內皆不肖擔子也敢不用心渡兵船大是難事此間盡數刷取擇而用之但曽經渡海不拘大小皆押往乃硬死法也大約儘海南只可如此糧船近亦差人往崖陵鈎取兵將入境此間合用事務當造成小册子分呈左右嚮導及地圖謹先發往儻有所疑據圖駁辨之勝於臨時講求所欲見教者此使回示及幸幸與陳海洲憲副昨得蕨岡書略談郎溫事勢此賊多而且很屯結成巢泗城蘭州之兵俱相觀望堅營自守兵氣日沮賊勢日張遽欲行招撫之䇿恐所招者未能使之膽破心服反以滋後患也從來泗城兵推姦不肯向前在瓊城亦略道之鄙意亦為蕨岡貴恙稍痊拔營屯入郎溫督諸哨深入執事嚴差一官執旗牌切責岑施示以利害若别處稍緩且合力以攻郎溫餘黨儻又兵少不彀分布軍門原劄有三哨合力夾攻之言明請各移一手本於中右二哨刻期約會夾攻仍一面呈請軍門蓋兵有多寡勢有強弱地有險易當分哨之時豈能一一懸合事機惟不擇利害不顧嫌疑公彼我而以除殘救民為心此真我輩之事也岑施似當參究此輩狡猾從前征調一以驕子畜之故使得肆無忌憚南涯處功次何久未解與之藤橋向己奉告矣若蕨岡移營入郎溫此路尤宜處也餘惟照察與程雪崖參戎昨解功至已委官閲視未報鄙意以真功潰爛猶可準惟細小當深懲之俘獲男口十嵗以上至十五六歲使果為土兵收留全活其命不須與之較但恐斬以為功則傷和甚矣故凡功之略小者皆削之使不敢以幼口充數也賊屬老幼纍纍使人不忍見此亦造化一條生意不可令死於吾輩之手賣之不售飬之不周尚未知所以處之也其略可為人養男以全其生則皆發令撫養亦必海以北稍逺乃可爾夜中思念本哨賊六千餘今僅得五百未能十之一後面勞費尚長而欲僥幸報功紛然真成兒戲今除土兵功外其漢逹官功次不實者一切削去使邉方略曉有紀綱而厲其趨事赴功之心不然賊勢尚蔓而僥幸者己袖手滿其所欲孰肯向前為吾用命哉髙明諒同此意諸應剿小村如抱萬抱道者可差人通查招之一字此時却用不甚著權縻之亦無妨爾又向在貴縣聞多澗等村之報地方憂念為之豁然恨不得奮飛左右酌酒以為地方賀區區此心何心哉鬼神可質也後聞渡海諸公及軍兵等言多澗事者又為之憂憤纍日或中夜不寐恨不得剸刃於誤事者之腹區區此心復何心哉亦鬼神可質也二哨力不足而心有餘吾哨力有餘而心不足其得失宜有間矣故諸公理真氣壯直以玩寇觀望老師費財目吾雪崖只如留賊不殺又欲久屯兵以防之雖區區亦不能解也僕自端州徑來此軍門後事俱未之聞明日即往亷州處四洞事海外悠悠念慮短淺想不能悉及惟雪崖屏去别念以地方赤子為念而善為之則區區尚有望日也伏冀照察與李抑齋銓部以下鄖中齎奏吏回得教翰始知廟堂所以濫敘之意慚愧無已廣東得報聞喻月梧候代日久又聞荆襄間方有大徵役皆守臣之責也故黽勉前來至荆州方得江右之報既入境遂無以辭也於前月二十六日接管行事此地東連蘄黃西通漢中北控關洛南接巴黔關天下之腰膂而制其四肢中間主客雜處易動難靜從前皆以僻靜目之特以所少者士夫應接其餘則皆未易論也諸合行事一般與之料理待代者而去庶幾為不負所行爾盤峯小洛俱補僉憲甚幸盤峯治武定獄有聲稱真足為吾鄉出色初至地方例該有題奏差人往附此未間千萬以時自愛不一不一與毛東塘本兵嚮齎奏人行具小啓奉候記室諒逹尊覽某至此遂彌月事事循前人之舊尋常批發無足言者江右咨勑未至代者王涵峯聲聞亦杳然兩地所理皆為國事不敢懈弛但明當考察恐至江右稍遲所屬賢否無由驗知只據諸司紙上心中又未能釋以此殊切耿耿爾籌邉大奏已於行移中見之兵糧將材固為急務而議論太多刻核太甚亦能使人東瞻西顧難於展布試觀自古大有為之世何嘗有一句間議論參其間乎此欛柄全在本兵力持也恃愛敢及之幸恕僣妄與河南巡撫李疊石某在嶺南時有事黎夷請結庫兵見佛朗機銃與諸處所傳者制頗不同昨携一具來此欲鑄給諸郡練教適有江右之改未及行也然已教之鄖陽其悍徑迅逺可逹三四百步某又妄以已意為車以運之低昻左右隨方爇放每銃一筒管子銃四五枚可以迭發不窮臨陳制勝所不敢知若控扼險害似無逾此其最小者嶺外人謂之爪哇銃亦海外器人有銃手専習之賊畏之甚於強弩亦携來此謹以新舊各二具上望試閲之詩曰有嚴有翼共武之服想公武服無不預飭矣區區奉此聊備森列中之萬一爾照入幸甚答勘處夷情都御史萬治齋使至承惠誨情禮勤款不勝佩感昨聞王涵峯來信某諒終此九月初方得至漢口車從想已臨辰陽瞻奉未有前期也奈何所示盛文并撫苗公移不肖狹中執著所警發多矣苗情此間隔涉無由詳知曲折如所示用非其人欺瞞姦格久益猜疑者指摘病根最為深切各道慮恐惡種尚留貽地方後患亦為不易之論而設官控制圖惟久安則須據其險要制其心腹然積梗首惡必略加懲創主謀詿誤有所分明然後其招可來來可久此處方略全仗尊算爾鄙意以為用兵之聲不可不振永保二司只嚴令整搠以待剋期招撫之事且勿令有所干與各苖聞之知吾有必剿之意不專在撫永保知其責在殺賊報功亦不敢以撫市於吾此固無妨於撫而亦有資於剿非但制賊亦所以御永保二司也承教愛之深不覺冗長公方廣忠集衆想不為訝也某此初五日離鄖陽稍前迎涵峯相望千里徒增勤慕使還謹此奉復不盡答夏桂洲以下江右事橫峯窰民急遂所圖謂建置衙門亦如往年稻穀可脅而出掠而有也故成此下䇿縣可立可不立可遲可速大阿之柄不可倒持而授之頑民糧米三千七百地方四十里餘又當水陸衝要之途理當熟慮而後從事若怵頑民一時邪謀不度可否利害以徇萬一異時有設非分之謀以脅持上下亦將怵而從之乎其漸似不可長也且窰民不樂隸弋陽欲自為聲教久矣特藉口於飢荒爾所割二十里此方居四之一就使立縣收其狡猾無賴以為吏卒牙儈挾官府為刀為機而上弋二縣新割十五里皆為肉也其苦何忍言哉某謂立縣必多割圖里優其事力者亦欲使衆共分其苦爾今此議固未可已所議當有大者遲以月日設法捕其首謀三五人置於法使吾之紀綱稍振頑民知舉措必由於上非邪謀之所可脅夫然後與之建立則治可久他日縣官亦有所恃以自立也東鄉萬年費力固多假使當初不一震駴狼子野心姑息容養其能與之俱存至今乎利害遲速亦可睹已承公愛念之深諭教諄切所懷不敢不吐望裁可否以示答嚴介溪閣老論延恩閣令價都下回伏領教言兼承勒石宸翰并二記莊誦再四侈上恩訓恭儉傳於四方孰不敬仰為公子孫守之以忠貞世世當何如也甚盛甚盛延恩經始某頗究心蓋仰體公所以超俗貽謀之意而以義理裁成之其細微曲折有非流俗所能知者但聞之守巡諸人似於部位髙下之間更須斟酌居第為子孫計與官府署居徒侈觀美者不同望詳盡以付所司使作者不至於徒費居者不至有後悔若曰勉為輪奐以為觀美想公意原不如此因齎文人便謹此奉謝不敏嵗陽寖亨伏冀順時為天下懋愛不宣又差人回承教翰奬豫敦至不勝感佩辱公知奬公事即某事也伯夷之所築者固不敢當此然以公盛美亦必以伯夷之所築者築之然後足承渥恩垂世範光絶縉紳之間且為袁人百十年故實彼徇流俗之意奉承左右公所不欲亦某所不敢也鄙意見諒益服雅量入夏漸熱伏惟倍加調燮副中外具瞻之望不宣延恩閣事答少卿丘集齋差人自北回領手教而考察之報亦至鷺沙竟不能免於銷鑠其命也夫然世亦有懲鷺沙不敢為其事今日與之同敗而縉紳公論又在此而不在彼不可全謂不憑兩三分義理也所喻云云誠有太寒儉處而付來之物并入支消皆有之某經事頗多非全不近人情者平日於此老知分亦不淺竊以當世路競馳之時惟有範我馳驅庶幾處已處人可兩全而無憾此事估其木料等項價一千五百金一閣之費若是泉人眼孔以為太入時㨾矣而復有云云亦可歎也嵗裏有一書逹此老備道此意吾兄若有聞并以見教不肖亦老矣稜稜寒骨死時惟少馬革一張爾其他自分已定亦不以為念也鄉諸先生不及别啓會間望為致意切不可語外人恐增紛紛爾不一不一答鄒東郭司成去冬賢郎過洪都辱賜提誨即欲奉復以所教諸事方在議擬間未能審其利害之歸不敢率爾以請兹意常存不忘也大扺末世以空文為政猶以空言為學不稽其實而徒取必於期會無益而反滋弊端近至撫建二郡略取諸司條貫閲之文與實違如糧長一事縣各不同亦有行之既久上下相安而不必易者惟官吏之掊尅執役之侵漁則無異也某以為此不當専在法上用事惟當於人上用意去一警百猶為迀論要必去其半以威其半然後庶可以止區區非其任也奈何其他諸事大率類此昨至撫州會明水知去嵗有華蓋之遊新詩琅然誦之如出入雲壑而聆山水之音也商量舊學培養新知此晦翁家法諒所謂邃密深沉諸兄必有得於是也樂水樂山與雅言好古旨訣不知同異似未可偶一登山便如此判斷也何幸更得承教明當往金溪夜中有此殊不盡照亮幸甚與唐漁石本兵以下粵事封川地方賊情向因具奏已附報大略夏熱當耕作之時土兵徵召在數千里之外近方畢集而賊中圍困日久飢乏內相抱怨首惡六人已計擒其五餘黨雖猶拒險摧以土兵想無不靡也近廣右有言古田當首誅者其説亦是但其地方廣闊醜類衆多且先據險要非合全廣之力不足以克之恐悉兵以往萬一别處復有嘯聚如近日封川賀縣者動三二千徒本地哨兵不足防禦必須於大哨中分兵䇿應兵分則勢弱不惟進不能得志於古田退亦恐損威於䇿應之賊也故不肖愚䇿先將各處嘯聚為害尤急者治之因以威其餘當招則招當守則守無轉顧之憂然後合兵以攻古田力專勢重庶幾可以成功目下封川與馬平五都先後進兵俟了封川又抽其精鋭益以新調以剿賀縣若仗廟堂威靈此三處起今年內得以就緒付地方守巡官收拾結裹明年力或可為古田亦不可緩諸葛孔明譏劉繇王朗今嵗不征明年不戰使孫䇿坐大并有江東今廣西地方大半為盜區此亦不肖并日而馳之時也但一歲而三處用兵恐驟聞不能無惑故敢陳其所以馬平五都剋期不日齎奏請教伏冀俯賜裁照與夏桂洲某守土無狀致動兵革去冬具栁州馬平用兵事由煩瀆朝聽近者恭承廟算各險寨悉摧破其勞其費皆有不容已者蓋此賊盤據栁慶之交梗其水陸二路自國初以來凡四用兵沿江一帶雖曽掃除而險巢未破至壬寅夏殺官軍之後勢遂桀張慶逺一郡幾為絶域前提督蔡尚書題奉欽依剿捕近巡按御史復有言而二郡有司百姓日以劫害事情來告欲止不能其幸而克之者亦無他術前此賊所以得延殘喘者由我進兵太遲散兵太蚤又徵兵太雜且逺蓋以十月後進兵賊已收穫上寨不久涉春雨水淋漓而逺調之兵思歸農種無復鬬志兵倦糧竭勢不得不遂解散也某向備數廣西提學深知其弊故去嵗以九月進兵收其禾稼以充軍食又以魚窩等險寨責之南丹東蘭那地三州兵精路近得以更番圍困故自去秋九月至今春四月我兵尚有餘食賊勢日蹙而更番之兵力亦有餘偶值機會而遂克之爾賊所據地綿亘百十里與栁城融縣各巢相倚為惡又擇其惡之尤者分兵追剿所謂上油洞則栁城蠻也所謂古龍古郎鵝頸三洞則融縣蠻也誅此數惡魁因以震怖其餘廣右猺獞不可勝誅終歸於撫然必威稍振而後惠流而撫可固其大概如此本不足深言以用兵大事亦欲公察其不容已者而非佳兵也某疏拙無能但能地方略靖上以仰稱任使而不負此行之意於平生不啻幸足豈敢復有希冀此某區區本心亦望公俯察及此爾與聞石塘太宰某備數三年不能綏輯夷民與地方共享安靜之福纍以兵革殺伐干聒朝聽心切不安然事有非獲已者賀連之寇連結三省為害三十餘年二縣城門嵗中為之屢閉久議征討力未能及每嵗調兵防守費不可言故決意興師而某適有改官之報念憂在地方不可因某一身去留為前却也幸荷公庇以能成功從此不敢多望或者十數年尚可保無虞較之每嵗防守之費大約只用三四嵗錢糧爾但某已遷官而興此役恐不知者以為好事初意欲留後面一著候歐約菴來結裹而歐久不至掣兵已逾一月勢不可不奏報然其中實無所為也亦冀公亮照之小山類稿卷九
