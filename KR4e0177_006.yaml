body:
  text: 小山類稿巻六明張岳撰書一辯學與郭淺齋憲副泉中及敝邑侍教累日晵益良多别後惘惘思念不置昨諸生有述執事臨行時所示良知孝弟及明德新民之説良知之言發於孟子而陽明先生述之謂孝弟之外有良知前無是言也殆䨇江年兄以其心所獨得者創言之於愚心不能無疑亦嘗靣質䨇江矣尚未盡也子思之言曰天命之謂性率性之謂道脩道之謂教而又申之喜怒哀樂之未發謂之中發而皆中節謂之和夫以性道之廣矣大矣無不備也而指其親切下手處示人不越乎喜怒哀樂已發未發之間所謂戒懼者戒懼乎此而已所謂謹獨者謹獨乎此而已至孟子又發出四端之㫖而特舉夫赤子入井嘑爾蹴爾睨視顙泚以驗良心之不容泯滅者亦可謂深切痛快無餘藴矣學者只依此本子做去自有無限工夫無限道理固不必别尋一二字以籠絡遮蓋之也明德新民之説徃嵗謁陽明先生於紹興如知行博約精一等語俱蒙開示反之愚心尚未釋然最後先生忽語曰古人只是一箇學問至如明明德之功只在親民後人分為兩事亦失之某􅋏然請問先生曰民字通乎上下而言欲明孝之德必親吾之父欲明忠之德必親吾之君欲明弟之德必親吾之長親民工夫做得透徹則已之德自明非親民之外别有一叚明德工夫也某又起請曰如此則學者固有身不與物接時節如戒謹乎其所不覩恐懼乎其所不聞相在爾室尚不愧于屋漏又如禮記九容之類皆在吾身不可湏臾離者不待親民而此功已先用矣先生謂明德工夫只在親民不能無疑先生曰是數節雖不待親民時已有此然其實所以為親民之本者在是某又請曰不知學者當其不睹不聞之必戒謹恐懼屋漏之必不愧于天手容之必㳟足容之必重頭容之必直等事是著實見得自已分上道理合是如此工夫合當如此則所以反求諸身者極於幽顯㣲細而不敢有毫髪之曠闕焉是皆自明已德之事非為欲親民而先此以為之本也如其欲親民而先此以為之本則是一心兩用所以反身者必不誠切矣故事父而孝事君而忠事長而弟此皆自明已德之事也必至已孝矣忠矣弟矣而推以之教家國天下之為人子為人臣為人弟者莫不然矣然後為新民之事已徳有一毫未明固不可推以新民茍新民工夫有毫髪未盡是亦自已分上自有欠闕故必皆止於至善而後謂之大學之道非謂明德工夫只在新民必如老先生之言則遺却未與民親時節一叚工夫又湏言所以為親民之本以補之但見﨑嶇費力聖賢平易教人之意恐不如是也先生再三鐫誨曰此處切要尋思公只為舊説纒繞耳非全放下終難湊泊夫以陽明先生之髙明特逹天下所共尊信者某之淺陋豈敢致疑於其説顧以心之所不安者又以為出於名公而不明辨以求通焉則為蔽也滋甚矣故得請教於左右願反覆其説使愚昧終有聞也外有柬逹䨇江亦道此意更乞炤亮答聶䨇江廵按嚮承教格物説匆匆未及奉答此一義也古人屢言之及陽明而益詳然鄙滯終不能釋然者盖古人學問只就日用行事上實下工夫所謂格物者只事物交接念慮發動處便就辨别公私義利使纎悉曲折昭晰明白足以自信不疑然後意可得而誠心可得而正不然一念私見横據於中縱使發得十分懇到如適越北轅愈騖愈逺自古許多好資質志向甚正只為擇義不精以陷於過差而不自知者有矣如楊墨釋氏豈有邪心哉其流至於無父無君此其病根所在不可不深究也来教云格物者克去已私以求復乎心之體也某謂一部大學皆是欲人克去已私以求復乎心之體也但必先辨夫公私之所在然後有以克而復之此其節級相承脉絡相因吾學之所定疊切實異於異教之張皇作用者只這些子且如讀書講明義理亦是吾心下元有此理知識一時未開湏讀古人書以開之然必急其當讀沉潜反覆使其滋味浹洽不但理明即此就是存養之功與俗學之支離浮誕者全不同豈有使之舍切已工夫而終日勞心於天文地理與夫名物度數以為知哉無是事也數年来朋友見教者甚多終是胸中舊根卒難掃除而私心習之既乆又不忍遽除之也故貢所疑以卒請教又有一事近来見朋友為學者多去博觀去學文字聲口杜詩晋字徒費精神及至論學則諱言窮理二字恫疑虚喝左遮右盖此其病痛亦甚不小不識吾兄曽憂及之否乎日方為祖母營塟有一舍弟病虚弱之甚料理醫藥未能見效心事種種不佳未䆒所欲言惟冀炤察又錢令過敝邑辱賜今年鄉書洋洋乎其言之也披巻疾讀心豁目開然其中有可疑者不能黙黙大扺今之論文章者必曰秦漢盖以近時之軟熟餖飣為可厭也講讀者必曰自得亦以傳註之拘滯支離學之未必有得也夫眞能以秦漢之文發其胸臆獨得之見洋洋乎通篇累牘而於根本淵源之地未必實有得焉君子未敢以作者歸之也况所謂秦漢者乃不出晩宋之尖新稍有異於今之軟熟者爾實亦無以異也暗鬱而不章煩複而無體奔走學者於譎誕險薄之域反不若淺近平易猶得全其未盡之巧之為愈也秦漢之文見於班馬氏所載多矣其深厚醇雅之氣明白正大之體曽有一言一字譎誕乎哉今之自詫為秦漢者恐未必於班馬之書有得也有得於中則其發也必不掩矣乃欲厚自與而疑學者其亦可悲也夫自得之言出於孟子其意亦曰漸漬積累自然有得爾夫豈必於排擯舊説直任胸臆所裁而謂之自得哉三代而下數聖人之經秦火之後人自為説至程朱始明矣雖其言或淺或深或詳或畧然聖人遺意徃徃而在學者不讀之則已如其讀之也豈可不深造而致其詳詳讀古人之書而有得其淺深詳畧之所存意有未安姑出己見為之説期於明是理以養心而已矣不在創意立説以駭人耳目也有是心而言又未或當其自蔽也甚矣嗚呼學之不講乆矣文章議論古人講學不以為先也今也窮日力以從事於此猶不得其要領况其逺且大者乎此類得失本無足辨然塲屋去取學者趨向繫焉新學小生心目謭薄一旦驟見此等議論必以為京師好尚皆如此其弊將至詭經叛聖大為心術之害有不可不深憂而豫防者伏枕無聊故一伸其拳拳之喙伏惟裁教又二月中黄倪二生過恵安辱賜手教新詩及近刻諸書讀其所為序説皆發明親切尊兄於簿領之餘而用心於内者乃益如此歎服書院習禮盖將使學者知舉業之外有此一叚本領工夫若於此信得及做得是日積月累滋味深長外而許多淺俗見解自然漸覺輕小矣此學不講已乆今聚八郡之士終日羣居若不就日用最親切處指示下手工夫使之有所持循據守以交相勸勉漸次有得而但務為渾淪籠統之語以詔之則恐聴者未悉吾意其材質髙者未必實用其力先已啓其好髙助長之心其下者又隨語生解借存飬之目以為譚説之資此其病痛面目證候雖與俗學不同而其根於心術隠㣲反有甚焉者不可不察也昔夫子之教以求仁為先仁即心也心即理也此心所存莫非天理黙而成之而仁不可勝用矣此數言者以夫子之聖七十之賢提耳而教之可以不終食而頓悟者而夫子則不然也顔淵問仁告之以克己復禮而其目在視聴言動仲弓問仁告之以出門如見大賔使民如承大祭己所不欲勿施於人樊遲問仁告之以居處恭執事敬與人忠司馬牛問仁告之以其言也訒而已顔子所聞者仲弓不得而與聞也仲弓所聞者樊遲不得而與聞也至樊遲所聞者司馬牛又不得而與聞也聖門之教因人成就如此其曰視聴言動曰出門使民曰居處執事與人皆就日用最親切處指示人下手工夫故曰勿視勿聴勿言勿動曰恭曰敬曰忠曰訒眞如漢廷之法較如晝一使人即此目下便有持循據守才質髙者不得躐此而不及者亦可以企此以有為所謂非僻之心惰慢之氣自將日銷月化於㝠㝠之中而不自覺此所謂聖門之學也無他只是有此實事實功而已矣夫豈在别尋一箇渾淪之體以為貫内外徹幽顯合天人使人愛慕玩弄而後謂之心學也哉且就講禮一節言之如士相見冠昏鄉射飲酒之禮之類不講之則己如欲學者之講之也則不但告之曰禮者理也理者性也性即心也心存則性存而禮在其中矣必使治其文也習其節也而又求之其義也則必據經傳質師友而反求於心然後有以得其節文意義之不可茍者而敬從之夫然後謂之善學顧其中閒自始至終皆以實欲行禮之心主之為有異剽竊狥外以欺人者爾易曰同歸而殊塗百慮而一致此言理本自然人不可私意求之爾既曰殊塗既曰百慮不可謂全無分别也故心也性也天也一理也然至論心自是心性自是性天自是天如人之父子祖孫本同一氣豈可便以子為父而祖為孫哉昔之失之者既以辯析大精而離之使異今欲矯其失必欲紐揑附㑹而强之使同可謂均亡其羊矣不如且釋同異之論令學者且就日用切已實下工夫如讀書不必泛觀博覽先將學庸語孟端坐疊足澄心易氣字字句句反覆涵泳務使意思昭晣滋味泛溢反之吾心實有與之相契合處如習禮則冠射相見等用之有時口識其節文大義亦當必求其所謂不可湏臾去身者如曲禮少儀玉藻中所記動容威儀之節逐條掇出相與講明而服行之坐時行時立時拜跪時獨處時至應事接物時提掇精神常常照管使其容色無時而不莊敬動作無時而不節守少有放肆失禮則朋友又得指其失而箴規之如是雖於學問之淵源統紀未能深造然就此著實規矩安頓身心資質髙者能自循此上逹其下者亦有以飬其端慤醇篤之性不至於道聴塗説揣度作用重為本體之害矣書院告成諸士子相與趨蹌禮文所願黽勉以觀其盛但以衰服不便逺出又念尊兄瓜期在邇十載神交僅得一再會别後之㑹又未可以日月期也瞻望使車徒切馳戀狂瞽之言極知無取然使其相見則所講論者大率不過如是爾裁教幸甚答黄泰泉太史在五羊逼嵗除匆匆告别尚有許多隠㣲衷曲次第未及吐之左右抱歉無已向所喻物則云云此是文公教人下手窮理工夫十分親切處眞能見得事事物物上各有義理精㣲不差則所謂人心道心氣質天性亦各有著落以為省察存飬之端今之學者差處正是認物為理以人心為道心以氣質為天性生心發事縱横作用而以良知二字飾之此所以人欲横流其禍不減於洪水猛獸者此也若老釋外事物以求理其學雖差要於虚空中實有所見豈若今人之恫疑虚喝其髙者入於奸雄以下殆類俳優此風不息不知將何止極也舟中畧閲學的此老元以采集聚類為家計第二巻摘出文公論敬數條皆精切之語要是眼力到處但其通篇規模次第與文公平生講學不甚似使人不無憾耳樂書渴欲一見有便録一本見教明年齎捧諸公北可附也人還謹此奉報惟冀炤亮答叅贊司馬張甬川嚮蒙示以近時學術之弊曰無理學無心學者剖判明盡承教多矣夫為學之道以心地為本若眞所見謂心者而存飬之則其本體固自正然非體察精密義理明晣有以備天下之故於寂然不動之中而曰心得其正者未之有也近時不察乎此紐揑附㑹恫疑虚喝既不知有義理工夫之實而亦安識所謂心體者哉其團合知行混誠正於修齊治平而以心字籠罩之皆謾為大言者也某之疑此乆矣朋友間一二有志者皆相率而入於此無可與開口者又恐徒為論辯而未必有益故於門下每傾心焉竊又思近時所以合知行於一者若曰必行之至然後為眞知此語出於前輩自是無弊惟其曰知之眞切處即是行此分明是以知為行其弊將使人張皇其虚空見觧不復知有踐履凡精神之所運用機械之所横發不論是非可否皆自謂本心天理而居之不疑其相唱和而為此者皆氣力足以濟邪説者也則亦何所不至哉此事自關世運不但講論之異同而已凡此皆欲質正於左右而其所望於左右者甚重且切也伏乞開論俾承學有述焉餘惟以時為國為吾道自愛不宣答前冡宰羅整菴徃年江右匆匆期㑹竟不能一造函丈扣質疑難以遂平生願學之心然竊讀公書而得其言論㫖趣則所私淑者多矣歐守至嶺外辱枉教翰感佩無量此學之未墜在林下者有公盛望推明誨引於下其辨析既明白其實行又足以信之所謂反經以勝邪慝者在此某以為詖遁之詞無所歸著乆必反而歸此無疑也惟願公夀考康健有以卒此盛業爾某入廣以来連事兵革今幸稍定而中閒恩威二字未能暢逹不知乆後又何如也恨道逺無由卒請教示歐守行附此奉問起居小山類稿巻六
