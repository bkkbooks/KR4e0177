body:
  text: 小山類稿卷五明張嶽撰奏議五總督湖廣川貴稿乞立存活被虜人口賞格疏題為援例乞恩救活被苖虜執人口以廣德意事臣到湖廣地方節據貴州布按二司守巡新鎮思仁二道撫苖兵備參議等官楊儒等呈報各苖寨節經奏內有名賊首龍許保吳黑苖等濳伏林菁伺人不意出沒劫掠軍民財畜殺人放火虜去男婦非止一次等因到臣又據該道呈稱人口歸寨勒要老銀取贖及將虜去男婦割髮賣與各該土官去訖臣訪得苖賊節年為害虜去人口在寨不止數百勒銀取贖因而賣與各土官輕價收買羈留各寨候調征之時割取首級輳作功次蓋從來用兵惟計首功其被虜人口送官者量行給賞不如首功之厚故各土官利在要功覓賞使被虜殘命於劫掠焚蕩之餘復遭屠戮與苖蠻枯骨同一醃焙梟挂慘毒之恨感傷和氣誠聖治之所不忍也臣節行曉諭禁約及將奪回被虜人口分别男婦老幼等第立為賞格比首級略加優厚其土官亦許有能送出人口全活數多者具奏升賞欲使知其所利重於首級則不必於斬取以邀功誠使殘民垂死之命得以生全男女長幼相折補每口用銀大約三兩則銀一千兩可活三百餘口所費者少所活者多但軍功論首級其來已久一旦欲以所全人口計功論賞恐各土官驟聞未敢以為必行之令或疑不信如蒙乞敕兵部再議明立賞格示之大信將舊例土官部下獲功一百顆該散官一級二百顆升二級三百顆升三級其不及前數而能送出被虜人口數多男子十六嵗以上至六十嵗一口準一功老弱婦女二口準一功容臣核實具奏與首級一體通算量加升賞如此則各土官知聖明有此殊典無不樂從臣恐不但目下彼虜人口蒙生全之福纍年為賊所執拘留在巢虐使者亦將送出以為功所全活將不可勝計除患恤民莫此為切緣係云云大征苖賊功次疏題為擒斬苖賊功次事案照先該臣將三省應剿稔惡叛苗分布哨道劄委各哨監統等官剋定嘉靖二十九年九月初三日丒時進兵至本年十一月二十八日止總計三哨擒斬俘奪共六百一十六名顆口內生擒一百零四名斬首二百四十顆俘獲賊屬一百八十七名口奪回被虜男婦八十五名口在數奏內有名首惡并各寨苖首龍董龍俸龍栁補龍老課等三十三名顆就於本月二十九日具題外臣隨看得各寨首從苖賊勢雖奔潰其竄伏林菁尚多及有聚險拒劄臣遵照欽奉敕旨切責嚴督各該撫鎮等官深入重地臣與貴州巡撫都御史任轍總兵官沈希儀駐劄銅仁府湖廣巡撫都御史屠大山總兵官豐城侯李熙駐劄辰州府四川巡撫都御史張素駐劄重慶府協心催督各哨官兵奮勇剿捕其貴州巡按御史董威湖廣巡按御史谷嶠四川巡按御史鄢懋卿俱至附近地方紀驗功次至本年十二月不等日據貴州哨監督副使趙之屏報準統督參將石邦憲手本報稱云云又據湖廣哨監督右參議張景賢報準統督都指揮李英手本報稱云云又據四川哨監督僉事薛騰蛟報準統督副總兵李爵都指揮孫賢呈報云云等因各到臣據此除去年十一月二十九日具題外至今一月有餘總計三哨又擒斬俘奪共九百七十名顆口內生擒九十四名斬首二百零八顆俘獲賊屬三百九十名口奪回被虜男婦二百七十八名口在數奏內有名首惡龍七保龍老二吳浪七龍栁普龍老夭龍老課吳老跳吳得者龍老犵龍跳馬吳老條龍瓦業吳老垣龍老胖龍得栁共一十五名各寨賊首吳老母吳老貫龍朗七田老課田老革共五名尚有龍許保吳黑苖未獲其母妻妾弟男一夥俱已受擒龍許保該哨官兵俱稱十一月二十八日宣慰安萬銓部目底蘇擒獲至今未曾報解未知有何情弊已經督查未報近準兵部咨為乞恩紀録功次以勵將士事先該臣題本部覆題看得四川哨湖廣都司都指揮僉事孫賢貴州哨戴罪管事協守貴州地方右參將石邦憲各領兵於苖賊出沒四路把截各陸續擒斬共一百三十六名顆俘獲奪回被虜男婦一百三十四名口皆係大舉之前功次合候命下之日備咨都察院轉行川貴巡按御史將孫賢石邦憲先次得獲功級行令分巡官查驗收入今次大舉功內題奉欽依備咨前來準此臣自委官防截至大舉至今通計擒斬俘奪共一千八百五十六名顆口內擒斬七百八十二名顆俘獲賊屬男婦五百九十一名口奪回被虜男婦四百八十三名口為照先據布政司通報銅平舊在册首從苗賊共計一千二百有零前項擒斬已七百八十二名顆係臨陳斬獲及在山摉扒真正苖賊其巢寨屋窖米穀財物俱為我兵燒掘盡絶又十一月初四初五十二月十九二十四日連旬凍雪深厚尺許各哨俘獲解到賊屬驗多肢體瘃裂殊非人形審據吐稱逃匿林菁之苖凍餓身死在內者不少縱有存者不過掘食草根度命其得穿山走脫逃入各土官衙門數亦不多追究可得此皆仰仗皇上弔民伐罪之威上天輔佑之應也目下春入漸深東作將興土兵思歸務農臣一面督令該撫及守備官招撫殘黨許以不死聽其投順隨宜安插量留精鋭旗軍打手及附近土兵人等防守并挨捕不服招撫餘黨外其貴州宣慰普安等司州兵悉放歸農以省軍餉再照湖廣蠟爾山下數寨不服招撫合夥貴苖為惡臣具題剿其太甚及進兵之初復行撫諭冀其改過各苖稔惡不悛窩藏貴苗有名賊首麻得盤吳旦逞等仍又助凶不時前來暗衝營寨若不誅除必為後患臣已責成該地方永保二司宣慰彭明輔彭藎臣酉陽司宣撫冉玄會兵攻剿取其魁渠撫其餘衆務使伐當其罪而知警撫服其心而知恩地方削平酌定善後事宜另行一併具本奏報緣係云云苖賊突劫思州疏題為漏刃惡賊糾集殘苖突入府城虜害官民事臣於嘉靖三十年二月二十九日據湖廣平溪衛申報本月二十六日巳時據被虜走脫思州府民人黃相報稱有苖一夥忽於二十五日巳時進入思州府城捉虜府官焚燒房屋殺虜人畜財物等情飛報到臣一靣督令各該哨堡官兵粘蹤截殺隨行貴州分守思仁撫苖右參議劉望之備查前賊的係何處村寨始從何來繼從何往虜去思州府官吏民人等并被害若干劫去倉庫錢米若干印信有無存亡及令弔取該府知府李允簡逐一查勘去後三月初七日據該道呈覆遵依親詣思州府查看得城內居民不上十六七家知府李允簡等具稱二月二十五日巳時正在外升堂畫卯各苖陡然忽到城外稱係瞿塘等衛前來替班防守軍兵比有瞿塘衛防守百户陳堂絶無一名出哨探報該府故不得知况係白晝失於防間以致一時閉門捍敵不及被苖衝入其為首者果係龍許保吳黑苖及湖寨不知名一瘦老漢另有小頭目八人亦不知寨分姓名其持槍帶刀向前好漢實數不上八十餘人名賊向李知府嚇説如今定要將你進寨替我主張招我安生便罷又央李知府説你傳與石參將只莫要發兵截我便饒你命等語二十五日劫府城後因庫藏空虛民户寡少無所大獲各相埋怨住劄一日商量欲分作三路一路由馬口司一路由鬼灑溪小羊山一路由茅坡等處肆行劫掠地方隨有探事苖人來報説撫按爺都在鎮逺見今調委楊通判何守偹帶領土軍馬前來䇿應方才懼怕於二十七日早止分兩哨行止半途復有探事苖人來報有石參將已發多兵各處截路各苖驚慌復又會聚苖羅板寨作一夥由茅坡省溪等處前去不知經由何路歸巢因此李知府王知事盧經歷并府吏張自丙蔣輝陳天相并民人脫身回還者頗多三月初一日午後據清浪衛差軍餘吕秀回稱各苖中途聞有石參將發兵截路不敢徑回尚在藏躲不知何處山菁等情備查到臣本日隨據原任參將石邦憲稟據原差伏路銅仁犵兵張思文等於思州茅坡裝塘擒獲打劫思州回還湖廣呵保寨惡苖龍老四千户李珊土官楊通達土舍楊再仕於三渡河截殺箭傷惡苖七人奪獲四川小平茶苖婦一口奪回被虜婦六口省祭吳經元客商二名衝散人口無數苖見追急將牛六隻砍死塞路奔進茶溪山去訖續又據參將石邦憲稟據原分桃映裝塘領兵千户安大朝率領四十八旗屯鄉兵截殺奪回被虜男婦七名口驢一頭牛二隻指揮奚都領銅仁司鄉兵楊科等於地名木寨生擒苖賊一名龍老喬斬獲首級二顆龍老青龍平留奪回被虜男婦一十九名口指揮王世臣千户楊鳯鳴領凱兵李元秀等乘虛直搗唐寨擒獲婦六口不肯前來盡皆殺死只背首惡龍得者親女一名約年十二歲奪獲馬二匹衣物等件十餘背指揮周鼎領鄉兵張思文盧思剛等於龍塘伏路奪獲被虜男子三人牛三隻武舉千户陶增家丁陶興陶才奪獲被虜男婦二名口又據參將石邦憲稟本月初二日思州都坪司被虜土官何世麒脫出回至銅仁府合行稟報等因到臣據此案照臣欽奉敕諭征剿貴州銅仁苖賊先後通計擒斬俘奪一千八百五十六名顆口除奪回被虜人口外實擒斬七百八十二名顆俘獲賊屬男婦五百九十一名口尚遺首惡龍許保吳黑苖未獲其母妻妾弟男一夥俱已受擒獲該哨官兵節稱十一月二十八日宣慰安萬銓部目底蘇擒獲龍許保未解節經督查及審據賊屬被虜人等俱稱殘苖穿山走脫四散逃躲各處者數亦不多且春深東作將興土兵思歸務農臣一面督令該府及守備等官招撫許加存恤隨宜安插量留精鋭旗軍打手及附近土兵人等防守并俟捕不服招撫餘黨其貴州宣慰普安等司州兵悉放歸農已經具題即行招撫隨據貴州宣慰安萬銓親到臣軍門查審執稱龍許保吳黑苗母與妻妾弟男一顆悉已擒獲二苖不知逃匿去向委實未得今據前因為照銅平苖賊擒斬數多脫逃各處之苖探得官兵掣散陸續濳回雖行撫恤尚多未知但村寨窖藏米穀財物盡為我兵燒掘妻子俱各就俘無食依倚易於鼓動遂被龍許保等四下糾集湖川殘苖拌死出劫財物且求旦夕之活其銅仁朗溪提省思南等處提備嚴謹不敢奔突查得思州府隔離苖寨七日之程地方窵僻城內居民不滿二十家少兵把守及查得猾苖不由銅仁提省正路陸續透從小路穿山伏林至清浪地名邊浪孫家莊集聚裝作調來換班防守軍兵突入府城虜劫倉庫錢糧殺虜人民財物無數雖該府知府李允簡署印知事王月謙經歷盧蕙中途脫回該府并經歷司儒學印信俱各見存但生民被其虜戮庫藏被其劫掠貽害地方甚為慘酷所據各該地方守土官員俱合有罪參照貴州巡撫都御史任轍總兵官沈希儀親臨賊巢執馘數俘徒知蔓草之已除不虞死灰之能燃銅仁切近之處布置頗嚴思州偏窵地方周防欠謹卒然變起莫能支吾協同鎮守貴州提督清浪參將劉鳯駐劄清浪相去思州僅三十餘里賊至不知策應賊退不能追截屢稱患病情願告休怯愞無為未展一䇿戴罪原任參將石邦憲先委統兵立功殺賊見留銅仁防守所劫地方原非其責殘苖復聚亦欠關防及發兵截苖歸路頗有擒斬微勞功過亦足相掩分守思仁撫苖右參議劉望之職任撫苖招徠殘黨適在撤兵之初方議撫處之宜恩信未俘於一時事變橫生於所忽思石兵備道僉事喻沖駐劄思南専防播賊之難懸隔銅仁弗與征剿之謀非力所及原情可恕思州府知府李允簡委在銅仁隨軍紀功畢事回任方及五日倉皇被執先事之防已疏艱難多端全印之術亦幸以上各官職任雖有大小均有失事之罪及臣奉敕征剿進兵五月略不能以及逺慮不足以識微誅之不能盡其類撫之未能服其心魁渠漏網殘黨竄伏敢濳入於僻郡致禍延於生靈臣之罪獨多於諸臣者也如蒙乞敕該部議擬將臣首加罰治其餘諸臣分别輕重亦量加罰念地方急在用人使各戴罪跟究前項賊徒惟龍許保吳黑苖罪惡深重必正典刑其餘殘黨或有未聞招撫之令外為二酋詿誤內為飢餓所逼相隨打劫一面撫處其有怙亂不悛仍伏山林不服招撫者查照臣原題奏事理將臣所留防守精鋭旗軍打手及附近土兵人等相機剿捕務在必得使餘黨帖服地方獲安為此具本専差千户仇爵親齎謹題請旨截獲苖賊疏題為漏網殘惡復糾出劫官兵截殺獲功事臣於嘉靖三十年四月二十二日據貴州布政司分守新鎮思仁兼管撫苖道右參議劉望之呈報銅仁府申奉本道督發各把截官兵臨陳生擒叛苖田老雷龍老比等五名到府當該知府鄒廷澤督同委官各府衛經歷徐稻方希顔審據供稱嘉靖三十年三月內有湖廣蠟爾山等寨苖頭龍老逺等十餘人各騎坐馬匹前到貴州各寨相約唐寨龍得者普杓寨龍老革地􅂒寨龍葛鮓田坪等寨不知名苖頭等要行出劫比龍得者等依允砍牛斷話各回收拾至本年四月初三日來到地架寨苖龍老央寨取齊通共男婦七百餘人始於初四日起程比有蠟爾山苖頭龍老逺龍老哦地架寨苖頭龍普娘略變寨苖頭龍淵抱水寨苖頭龍老革地􅂒寨龍阿貫地架寨龍央老各騎馬匹俱向前打路於初五日早到平頭上囤虜得牛馬祭旗商同要去攻劫石阡印江所管板橋昔陀浹口等處探知各處關隘嚴謹兵多懼怕不敢前進止將公義洋溪駱映屯一帶地方搜搶得牛馬家財人口不計的數齊轉回頭於十二日過省溪地方被伏路官兵對敵我們不過次日行至貓兒囤不料又有官兵數多裝伏各塘齊起截殺當將我們前鋒騎馬頭腦人殺了兩三箇倒下馬因此懼怕各不相顧將虜來牛馬人口并自帶來的器械盡數丢棄奔敗間被衆兵追殺斬首數多及將我苖五箇并連首級苖婦同人口牛馬陸續解府本道發府審取前情是的除將各犯并苖婦苖仔俱監候又督同委官經歷徐稻方希顔親將首級逐顆紀驗及帶熟苖麻順并鄉健人等眼同辨認俱係真正臨陳擒斬惡苖誠為竒績似應從厚犒賞以勵來效今將審過口詞并驗過功次呈報到道親自覆審實獲生擒苖賊五名賊級六十六顆見獲人口二百名口明白造册具由呈報到臣案照臣奉敕征剿銅平苖賊先後擒斬俘奪共一千八百五十六名顆口除奪回被虜人口外實擒斬七百八十二名顆俘獲賊屬五百九十一名口俱經具題訖尚有三哨續報擒斬俘奪另共有八十五名顆口在案未及具題臣看各賊擒斬頗多春深兵丁難以久屯即行招撫隨議同該省巡撫都御史任轍審度要害於石子坡黃蠟灘壩地岡木桶龍于四十八旗等一十二處設立哨堡量留精鋭軍兵防守及相機挨捕不服豈料首惡龍許保吳黑苖等原未擒獲乘隙濳回糾拽透從山路突至思州僻郡劫害官民財物甚為失事罪不可逭臣復看得苖賊既劫思州必為得計且自分必誅招撫雖加必不見信况飢困無食勢必旋踵復出臣即移緩就急先抽撥湖廣乾州五寨二哨防兵共八百名晃州哨防兵二百名前赴銅仁聽原任參將石邦憲會同撫苖參議劉望之調度分布雕擒首惡龍許保吳黑苖及防截怙終出劫殘賊去後今據前因為照苖數本不甚多然敢于出劫地方者由首惡龍許保吳黑苖未除糾合湖川二省殘苖乘官軍掣退出劫虜食負重逺來我軍伏路截殺以逸待勞獲功數多中間另驗有苖婦裝作為苖人不準作功者三十餘口黨類無多亦從可知臣除將獲功官兵自指揮以下核實功次分别犒賞外照得原任參將石邦憲分守撫苖右參議劉望之調度有方官兵效力截殺多功似當甄録緣思州失事見為參論但石邦憲留委銅仁防守思州地方原非其責劉望之適在掣兵方議撫處機宜未定變出不意先過後功亦足相掩伏望皇上憫事變之不測勢力之難全乞敕該部將二臣以功贖罪免其罰治量為甄録責其後效何勝感戴臣又查得首惡龍許保吳黑苖今次內防官軍搗巢不曾出劫但各苖實由主使魁首不除終為作梗地方難以平靖臣多方計處相機雕剿務期必獲以絶禍根其餘殘黨并脅從者除已撫處外其未聽撫者再行撫苖等官開示恩信聽其投撫照舊安插務使畏威懷惠苗人帖服地方永賴而後已緣係云云擒獲首惡龍許保疏題為擒獲敕內坐名首惡叛苖事嘉靖三十年五月初七日據貴州布政司分守新鎮思仁兼管撫苖石參議劉望之防守銅仁原任參將石邦憲委守備指揮張大儒押解極惡賊龍許保等到臣復據各官呈稱訪得湖貴川省叛苖惟龍塘寨龍許保為首姦深計大膂力過人勢壓衆苖易於嘯聚此惡不剪餘患難除况又聞約三省苗頭吳黑苖龍老逺龍得者等欲再出劫只得重示懸賞祕遣鄉健李宗一楊春秀吳永富入栗凹魯母等寨責令順苖麻得盤吳老􅀈逞旦逞等計擒查得龍許保因四月十三等日衆苖出劫至貓兒囤地方被官兵截殺大敗回巢方知懼怕不敢即出至二十日帶同伊族惡黨苖人龍重陽龍郭大來到伊親田坪寨苖頭吳栁茍家弔喪是麻得盤因就賺請過魯母寨吳旦逞家求伊女與許保為妻比吳旦逞佯為許允設酒欵待以致龍許保等歡喜痛飲深醉麻得盤吳老革吳旦逞父子兄弟等方敢下手將龍許保并龍重陽一時綁獲欲行解報間被龍郭大脫走與吳栁茍前去糾集龍塘鬼提都庫罵勞等寨殘苖前來欲行搶奪麻得盤吳老􅀈等星夜來報本道并石參將處發兵前去接護有石參將身自督領指揮周鼎陳繼爵劉良貴等押帶漢土精兵二千五百名直抵伊寨護取彼田坪龍塘等寨惡苖懼怕各遁去訖隨有各寨苖人聞知陸續前來俱稱許保乃係苖王若要將伊解官我們衆苖亦願大家送出如何只吳旦逞麻得盤吳老􅀈等得了賞銀今我苖巢寨人口殺燬殆盡窮迫難存今乞要重重犒賞永不背叛石參將星夜稟報軍門蒙批已行劉參議若得獲首惡地方獲安小費不必計較石參將遵依在彼隨宜給賞除原懸賞外復加賞計謀下手擒拏許保及各寨情願聽招苖人訖將龍許保并龍重陽押解前來等因呈報到臣據此案照先該臣節奉敕諭督率官兵剋期三省進攻自入山并貓兒囤等處先後截殺功次陸續俱經具題訖惟有首惡龍許保狡詐百端濳遁末獲臣看得此賊極惡終為後患官兵進剿已焚其巢寨收其積聚獲其妻子當此奔敗之餘東潛西伏雖有多兵亦無所用惟蹤迹所在用計擒捕仍以精兵雕其餘黨則可以費省而事集會同巡撫都御史任轍計處方略分立營堡把截要害専以擒捕雕剿之事責之參將石邦憲與撫苖參議劉望之凡事計議而行仍行鎮守貴州總兵官沈希儀提調催督各賊前懾大征之威近懲貓兒囤之敗其中聽撫諸苖如麻得盤麻順吳旦逞吳老􅀈自出見官口稱數年地方之禍皆龍許保一人倡首致我衆苖不得安生若許保不死我苖決為帶纍身家難保等語因擔認擒獻許保以免後患乞發兵策應恐有搶奪節據參議劉望之參將石邦憲會報又經督行湖廣湖北道守巡官參政陶欽夔副使劉天授陸續發打手土兵二千名前去策應今據前因臣除將本犯審發湖北守巡兵備各官覆審監候外參照極惡苖賊龍許保稔惡多年貽害三省銅仁之郊野已為丘墟湖川之疆界時被侵擾殺戮則嬰孩不遺抄括而雞豚為空至於攻打省溪印江石阡思州等衙門虜官奪印掠燒倉庫虜質人口肆其凶殘略無忌憚惡貫滿盈神人憤怒已不容於同類豈能逃乎法網從來苖頑黨惡相濟未有肯自執首惡以求欵附者此皆伏遇我皇上神武布昭至誠感神故能使魁渠俘馘醜類革心以背公死黨之夷一旦變為嚮風慕義之舉禍根已除衆心解散苖勢衰弱餘黨竄伏臣等憑藉威靈若處置得宜則地方兵禍可冀銷寢臣又查得先年總督軍務右都御史王來擒獲苖王賊首韋同烈曾經押解赴京典刑合無查照前例將龍許保檻解赴京伏法市曹以雪衆憤或念道里遙逺動經旬月誠恐中途瘐死不無遺刑惟復就近遵照軍法會官徑自處決緣係擒獲敕內坐名首惡叛苖事理未敢擅便為此具本専差承差楊勝春親齎謹題請旨謝恩疏奏為謝恩事嘉靖三十年五月二十七日準兵部咨職方清吏司案呈該本部等衙門會題兵科抄出巡按貴州監察御史董威題為漏殄叛苗復肆猖獗攻打府治參論地方失事緣由覆題奉聖旨朝廷設置總督欲其事權歸一以盡除苖患張嶽原奏分哨進兵又稱湖苖聽撫今乃攻陷府治虜殺守臣失事重大即當拏問處治念係緊急用人姑且與做兵部右侍郎兼右僉都御史職名戴罪任事仍前住俸欽此欽遵臣即於本日望闕謝恩到任照舊管事外伏念臣本以章句諸生粗諳文墨軍旅之任非其所長屬以銅平苖情急在用人皇上兼收羣材不遺樗櫟俾臣總督三省融處兵糧相機撫剿臣於去年九月內分發哨道責任將帥頗有俘獲勢將寧息不意首惡逋逃殘黨飢逼隂聽土官之謀公行思州之劫意在困臣且釀後禍揆厥所由皆由臣節制欠嚴謀略疏闊之所致也伏蒙聖恩矜其愚昧曲賜生成以斧鉞必加之罪納之天地包容之中僅鐫官階尚畀事任部伍不移節制仍在罪重罰輕感激涕出雖希斫之指已傷而一割之志未巳臣敢不整飭戎行宣示恩信兵有所不加而誅止及於逆命備不敢忘設而慮尤創於幾先不但靖冦兼冀息民庶收桑榆之功以答乾坤之造臣無任受恩感激之至為此具本専差百户金子麟親齎稱謝謹具奏聞參究主苖酉陽宣撫冉玄疏題為姦惡土官隂黨殘苖屢攻衙門乞行處治以正國法以杜後患事嘉靖三十年五月初七日據貴州布政司分守新鎮思仁兼管撫苖右參議劉望之防守銅仁原任參將石邦憲委守備指揮張大儒押解極惡賊首龍許保前來臣當堂對衆面審吐稱今年虜劫思州我貴州殘苖不多俱是酉陽管下地崩岑地龍箐小平茶沙留等苖伊司頭目張魁主使前去攻打又將黑騾一匹賣與許保騎坐與銀一十五兩等情據此該臣先據都坪長官司被虜走脫土官何世麟前赴軍門投見親審本官執稱親在賊夥多有酉陽土人目兵在內同劫思州各人身穿斑絲斜紋綾紬衣服手執花槍花牌鈎刀俱是該司號色軍器比與衆苖衣服器械不同等情又據平溪衛指揮袁宗文稟稱思州府被虜脫回伊親監生周廷璉與伊手帖説稱清浪軍人董伏二重復被虜至龍罩坐講前項劫思州賊內有酉陽頭目張魁并地名地崩岑等苖等因備抄原書前來又據貴州分守撫苖右參議劉望之呈解被虜放回人民茍仁到院供稱被地􅂒寨苖人龍十觀等鎖虜到寨見一苖身穿斜紋白綾短衣紅紬長裙前到地􅀈比仁密問寨內被虜日久婦女稱係酉陽差來查被虜人口等語又據永順宣慰司申酉陽冉玄因見苖平兵退地方無事恐怕上司根究攻打平茶殺虜官印罪大商同舍目覃鳯等計約各苖龍許保吳黑苖等攻打思州將婦女四口皮箱一箇馬二匹送與冉玄段匹衣服分衆把總等情案照酉陽宣撫冉玄先於嘉靖二十八年七月內為因湖廣鎮溪所慣惡土指揮田應朝姦計跋扈苖兵衆多以女招配資其聲勢無故擅將平茶洞長官司土人盡行殺虜抄奪土司印信虜辱土官妻女已經具題查究間仍敢謀吞平茶地方將虜去已故土舍楊正嵩庶子楊通一立為土官拘在伊司仍以楊通一出名掜報兵數又擅將奪去印信用鈐册領冒支平茶土兵預放進哨糧銀八百九十二兩五錢臣看得平茶既破印信人口俱稱酉陽虜去要見各官有何慿據交與何人顯是酉陽盜冒嚴行分守該道右參議孟淮追出前項糧銀如數還官見貯黔江縣庫附照行布政司及該道查勘應襲土舍嘉靖二十八年十二月二十九年正月間冉玄因臣參究其謀吞平茶之罪與田應朝商令伊家人田喜安等買拽前項叛苖先後攻打印江石阡府縣使地方失事臣必得罪換官前來總督方可圗滅前案彼時雖聞人言尚無實證及被虜走回千户安大朝贖出知縣徐文伯各執稱被虜之時有苗賊龍得者等向職説是田土官用銀一千兩買我衆苖來打你地方如今有箇田土舍見在此安大朝徐文伯親見土舍身穿緑緞短襖頭帶圓帽年約五十餘嵗等情臣思得冉玄為糾苖之腹心而田應朝乃冉玄之手足先得應朝或可以伐謀寢禍臣即著落永順宣慰彭明輔計獲田應朝及田喜安等一併解官審發弔取千户安大朝知縣徐文伯審執苖賊攻打印江時各官識認得田喜安面目的確田喜安亦認得徐文伯安大朝俱經招承服罪監故訖隨責令冉玄將平茶人口印信吐退豈料將欽降原印仍占留偽造假印交還平茶臣逐查平查日行申報卷內驗出先後印文差異就督行守巡該道辨驗一併查究去後復查得蠟爾山下地崩岑沙留地龍箐小茶平先年係屬鎮筸苖寨後因田應朝與冉玄締為姻好同惡相濟故將前寨割送冉玄管轄冉玄得此數寨愈加膽大節年隂令張魁等勾引惡苖復劫郡縣以成中傷之計一則使臣倣徨待罪極力周防無暇追理其咎一則料臣罪黜以去新官接管一時不知詳細得以延捱出脫且思州被劫道路喧傳係酉陽主使該貴州巡撫都御史任轍駐劄鎮逺先有所聞已經題稱酉陽宣撫司所轄苖寨尚多逋逃今次出劫傳聞亦相糾聚乞敕臣責併該司獻其首惡等因參照酉陽宣撫冉玄封豕之性肆毒無厭欲大封疆不憚屠戮之慘久通苖醜甘為􅌪引之原信頭目覃鳯張魁為瓜牙侵占貴州沿河祐溪司土地以畀覃鳯又占湖廣地崩岑貴州九江等處地方以居張魁諸司力不能敵束手受奪又偽造平茶邑梅平頭等司印信揑申文書以行構害其攻平茶將已故土官楊再顯剝皮抽腸又將該司丁壯殺戮千餘嬰兒五百餘口縱火燒死慘不可言湖廣川雲土官未有若是之縱肆者該地方守巡兵備等官明知其惡法令不行只得姑息曲為隱蔽以故愈肆猖狂罪案纍年不決臣思止沸去薪除惡務本冉玄神姦鬼譎既能號召苖蠻虎噬鴟張又敢唆苖攻打城郭見臣欲究其罪則設計相傾為謀滋長况其變詐縱橫足以鼓動上下其金銀土貨足以結交彌縫其文移便給足以駭惑聽聞若復諉為土官姑息不治紀網廢弛法度不行邊患苖情終無定期如蒙皇上明見萬里深究亂階乞敕該部再加詳察將冉玄先今所犯事情行臣勘究先將主使撥置頭目覃鳯張魁責該守巡兵備等官勒限拘拏到官審究窩苖通苖及夥劫思州緣由解臣覆審然後行提冉玄果有干礙一併治罪以示土官臣又訪得湖川土官専一收留各處光棍無賴成羣潛住京城打聽事情或交通賄賂或央求面分或騰駕謗言挾害上官或掜傳是非誑惑愚民乞敕該部行緝事衙門但各土司有光棍人等潛住京城如前所為者盡行禁逐其所賫帶金銀私帖等項追究入官應治罪者治罪庶姦人知警戒而紀綱自正緣係云云報過撫剿殘苖疏題為遵奉明旨剿撫殘苖事嘉靖三十一年四月十五日臣據貴州布政司分守思仁道兼管撫苖右參議劉望之貴州按察司整飭都清兵備原監督副使趙之屏分守貴州銅仁等處地方右參將石邦憲會呈奉臣批據各職呈照得銅平所屬各寨叛苖先自大舉各寨征剿及貓兒囤截殺并擒獲首惡龍許保等功次俱經通行呈報已蒙題奏外訪得各殘苖屢遭挫衄惡狀消沮奔竄巖洞無地投生分遣鄉健齎執火牌進寨宣諭朝廷恩威準許招撫各苖喜得生命各具情詞跟隨各役赴官投遞願聽撫處隨查得二司所屬共三十寨原苖共一千七百八十一名今除大征并截殺雕剿奔跌凍餓等項陸續死亡外通共止存四百九十八名較之大征以前原數死亡不止三分之二猶恐不的比因各苖赴撫苖道支給賑濟口糧行府查報名數相同見今各苖市買牛具種子魚鹽俱聽坐寨鄉健帶至銅仁府與市民兩平交易龍塘栗凹等寨講理私讐亦俱赴道訴理聽與處分村居遂漸稠密道路行旅往來早暮隨便自去嵗八月迄今地方無警居民安業等因奉批各苖雖聽撫尚有吳黑苖惡名亞於龍許保已經題奏在於必得近日藏在何處曾設何策用何人購捕何時大約可得此賊不除終為地方之患不可狃於習俗之見為含糊姑息之計仰再會查詳報繳依奉查得新寨原苖四十九名除大征雕剿之後止存吳黑苖并小苖二名祗因龍許保既擒之後伊即驚遁未出雖據屢次具狀令小苖投訴乞生各職亦未敢聽信中止一向協力設計且將伊族長吳黨所親男吳永順拘留執當著落跟要無奈本賊傷弓之鳥遁迹愈堅菁大山深東藏西躲欲為圍困之計只因班師既久難請動調大兵欲為雕剿之計又因撫處已定難併驚擾各寨似此暫無所施只得另行計擒免到剿撫兩誤况思原奉明旨曾有脅從餘黨隨宜招撫之條今苖已定地方已安惟此一賊料是離羣穽虎終難脫網若不先行呈報祗恐有負明旨合無準容先將已撫殘苖省令安生免復驚懼仍將吳黑苖催行石參將祕計擒獻不致疏虞庶幾苖人得分順逆居民得保治安實為地方之便等因并據湖廣布政司分守湖北道兼管撫苖右參政陶欽夔湖廣按察司整飭辰沅兵備副使髙節分巡湖北道僉事曾才漢分守鎮篁等處地方右參將孫賢會呈查得鎮溪千户所并篁子坪長官司各所轄苖寨共三十四處除崖洞板栗茅岡泠水溪等處原係叛苖寨分已該官兵攻打將苖龍亞者等俱已生擒及將各巢寨燒燬無存其餘原經招撫并征後無過共二十八寨內鎮溪千户所管下一十二處聽撫苖人龍老黨等二百一十名筸子坪長官司管下一十六處聽撫苖人吳老朵等五百三十八名自嘉靖三十年正月內班師之後鎮溪各苖俱赴永順宣慰彭明輔處筸子坪各苖俱赴保靖宣慰彭藎臣處各領榜給賞魚鹽回寨安插耕種各宣慰責差頭目帶領家小併健目人等坐寨各苖有欲收買魚鹽生畜聽健目帶領各苖前到乾州市兩平交易並不敢生事為非重復查明造册開報等因各呈到臣卷查先該臣遵照節經欽奉敕旨切責嚴行各該撫鎮等官上緊協心征剿事理欽遵將三省應剿稔惡叛苖分布哨道畫圗貼説通行劄委各哨監統等官剋定於嘉靖二十九年九月初三日一齊舉兵進剿續據貴州哨監督按察司副使趙之屏湖廣哨監督布政司右參議張景賢四川哨監督按察司僉事今丁憂薛騰蛟各呈準統督銅仁右參將石邦憲湖廣都行二司都指揮今升清浪右參將李英鎮筸右參將孫賢原任松藩副總兵李爵等手本開據各哨坐營領哨領隊守備等官張鉉王夢麒徐椿齡等報稱自進兵日起至嘉靖三十年正月十四日止貴州哨官兵攻破原分進剿本省銅平所轄龍塘等寨陸續生擒首從苖賊龍老餘龍小保等八十一名斬獲首從苖賊龍董龍老保等并不知名首級共一百四十九夥俘獲賊屬一百六十五名口奪回被虜男婦一百二十四名口湖廣哨官兵攻破原分進剿貴州銅仁司所轄麻銅等七寨生擒首從苖賊吳政等斬獲首從苖賊吳老課吳昔奴等并不知名首級及攻剿本省不聽撫鎮筸所轄崖洞板栗回保昔朗泠水紅崖下水板凳著安等寨生擒首賊龍求南龍亞者龍老子龍老官吳老莽龍各者吳老那斬獲首賊龍補那龍七柯吳保恰吳晚兒等首級并攻摉貴州原剿新寨等八寨生擒首從苖賊龍老革龍栁普吳老跳等斬獲首從苖賊吳老坦吳老馬等并不知名首級共計陸續生擒四十六名斬獲首級一百一十三顆外俘獲賊屬二百一十名口奪回被虜男婦一百四十八名口四川哨官兵攻原分進剿貴州平頭司所轄塘寨等八寨生擒首從苖賊龍史洛等斬獲首從苖賊龍栁補龍老七等并不知名首級及攻剿本省不聽撫酉陽管轄鬼益等寨生擒首從苖賊龍老嗏等斬獲首從苖賊麻老忙等并不知名首級并攻摉貴州原剿龍塘罵勞等寨生擒首從苖賊龍老王等斬獲首從苖賊石老懶等并不知名首級共計陸續生擒七十一名斬獲首級一百八十六顆俘獲賊屬二百零二名口奪回被虜男婦九十一名口各開報到臣及查貴州四川二哨統督參將石邦憲都指揮孫賢未進兵之先領兵四路把截陸續擒斬俘奪共二百七十名顆口已經題奉欽依收入大舉功內總計先後通共擒斬俘奪一千八百五十六名顆口及查各賊巢寨屋窖米穀財物俱為我兵燒掘盡絶及審俘獲賊屬吐稱雖有逃匿山菁之苖多凍餓身死雖有存者不過掘食草根度命其得穿山走脫逃入各土官衙門數亦不多臣看得春入漸深東作將興土兵思歸務農除行諭殘苖許以不死聽其投順隨宜安插量留精鋭軍兵防守并挨捕不服招撫餘黨其餘大兵行令撤散已於本月二十七日具題外本年二月二十九日據湖廣平溪衛申稱本月二十五日有苖一夥突入思州府城捉虜府官焚燒房屋殺虜人財等情飛報到臣一面督令各該哨堡官兵黏縱截殺及行貴州分守該道撫苖參議劉望之體查得前項苖賊係龍許保為首并未獲吳黑苖等情備查到臣備將各該地方守土失事官員參行兵部覆題間本年四月二十二日又據參議劉望之呈稱本月初五等日苖賊出劫平頭貓兒囤等處又該官兵擒斬俘獲二百七十一名顆口呈報到臣及查得本年正月十四日以後各監統等官續報三哨通共續報擒斬俘奪八十五名顆口在案一併具本於本年四月二十八日具題訖本年五月初七日據貴州守參等官劉望之等呈稱懸賞設計擒獲極惡賊首龍許保連人呈解到臣審發湖廣湖北守巡兵備道審供監候即於本月初十日具本奉行兵部覆題奉聖旨張嶽等既擒獲首惡著待事寧之日巡按查明功罪一併奏請仍著嚴督各官務在剿絶餘黨以靖地方龍許保著彼處會官依律處決梟示欽此咨臣欽遵會行貴州撫鎮等官遵照欽依內事理於本年八月初七日將首惡龍許保押赴市曹依律典刑梟示及具本題知外又該臣看得未獲吳黑苖亦係屢奏有名與龍許保同為惡務期必獲庶不怙終作梗又經嚴督各該撫苖守巡兵備參備等官設法計擒并雕剿脅從餘黨隨據分守參議劉望之呈稱會同參將石邦憲嚴督委官指揮王世臣等督兵於龍塘等寨雕剿陸續擒斬俘奪總共三十二名顆解驗明白造册到臣案候在卷三十一年四月內據貴州參議劉望之副將趙之屏參將石邦憲呈稱銅平殘苖剿撫已定緣由前來駁行各官再查及行仰湖廣守巡湖北兵參等官查勘鎮筸各寨聽撫苖人造册繳報去後今據前因臣會同湖廣鎮守總兵官平蠻將軍東寧伯焦棟巡撫右副都御史屠大山四川巡撫右副都御史戴鱀貴州鎮守總兵官都督同知沈希儀巡撫右副都御史奉旨革職冠帶辦事任轍議照銅平鎮筸等處叛苖已該大舉官軍征剿及先後防守截殺雕剿總計擒斬俘奪共二千二百四十四名顆口貴州招撫過四百九十八名湖廣招撫過七百四十八名其奏內有名首惡龍許保仰賴我皇上威德使其醜類自執以獻已正典刑衆憤已雪三省地方因以寧謐止有新寨苖首吳黑苖一名漏刃未獲臣惟此賊因計擒龍許保之後即帶同親信一二苖人逺遁深山依恃深阻日則援崖哨望雖風吹草動彼亦猜防每遇鄉導或順苖一二人空身無兵甲者方得近前相去三四丈相見打話若四五人以上不問有無兵甲伊即驚疑閃避莫能相近草木蓊密嵐霧翳深東躲西藏又無定在只可計擒難以衆取欲舉官軍圍困摉捕因大兵撤散已久尤恐驚動方撫之苖誠有如各官所呈者如蒙乞敕兵部再加查議合無將臣俸糧照舊住支仍聽臣督併原監督按察司副使趙之屏該道分守參議劉望之分守參將石邦憲設法計擒稍遲嵗月暫示以寬緩之意俾其疑慮稍解防備稍寬人得近前一舉就擒以度後患其已撫過餘黨殘苖仍聽臣隨宜招撫省令革心向化永為良民以安地方如此庶上可紓九重南顧之憂下可致三省邊氓之福而臣瘝曠之罪亦或得以少逭矣除計處善後事宜另行具奏其三省監統領哨領隊撫苖等官功罪并賊犯首級先該各紀功官查明造報聽各該巡按御史核實徑自造册奏繳外緣係云云斬獲首惡吳黑苖地方事寧完報疏題為斬獲首惡苖賊地方事寧完報事臣於嘉靖三十一年十月初八日據貴州布按二司原監督整飭都清兵備分巡新鎮道副使趙之屏分守思仁道兼撫苖右參議劉望之整飭思石兵備分巡思仁道僉事龍遂會同分守貴州銅仁等處地方右參將石邦憲呈稱斬獲首惡苖賊吳黑苖首級到臣隨準參將石邦憲手本開稱自大征之後節奉總督并撫按總兵行委設計擒斬首惡會同撫苖參議劉望之重行懸賞屢差鄉健督同苖長順苖各用計擒斬及將吳黑苖叔吳黨所親男吳永順羈留府城激其速圗後因久未成功又蒙責成原監督副使趙之屏坐委烏羅郎溪二司土官田興邦楊瑛圗取必須彼此合謀同幹本職節行烏朗二司及差頭目盧思剛督率守催又該分巡思仁兵備僉事龍遂據土官田興邦稟據土舍楊勝原報稱本賊因參府衙門鄉導人等窺捕太嚴以致疑懼尤甚防備愈密不便動手遂將原差鄉健人等通行禁止不容入寨及將原羈留吳永順放回以安其心庶事可圗至本年八月二十四日該烏朗二司守寨人役劉甫等將吳黑苖首級斬獲隨該撫苖道審據原差鄉健蕭奴祝銀同等并被虜放回鄉兵羅彬各稱吳黑苖的於八月二十四日該烏朗二司差人劉甫等入寨計斬首級背行因地所寨苖追趕爭功丢棄首級被唐寨苖人龍章保尋獲用火烘乾藏匿在家圗討厚賞續該分巡思仁兵備僉事龍遂量給犒賞督責土官田興邦於本年九月二十五日方才追取首級前來及取土官張文貴等原割兩耳各道督同思南銅仁二府知府李寀鄒廷澤烏朗二司土官楊瑛田興邦等辨驗明實取結具由解驗等因據此卷查先該臣遵照節奉敕旨切責嚴督各該撫鎮等官協心征剿事理欽遵將三省應剿叛苖舉兵征剿自嘉靖三十年正月內撤兵并撤兵後貓兒囤等處截殺及計擒首惡龍許保先後功次俱經陸續俱題訖又該臣看得苖首吳黑苖漏刃未獲亦係屢奏有名與龍許保同惡不相上下恐怙終作梗又經嚴行貴州都布按三司轉行各該撫苖守巡兵備參備等官設法計擒首惡並雕剿脅從餘黨及招撫殘苖嘉靖三十一年四月內行據貴州原監督副使趙之屏分守思仁撫苖右參議劉望之分守銅仁右參將石邦憲呈稱銅平殘苖剿撫已定止有新寨吳黑苖因龍許保計擒之後伊即驚遁已將伊族長吳黨所親男吳永順拘留執當著落名下跟要無奈本賊傷弓之鳥遁迹愈堅只得另行計擒免致剿撫兩誤等因并據湖廣布政司分守湖北道兼管撫苖右參議陶欽夔湖廣按察司整飭辰沅兵備副使髙節分巡湖北道僉事曾才漢分守鎮筸等處地方右參將孫賢呈繳查勘過鎮筸各寨聽撫苖人造册前來該臣會同湖廣鎮守總兵官平蠻將軍東寧伯焦棟巡撫右副都御史屠大山四川巡撫右副都御史戴鱀貴州鎮守總兵官都督同知沈希儀巡撫右副都御史先革職冠帶辦事今病故任轍議照銅平鎮筸等處叛苖已該大舉官兵征剿及先後防守截殺雕剿總計擒斬俘奪共二千二百四十四名顆口貴州招撫過四百九十八名湖廣招撫過七百四十八名其奏內有名首惡龍許保仰賴我皇上威德使其醜類自執以獻已正典刑衆憤已雪三省地方因以寧謐止有新寨苖首吳黑苖一名漏刃未獲仍聽臣督併原監督副使趙之屏該道分守參議劉望之參將石邦憲設法計擒稍遲嵗月暫示以寬緩之意俾其疑慮稍解防備稍寬人得近前一舉就擒以杜後患其已撫過餘黨殘苖仍聽臣隨宜招撫省令革心向化永為良民其三省監統領哨領隊撫苖等官功罪并賊犯首級先該各紀功官查明造報聽各該巡按御史核實徑自造册奏繳等因具本於本年六月二十五日具奏訖續該臣查訪得吳黑苖往來湖廣回保等寨依親濳躲節差千户張克新李美張愛齎捧旗牌前往銅仁坐鎮催功及行湖廣分守湖北道撫苖右參政陶欽夔整飭辰沅兵備副使髙節分巡湖北道僉事曽才漢分守鎮筸右參將孫賢督併各該土官并守備防守等官多方爪探毋分彼此一體計擒及揀委指揮袁崇友千户江添澤等節次領兵前去協同貴州巡守兵備參將各官原委守備張大儒知府鄒廷澤李寀指揮王世臣奚都經歷劉仲芳土官田興邦楊瑛吏目郝以芳田紹甫土舍楊勝原李承祖等分設計擒共收全䇿至本年八月二十六七等日節據貴州守巡兵備參將等官趙之屏劉望之龍遂石邦憲等報稱首惡吳黑苖已該烏朗二司差人劉甫等於八月二十四日在寨斬訖及據烏朗二司土官田興邦楊瑛各亦稟報相同行據各官回稱所斬首級被唐寨苖人奪匿求賞等因就經駁查追取并嚴諭地所唐寨各苖不許爭功讐殺及將殺死土舍土兵楊勝金等優恤去後今據解到該臣督同湖廣按察司整飭辰沅兵備副使髙節貴州整飭思石兵備分巡思仁道僉事龍遂當堂將解到首級并原割兩耳逐一紀驗明白除將首級發仰銅仁參將石邦憲轉發苖出要路梟挂外為照首惡苖賊吳黑苖慿山菁之險恃種類之繁倡亂多年流毒三省攻衙門而虜官奪印劫村寨而放火殺人虐熖滔天肆無忌憚自夫大舉之初負固梗化班師之後復出跳梁乃今罪惡貫盈天奪其魄遂使官兵用命一舉斬獲此皆仰仗我皇上神武昭布之所致况前此犂庭掃穴醜類久已膽落即今渠魁皆誅殘黨愈覺心畏地方自是而寧三省邊岷庶有安枕之日矣除有功人員聽該省巡按御史查照原行核查功罪一併查明奏請外為此具本専差承差鄧伯阡親齎謹具題知小山類稿卷五
