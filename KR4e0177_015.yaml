body:
  text: 小山類稿卷十五明張嶽撰祝文亷州建啓聖祠告先師文乃者聖天子稽古禮輯羣議原本先師之所自生命天下學宫皆得立啓聖公祠所以尊隆道統之典曠絶千古而荒郡有司奉承弗虔制度物采一切茍簡甚非詔書意也某不勝悼懼謹與學官諸生議改建于先師廟左卜日興工咸以詔書從事庶足慰先師在天之靈且仰稱聖天子尊崇道統之意某與學官諸生朝夕瞻依亦有所興起惟先師實鑒臨之謹告遷合浦縣學告土地文維山川之氣時翕時見皆有神以司之若翕久而數將通則神之精光浮動渙發與人心目有不謀而自遇者某等乘茲將通之數改建邑校于郡城南方陽位歲丙日丁文明參合維神久顓其司而機實使之某等又將永賴神力以圖功于不墜者也敢不虔告祭告海潮文本府海潮之神大廉和融二山材良且堅以珍珠禁厲舟楫弗敢通而郡中公私興作日尋斧斤於近郊材鮮良而山將竭民又以病告某嘗與僚吏僉議欲有以均節而紓其力邇者改建合浦縣學令梓人於二山擇其可材梁棟榱桷者斷而取之將由海漘以達江干惟風水參差非憑仗神靈則曷由以濟假以數日之晴木集于肆士有棲止而民不重勞在神倏然呼吸間耳而某與僚吏諸生受賜則既大矣故敢竭誠以叩尚饗廉州祈雨告社稷文古之良有司教民稼穡相五土之宜並蒔五穀故雖有水旱不能為災太守為政三年矣猶有不墾之田不種之穀靦顔事神憂愧無已神不垂矜憫又督以災旱是使太守不能有其民而終無以事神也神為民而立太守為民而來旱乾纍旬民且薦飢豈特太守之責邪維神黽思其責使太守有所倚仗以育其民不勝幸甚告山川文此邦之人無溝洫墟岸以耕無貿遷蓄聚以食取給於歲而仰成于天數月不雨釋其犁鋤以待飢饉流莩而已夫民不能自力為旱備以至於旱而無以救之此長吏勸農無狀之過也吏信有罪矣神崇深變化血食此土寧忍坐視其燋炕而莫之恤乎惟大霈甘澤以紓此旦夕之急而適長吏以罪固無所辭也謹告告城隍文自去冬不雨至于今五閲月矣此邦素號多雨或連隂弗解漲潦驟至以至妨害稼穡者乃其常也而未嘗病于旱乃今病甚矣穀將投土而不得敷芒以達一年之計邈焉無望此吏不良于政有以致之宜獨蒙其罰民則奚辜惟神聰明正直司命此土吏知無所逭罪敢以自歸于神而為無辜之民請命惟神其鑒照之告殿中公墓文嗚呼文獻公兄弟四人惟公子姓最蕃公諸子傳者九房惟第五房僕射府君子姓尤蕃且顯而厯唐五季遷徙離散在宋惟廣漢在今日惟我錦田尚知為系出于公也始興之裔寧能無人昧厥本原至牢原丘墓亦以文獻夫人訛之蓋譜牒放失世派無傳子孫不知祖公而祖文獻亦其勢然也近者丘壠之變繄羣不逞豈能毁傷公精靈在天體魄在地餘庇在血屬磅礴憤鬱必有所假手而發使志銘流于人間然後訛謬始正亦有數然也志公墓者有云惟嶽降靈自天鍾美某初字鍾靈而名幼時先人所命也始符守以盜伐文獻夫人墳移文諸司某曰此非夫人必我殿中而稱夫人者同辭某曰必不得已則啓視之以囑符守啓之而果然不肖名與字又見諸志者如此噫其偶然邪公精靈在天體魄在地餘庇在我血屬必有時而發其非偶然也在宋惟廣漢在今曰惟我錦田子孫之克靈承公庇者亦希矣公能無意于冥冥中邪公勳階封贈碑文尚傳謹伐石大書以表隧道惜子孫之在始興者既無以辨其所出某輩又不能舍閩中丘壠來此將謀作屋買田以奉春秋而託始興族人守之他日子孫能來此者則令一人來此就不能來牢原丘墓庶幾可以無廢嗚呼其可念也已公靈有知尚其鑒亮尚饗韶州三祖祠告文逺祖殿中府君僕射府君祕書府君之神曰惟我三祖奕世相承德業風節史册大書有足以興起邦人於百世之下不但為一門一時之光而已喪亂之後文獻逸淪聲影沈歇能知系閥名諱者亦少矣况所謂百世興起者邪某逺藉先緒竊祿來此既表揭墳墓方謀作祠屋以續香火而有司以繫官田廬來告請稽典禮登載郡祀使鄉人後進考論流風有所師仰輿論所同某不敢辭謹涓嘉辰率有司郡士及族家子孫奉安神靈伏惟即安宇居用答羣情髙風激揚百世如見尚饗英德告辭先大夫祠文惟我顯考當正德末為天子作牧茲土惠化洽流登食明祀不肖孤蒙被先訓備藩嶺嶠嗣德無堪叨忝溢分茲者蒙恩晉二中臺督撫南楚奔奉簡書拜别祠下追慕音容曷勝摧愴伏惟盛德流光子孫民庶實兼覆庇不肖孤責重材輕若涉淵氷冀憑先靈默賜保佑庶幾弗墜官常以為縉紳羞惟顯考其鑒臨之尚饗江西撫院祭土地文本院土地之神惟茲中執法之地有神以司之豈惟相協厥居亦將謹察其行事以告于帝而賞罰之歲序告成一歲之公私隱顯咸在神聰某不敢有所祈也惟恭舉常事以報神相協之德尚饗祭井文本院司井之神惟神抱寒洌之性居吾堂廡之下而混在泥滓辱於隸人者多年矣夫耳目蔽于近者尚如此况人情之遁于幽逺者乎此吾所以重有愧於神也諏工淘治泥渣去而寒洌通神毋以不食為惻惟益懋養人之功以與汲者並受其福尚饗梅嶺告曲江公祠文公昔閔越人綿材薄力負任于層崖之徑故改鑿此嶺化其險阻以為坦夷人之勞者稍康矣然而南海貨貝絺絲器用盈貪墨之橐方軌北走者亦歡號稱便誅求益深膏血日竭茲嶺實崇之厲階也公忠孝正直日閲北走之行李見生靈之憔悴其亦無慨然于中乎邇者天子不以某愚無用付以全粵俾來督撫安車視履幸免九折之凌兢攬轡澄清愧乏昔賢之風采夫內不能以禮自克外又不能分别賢不肖濁潔而激揚勸懲以矯變風俗欲使紀綱正軍實修繁訟不興姦宄寢息嶺海內外咸遂生全者未之有也某之愚不能及此惟公默垂矜念遏其邪心而相其所欲為毋使異日嶺海之民有或眷顧斯道而澘然者則公之為鄉國賜不既深且溥乎入境之初敢控􅅹以告尚饗英德先君祠告文不肖孤昔赴鄖楚攜挈孫息拜别祠下逮今三載復被簡書督撫茲土顧惟君親之恩地厚天髙匪躬竭力萬未酬一仰慚先志俯愧僕馭幸茲密邇感愴益深遺訓所存庶幾夙夜惟先考其鑒臨之尚饗祭文合祭大司馬林泉山文嗚呼昔我憲宗孝宗及今皇上嗣位之初四十年間當國家豐亨之會而公以布衣諸生擢巍科躋華要與之終始何其盛也逮于暮年由南都天卿轉參外管厄于權姦以去則國是駸駸然變更矣一旦天子曠然昭悟彗掃羣姦還公舊秩不復煩以職事命有司四時存問其家恩至渥也議者猶以舊人未究所用為慨嗚呼公今已矣公有惇龎碩大之德有正直清約之操有鴻深典雅之學兼古大臣之所長者而多福眉夀有子有孫方之古人復何憾哉獨其遭逢而用不克終則夫去就進退之際又志士仁人所為痛哭流涕而不能已也某等鄉愚晚生髙山仰止銜哀一觴情寫千里尚饗合祭史筍江給事文嗚呼世之論富貴夀夭者兼觀器識而傳亦有動作威儀以定命之言今以吾筍江之死質之皆有不然何邪先生氣寂而顓貌和而肅言不妄發行必擇義其思湛靜而不浮其守確實而不二足以固其精神魂魄而致之於久逺者至于談理必究指歸論事必引大體責人不録瑕疵非局促繳繞不能厚受者比所謂富貴多夀皆先生所宜有而竟止於斯其故何邪先生卧病時吾輩日相與候問冀其速瘳已而體日加羸神氣日瘁吾輩竊疑之勉令餌藥先生曰吾誤餌二劑不與病對以此知庸醫無濟于病正當安卧以養之爾越數日愈甚則亟號之曰先生無容武之地貽子孫即不起亦有後命否曰任之矣明日屬纊嗚呼謂庸醫無濟于病並其良者拒之不納吾輩不知命者不能無憾于先生然觀其臨沒安定無一語雜亂則所以自信者亦固有道也邪嗚呼哀哉死生夀夭先生既無留滯又不肯為子孫無益之悲吾輩方且徵天援神歎恨修短經理其後事兼哀孤弱之失所欲為之曲處無亦非先生意邪世固有事不同而理同各發于誠各踐其義以即其心之所安則吾輩又恐力不能及心有不能盡以有愧于幽冥也已嗚呼哀哉樽酒豆肉朋知咸在歡宴幾何忽然慟哭信人生之難恃而哀樂之無終極也先生有靈其亦有以鑒此否乎嗚呼尚饗祭周兩山學憲文嗚呼昔在乙酉與公傾蓋于閩嶺之上一語論心是後不相聞者十載矣去歲五羊復遂良晤顧鄙性之愚戅昧世穽以前趨惟公閔我屢形言色提攜教誨情切弟兄暨我南來握手叮嚀謂當思明夷之訓謂弗蹈迷復之凶雖愚質之難矯敢不刻厲以率從窮荒遼落夢寐思公日望征車遽此承凶嗚呼哀哉敦厚之資沈敏之識而今不可復見矣某羈此官守莫獲撫殮清樽束帛聊寄哀忱公靈不昧尚其鑒此尚饗祭鄒靜齋學正文嗚呼昔兩漢盛時士大夫爭以忠厚禮讓相漸摩朝廷之所選舉鄉里之所甄評以及士大夫論交取友必先問其人長者與否至永平建初之間長者風誼微矣士有一言近忠厚者衆猶矍然訝之曰是安得長者之言邪長者之行不可見而聞其言猶知異而重之此漢所以近古也歲在癸酉與公計偕北上公長數歲我呼為兄同時二三友皆少年氣盛談論潦倒抵掌噭呼公以醇古之氣泊其間語無譁而心不競蔚然長者之風也當是時某與二三友者莫不斂袵於公矣朴俗既散前輩風誼日益逺至鄉井習尚亦漸變于時得聞長者之言鮮矣而况於其行邪公自偕計後即教郴陽歸卧林丘始終二十餘年篤踐于忠厚禮讓而不衰士大夫有動世變之思而欲逺挹流風于兩漢之盛者不於公乎觀行而誰觀公子君哲持嶺東憲節料兵于亷典刑公也器業又駸駸逺到未艾蓋萬石之後必昌于公之門當大漢世名卿大抵多長者子孫也公沒而不亡者其不在于此乎情阻獻奠文以告哀公靈不昧尚其饗之祭大司馬毛東塘文惟公秉金玉之資具經綸之材遭際清朝蜚聲仕路始理郡刑名揚浙水繼秉霜簡望重臺端旋由棘署進陟中丞詳讞人以無寃撫循獨持大體既乎晚節復遇聖明南平交夷長纓繫銜璧之酋北經塞垣千里息暮煙之燧比綱紀乎內臺復張皇于本兵老成重于典刑輿論方歸精神未及折衝時運多阻甫懸里門之車遽呼臯某之復逺略炳其若存文江為之失色嗚呼哀哉某學非有用久辱公知推轂所及寧由莩管尺書相示莫非肺肝闊别數年期再陪乎杖屨分流一嶺遂永隔於幽冥初聞訃音驚若夢寐莫叩西州之扉永絶鍾期之響寄哀一奠悠悠千里嗚呼哀哉尚饗祭學憲陳紫峯文嗚呼紫峯一世人豪有蟠屈萬古之心胸有瀉落長江之辨論文足以籠罩百物氣足以旁魄宇內不但今世之所希雖古稱邁往之士亦或難之至於孝友天性造詣深醇飭躬砥行慕義強仁有避世之深心而非玩世無道學之門戶而有實學非特邁往之士所難雖世之號為講學君子或未能以無歉於茲方其擢第大廷服官比部羣公斂袵士友傾心謂瑚璉之器宜亟登于清廟乃卷而懷之以自輝媚于山澤之間一丘一壑一觴一詠遺落世情逍遙物外夫其學問之成諸已固已渙然而自得其出處去就之際又峻潔光明而無疵尚論人豪舍兄其誰嗚呼紫峯自昔豪傑遁世類多有託故步兵長醉五栁耽詩兄嘗評論人物至陳元龍孔文舉之為人慨然嘆曰廣陵之樓百尺北海之樽不空人生如此足矣擾擾何為此正德末年也其高風逺韻殆將翺翔千仞之表奚止樓坐元龍樽湛文舉而已邪某之交兄實自丁丑京華雪夜古寺疏燈舉觴相誨無扣不鳴兄惟我師豈云其友一别十年尺書再通尚冀他日言宴從容去歲之夏次崖書來以兄訃告開緘失聲手足如墜嗚呼紫峯兄果厭世而長往耶哲人即逝吾無以為質矣隻雞斗酒其能有以酬宿草而寫悲腸也邪尚饗祭座師大司徒李涔涯文惟公弱冠擢第兩宰名城寬嚴互用政稱廉平御史持斧秋肅春生爬梳利病條貫繩繩豫告里居寡所將迎起整戎旅灕水為清榆中列棨尊俎甲兵入二太宰載陟夏卿兩都回翔邦賦作程歸守林泉衆望方並疾病乘之竟阻千齡標髙多風臺崇忽傾屈伸孰尸元化冥冥嗚呼哀哉公昔按閩秋試懸衡虛薄無取能為重輕羣視驟駭公眼獨明心期浩邈歲月峥嶸顧安蹇步恐負生成往赴漢上公門停旌歡笑握手誨屬丁寧及茲再來翳翳荒塋墓木未拱狐兔縱橫追惟夙誼悲哽填膺願言灑掃逼此嚴征芷蘭薦潔毫素敷誠躊躇忍去寸心紆縈公神不昧庶其我聽尚饗祭許松臯閣老文惟公世哲宗工登庸三事承家體國竭孝盡忠蘇聨父班亟見稱於廣平范繼先志亦收功于元祐前有元祐之遭故進而必申其守旁乏廣平之助故退則必決于義終始大節無愧前聞園依獨樂尚結餘忠表留午橋遂齎宿恨嗚呼哀哉某素無先容特深知顧起自淪落置之雄班某非有求公豈為賜奬以大義成其至公門館未登書記僅奏惟有此心耿耿在側承役荆楚北望洛師瓣香欲展路阻願違緘辭千里臨岐涕揮尚饗祭馬明山長史文嗚呼吾駐沅二載所閲士大夫多矣求其德器謹質趣尚端正語皆由衷動不逾則如君者不多得也君見幾辭祿結廬明山之下一室靜坐翛然有塵外之志余每造之竟日忘歸君亦時或詣余喜為余傾倒焉不見月餘遽以訃告雲山失色逝水滔滔使余安得不遡髙風而永歎悼後遊之無從也一尊寄哀君其我鑒尚饗祭徐方伯波石文嗚呼沅江之變因循十餘年必待君一死然後討賊之義明敵愾之氣振其有關于滇南大數亦不小矣悠悠之議亦有訾其涉于輕者君篤信所學而以死守之不擇難易不眩異同皎然不欺其志以即夫心之所安此今人之所難而古人之所必取者悠悠者奚足知君邪衣冠之櫬東過潕水念昔相與意氣若存臨奠抒情君聞不聞尚饗祭任竹坡中丞文嗚呼與公共事征苗之役自秋徂春七更蓂莢聚師于疆峙糧于庾萬騎前驅夷厥險阻苗頑幾即工矣而狂狡濳作越又兩月乃縛其渠魁輯撫餘衆方審察利害毋違好惡養同吾人爰俾得所而公以勞瘁舍我而徂良工心苦誰復知者我雖知之又未敢言嗚呼哀哉公有溫良之性精敏之才潔白之行蓋世所需以為用者一方猶以為小小亦不可留焉天於斯世于善人果何如也雖然沒于官署無異正寢寮屬視斂無異子孫以死勤事義配古人處世雖短而不亡者長公又奚憾聞公之病問訊相屬比聞公訃不能往哭老病支離感念今昨臨風一慟哀徹冥漠尚饗小山類稿卷十五
